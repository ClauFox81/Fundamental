function SuppsOnlyScreen({profile}) {
  const [suppChecked, setSuppChecked] = useState({});
  const todayStr = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();

  useEffect(()=>{
    load("supps:"+todayStr).then(v=>{if(v)try{setSuppChecked(JSON.parse(v));}catch(e){}});
  },[]);

  const toggleSupp = async(name) => {
    const nc = {...suppChecked,[name]:!suppChecked[name]};
    setSuppChecked(nc);
    await save("supps:"+todayStr, nc);
  };

  const sp = SUPPS(profile);
  const taken = sp.filter(s=>suppChecked[s.n]).length;
  const isMale = profile?.gender==="male";
  const isSm = profile?.conditions?.includes("smoker");
  const isPeri = !isMale&&(profile?.menopause==="peri"||profile?.menopause==="post");
  const tags=[];
  if(isMale) tags.push({l:"Hombre activo",c:"#7A9E8A"});
  else tags.push({l:"Mujer activa",c:"#C8845A"});
  if(isPeri) tags.push({l:"Perimenopausia",c:"#E8A87A"});
  if(isSm) tags.push({l:"Fumadora/or",c:"#E07070"});

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Suplementos</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Protocolo personalizado para tu perfil.</div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Protocolo personalizado para</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {tags.map((t,i)=>(
            <span key={i} style={{fontSize:11,padding:"3px 10px",borderRadius:20,
              background:`${t.c}15`,border:`1px solid ${t.c}44`,color:t.c,fontWeight:500}}>
              {t.l}
            </span>
          ))}
        </div>
      </div>
      <div className="card" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Tomados hoy</div>
          <div className="serif" style={{fontSize:28,fontWeight:500,color:G.crm}}>{taken} <span style={{fontSize:14,color:G.sft,fontFamily:"DM Sans"}}>/ {sp.length}</span></div>
        </div>
        <svg viewBox="0 0 40 40" width="52" height="52">
          <circle cx="20" cy="20" r="16" fill="none" stroke={G.bor} strokeWidth="3"/>
          <circle cx="20" cy="20" r="16" fill="none"
            stroke={taken===sp.length?G.grn:G.acc} strokeWidth="3"
            strokeDasharray={`${(taken/sp.length)*100} 100`}
            strokeLinecap="round" transform="rotate(-90 20 20)"
            style={{transition:"stroke-dasharray .4s"}}/>
        </svg>
      </div>
      {["alta","media","baja"].map(pr=>{
        const group = sp.filter(s=>s.pr===pr);
        if(!group.length) return null;
        return (
          <div key={pr} style={{marginBottom:16}}>
            <div style={{fontSize:11,color:pr==="alta"?G.err:pr==="media"?G.acc:G.mut,
              letterSpacing:1,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:pr==="alta"?G.err:pr==="media"?G.acc:G.mut,display:"inline-block"}}/>
              Prioridad {pr}
            </div>
            {group.map(s=>(
              <div key={s.n} className="card" style={{marginBottom:10,opacity:suppChecked[s.n]?.7:1,transition:"opacity .3s"}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <button onClick={()=>toggleSupp(s.n)}
                    style={{width:24,height:24,borderRadius:6,flexShrink:0,cursor:"pointer",marginTop:2,
                      background:suppChecked[s.n]?G.grn:"transparent",
                      border:`2px solid ${suppChecked[s.n]?G.grn:G.bor}`,
                      display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    {suppChecked[s.n]&&<span style={{color:"#fff",fontSize:14}}>✓</span>}
                  </button>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                      <div style={{fontSize:14,fontWeight:600,color:G.crm,textDecoration:suppChecked[s.n]?"line-through":"none"}}>{s.n}</div>
                      <div style={{fontSize:11,color:G.acc,marginLeft:8,flexShrink:0}}>{s.d}</div>
                    </div>
                    {s.t && <div style={{fontSize:11,color:G.grn,marginBottom:3}}>⏰ {s.t}</div>}
                    {s.hi
                      ? <div style={{fontSize:11,color:G.sft,marginBottom:3,fontWeight:500}}>⚡ {s.perf}</div>
                      : <div style={{fontSize:11,color:G.mut,marginBottom:3}}>{s.perf}</div>
                    }
                    <div style={{fontSize:12,color:G.sft,lineHeight:1.5}}>{s.why}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      })}
      <div style={{background:"rgba(90,122,98,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:20,padding:14,fontSize:12,color:G.sft,lineHeight:1.7}}>
        💡 Consulta con tu médico antes de iniciar cualquier protocolo. Para D3 solicita un análisis de sangre primero.
      </div>
    </div>
  );
}

// ── PROFILE CODE ──────────────────────────────────────────────────────────
function encodeProfile(p) {
  try {
    const parts = [
      (p.name||'').replace(/[|]/g,''),
      p.gender==='male'?'M':'F',
      p.age||0, p.weight||0, p.height||0, p.restingHR||0,
      {sedentary:'S',light:'L',moderate:'M',active:'A',athlete:'AT'}[p.activity]||'M',
      {recomp:'RC',fat_loss:'FL',muscle:'MU',health:'HE'}[p.goal]||'RC',
      {none:'N',pre:'PR',peri:'PE',post:'PO'}[p.menopause]||'N',
      {beginner:'B',intermediate:'I',advanced:'A',expert:'E'}[p.trainingYears]||'B',
      p.muscleLevel||'average',
      (p.conditions||[]).join(',')
    ];
    return 'FND2:' + btoa(parts.join('|'));
  } catch(e) { return ''; }
}
function decodeProfile(code) {
  try {
    if(!code) return null;
    code = code.trim();
    let raw;
    if(code.toUpperCase().startsWith('FND2:')) {
      raw = atob(code.slice(5));
    } else if(code.toUpperCase().startsWith('FND:')) {
      // legacy
      raw = atob(code.slice(4));
    } else return null;
    const parts = raw.split('|');
    const [name,g,age,weight,height,rhr,act,goal,mn,ty,ml,conds] = parts;
    return {
      name: name||'',
      gender: g==='M'?'male':'female',
      age: +age||0, weight: +weight||0, height: +height||0,
      restingHR: +rhr||null,
      activity:{S:'sedentary',L:'light',M:'moderate',A:'active',AT:'athlete'}[act]||'moderate',
      goal:{RC:'recomp',FL:'fat_loss',MU:'muscle',HE:'health'}[goal]||'recomp',
      menopause:{N:'none',PR:'pre',PE:'peri',PO:'post'}[mn]||'none',
      trainingYears:{B:'beginner',I:'intermediate',A:'advanced',E:'expert'}[ty]||'beginner',
      muscleLevel: ml||'average',
      conditions: conds?conds.split(',').filter(Boolean):[]
    };
  } catch(e) { return null; }
}

function ModoPlato({profile, onAdd, onClose}) {
  const tg = calcTargets(profile);
  const [selections, setSelections] = useState({proteina:"", carbo:"", vegetal:"", grasa:""});
  const [porciones, setPorciones] = useState({proteina:1, carbo:1, vegetal:2, grasa:0.5});

  const PLATO_OPTIONS = {
    proteina: ["Pollo cocido","Res","Salmón","Atún","Huevos","Yogurt griego","Tofu"],
    carbo: ["Arroz blanco cocido","Arroz integral cocido","Papa cocida","Batata cocida","Pasta cocida","Quinoa cocida"],
    vegetal: ["Brócoli cocido","Ensalada mixta","Espinaca","Zanahoria cocida","Zucchini cocido","Pimentón"],
    grasa: ["Aguacate","Aceite de oliva","Nueces","Mantequilla de maní"],
  };

  // Portion sizes in grams
  const PORTION_G = {proteina:120, carbo:150, vegetal:100, grasa:30};

  const getItem = (type, name) => {
    const g = PORTION_G[type] * porciones[type];
    const food = DB.find(f=>f.n===name||f.a?.includes(name.toLowerCase()));
    if(!food) return null;
    const factor = g/100;
    return {n:`${name} (plato)`,g,p:Math.round(food.p*factor*10)/10,c:Math.round(food.c*factor*10)/10,f:Math.round(food.f*factor*10)/10,k:Math.round(food.k*factor),fi:Math.round(food.fi*factor*10)/10};
  };

  const addAll = () => {
    const items = Object.entries(selections)
      .filter(([,v])=>v)
      .map(([type,name])=>getItem(type,name))
      .filter(Boolean);
    if(items.length) onAdd(items);
    onClose();
  };

  const totalCal = Object.entries(selections).reduce((acc,[type,name])=>{
    const item = name ? getItem(type,name) : null;
    return acc + (item?.k||0);
  },0);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:"20px 20px 0 0",
        padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:G.bor,borderRadius:2,margin:"0 auto 16px"}}/>
        <div className="serif" style={{fontSize:20,fontWeight:500,color:G.crm,marginBottom:4}}>Modo Plato</div>
        <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Arma tu plato por secciones. Sin báscula.</div>

        {[
          {key:"proteina",label:"🥩 Proteína (¼ del plato)",color:G.acc},
          {key:"carbo",label:"🍚 Carbohidrato (¼ del plato)",color:"#EAC850"},
          {key:"vegetal",label:"🥦 Vegetales (½ del plato)",color:G.grn},
          {key:"grasa",label:"🥑 Grasa saludable",color:"#A89EC0"},
        ].map(({key,label,color})=>(
          <div key={key} style={{marginBottom:14}}>
            <div style={{fontSize:12,color:color,fontWeight:600,marginBottom:6}}>{label}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
              {PLATO_OPTIONS[key].map(opt=>(
                <button key={opt} onClick={()=>setSelections(s=>({...s,[key]:s[key]===opt?"":opt}))}
                  style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",
                    border:`1.5px solid ${selections[key]===opt?color:G.bor}`,
                    background:selections[key]===opt?`${color}15`:"transparent",
                    color:selections[key]===opt?color:G.sft}}>
                  {opt}
                </button>
              ))}
            </div>
            {selections[key] && (
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:G.mut}}>Porciones:</span>
                <button onClick={()=>setPorciones(p=>({...p,[key]:Math.max(0.5,p[key]-0.5)}))}
                  style={{width:24,height:24,borderRadius:"50%",background:G.sur,border:`1px solid ${G.bor}`,cursor:"pointer",color:G.sft}}>−</button>
                <span style={{fontSize:13,color:G.crm,fontWeight:600}}>{porciones[key]}</span>
                <button onClick={()=>setPorciones(p=>({...p,[key]:p[key]+0.5}))}
                  style={{width:24,height:24,borderRadius:"50%",background:G.grn,border:"none",cursor:"pointer",color:"#fff"}}>+</button>
                <span style={{fontSize:11,color:G.sft}}>{Math.round(PORTION_G[key]*porciones[key])}g est.</span>
              </div>
            )}
          </div>
        ))}

        {totalCal>0 && (
          <div style={{background:G.sur,borderRadius:10,padding:"10px 14px",marginBottom:14,
            display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:G.sft}}>Total estimado</span>
            <span style={{fontSize:13,fontWeight:600,color:G.crm}}>{Math.round(totalCal)} kcal</span>
          </div>
        )}

        <button onClick={addAll} disabled={!Object.values(selections).some(Boolean)}
          style={{width:"100%",background:Object.values(selections).some(Boolean)?G.grn:"rgba(255,255,255,.06)",
            color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Agregar al registro →
        </button>
      </div>
    </div>
  );
}

function MiEntrenoView({workoutLog, setWorkoutLog, todayStr, onRegister}) {

  const [registered, setRegistered] = useState(false);

  const [rutinasGuardadas, setRutinasGuardadas] = useState([]);

  const [nombreRutina, setNombreRutina] = useState("");

  const [searchQ, setSearchQ] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    Promise.all([
      loadJSON(ENTRENO_KEY),
      loadJSON(RUTINAS_KEY),
    ]).then(([d, r])=>{
      if(d && d.ejercicios) setEjercicios(d.ejercicios);
      if(r) setRutinasGuardadas(r);
      setLoading(false);
    });
  },[]);

  const saveEntreno = async(exs) => {
    const data = {date: todayStr, ejercicios: exs, };
    await save(ENTRENO_KEY, data);
    // Auto-update saved rutina with latest weights/reps
    if(loadedRutinaRef.current) {
      const updatedRutinas = rutinasGuardadas.map(function(ru) {
        return ru.id === loadedRutinaRef.current
          ? Object.assign({}, ru, {ejercicios: exs, actualizadaEl: todayStr})
          : ru;
      });
      save(RUTINAS_KEY, updatedRutinas);
      setRutinasGuardadas(updatedRutinas);
    }
    // Also update workoutLog
    const newLog = {...(workoutLog||{}), [todayStr]: {
      ...((workoutLog||{})[todayStr]||{}),
      miEntreno: data,
      date: todayStr,
      block: "Mi Entreno",
    }};
    setWorkoutLog(newLog);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

// ─── 90 SECONDS TIMER ────────────────────────────────────────────────────────
function NinetySecondsTimer({onClose, activeLab}) {
  const [seconds, setSeconds] = useState(90);
  const [phase, setPhase] = useState("breathe-in"); // breathe-in, hold, breathe-out
  const [running, setRunning] = useState(true);
  const [completed, setCompleted] = useState(false);
  const [emotion, setEmotion] = useState("");

  useEffect(()=>{
    if(!running || completed) return;
    if(seconds <= 0) {
      setRunning(false);
      setCompleted(true);
      // Save to log
      const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
      loadJSON("ninety_log").then(log=>{
        const newLog = log || {};
        newLog[today] = (newLog[today] || 0) + 1;
        save("ninety_log", newLog);
      });
      return;
    }
    const t = setTimeout(()=>setSeconds(s=>s-1), 1000);
    return ()=>clearTimeout(t);
  },[seconds, running, completed]);

  // Breathing cycle: 4s in, 4s hold, 6s out (14s cycle)
  useEffect(()=>{
    if(!running || completed) return;
    const cycle = (90 - seconds) % 14;
    if(cycle < 4) setPhase("breathe-in");
    else if(cycle < 8) setPhase("hold");
    else setPhase("breathe-out");
  },[seconds, running, completed]);

  const phaseLabel = {
    "breathe-in":"Inhala",
    "hold":"Sostén",
    "breathe-out":"Exhala"
  }[phase];

  const phaseColor = {
    "breathe-in":"#A89EC0",
    "hold":G.acc,
    "breathe-out":G.grn
  }[phase];

  const circleScale = phase==="breathe-in"?1.3 : phase==="hold"?1.3 : 0.8;

  if(completed) {
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(13,17,23,.96)",zIndex:9999,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
        <div className="serif" style={{fontSize:32,fontWeight:500,color:G.crm,marginBottom:12,textAlign:"center"}}>
          90 segundos.
        </div>
        {(activeLab?.n === 3 || activeLab?.n === 8) ? (
          <>
            <div style={{fontSize:11,color:G.terra,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
              Lab activo: {activeLab.title}
            </div>
            <div style={{fontSize:15,color:G.crm,marginBottom:24,textAlign:"center",lineHeight:1.8,maxWidth:340,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>
              {activeLab.n === 3 
                ? "Las emociones duran 90 segundos si no las alimentas. Acabas de demostrarlo."
                : "Notar → Elegir → Actuar. Los 90 segundos son el espacio donde la elección sucede."}
            </div>
            <div style={{fontSize:13,color:G.sft,marginBottom:24,textAlign:"center",lineHeight:1.7,maxWidth:320}}>
              ¿Cuál es tu próxima elección?
            </div>
          </>
        ) : (
          <div style={{fontSize:15,color:G.sft,marginBottom:32,textAlign:"center",lineHeight:1.7,maxWidth:320}}>
            La emoción ya pasó por su ciclo bioquímico completo. Lo que sientes ahora ya es decisión, no impulso.
          </div>
        )}
        <div style={{width:"100%",maxWidth:360,marginBottom:24}}>
          <label style={{fontSize:12,color:G.acc,display:"block",marginBottom:8}}>
            ¿Qué sentías? (opcional)
          </label>
          <input value={emotion} onChange={e=>setEmotion(e.target.value)}
            placeholder="ej: rabia, ansiedad, urgencia..."
            style={{width:"100%",background:G.sur,border:`1px solid ${G.bor}`,borderRadius:10,
              padding:"10px 14px",color:G.crm,fontSize:14,outline:"none"}}/>
        </div>
        <button onClick={async()=>{
          if(emotion.trim()) {
            const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
            const log = await loadJSON("ninety_emotions") || {};
            log[today] = log[today] || [];
            log[today].push({time:new Date().toISOString(), emotion:emotion.trim()});
            await save("ninety_emotions", log);
          }
          onClose();
        }}
          style={{background:G.grn,color:"#fff",border:"none",borderRadius:16,
            padding:"14px 32px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Cerrar
        </button>
      </div>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,17,23,.96)",zIndex:9999,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
      <button onClick={onClose}
        style={{position:"absolute",top:24,right:24,background:"transparent",border:"none",
          color:G.sft,fontSize:24,cursor:"pointer"}}>×</button>

      <div style={{fontSize:11,color:G.acc,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>
        90 segundos
      </div>
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:48,textAlign:"center",maxWidth:320,lineHeight:1.5}}>
        La emoción es una ola. Solo respira.
      </div>

      {/* Breathing circle */}
      <div style={{position:"relative",width:240,height:240,marginBottom:32,
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",width:240,height:240,borderRadius:"50%",
          border:`2px solid ${phaseColor}`,opacity:0.2,
          transform:`scale(${circleScale})`,transition:"transform 4s ease-in-out"}}/>
        <div style={{position:"absolute",width:160,height:160,borderRadius:"50%",
          background:`radial-gradient(circle, ${phaseColor}30, transparent)`,
          transform:`scale(${circleScale})`,transition:"transform 4s ease-in-out"}}/>
        <div style={{textAlign:"center",zIndex:2}}>
          <div style={{fontSize:48,fontWeight:300,color:G.crm,fontFamily:"'Fraunces',serif"}}>
            {seconds}
          </div>
          <div style={{fontSize:13,color:phaseColor,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>
            {phaseLabel}
          </div>
        </div>
      </div>

      <div style={{fontSize:12,color:G.sft,textAlign:"center",maxWidth:280,lineHeight:1.6}}>
        Las emociones duran 90 segundos si no las alimentas con pensamiento.
      </div>
    </div>
  );
}


function MorningRitual({profile, premise, healingLog, onComplete, onSaveHealing}) {
  const today = localDateStr();
  const hour = new Date().getHours();
  const [step, setStep] = useState(1);
  const [selectedPilar, setSelectedPilar] = useState(null);
  const [premiseText, setPremiseText] = useState("");
  const [gratitud, setGratitud] = useState("");
  const [movimiento, setMovimiento] = useState(null);
  const [cierreText, setCierreText] = useState("");
  const [breathActive, setBreathActive] = useState(false);
  const [breathSecs, setBreathSecs] = useState(120);
  const [breathPhase, setBreathPhase] = useState("inhale");
  const [breathDone, setBreathDone] = useState(false);
  const [saving, setSaving] = useState(false);
  const [premiseAI, setPremiseAI] = useState(null);
  const [premiseLoading, setPremiseLoading] = useState(false);

  const name = profile?.name?.split(" ")[0] || "";
  const dayNames = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const monthNames = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const d = new Date();
  const dayOfWeek = d.getDay();
  const dateLabel = `${dayNames[dayOfWeek]}, ${d.getDate()} de ${monthNames[d.getMonth()]}`;

  useEffect(()=>{
    if(!breathActive||breathDone) return;
    if(breathSecs<=0){setBreathActive(false);setBreathDone(true);return;}
    const t=setTimeout(()=>{
      setBreathSecs(s=>s-1);
      const elapsed=(120-breathSecs+1)%12;
      if(elapsed<4) setBreathPhase("inhale");
      else if(elapsed<8) setBreathPhase("hold");
      else setBreathPhase("exhale");
    },1000);
    return()=>clearTimeout(t);
  },[breathActive,breathSecs,breathDone]);

  const PILLARS = [
    {id:"valor",         ic:"💎", label:"Valor Personal",    desc:"Soy digna. No necesito probar nada."},
    {id:"cuerpo",        ic:"🌿", label:"Cuerpo",            desc:"Mi cuerpo es mi aliado. Lo nutro y lo escucho."},
    {id:"emociones",     ic:"🌊", label:"Emociones",         desc:"Siento sin quedarme atrapada."},
    {id:"relaciones",    ic:"🤝", label:"Relaciones",        desc:"Solo doy desde la abundancia."},
    {id:"accion",        ic:"⚡", label:"Acción",            desc:"Decido desde mi identidad, no desde el miedo."},
    {id:"espiritualidad",ic:"✨", label:"Espiritualidad",    desc:"Confío en el proceso."},

  const CIERRE = [
    {label:"Intención",              title:"Hoy voy a...",                        placeholder:"No un objetivo — una forma de ser"},
    {label:"Afirmación",             title:"Hoy opero como...",                   placeholder:"La versión de ti que ya decidiste ser"},

    {label:"Gratitud extra",         title:"Lo mejor de esta semana hasta ahora", placeholder:"Aunque sea algo pequeño"},
    {label:"Intención de fin de semana", title:"Este fin de semana quiero...",    placeholder:"¿Cómo quieres sentirte?"},
    {label:"Revisión semanal",       title:"¿En qué fui coherente esta semana?",  placeholder:"Un momento donde actuaste desde tu versión soberana"},
  ];
  const cierreHoy = CIERRE[dayOfWeek];

  const handleComplete = async() => {
    setSaving(true);
    const entry = {
      pilar:selectedPilar, premiseText:premiseText.trim(),

      cierre:cierreText.trim(), cierreLabel:cierreHoy.label,

    };
    const newLog = {...(healingLog||{}), [today]:{...((healingLog||{})[today]||{}), ...entry}};
    await save("healing_log", newLog);

      ))}

function ExportScreen() {
  const [loading, setLoading] = useState(false);
  const loadedRutinaRef = useRef(null);
  const [done, setDone] = useState(false);

  const exportData = async () => {
    setLoading(true);
    try {
      // Collect all keys from storage
      const allKeys = await window.storage.list();
      const data = {};
      
      for(const key of (allKeys?.keys || [])) {
        try {
          const val = await window.storage.get(key);
          if(val?.value) {
            try { data[key] = JSON.parse(val.value); }
            catch(e) { data[key] = val.value; }
          }
        } catch(e) {}
      }

      // Build readable report
      const today = new Date().toLocaleDateString("es", {day:"numeric",month:"long",year:"numeric"});
      const profile = data["profile"] || {};
      
      // Get last 7 days of logs
      const logs = {};
      for(const key of Object.keys(data)) {
        if(key.startsWith("log:")) {
          logs[key.replace("log:","")] = data[key];
        }
      }

      const report = {
        exportDate: today,
        profile: {
          nombre: profile.name,
          edad: profile.age,
          peso: profile.weight,
          altura: profile.height,
          objetivo: profile.goal,
          actividad: profile.activity,
          menopausia: profile.menopause,
        },
        streak: data["streak"],
        registros_comidas: logs,
        bitacora: data["bitacora_log"] || {},
        gym: data["workout_log"] || {},
        healing: data["healing_log"] || {},
        metricas: data["daily_metrics"] || {},
        premise: data["fundamental_premise"] || {},
        combos: data["my_combos"] || [],
      };

      // Download as JSON
      const blob = new Blob([JSON.stringify(report, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `fundamental_datos_${localDateStr()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setDone(true);
    } catch(e) {
      console.error(e);
    }
    setLoading(false);
  };

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Exportar datos</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:24,lineHeight:1.6}}>
        Descarga todo tu historial — comidas, gym, bitácora, healing y métricas — en un archivo que puedes compartir con Claude para análisis.
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Incluye</div>
        {[
          ["🥗","Registro de comidas","Todos los días registrados"],
          ["💪","Historial de gym","Entrenamientos y descansos"],
          ["📊","Bitácora","Sliders, síntomas y correlaciones"],
          ["💎","Healing","Premise, pilares y coherencia"],
          ["📈","Métricas","Agua, pasos, peso, ciclo"],
          ["👤","Perfil","Datos básicos y objetivos"],
        ].map(([ic,title,sub])=>(
          <div key={title} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:18,flexShrink:0}}>{ic}</span>
            <div>
              <div style={{fontSize:13,color:G.crm}}>{title}</div>
              <div style={{fontSize:11,color:G.sft}}>{sub}</div>
            </div>
          </div>
        ))}
      </div>

      <button onClick={exportData} disabled={loading}
        style={{width:"100%",background:done?G.grn:loading?"rgba(90,122,98,.3)":G.acc,
          color:"#fff",border:"none",borderRadius:16,padding:"15px",
          fontSize:15,fontWeight:600,cursor:loading?"wait":"pointer",marginBottom:12}}>
        {loading?"Preparando..."
          :done?"✓ Descargado — revisa tus archivos"
          :"📤 Descargar mis datos"}
      </button>

      {done && (
        <div style={{background:"rgba(90,122,98,.06)",border:"1px solid rgba(74,155,111,.2)",
          borderRadius:16,padding:14,fontSize:13,color:G.sft,lineHeight:1.7}}>
          Archivo guardado. Compártelo con Claude para análisis semanal — patrones de macros, correlaciones con la bitácora, y recomendaciones basadas en tus datos reales.
        </div>
      )}
    </div>
  );
}


function MisCombosView({meals, setMeals}) {
  const [combos, setCombos] = useState([]);
  const [mode, setMode] = useState("list"); // list | create
  const [added, setAdded] = useState(null);

  // Create mode state
  const [comboName, setComboName] = useState("");
  const [comboItems, setComboItems] = useState([]);
  const [searchQ, setSearchQ] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [saving, setSaving] = useState(false);
  const [createMode, setCreateMode] = useState("ingredients");
  const [macroEntry, setMacroEntry] = useState({p:"",c:"",f:"",k:"",fi:""});

  useEffect(()=>{
    loadJSON(COMBOS_KEY).then(d=>{if(d) setCombos(d);});
  },[]);

  // Search foods
  useEffect(()=>{
    if(!searchQ.trim()) { setSearchResults([]); return; }
    const q = searchQ.toLowerCase();
    const res = DB.filter(f=>
      f.n.toLowerCase().includes(q) ||
      (f.a||[]).some(a=>a.toLowerCase().includes(q))
    ).slice(0,8);
    setSearchResults(res);
  },[searchQ]);

  const addItemToCombo = (food, grams=100) => {
    const factor = grams/100;
    const p = food.p??food.protein??0;
    const carb = food.c??food.carbs??0;
    const fat = food.f??food.fat??0;
    const cal = food.k??food.calories??0;
    const fi = food.fi??food.fiber??0;
    setComboItems(prev=>[...prev, {
      name: `${food.n} (${grams}g)`,
      n: food.n,
      g: grams,
      protein: Math.round(p*factor*10)/10,
      carbs: Math.round(carb*factor*10)/10,
      fat: Math.round(fat*factor*10)/10,
      calories: Math.round(cal*factor),
      fiber: Math.round(fi*factor*10)/10,
      // Also keep short props for internal use
      p: Math.round(p*factor*10)/10,
      c: Math.round(carb*factor*10)/10,
      f: Math.round(fat*factor*10)/10,
      k: Math.round(cal*factor),
      fi: Math.round(fi*factor*10)/10,
      id: Date.now()+Math.random(),
    }]);
    setSearchQ("");
    setSearchResults([]);
  };

  const removeItem = (id) => setComboItems(prev=>prev.filter(x=>x.id!==id));

  const updateGrams = (id, g) => {
    setComboItems(prev=>prev.map(item=>{
      if(item.id!==id) return item;
      const orig = DB.find(f=>f.n===item.n);
      if(!orig) return {...item,g};
      const factor = g/100;
      const p=Math.round(orig.p*factor*10)/10;
      const carb=Math.round(orig.c*factor*10)/10;
      const fat=Math.round(orig.f*factor*10)/10;
      const cal=Math.round(orig.k*factor);
      const fi=Math.round((orig.fi||0)*factor*10)/10;
      return {
        ...item, g,
        name: `${orig.n} (${g}g)`,
        p, c:carb, f:fat, k:cal, fi,
        protein:p, carbs:carb, fat, calories:cal, fiber:fi,
      };
    }));
  };

  const saveCombo = async () => {
    if(!comboName.trim()||!comboItems.length) return;
    setSaving(true);
    const combo = {
      id: Date.now(),
      name: comboName.trim(),
      items: comboItems,
      cal: Math.round(comboItems.reduce((a,i)=>a+i.k,0)),
      prot: Math.round(comboItems.reduce((a,i)=>a+i.p,0)),
    };
    const newCombos = [...combos, combo];
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
    setComboName("");
    setComboItems([]);
    setMode("list");
    setSaving(false);
  };

  const addComboToMeal = (combo, mealId) => {
    setMeals(prev=>({
      ...prev,
      [mealId]: [...(prev[mealId]||[]),
        ...combo.items.map(i=>({
          ...i,
          // Ensure both property formats exist
          name: i.name || `${i.n||"Alimento"} (${i.g||100}g)`,
          protein: i.protein ?? i.p ?? 0,
          carbs: i.carbs ?? i.c ?? 0,
          fat: i.fat ?? i.f ?? 0,
          calories: i.calories ?? i.k ?? 0,
          fiber: i.fiber ?? i.fi ?? 0,
          id: Date.now()+Math.random(),
        }))
      ]
    }));
    setAdded(combo.id);
    setTimeout(()=>setAdded(null), 2000);
  };

  const deleteCombo = async (id) => {
    const newCombos = combos.filter(c=>c.id!==id);
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
  };

  const MEAL_OPTS = [
    {id:"breakfast",l:"Desayuno",i:"🌅"},
    {id:"lunch",l:"Almuerzo",i:"☀️"},
    {id:"dinner",l:"Comida",i:"🍽️"},
    {id:"snack",l:"Snack",i:"🥜"},
    {id:"supper",l:"Cena",i:"🌙"},
  ];

  const comboTotals = {
    k: Math.round((comboItems||[]).reduce((a,i)=>a+(i.k||0),0)),
    p: Math.round((comboItems||[]).reduce((a,i)=>a+(i.p||0),0)),
    c: Math.round((comboItems||[]).reduce((a,i)=>a+(i.c||0),0)),
    f: Math.round((comboItems||[]).reduce((a,i)=>a+(i.f||0),0)),
  };

  // CREATE MODE
  if(mode==="create") return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={()=>{setMode("list");setCreateMode("ingredients");setMacroEntry({p:"",c:"",f:"",k:"",fi:""}); }}
          style={{background:"transparent",border:"none",color:G.sft,cursor:"pointer",fontSize:13,padding:0}}>
          ← Volver
        </button>
        <div style={{fontSize:15,fontWeight:600,color:G.crm}}>Nuevo Combo</div>
      </div>

      {/* Name */}
      <input value={comboName} onChange={e=>setComboName(e.target.value)}
        placeholder="Nombre del combo (ej: Desayuno fit)"
        style={{width:"100%",background:G.sur,border:`1.5px solid ${comboName?G.acc:G.bor}`,
          borderRadius:10,padding:"11px 14px",color:G.crm,fontSize:14,outline:"none",marginBottom:14}}/>

      {/* Mode toggle */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["ingredients","🔍 Por ingredientes"],["macros","📊 Solo macros"]].map(([m,l])=>(
          <button key={m} onClick={()=>setCreateMode(m)}
            style={{flex:1,padding:"9px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:500,
              border:`1.5px solid ${createMode===m?G.acc:G.bor}`,
              background:createMode===m?"rgba(200,132,90,.1)":"transparent",
              color:createMode===m?G.acl:G.sft}}>
            {l}
          </button>
        ))}
      </div>

      {createMode==="macros" && (
        <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:20,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,color:G.sft,marginBottom:12,lineHeight:1.6}}>
            Ingresa los macros directamente — útil para recetas propias o productos sin base de datos.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {[
              {key:"k",label:"Calorías",unit:"kcal",color:G.sft},
              {key:"p",label:"Proteína",unit:"g",color:G.acc},
              {key:"c",label:"Carbohidratos",unit:"g",color:G.grn},
              {key:"f",label:"Grasa",unit:"g",color:"#7A9E8A"},
              {key:"fi",label:"Fibra",unit:"g",color:"#A0C878"},
            ].map(({key,label,unit,color})=>(
              <div key={key}>
                <label style={{fontSize:11,color:color,display:"block",marginBottom:4}}>{label}</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="number" value={macroEntry[key]}
                    onChange={e=>setMacroEntry(prev=>({...prev,[key]:e.target.value}))}
                    placeholder="0"
                    style={{flex:1,background:G.sur,border:`1px solid ${G.bor}`,borderRadius:8,
                      padding:"8px 10px",color:G.crm,fontSize:14,outline:"none",textAlign:"center"}}/>
                  <span style={{fontSize:11,color:G.mut}}>{unit}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {createMode==="ingredients" && (
      <div>
      {/* Search to add items */}
      <div style={{background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
        padding:"0 12px",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:G.mut,fontSize:14}}>🔍</span>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          placeholder="Buscar alimento para agregar..."
          autoFocus
          style={{flex:1,background:"transparent",border:"none",outline:"none",
            color:G.crm,fontSize:14,padding:"11px 0"}}/>
      </div>

      {/* Search results */}
      {searchResults.length>0 && (
        <div style={{background:G.sur,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
          {searchResults.map((f,i)=>(
            <div key={i} onClick={()=>addItemToCombo(f,100)}
              style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<searchResults.length-1?`1px solid ${G.bor}`:"none",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,color:G.crm}}>{f.n}</div>
                <div style={{fontSize:11,color:G.sft}}>{f.k} kcal · {f.p}g prot por 100g</div>
              </div>
              <span style={{color:G.grn,fontSize:18}}>+</span>
            </div>
          ))}
        </div>
      )}

      {/* Items in combo */}
      {comboItems.length>0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
            Alimentos ({comboItems.length})
          </div>
          {comboItems.map(item=>(
            <div key={item.id} style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:10,
              padding:"10px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:G.crm,marginBottom:2}}>{item.n}</div>
                <div style={{fontSize:11,color:G.sft}}>{item.k} kcal · {item.p}g P</div>
              </div>
              <input type="number" value={item.g}
                onChange={e=>updateGrams(item.id,Number(e.target.value))}
                style={{width:60,background:G.sur,border:`1px solid ${G.bor}`,borderRadius:6,
                  padding:"5px 8px",color:G.crm,fontSize:12,textAlign:"center",outline:"none"}}/>
              <span style={{fontSize:10,color:G.mut}}>g</span>
              <button onClick={()=>removeItem(item.id)}
                style={{background:"transparent",border:"none",color:G.mut,cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          ))}

          {/* Totals */}
          <div style={{background:"rgba(90,122,98,.06)",border:"1px solid rgba(74,155,111,.2)",
            borderRadius:10,padding:"10px 14px",display:"flex",gap:16,flexWrap:"wrap"}}>
            {[["kcal",comboTotals.k,G.sft],["P",`${comboTotals.p}g`,G.acc],["C",`${comboTotals.c}g`,G.grn],["G",`${comboTotals.f}g`,"#7A9E8A"]].map(([l,v,col])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:600,color:col}}>{v}</div>
                <div style={{fontSize:10,color:G.mut}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      </div>
      )}

      <button onClick={async()=>{
          if(!comboName.trim()) return;
          setSaving(true);
          let combo;
          if(createMode==="macros") {
            const p=parseFloat(macroEntry.p)||0;
            const carb=parseFloat(macroEntry.c)||0;
            const fat=parseFloat(macroEntry.f)||0;
            const cal=parseFloat(macroEntry.k)||(Math.round(p*4+carb*4+fat*9));
            const fi=parseFloat(macroEntry.fi)||0;
            combo = {
              id: Date.now(),
              name: comboName.trim(),
              items: [{
                name: comboName.trim(), n: comboName.trim(),
                g: 100, protein:p, carbs:carb, fat, calories:cal, fiber:fi,
                p, c:carb, f:fat, k:cal, fi,
              }],
              cal, prot:p, isMacro:true,
            };
          } else {
            if(!comboItems.length) { setSaving(false); return; }
            combo = {
              id: Date.now(),
              name: comboName.trim(),
              items: comboItems,
              cal: Math.round(comboItems.reduce((a,i)=>a+i.k,0)),
              prot: Math.round(comboItems.reduce((a,i)=>a+i.p,0)),
            };
          }
          const existing = await loadJSON(COMBOS_KEY) || [];
          await save(COMBOS_KEY, [combo, ...existing]);
          setCombos(prev=>[combo, ...prev]);
          setComboName(""); setComboItems([]); setMacroEntry({p:"",c:"",f:"",k:"",fi:""});
          setMode("list"); setSaving(false);
        }}
        disabled={!comboName.trim()||(createMode==="ingredients"&&comboItems.length===0)||saving}
        style={{width:"100%",
          background:comboName&&(createMode==="macros"||comboItems.length)?G.grn:"rgba(255,255,255,.06)",
          color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,
          fontWeight:600,cursor:"pointer",marginTop:4}}>
        {saving?"Guardando...":"✓ Guardar combo"}
      </button>
    </div>
  );

  // LIST MODE
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:G.crm}}>Mis Combos</div>
          <div style={{fontSize:12,color:G.sft}}>Tus recetas guardadas</div>
        </div>
        <button onClick={()=>setMode("create")}
          style={{background:G.acc,color:"#fff",border:"none",borderRadius:8,
            padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          + Nuevo combo
        </button>
      </div>

      {combos.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 0"}}>
          <div style={{fontSize:32,marginBottom:12}}>🍳</div>
          <div style={{fontSize:14,color:G.sft,marginBottom:6}}>Sin combos guardados</div>
          <div style={{fontSize:12,color:G.mut,lineHeight:1.6,marginBottom:16}}>
            Crea un combo con los alimentos que repites — pancakes de proteína, tu desayuno habitual, etc.
          </div>
          <button onClick={()=>setMode("create")}
            style={{background:G.grn,color:"#fff",border:"none",borderRadius:10,
              padding:"11px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            Crear mi primer combo →
          </button>
        </div>
      ) : (
        combos.map(combo=>(
          <div key={combo.id} style={{background:G.card,
            border:`1px solid ${added===combo.id?G.grn:G.bor}`,
            borderRadius:16,padding:"14px 16px",marginBottom:10,transition:"border-color .3s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <div style={{fontSize:14,fontWeight:600,color:G.crm}}>{combo.name}</div>
                  {combo.isFav&&<span style={{fontSize:10,color:"#EAC850"}}>★ Favorito</span>}
                  {combo.isMacro&&<span style={{fontSize:10,color:"#A89EC0"}}>📊 Macros</span>}
                </div>
                <div style={{fontSize:11,color:G.sft}}>{combo.cal} kcal · {combo.prot}g prot · {combo.isFav?"1 ítem":`${combo.items.length} ítems`}</div>
              </div>
              <button onClick={()=>deleteCombo(combo.id)}
                style={{background:"transparent",border:`1px solid ${G.bor}`,borderRadius:6,
                  padding:"4px 8px",fontSize:11,color:G.mut,cursor:"pointer"}}>✕</button>
            </div>

            {/* Items preview */}
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
              {combo.items.slice(0,4).map((item,i)=>(
                <span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:10,
                  background:"rgba(255,255,255,.04)",color:G.sft}}>
                  {item.n.split(" ").slice(0,3).join(" ")} {item.g}g
                </span>
              ))}
              {combo.items.length>4&&<span style={{fontSize:10,color:G.mut}}>+{combo.items.length-4} más</span>}
            </div>

            {/* Add to meal */}
            {added===combo.id ? (
              <div style={{textAlign:"center",padding:"8px",color:G.grn,fontSize:13,fontWeight:600}}>
                ✓ Agregado al registro
              </div>
            ) : (
              <div>
                <div style={{fontSize:11,color:G.mut,marginBottom:6}}>Agregar a:</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {MEAL_OPTS.map(m=>(
                    <button key={m.id} onClick={()=>addComboToMeal(combo,m.id)}
                      style={{padding:"6px 12px",borderRadius:8,fontSize:12,cursor:"pointer",
                        border:`1px solid ${G.bor}`,background:"transparent",color:G.sft}}>
                      {m.i} {m.l}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        ))
      )}
    </div>
  );
}

function CompareSlider({photoA, photoB, labelA, labelB, onClose}) {
  const [pos, setPos] = useState(50);
  const containerRef = useRef(null);
  const dragging = useRef(false);

  const getX = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.min(Math.max(0, ((clientX - rect.left) / rect.width) * 100), 100);
  };
  const onStart = (e) => { dragging.current = true; setPos(getX(e)); };
  const onMove  = (e) => { if(dragging.current){ e.preventDefault(); setPos(getX(e)); }};
  const onEnd   = ()  => { dragging.current = false; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,
      background:"#000",zIndex:200,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",
        alignItems:"center",background:"rgba(0,0,0,0.8)"}}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{labelA}</div>
        <div style={{color:G.terra,fontSize:11,fontWeight:600,
          letterSpacing:"0.1em",textTransform:"uppercase"}}>Desliza para comparar</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{labelB}</div>
      </div>
      {/* Slider */}
      <div ref={containerRef}
        style={{flex:1,position:"relative",overflow:"hidden",
          cursor:"col-resize",userSelect:"none"}}
        onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
        onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>
        {/* Photo B — background (after) */}
        <img src={photoB} style={{position:"absolute",top:0,left:0,
          width:"100%",height:"100%",objectFit:"cover"}}/>
        {/* Photo A — clipped (before) */}
        <div style={{position:"absolute",top:0,left:0,
          width:pos+"%",height:"100%",overflow:"hidden"}}>
          <img src={photoA} style={{position:"absolute",top:0,left:0,
            width:containerRef.current?containerRef.current.offsetWidth+"px":"100vw",
            height:"100%",objectFit:"cover",maxWidth:"none"}}/>
        </div>
        {/* Divider line */}
        <div style={{position:"absolute",top:0,bottom:0,
          left:"calc("+pos+"% - 1px)",width:2,
          background:"#fff",boxShadow:"0 0 8px rgba(0,0,0,0.8)"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",
            transform:"translate(-50%,-50%)",width:40,height:40,
            borderRadius:"50%",background:"#fff",
            boxShadow:"0 2px 12px rgba(0,0,0,0.4)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:16,color:"#333",fontWeight:700}}>
            ⇔
          </div>
        </div>
        {/* Labels */}
        <div style={{position:"absolute",bottom:20,left:12,
          background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,
          padding:"4px 10px",borderRadius:20,pointerEvents:"none"}}>{labelA}</div>
        <div style={{position:"absolute",bottom:20,right:12,
          background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,
          padding:"4px 10px",borderRadius:20,pointerEvents:"none"}}>{labelB}</div>
      </div>
      <button onClick={onClose}
        style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",
          padding:"16px",fontSize:14,cursor:"pointer",letterSpacing:"0.05em"}}>
        Cerrar
      </button>
    </div>
  );
}

function makeBadgeSVG(b, size=80) {

    const labsCompleted = (labCompletions||[]).length;

    // Morning rituals
    const morningKeys = await window.storage.list("morning_done:");
    const morningCount = (morningKeys?.keys||[]).length;

    // Photos
    const photos = await loadJSON(PHOTOS_KEY);
    const photoCount = (photos||[]).length;

    // Protein today
    const tgt = calcTargets(profile);
    const tot = totals(meals);
    const proteinaHoy = Math.round(tot.p) >= tgt.protein;

    return {streakDays, workoutCount, labsCompleted, morningCount, photoCount, proteinaHoy};
  }, [streak, workoutLog, meals, labCompletions, profile]);

  useEffect(()=>{
    (async()=>{
      const saved = await loadJSON(ACHIEVEMENTS_KEY) || [];
      const data = await buildData();

      // Check for new unlocks
      const newUnlocks = [];
      for(const badge of BADGE_DEFS){
        const wasUnlocked = saved.some(u=>u.id===badge.id);
        const isUnlocked = badge.check(data);
        if(isUnlocked && !wasUnlocked){
          newUnlocks.push({id:badge.id, unlockedAt:new Date().toISOString()});
        }
      }

      if(newUnlocks.length > 0){
        const updated = [...saved, ...newUnlocks];
        await save(ACHIEVEMENTS_KEY, updated);
        setUnlocked(updated);
        // Show toast for first new unlock
        setNewBadge(newUnlocks[0]);
        setTimeout(()=>setNewBadge(null), 3000);
      } else {
        setUnlocked(saved);
      }
      setLoaded(true);
    })();
  },[]);

  const unlockedIds = new Set(unlocked.map(u=>u.id));
  const unlockedBadges = BADGE_DEFS.filter(b=>unlockedIds.has(b.id));
  const lockedBadges   = BADGE_DEFS.filter(b=>!unlockedIds.has(b.id));

  const formatDate = (iso) => {
    const d = new Date(iso);
    const months = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  };

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.sft}}>Cargando...</div>;

  return (
    <div className="fu" style={{paddingBottom:80}}>
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Mis Logros</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:24,lineHeight:1.6}}>
        {unlockedBadges.length} de {BADGE_DEFS.length} desbloqueados
      </div>

      {/* New badge toast */}
      {newBadge && (()=>{
        const badge = BADGE_DEFS.find(b=>b.id===newBadge.id);
        return (
          <div style={{background:G.terra,borderRadius:20,padding:"12px 16px",
            marginBottom:20,display:"flex",alignItems:"center",gap:12,
            boxShadow:"0 8px 32px rgba(198,139,119,0.4)",animation:"fadeUp .4s ease"}}>
            <div style={{flexShrink:0}}
              dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,44)}}/>
            <div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.8)",letterSpacing:"0.1em",
                textTransform:"uppercase",marginBottom:2}}>¡Nuevo logro!</div>
              <div style={{fontSize:15,fontWeight:600,color:"#fff"}}>{badge.label}</div>
            </div>
          </div>
        );
      })()}

      {/* Unlocked */}
      {unlockedBadges.length > 0 && (
        <div>
          <div style={{fontSize:10,color:G.terra,letterSpacing:"0.14em",
            textTransform:"uppercase",fontWeight:600,marginBottom:16}}>
            Desbloqueados
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20,marginBottom:32}}>
            {unlockedBadges.map(badge=>{
              const u = unlocked.find(x=>x.id===badge.id);
              return (
                <div key={badge.id} style={{display:"flex",flexDirection:"column",
                  alignItems:"center",gap:8}}>
                  <div style={{transition:"transform .3s cubic-bezier(.34,1.4,.64,1)"}}
                    dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,80)}}/>
                  <div style={{fontSize:11,fontWeight:500,color:G.crm,
                    textAlign:"center",lineHeight:1.4}}>{badge.label}</div>
                  <div style={{fontSize:9,color:G.terra}}>
                    {u?.unlockedAt ? formatDate(u.unlockedAt) : ""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Empty state */}
      {unlockedBadges.length === 0 && (
        <div style={{textAlign:"center",padding:"24px 0 32px",
          background:G.card,borderRadius:20,marginBottom:24,
          boxShadow:"0 4px 24px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:32,marginBottom:10}}>🌱</div>
          <div style={{fontSize:14,fontWeight:500,color:G.crm,marginBottom:6}}>
            Tu colección empieza aquí
          </div>
          <div style={{fontSize:12,color:G.sft,lineHeight:1.6,padding:"0 20px"}}>
            Registra tu primer día para desbloquear tu primer logro.
          </div>
        </div>
      )}

      {/* Locked */}
      <div>
        <div style={{fontSize:10,color:G.mut,letterSpacing:"0.14em",
          textTransform:"uppercase",fontWeight:600,marginBottom:16}}>
          Por desbloquear
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}}>
          {lockedBadges.map(badge=>(
            <div key={badge.id} style={{display:"flex",flexDirection:"column",
              alignItems:"center",gap:8,opacity:1}}>
              <div style={{filter:"grayscale(1) opacity(0.3)"}}
                dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,80)}}/>
              <div style={{fontSize:11,fontWeight:400,color:G.mut,
                textAlign:"center",lineHeight:1.4}}>{badge.label}</div>
              <div style={{fontSize:9,color:G.mut,textAlign:"center"}}>{badge.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");
  const [logSearchQuery, setLogSearchQuery] = useState("");
  const [authUser, setAuthUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [morningDone, setMorningDone] = useState(false);
  const [morningChecked, setMorningChecked] = useState(false);
  const [showTimer, setShowTimer] = useState(false);
  const [activeLab, setActiveLab] = useState(null); // {n, title, startDate, completedDays:[]}
  const [labCompletions, setLabCompletions] = useState([]); // [{n, completedAt, response, tag}]
  const [labResponses, setLabResponses] = useState({}); // {labN: [{date, response, tag}]}
  const [profile, setProfile] = useState(null);
  const [meals, setMeals] = useState(EMPTY_MEALS);
  const [savedFoods, setSavedFoods] = useState([]);
  const [streak, setStreak] = useState({days:[],points:0});
  const [gymDay, setGymDay] = useState(0); // Start at Block 1
  const [exPrefs, setExPrefs] = useState({}); // exercise preferences/replacements
  const [healingLog, setHealingLog] = useState({});
  const [premise, setPremise] = useState(null);
  const [workoutLog, setWorkoutLog] = useState({});
  const [sleepLog, setSleepLog] = useState({});
  const [showManifesto, setShowManifesto] = useState(false);
  const [bitacoraLog, setBitacoraLog] = useState({});
  const [loading, setLoading] = useState(true);
  const [showCode, setShowCode] = useState(false);
  const [toast, setToast] = useState(null);

  // Load all data from window.storage on mount
  // Supabase sync - save all user data
  const syncToSupabase = async (user, data) => {
    if(!user?.token || !user?.userId) return;
    const headers = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${user.token}`,
      "Prefer": "resolution=merge-duplicates,return=representation",
    };
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/user_data`, {
        method: "POST",
        headers,
        body: JSON.stringify({
          user_id: user.userId,
          ...data,
          updated_at: new Date().toISOString(),
        }),
      });
    } catch(e) { console.log("Sync error:", e); }
  };

  const loadFromSupabase = async (user) => {
    if(!user?.token || !user?.userId) return null;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/user_data?user_id=eq.${user.userId}&select=*`,
        { headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${user.token}`,
        }}
      );
      if(!res.ok) return null;
      const rows = await res.json();
      return rows?.[0] || null;
    } catch(e) { return null; }
  };

  const navigateTo = (dest) => {
    if(dest && dest.startsWith("log_search:")) {
      setLogSearchQuery(dest.replace("log_search:",""));
      setScreen("log");
    } else {
      setLogSearchQuery("");
      setScreen(dest);
    }
  };

  useEffect(()=>{
    (async()=>{
      // Check for existing session
      try {
        const token = await window.storage.get("sb_token");
        const userId = await window.storage.get("sb_user_id");
        if(token?.value && userId?.value) {
          setAuthUser({token: token.value, userId: userId.value});
        }
      } catch(e) {}
      // Check if morning ritual already done today
      try {
        const today = new Date();
        const todayStr = today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
        const morningKey = await window.storage.get("morning_done:"+todayStr);
        if(morningKey?.value === "1") setMorningDone(true);
      } catch(e) {}
      // Load active lab data
      try {
        const al = await loadJSON("active_lab");
        if(al) setActiveLab(al);
        const lc = await loadJSON("lab_completions");
        if(lc) setLabCompletions(lc);
        const lr = await loadJSON("lab_responses");
        if(lr) setLabResponses(lr);
      } catch(e) {}
      setAuthChecked(true);
      setMorningChecked(true);
    })();
  },[]);

  useEffect(()=>{
    (async()=>{
      const [p,m,sf,sk,ep,hl,pr,wl,bl,gd,sl] = await Promise.all([
        loadJSON("profile"),
        loadJSON(todayKey()),
        loadJSON("saved"),
        loadJSON("streak"),
        loadJSON("exPrefs"),
        loadJSON(HEALING_KEY),
        loadJSON(PREMISE_KEY),
        loadJSON(WORKOUT_KEY),
        loadJSON(BITACORA_KEY),
        loadJSON("gym_day"),
        loadJSON(SLEEP_KEY),
      ]);
      if(p) setProfile(p);
      if(m) setMeals(prev=>({...prev,...m}));
      if(sf) setSavedFoods(sf);
      if(sk) setStreak(sk);
      if(ep) setExPrefs(ep);
      if(hl) setHealingLog(hl);
      if(pr) setPremise(pr);
      if(wl) setWorkoutLog(wl);
      if(bl) setBitacoraLog(bl);
      if(gd !== null && gd !== undefined) setGymDay(Number(gd));
      if(sl) setSleepLog(sl);
      if(!p) {
        const msSeen = typeof localStorage !== "undefined" && localStorage.getItem("manifesto_seen");
        if(!msSeen) setShowManifesto(true);
      }
      // Try to load from Supabase if logged in
      if(authUser) {
        const sbData = await loadFromSupabase(authUser);
        if(sbData) {
          if(sbData.profile) setProfile(JSON.parse(sbData.profile));
          if(sbData.healing_log) setHealingLog(JSON.parse(sbData.healing_log));
          if(sbData.premise) setPremise(JSON.parse(sbData.premise));
          if(sbData.workout_log) setWorkoutLog(JSON.parse(sbData.workout_log));
          if(sbData.sleep_log) setSleepLog(JSON.parse(sbData.sleep_log));
          if(sbData.rutinas) { save(RUTINAS_KEY, JSON.parse(sbData.rutinas)); }
          if(sbData.saved_foods) setSavedFoods(JSON.parse(sbData.saved_foods));
          if(sbData.rutinas) { save(RUTINAS_KEY, JSON.parse(sbData.rutinas)); }
          if(sbData.meals) setMeals(prev=>({...prev,...JSON.parse(sbData.meals)}));
          if(sbData.bitacora_log) setBitacoraLog(JSON.parse(sbData.bitacora_log));
          if(sbData.streak) setStreak(JSON.parse(sbData.streak));
        }
      }
      setLoading(false);
    })();
  },[authUser]);

  // Persist meals whenever they change
  useEffect(()=>{
    if(!loading && meals && Object.values(meals).some(arr=>arr&&arr.length>0)) {
      save(todayKey(), meals);
    }
  },[meals,loading]);

  // savedFoods persisted directly in handlers (no useEffect to avoid race conditions)

  // Persist gymDay
  useEffect(()=>{
    if(!loading) save("gym_day", gymDay);
  },[gymDay,loading]);

  // Persist streak
  useEffect(()=>{
    if(!loading) {
      save("streak", streak);
      if(authUser) syncToSupabase(authUser, {streak: JSON.stringify(streak)});
    }
  },[streak,loading]);

  // Sync saved rutinas
  useEffect(()=>{
    if(!loading && authUser) {
      loadJSON(RUTINAS_KEY).then(r=>{
        if(r && r.length>0) syncToSupabase(authUser, {rutinas: JSON.stringify(r)});
      });
    }
  },[authUser,loading]);

  // Sync workoutLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && workoutLog && Object.keys(workoutLog).length>0) {
      syncToSupabase(authUser, {workout_log: JSON.stringify(workoutLog)});
    }
  },[workoutLog,loading]);

  // Sync bitacoraLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && bitacoraLog && Object.keys(bitacoraLog).length>0) {
      syncToSupabase(authUser, {bitacora_log: JSON.stringify(bitacoraLog)});
    }
  },[bitacoraLog,loading]);

  // Sync sleepLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && sleepLog && Object.keys(sleepLog).length>0) {
      syncToSupabase(authUser, {sleep_log: JSON.stringify(sleepLog)});
    }
  },[sleepLog,loading]);

  // Sync healingLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && healingLog && Object.keys(healingLog).length>0) {
      syncToSupabase(authUser, {healing_log: JSON.stringify(healingLog)});
    }
  },[healingLog,loading]);

  // Sync meals to Supabase
  useEffect(()=>{
    if(!loading && authUser && meals && Object.values(meals).some(a=>a&&a.length>0)) {
      syncToSupabase(authUser, {meals: JSON.stringify(meals)});
    }
  },[meals,loading]);

  // Sync savedFoods
  useEffect(()=>{
    if(!loading && authUser && savedFoods && Object.keys(savedFoods).length>0) {
      syncToSupabase(authUser, {saved_foods: JSON.stringify(savedFoods)});
    }
  },[savedFoods,loading]);

  // Supabase sync ready — activar cuando se despliegue en web

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null), 2200);
  };

  const saveProfile = async(p) => {
    setProfile(p);
    await save("profile", p);
    if(authUser) syncToSupabase(authUser, {profile: JSON.stringify(p)});
    showToast(`¡Hola, ${p.name}! Perfil guardado ✓`);
    setScreen("home");
    setTimeout(()=>setShowCode(true), 900);
  };

  const dateStr = new Date().toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"});

  // Check and update streak
  useEffect(()=>{
    if(loading||!profile) return;
    const today=localDateStr();
    if(streak.days?.includes(today)) return;
    const tgt=calcTargets(profile,getEffectiveDayType(gymDay,workoutLog),calcAvgSleep(sleepLog));
    const tot2=totals(meals);
    const pct=tot2.k/tgt.calories, pp=tot2.p/tgt.protein;
    if(pct>=.8&&pp>=.85){
      setStreak(s=>{const ns={days:[...(s.days||[]),today],points:(s.points||0)+10};return ns;});
      showToast("🎉 ¡Día completado! +10 puntos");
    }
  },[meals,loading]);

  // Morning ritual gate - only first open of the day
  if(morningChecked && !morningDone && !loading && profile?.name && premise) {
    return (
      <div style={{background:G.bg,minHeight:"100vh",color:G.txt,fontFamily:"'DM Sans',sans-serif"}}>
        <style>{css}</style>
        <MorningRitual
          profile={profile}
          premise={premise}
          healingLog={healingLog}
          onComplete={async()=>{
            const today = new Date();
            const todayStr = today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
            await save("morning_done:"+todayStr, "1");
            setMorningDone(true);
          }}
          onSaveHealing={(hl)=>setHealingLog(hl)}
        />
      </div>
    );
  }

  if(loading) return(
    <div style={{background:G.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{css}</style>
      <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
        <path d="M20 4 C20 4,10 10,8 20 C6 30,14 36,20 36" stroke="#4A9B6F" strokeWidth="2.5" strokeLinecap="round"/>
        <path d="M20 4 C20 4,30 10,32 20 C34 30,26 36,20 36" stroke="#6BBF8E" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 3" opacity="0.6"/>
        <circle cx="20" cy="4" r="2" fill="#6BBF8E"/>
      </svg>
    </div>

  // First time — show profile form
  if(!profile?.name&&screen!=="profile") return(
    <div style={{background:G.bg,minHeight:"100vh",color:G.txt,fontFamily:"'DM Sans',sans-serif"}}>
      <style>{css}</style>
      <div style={{maxWidth:480,margin:"0 auto",padding:"32px 20px 60px"}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:300,color:'#F2EDE4',letterSpacing:1}}>Fundamental</div>
          <div style={{fontSize:10,color:'#7A9E8A',letterSpacing:.5}}>by Claudia Fox</div>
        </div>
        <button onClick={()=>setShowCode(true)}
          style={{width:'100%',background:'rgba(74,155,111,.12)',border:'1.5px solid #4A9B6F',borderRadius:16,padding:'14px 20px',cursor:'pointer',marginBottom:16,display:'flex',alignItems:'center',gap:12,textAlign:'left'}}>
          <span style={{fontSize:24}}>🔑</span>
          <div><div style={{fontSize:14,fontWeight:600,color:'#6BBF8E'}}>Ya tengo un código</div><div style={{fontSize:12,color:'#B8CFC0',marginTop:1}}>Carga tu perfil en segundos</div></div>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div style={{flex:1,height:1,background:'#254D3A'}}/><span style={{fontSize:12,color:'#7A9E8A'}}>o crea tu perfil nuevo</span><div style={{flex:1,height:1,background:'#254D3A'}}/>
        </div>
        <ProfileForm initial={null} onSave={saveProfile}/>
      </div>
      {showCode&&<CodeModal profile={null} onClose={()=>setShowCode(false)} onLoad={async(p)=>{setProfile(p);await save("profile",p);setShowCode(false);showToast(`Bienvenida ${p.name}! ✓`);setScreen("home");}}/>}
    </div>
  );

  const NAV=[
    {id:"home",l:"Inicio",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"log",l:"Registro",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>},
    {id:"gym",l:"Gym",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>},
    {id:"bitacora",l:"Bitácora",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>},
    {id:"healing",l:"Healing",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>},
    {id:"progress",l:"Progreso",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>},
    {id:"mas",l:"Más",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>},
  ];

  return(
    <div style={{background:G.bg,minHeight:"100vh",color:G.txt,fontFamily:"'DM Sans',sans-serif"}}>
      <style>{css}</style>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:G.bg,borderBottom:`1px solid ${G.bor}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <svg width="36" height="36" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="21" fill="#3A2820"/>
            <text x="21" y="29" textAnchor="middle" fontFamily="Cormorant Garamond, serif" fontStyle="italic" fontWeight="400" fontSize="25" fill="#D4A090">F</text>
          </svg>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:G.crm,lineHeight:1.1}}>Fundamental</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:9,color:G.sft,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>by Claudia Fox</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:11,color:G.mut,textTransform:"capitalize"}}>{dateStr}</span>
          <button onClick={()=>setShowCode(true)} style={{background:"none",border:`1px solid ${G.bor}`,borderRadius:20,cursor:"pointer",fontSize:11,color:G.sft,padding:"4px 10px"}}>🔑</button>
          <button onClick={()=>setScreen("profile")} style={{background:"none",border:"none",cursor:"pointer",fontSize:18}}>👤</button>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 20px 90px"}}>
        {screen==="home"&&<HomeScreen profile={profile} meals={meals} gymDay={gymDay} streak={streak} onNavigate={navigateTo} healingLog={healingLog} premise={premise} workoutLog={workoutLog} sleepLog={sleepLog} bitacoraLog={bitacoraLog} activeLab={activeLab} onMarkLabAction={async(done)=>{
  if(!activeLab) return;
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const completedDays = activeLab.completedDays || [];
  const updated = done
    ? {...activeLab, completedDays: [...new Set([...completedDays, today])]}
    : {...activeLab, completedDays: completedDays.filter(d=>d!==today)};
  setActiveLab(updated);
  await save("active_lab", updated);
}}/>}
        {(screen==="log")&&<LogScreen meals={meals} setMeals={setMeals} profile={profile} initialSearch={logSearchQuery} savedFoods={savedFoods} setSavedFoods={setSavedFoods} gymDay={gymDay} workoutLog={workoutLog} sleepLog={sleepLog} onNavigateBit={setScreen}/>}
        {screen==="gym"&&<GymScreen profile={profile} gymDay={gymDay} setGymDay={setGymDay} exPrefs={exPrefs} setExPrefs={setExPrefs} workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} onNavigate={navigateTo}/>}
        {screen==="recetas"&&<RecetasScreen/>}
        {screen==="bitacora"&&<BitacoraScreen profile={profile} meals={meals} onNavigate={navigateTo} onBitacoraUpdate={(bl)=>setBitacoraLog(bl)}/>}
        {screen==="sleep"&&<SleepScreen profile={profile}/>}
        {(screen==="healing"||screen==="healing_labs")&&<HealingScreen
  profile={profile}
  initialTab={screen==="healing_labs"?"ritual":undefined}
  onNavigate={navigateTo}
  onPremiseSaved={(p)=>{setPremise(p);save(PREMISE_KEY,p);}}
  onHealingUpdate={(hl)=>setHealingLog(hl)}
  activeLab={activeLab}
  setActiveLab={async(lab)=>{setActiveLab(lab); await save("active_lab", lab);}}
  labCompletions={labCompletions}
  setLabCompletions={async(c)=>{setLabCompletions(c); await save("lab_completions", c);}}
  labResponses={labResponses}
  setLabResponses={async(r)=>{setLabResponses(r); await save("lab_responses", r);}}
/>}
        {screen==="morning"&&<MorningRitual profile={profile} premise={premise} healingLog={healingLog} onComplete={async()=>{const today=localDateStr();await save("morning_done:"+today,"1");setMorningDone(true);setScreen("home");}} onSaveHealing={(hl)=>{setHealingLog(hl);save("healing_log",hl);}}/>}
        {(screen==="blog"||screen?.startsWith?.("blog_"))&&<BlogScreen 
  initialPost={screen?.startsWith?.("blog_")?parseInt(screen.split("_")[1]):null}
  onBack={screen?.startsWith?.("blog_")?()=>setScreen("home"):null}
/>}
        {screen==="profile"&&<ProfileScreen profile={profile} onSave={saveProfile} sleepLog={sleepLog}/>}
        {screen==="supps"&&<SuppsOnlyScreen profile={profile}/>}
        {screen==="metrics"&&<MetricsScreen profile={profile}/>}
        {screen==="progress"&&<ProgressScreen/>}
        {screen==="export"&&<ExportScreen/>}
        {screen==="learn"&&<LearnScreen/>}
        {screen==="logros"&&<LogrosScreen streak={streak} workoutLog={workoutLog} meals={meals} labCompletions={labCompletions} healingLog={healingLog} profile={profile}/>}
        {screen==="recetas"&&<RecetasScreen/>}
        
        {screen==="mas"&&(
          <div className="fi">
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Más</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Recursos y herramientas</div>
            {[
              {ic:"🏆",title:"Mis Logros",sub:"Badges y hitos desbloqueados",screen:"logros"},
              {ic:"📖",title:"Aprende",sub:"Ciencia sin ruido — 11 artículos",screen:"learn"},
              {ic:"📊",title:"Métricas",sub:"Agua, peso, pasos, ciclo y más",screen:"metrics"},
              {ic:"💊",title:"Suplementos",sub:"Protocolo personalizado para tu perfil",screen:"supps"},
              {ic:"🍳",title:"Recetas",sub:"23 recetas con macros calculados",screen:"recetas"},

              {ic:"📤",title:"Exportar mis datos",sub:"Descarga tu historial completo",screen:"export"},
            ].map(item=>(
              <button key={item.screen} onClick={()=>setScreen(item.screen)}
                style={{width:"100%",background:G.card,border:`1px solid ${G.bor}`,borderRadius:20,
                  padding:"16px",cursor:"pointer",textAlign:"left",display:"flex",gap:14,
                  alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:28,flexShrink:0}}>{item.ic}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.title}</div>
                  <div style={{fontSize:12,color:G.sft}}>{item.sub}</div>
                </div>
                <span style={{marginLeft:"auto",color:G.mut,fontSize:18}}>›</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* 90 sec floating button */}
      {!showTimer&&authChecked&&morningDone&&(
        <button onClick={()=>setShowTimer(true)}
          style={{position:"fixed",bottom:90,right:20,width:54,height:54,borderRadius:"50%",
            background:"#3A2820",border:"none",
            boxShadow:"0 4px 20px rgba(198,139,119,0.45)",cursor:"pointer",zIndex:100,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4A090" strokeWidth="1.8" strokeLinecap="round">
            <path d="M3 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
            <path d="M3 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
            <path d="M3 16c2-2 4-2 6 0s4 2 6 0"/>
          </svg>
        </button>
      )}
      {showTimer&&<NinetySecondsTimer onClose={()=>setShowTimer(false)} activeLab={activeLab}/>}

      {/* Bottom nav - silBe pill style */}
      <div className="bnav" style={{left:0,right:0,maxWidth:480,margin:"0 auto"}}>
        <div style={{background:"rgba(242,226,218,0.5)",borderRadius:50,padding:"4px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:2,width:"100%"}}>
          {NAV.map(n=>{
            const isOn = screen===n.id;
            return isOn ? (
              <button key={n.id} onClick={()=>navigateTo(n.id)}
                style={{display:"flex",alignItems:"center",gap:7,background:G.terra,
                  borderRadius:50,padding:"9px 16px",border:"none",cursor:"pointer",
                  boxShadow:`0 4px 14px rgba(198,139,119,0.4)`,flexShrink:0}}>
                <div style={{color:"white",display:"flex"}}>{n.svg}</div>
                <span style={{fontSize:12,fontWeight:500,color:"white",whiteSpace:"nowrap",fontFamily:"'DM Sans',sans-serif"}}>{n.l}</span>
              </button>
            ) : (
              <button key={n.id} onClick={()=>navigateTo(n.id)}
                style={{display:"flex",alignItems:"center",justifyContent:"center",
                  width:42,height:42,borderRadius:50,background:"transparent",
                  border:"none",cursor:"pointer",flex:1}}>
                <div style={{color:"rgba(44,36,32,0.35)",display:"flex"}}>{n.svg}</div>
              </button>
            );
          })}
        </div>
      </div>

      {toast&&<Toast msg={toast}/>}
      {showCode&&<CodeModal profile={profile} onClose={()=>setShowCode(false)} onLoad={async(p)=>{setProfile(p);await save("profile",p);setShowCode(false);showToast(`Bienvenida ${p.name}! ✓`);setScreen("home");}}/>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

  </script>
  <script>
    const obs=new MutationObserver(()=>{
      if(document.getElementById('root').children.length>0){
        document.getElementById('loader').style.display='none';
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true});
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.style.display='none';},15000);
  </script>
</body>
</html>
