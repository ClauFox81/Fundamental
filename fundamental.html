    // IndexedDB storage - persists on iOS Safari unlike localStorage
    // ─── STORAGE: localStorage primary (reliable on iOS Safari) ───────
    window.storage = {
      set: (k,v) => {
        try {
          const str = typeof v === "string" ? v : JSON.stringify(v);
          localStorage.setItem("fund_" + k, str);
          return {key:k, value:str};
        } catch(e) { return null; }
      },
      get: (k) => {
        try {
          const v = localStorage.getItem("fund_" + k);
          if(v === null) return null;
          return {key:k, value:v};
        } catch(e) { return null; }
      },
      delete: (k) => {
        try { localStorage.removeItem("fund_" + k); return {key:k, deleted:true}; } catch(e) { return null; }
      },
      list: (prefix) => {
        try {
          const keys = [];
          for(let i=0; i<localStorage.length; i++){
            const k = localStorage.key(i);
            if(k && k.startsWith("fund_")){
              const stripped = k.slice(5);
              if(!prefix || stripped.startsWith(prefix)) keys.push(stripped);
            }
          }
          return {keys};
        } catch(e) { return {keys:[]}; }
      }
    };

// ─── MIGRATION: IndexedDB → localStorage (runs once) ────────────
    async function migrateFromIndexedDB() {
      if(localStorage.getItem("fund_migrated_v2")) return;
      try {
        const DB_NAME = "FundamentalDB", STORE = "data";
        const db = await new Promise((res,rej) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onsuccess = e => res(e.target.result);
          req.onerror = () => rej();
          req.onupgradeneeded = () => rej(); // DB didn't exist
        });
        const keys = await new Promise((res,rej) => {
          const tx = db.transaction(STORE,"readonly");
          const req = tx.objectStore(STORE).getAllKeys();
          req.onsuccess = () => res(req.result);
          req.onerror = () => res([]);
        });
        for(const k of keys) {
          const val = await new Promise((res) => {
            const tx = db.transaction(STORE,"readonly");
            const req = tx.objectStore(STORE).get(k);
            req.onsuccess = () => res(req.result?.v || null);
            req.onerror = () => res(null);
          });
          if(val && !localStorage.getItem("fund_" + k)) {
            localStorage.setItem("fund_" + k, val);
          }
        }
        db.close();
        localStorage.setItem("fund_migrated_v2","1");
        console.log("Migration complete:", keys.length, "keys");
      } catch(e) {
        // IndexedDB not available or empty — mark as done
        localStorage.setItem("fund_migrated_v2","1");
      }
    }
    migrateFromIndexedDB();

    const {useState,useEffect,useRef,useCallback,useMemo}=React;
  </script>

// ─── STORAGE ──────────────────────────────────────────────────────
// window.storage is the artifact persistent storage - works in React artifacts
async function save(key, value) {
  try {
    const str = typeof value === "string" ? value : JSON.stringify(value);
    window.storage.set(key, str);
  } catch(e) { console.error("Save failed:", key, e); }
}
async function load(key) {
  try {
    const r = window.storage.get(key);
    if (r && r.value) return r.value;
  } catch(e) {}
  return null;
}
async function loadJSON(key) {
  const v = await load(key);
  if (!v) return null;
  try { return JSON.parse(v); } catch(e) { return null; }
}

// ─── CALCS ────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return "log:" + y + "-" + m + "-" + day;
}
function dayStr(off=0) { const d=new Date(); d.setDate(d.getDate()+off);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day; }
function dayLabel(off=0) { const D=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]; const d=new Date(); d.setDate(d.getDate()+off); return D[d.getDay()]; }

// ─── CYCLE PHASE ─────────────────────────────────────────────────────────────
function getCyclePhase(cycleStartDate, cycleLength=28) {
  if(!cycleStartDate) return null;
  // Use local date strings to avoid timezone issues
  const startStr = cycleStartDate.slice(0,10);
  const d = new Date();
  const todayStr = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const startParts = startStr.split("-").map(Number);
  const todayParts = todayStr.split("-").map(Number);
  const startLocal = new Date(startParts[0], startParts[1]-1, startParts[2]);
  const todayLocal = new Date(todayParts[0], todayParts[1]-1, todayParts[2]);
  const diff = Math.floor((todayLocal - startLocal) / (1000*60*60*24));
  const dayInCycle = (diff % cycleLength) + 1;
  if(dayInCycle <= 5) return {phase:"menstruation", day:dayInCycle, label:"Menstruación", ic:"🔴", days:"1-5"};
  if(dayInCycle <= 13) return {phase:"follicular", day:dayInCycle, label:"Folicular", ic:"🌱", days:"6-13"};
  if(dayInCycle <= 16) return {phase:"ovulation", day:dayInCycle, label:"Ovulación", ic:"⭐", days:"14-16"};
  return {phase:"luteal", day:dayInCycle, label:"Lútea", ic:"🌙", days:"17-28"};
}

function getCycleCalAdjustment(phase) {
  if(!phase) return {cal:0, carbs:0, fat:0, note:""};
  switch(phase) {
    case "menstruation": return {cal:0, carbs:0, fat:5, note:"Más grasas antiinflamatorias. Prioriza hierro."};
    case "follicular": return {cal:0, carbs:0, fat:0, note:"Energía óptima. Buen momento para entrenar fuerte."};
    case "ovulation": return {cal:50, carbs:10, fat:0, note:"Pico de energía. Más proteína para capitalizar la fuerza."};
    case "luteal": return {cal:200, carbs:20, fat:5, note:"Metabolismo elevado. El hambre es real y fisiológica."};
    default: return {cal:0, carbs:0, fat:0, note:""};
  }
}


function calcTargets(p, dayType, avgSleep) {
  if(!p?.weight||!p?.height||!p?.age) return {calories:1800,protein:128,carbs:160,fat:64,fiber:25,tdee:2100};

  const isMale  = p.gender==="male";
  const isPeri  = !isMale && (p.menopause==="peri"||p.menopause==="post");
  const isGymDay = dayType && dayType !== "rest";

  // ── Proteína: 2g/kg peri / perimenopausia, 1.8g/kg otherwise ──────────
  const protPerKg = isMale ? 2.0 : isPeri ? 2.0 : 1.8;
  const protein = Math.round(p.weight * protPerKg);

  // ── Grasas por día ─────────────────────────────────────────────────────
  const fatPerKg = isMale
    ? (isGymDay ? 0.9 : 1.0)
    : isPeri
      ? (isGymDay ? 0.85 : 1.0)
      : (isGymDay ? 0.75 : 0.9);
  let fat = Math.max(Math.round(p.weight * fatPerKg), Math.round(p.weight * 0.7));

  // ── Carbohidratos por kg según día ─────────────────────────────────────
  // Rango científico para recomposición: 2-4g/kg según intensidad
  const carbPerKg = isMale ? {
    rest: 2.5, gym_upper: 3.5, gym_full: 3.8, gym_legs: 4.2
  } : isPeri ? {
    rest: 2.2, gym_upper: 3.1, gym_full: 3.3, gym_legs: 3.6
  } : {
    rest: 2.0, gym_upper: 2.9, gym_full: 3.1, gym_legs: 3.4
  };
  const dayKey = dayType || "rest";
  let carbs = Math.round(p.weight * (carbPerKg[dayKey] || carbPerKg.rest));

  // Ajuste por objetivo
  if(p.goal === "fat_loss") {
    carbs = Math.round(carbs * 0.85);
    fat   = Math.round(fat   * 0.9);
  } else if(p.goal === "muscle") {
    carbs = Math.round(carbs * 1.1);
  }

  // ── Fibra ──────────────────────────────────────────────────────────────
  const fiber = Math.max(Math.round(p.weight * 0.4), 25);

  // ── Calorías = resultado de macros ─────────────────────────────────────
  let cal = protein*4 + carbs*4 + fat*9;

  // ── Ajuste de sueño ───────────────────────────────────────────────────
  if(avgSleep !== null && avgSleep !== undefined) {
    if(avgSleep < 5.5)      { protein += Math.round(p.weight * 0.1); }
    else if(avgSleep < 6.5) { protein += Math.round(p.weight * 0.05); }
  }

  // ── TDEE estimado (para referencia) ───────────────────────────────────
  const muscleCr = {low:0.93,average:1.0,high:1.07,very_high:1.13};
  const bmr = Math.round((10*p.weight+6.25*p.height-5*p.age+(isMale?5:-161))*(muscleCr[p.muscleLevel]||1.0));
  const actMult = {sedentary:1.2,light:1.375,moderate:1.55,mod_active:1.64,active:1.725,athlete:1.9};
  const tdee = Math.round(bmr*(actMult[p.activity]||1.55));

  // ── Ajuste fase del ciclo ──────────────────────────────────────────────
  if(!isMale && p.cycleStart) {
    const phase = getCyclePhase(p.cycleStart, p.cycleLength||28);
    if(phase) {
      const adj = getCycleCalAdjustment(phase.phase);
      carbs = Math.round(carbs + adj.carbs);
      fat   = Math.round(fat   + adj.fat);
      cal   = protein*4 + carbs*4 + fat*9;
    }
  }

  return {calories:cal, protein, carbs, fat, fiber, tdee};
}


function calcZones(age, rhr) {
  const max=220-age, r=rhr?max-rhr:0;
  if(rhr&&rhr>0) return {z2lo:Math.round(rhr+r*.6),z2hi:Math.round(rhr+r*.7),z3lo:Math.round(rhr+r*.7),z3hi:Math.round(rhr+r*.8),max,m:"Karvonen"};
  return {z2lo:Math.round(max*.6),z2hi:Math.round(max*.7),z3lo:Math.round(max*.7),z3hi:Math.round(max*.8),max,m:"Estándar"};
}

function getBMI(w,h) {
  const v=(w/((h/100)**2)).toFixed(1);
  return {v,l:v<18.5?"Bajo peso":v<25?"Peso saludable":v<30?"Sobrepeso":"Obesidad",c:v<18.5?G.acc:v<25?G.grn:G.err};
}

function totals(meals) {
  return Object.values(meals).flat().reduce((a,f)=>({p:a.p+f.protein,c:a.c+f.carbs,f:a.f+f.fat,k:a.k+f.calories,fi:a.fi+(f.fiber||0)}),{p:0,c:0,f:0,k:0,fi:0});
}

function getTodayType(gymDay) {
  const g=GYM[gymDay];
  if(!g||g.t==="r") return "rest";
  if(gymDay===1||gymDay===3) return "gym_legs";
  if(gymDay===4) return "gym_full";
  return "gym_upper";
}

function localDateStr(d) {
  var dt = d || new Date();
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}

function calcAvgSleep(sleepLog) {
  if(!sleepLog) return null;
  var days = [], i;
  for(i=0; i<7; i++) {
    var d = new Date(); d.setDate(d.getDate()-i);
    var key = localDateStr(d);
    if(sleepLog[key]?.hours) days.push(sleepLog[key].hours);
  }
  return days.length >= 3 ? Math.round((days.reduce(function(a,b){return a+b;},0)/days.length)*10)/10 : null;
}

function getEffectiveDayType(gymDay, workoutLog) {
  const today = localDateStr();
  const entry = workoutLog?.[today];
  if(!entry) return getTodayType(gymDay);
  // Mi Entreno registered = treat as full gym day
  if(entry.isMiEntreno || entry.miEntreno) return "gym_full";
  // Use the actual block registered today
  if(entry.block === "D" || entry.block === "Descanso") return "rest";
  if(entry.block && entry.block !== "D") return "gym_full";
  // Fallback to gym plan
  return getTodayType(gymDay);
}

function searchDB(q) {
  const s=q.toLowerCase().trim();
  let grams=null, fq=s;
  const gm=s.match(/^(\d+(?:\.\d+)?)\s*g\s+(.+)/);
  if(gm){grams=+gm[1];fq=gm[2];}
  return DB.map(x=>{
    const nm=x.n.toLowerCase().includes(fq)?2:0;
    const am=x.a.some(a=>a.includes(fq)||fq.includes(a))?3:0;
    const em=x.a.some(a=>a===fq)?5:0;
    return{x,s:nm+am+em};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).slice(0,5).map(r=>({...r.x,_g:grams}));
}

function scaleFood(item, g) {
  const m=g/100;
  const p=item.p??item.protein??0, c=item.c??item.carbs??0,
        f=item.f??item.fat??0, k=item.k??item.calories??0, fi=item.fi??item.fiber??0;
  return {name:`${item.n||item.name} (${g}g)`,protein:Math.round(p*m*10)/10,carbs:Math.round(c*m*10)/10,fat:Math.round(f*m*10)/10,calories:Math.round(k*m),fiber:Math.round(fi*m*10)/10};
}

// ─── RING SVG ─────────────────────────────────────────────────────
function Ring({val,max,color,label,size=64}) {
  const r=size*.42, circ=2*Math.PI*r, pct=Math.min(val/max,1), over=val>max;
  const pctNum = Math.round(pct*100);
  const isKcal = label==="Kcal";
  const valDisplay = isKcal ? Math.round(val) : Math.round(val)+"g";
  return (
    <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",display:"block"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.bor} strokeWidth="5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none"
            stroke={over?G.err:color} strokeWidth="5" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            style={{transition:"stroke-dashoffset .8s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:0}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:size>60?13:11,
            fontWeight:600,color:over?G.err:G.crm,lineHeight:1}}>{valDisplay}</span>
          <span style={{fontSize:size>60?10:9,color:over?G.err:color,
            fontWeight:500,marginTop:1}}>{pctNum}%</span>
        </div>
      </div>
      <span style={{fontSize:9,color:G.sft,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</span>
      <span style={{fontSize:9,color:G.mut}}>/{max}{isKcal?"":"g"}</span>
    </div>
  );
}

function Picker({item, mealLabel, onAdd, onClose}) {
  const defG = item._g||(item.g)||100;
  const [amt, setAmt] = useState(String(defG));
  const baseG = item.g||100;
  const quick = [{l:"100g",g:100}];
  if(item.g&&item.u&&item.g!==100){
    quick.push({l:`${item.u} (~${baseG}g)`,g:baseG});
    quick.push({l:`½ (~${Math.round(baseG/2)}g)`,g:Math.round(baseG/2)});
  }
  const sc = amt&&+amt>0 ? scaleFood(item,+amt) : null;
  return (
    <div className="ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mb su">
        <div className="dh"/>
        <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.n||item.name}</div>
        <div style={{fontSize:11,color:G.sft,marginBottom:14}}>valores por 100g de referencia</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,background:G.sur,borderRadius:10,padding:12,marginBottom:14}}>
          {[["P",item.p??item.protein,G.acc],["C",item.c??item.carbs,G.grn],["G",item.f??item.fat,"#7A9E8A"],["kcal",item.k??item.calories,G.sft],["fi",item.fi??item.fiber??0,"#A0C878"]].map(([l,v,col])=>(
            <div key={l} style={{textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:600,color:col}}>{Math.round(v)}</div>
              <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        <div className="lbl">Porciones rápidas</div>
        <div className="qb">
          {quick.map(o=><button key={o.g} className="qbtn" onClick={()=>setAmt(String(o.g))}>{o.l}</button>)}
        </div>
        <div className="lbl">Cantidad en gramos</div>
        <input className="field" type="number" placeholder="Ej: 150" value={amt} onChange={e=>setAmt(e.target.value)} style={{marginBottom:12}} autoFocus/>
        {sc&&(
          <div style={{background:"rgba(90,122,98,.08)",border:"1px solid rgba(74,155,111,.25)",borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,color:G.grn,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Para {amt}g</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {[["P",sc.protein,G.acc],["C",sc.carbs,G.grn],["G",sc.fat,"#7A9E8A"],["kcal",sc.calories,G.sft],["fi",sc.fiber,"#A0C878"]].map(([l,v,col])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:600,color:col}}>{v}</div>
                  <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <button className="bgh" onClick={onClose}>Cancelar</button>
          <button className="btn" style={{flex:1}} disabled={!amt||+amt<=0} onClick={()=>{if(sc)onAdd(sc);}}>
            Agregar{mealLabel?` al ${mealLabel}`:""}
          </button>
        </div>
      </div>
    </div>
  );
}

function StarSaveBtn({food}) {
  const [saved, setSaved] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(()=>{
    loadJSON(COMBOS_KEY).then(combos=>{
      const exists = (combos||[]).some(c=>c.isFav && c.foodN===food.n);
      setSaved(exists);
      setChecking(false);
    });
  },[food.n]);

  const toggle = async(e) => {
    e.stopPropagation();
    const combos = await loadJSON(COMBOS_KEY) || [];
    if(saved) {
      const newCombos = combos.filter(c=>!(c.isFav && c.foodN===food.n));
      await save(COMBOS_KEY, newCombos);
      setSaved(false);
    } else {
      const newCombo = {
        id: Date.now(),
        name: food.n,
        foodN: food.n,
        isFav: true,
        items: [{
          n: food.n,
          name: food.n,
          g: 100,
          p: food.p, protein: food.p,
          c: food.c, carbs: food.c,
          f: food.f, fat: food.f,
          k: food.k, calories: food.k,
          fi: food.fi||0, fiber: food.fi||0,
        }],
        cal: food.k,
        prot: food.p,
      };
      await save(COMBOS_KEY, [newCombo, ...combos]);
      setSaved(true);
    }
  };

  if(checking) return null;
  return (
    <button onClick={toggle}
      style={{position:"absolute",top:8,right:8,background:"transparent",
        border:"none",cursor:"pointer",fontSize:16,padding:"2px 4px",
        color:saved?"#EAC850":G.mut,transition:"color .2s"}}
      title={saved?"Quitar de Mis Combos":"Guardar en Mis Combos"}>
      {saved?"★":"☆"}
    </button>
  );
}

// ─── PROGRESS PHOTOS ─────────────────────────────────────────────────────────
const PHOTOS_KEY = "progress_photos";

function ProgressScreen() {
  const [photos, setPhotos]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [comparing, setComparing] = useState(null);
  const [pickMode, setPickMode] = useState(null);
  const [compareA, setCompareA] = useState(null);
  const [compareB, setCompareB] = useState(null);

  useEffect(()=>{
    loadJSON(PHOTOS_KEY).then(p=>{ if(p) setPhotos(p); setLoading(false); });
  },[]);

  const addPhoto = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = async() => {
        const MAX=900, ratio=Math.min(MAX/img.width,MAX/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        const compressed=canvas.toDataURL("image/jpeg",0.72);
        const newPhoto={id:Date.now(),date:localDateStr(),src:compressed};
        const updated=[...photos,newPhoto].sort((a,b)=>a.date.localeCompare(b.date));
        setPhotos(updated);
        await save(PHOTOS_KEY,updated);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const deletePhoto = async(id) => {
    const updated=photos.filter(p=>p.id!==id);
    setPhotos(updated); await save(PHOTOS_KEY,updated);
    if(selected?.id===id) setSelected(null);
  };

  const resetCompare = () => { setPickMode(null); setCompareA(null); setCompareB(null); };

  const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const formatDate=(d)=>{ const p=d.split("-"); return p[2]+" "+months[parseInt(p[1])-1]+" "+p[0]; };

  if(loading) return <div style={{padding:40,textAlign:"center",color:G.sft}}>Cargando...</div>;

  // Slider fullscreen
  if(comparing) return <CompareSlider
    photoA={comparing.a.src} photoB={comparing.b.src}
    labelA={formatDate(comparing.a.date)} labelB={formatDate(comparing.b.date)}
    onClose={()=>{setComparing(null);resetCompare();}}/>;

  // Full photo view
  if(selected) return (
    <div style={{position:"fixed",inset:0,background:"#000",
      display:"flex",flexDirection:"column",justifyContent:"space-between",zIndex:100}}>
      <div style={{padding:"16px 20px",display:"flex",
        justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>setSelected(null)}
          style={{background:"transparent",border:"none",color:"#fff",fontSize:15,cursor:"pointer"}}>
          ← Volver
        </button>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{formatDate(selected.date)}</div>
        <button onClick={()=>deletePhoto(selected.id)}
          style={{background:"transparent",border:"none",color:"rgba(255,100,100,0.8)",
            fontSize:13,cursor:"pointer"}}>Eliminar</button>
      </div>
      <img src={selected.src} style={{width:"100%",flex:1,objectFit:"contain"}}/>
      <div style={{height:40}}/>
    </div>
  );

  const sortedPhotos = photos.slice().reverse();

  return (
    <div style={{paddingBottom:80}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",
        alignItems:"center",marginBottom:16}}>
        <div>
          <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>Progreso</div>
          <div style={{fontSize:12,color:G.sft}}>
            {photos.length} foto{photos.length!==1?"s":""} registrada{photos.length!==1?"s":""}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {photos.length>=2&&!pickMode&&(
            <button onClick={()=>setPickMode("a")}
              style={{background:G.card,border:`1px solid ${G.bor}`,
                borderRadius:12,padding:"9px 14px",fontSize:12,fontWeight:500,
                cursor:"pointer",color:G.terra,display:"flex",alignItems:"center",gap:5,
                boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
              ⇔ Comparar
            </button>
          )}
          <label style={{background:G.terra,color:"#fff",borderRadius:12,
            padding:"9px 16px",fontSize:13,fontWeight:500,cursor:"pointer"}}>
            + Foto
            <input type="file" accept="image/*" onChange={addPhoto} style={{display:"none"}}/>
          </label>
        </div>
      </div>

      {/* Pick mode banner */}
      {pickMode&&(
        <div style={{background:G.card,borderRadius:16,padding:"14px 16px",
          marginBottom:16,border:`1.5px solid ${G.terra}`,
          boxShadow:"0 4px 20px rgba(198,139,119,0.1)"}}>
          <div style={{fontSize:12,color:G.terra,fontWeight:600,
            letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>
            {pickMode==="a"
              ? "Toca la foto de ANTES"
              : compareA&&compareB ? "¡Listo! Ver comparación" : "Toca la foto de DESPUÉS"}
          </div>
          <div style={{fontSize:12,color:G.sft,marginBottom:12}}>
            {pickMode==="a"
              ? "Selecciona la foto más antigua"
              : compareA ? `✓ Antes: ${formatDate(compareA.date)}` : "Selecciona la foto más reciente"}
            {pickMode==="b"&&compareB&&` · ✓ Después: ${formatDate(compareB.date)}`}
          </div>
          <div style={{display:"flex",gap:8}}>
            {compareA&&compareB&&(
              <button onClick={()=>setComparing({a:compareA,b:compareB})}
                style={{flex:2,background:G.terra,color:"#fff",border:"none",
                  borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Ver comparación →
              </button>
            )}
            <button onClick={resetCompare}
              style={{flex:1,background:"transparent",border:`1px solid ${G.bor}`,
                borderRadius:10,padding:"10px",fontSize:12,color:G.sft,cursor:"pointer"}}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* Tip */}
      <div style={{fontSize:11,color:G.sft,marginBottom:16,lineHeight:1.6}}>
        📅 Recomendado: una foto cada 2 semanas. El cuerpo cambia más despacio de lo que la mente espera.
      </div>

      {/* Empty state */}
      {photos.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:40,marginBottom:16}}>📸</div>
          <div style={{fontSize:16,fontWeight:600,color:G.crm,marginBottom:8}}>
            Tu línea de tiempo empieza aquí
          </div>
          <div style={{fontSize:13,color:G.sft,lineHeight:1.6}}>
            Agrega tu primera foto hoy.<br/>
            En 4 semanas tendrás algo poderoso que ver.
          </div>
        </div>
      )}

      {/* Photo grid */}
      {sortedPhotos.map((photo,i)=>(
        <div key={photo.id} style={{marginBottom:20}}>
          <div style={{fontSize:11,color:G.terra,letterSpacing:"0.1em",
            textTransform:"uppercase",fontWeight:600,marginBottom:8,
            display:"flex",alignItems:"center",gap:8}}>
            {formatDate(photo.date)}
            {i===0&&<span style={{background:G.terra,color:"#fff",
              borderRadius:20,padding:"2px 8px",fontSize:9}}>Más reciente</span>}
            {pickMode&&compareA?.id===photo.id&&
              <span style={{background:"rgba(198,139,119,.15)",color:G.terra,
                borderRadius:20,padding:"2px 8px",fontSize:9,border:`1px solid ${G.terra}`}}>
                ANTES ✓
              </span>}
            {pickMode&&compareB?.id===photo.id&&
              <span style={{background:"rgba(90,122,98,.15)",color:G.grn,
                borderRadius:20,padding:"2px 8px",fontSize:9,border:`1px solid ${G.grn}`}}>
                DESPUÉS ✓
              </span>}
          </div>
          <div style={{position:"relative",borderRadius:16,overflow:"hidden",
            cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.1)",
            border:pickMode&&(compareA?.id===photo.id||compareB?.id===photo.id)
              ?`2px solid ${compareA?.id===photo.id?G.terra:G.grn}`:"none"}}
            onClick={()=>{
              if(pickMode==="a"){
                setCompareA(photo);
                setPickMode("b");
              } else if(pickMode==="b"){
                setCompareB(photo);
              } else {
                setSelected(photo);
              }
            }}>
            <img src={photo.src}
              style={{width:"100%",height:300,objectFit:"cover",display:"block"}}/>
            {pickMode&&(
              <div style={{position:"absolute",inset:0,
                background:"rgba(198,139,119,0.08)",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:G.terra,color:"#fff",borderRadius:20,
                  padding:"8px 20px",fontSize:13,fontWeight:600,opacity:0.9}}>
                  {pickMode==="a"?"Seleccionar como ANTES":"Seleccionar como DESPUÉS"}
                </div>
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── ESTADO DEL SUELO ────────────────────────────────────────────────────────
function SueloCard({meals, targets, cyclePhase, onNavigate}) {
  // Calculate today's nutrition totals
  let totalCal=0, totalP=0;
  Object.values(meals||{}).forEach(function(items){
    if(!Array.isArray(items)) return;
    items.forEach(function(item){
      totalCal += item.calories||item.k||0;
      totalP += item.protein||item.p||0;
    });
  });

  const calPct = targets?.calories ? Math.round((totalCal/targets.calories)*100) : 0;
  const protPct = targets?.protein ? Math.round((totalP/targets.protein)*100) : 0;

  // Time-aware thresholds: compare against expected intake for this hour
  const hour = new Date().getHours();
  const eatStart = 7, eatEnd = 21;
  const rawProgress = (hour - eatStart) / (eatEnd - eatStart);
  const dayProgress = Math.max(0.08, Math.min(1, rawProgress)); // min 8% (early morning)
  const expectedPct = Math.round(dayProgress * 100);

  // On track = within 70% of expected for this time
  const calOk = calPct >= expectedPct * 0.70;
  const protOk = protPct >= expectedPct * 0.70;
  const noData = calPct === 0 && protPct === 0;

  const suelo = noData ? "vacio"
    : calOk && protOk ? "fertil"
    : (calPct >= expectedPct * 0.45 && protPct >= expectedPct * 0.45) ? "recuperacion"
    : "pobre";

  const config = {
    fertil: {
      color:G.grn, label:"Suelo fértil",
      msg:"Tu hardware está nutrido. Hoy puedes hacer trabajo profundo.",
    },
    recuperacion: {
      color:G.terra, label:"Construyendo base",
      msg:"Tu sistema está construyendo. Labs de observación hoy.",
    },
    pobre: {
      color:"#E8A87A", label:"Hardware en déficit",
      msg:"Come más antes de trabajar emocionalmente. Primero el hardware.",
    },
    vacio: {
      color:G.mut, label:"Sin registrar aún",
      msg:"Registra tus comidas para saber el estado de tu suelo hoy.",
    },
  }[suelo];

  const phaseLabMsg = cyclePhase ? {
    menstruation: "Fase menstrual — Labs de observación y compasión.",
    follicular: "Fase folicular — Energía en ascenso. Buen momento para Labs de acción.",
    ovulation: "Ovulación — Ventana de máxima claridad y valentía.",
    luteal: "Fase lútea — Mayor introspección. Labs de conciencia y patrón.",
  }[cyclePhase.phase] : null;

  return (
    <div style={{background:G.card,borderRadius:20,padding:"16px",marginBottom:12,
      boxShadow:"0 4px 24px rgba(0,0,0,0.05)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            {React.createElement("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:config.color,strokeWidth:"1.8",strokeLinecap:"round",strokeLinejoin:"round"},
              React.createElement("line",{x1:"12",y1:"22",x2:"12",y2:"12"}),
              React.createElement("path",{d:"M12 16 C10 13 7 12 8 9 C9 7 11 8 12 12"}),
              React.createElement("path",{d:"M12 16 C14 13 17 12 16 9 C15 7 13 8 12 12"})
            )}
            <span style={{fontSize:12,fontWeight:600,color:G.crm}}>{config.label}</span>
          </div>
          <div style={{fontSize:12,color:G.crm,lineHeight:1.6,marginBottom:phaseLabMsg?8:0}}>
            {config.msg}
          </div>
          {phaseLabMsg && (
            <div style={{fontSize:11,color:G.sft,fontStyle:"italic",lineHeight:1.5,marginTop:4}}>
              {phaseLabMsg}
            </div>
          )}
        </div>
        <button onClick={()=>onNavigate("healing_labs")}
          style={{background:"transparent",border:`1px solid ${G.bor}`,
            borderRadius:8,padding:"6px 10px",color:config.color,
            fontSize:11,cursor:"pointer",flexShrink:0,marginLeft:10}}>
          Ver Labs →
        </button>
      </div>
      {!noData && (
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <div style={{flex:1,background:G.sur,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:G.mut,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:3}}>Calorías</div>
            <div style={{fontSize:14,fontWeight:600,color:calOk?G.grn:G.terra}}>{calPct}%</div>
            <div style={{fontSize:9,color:G.mut,marginTop:1}}>esp. {expectedPct}%</div>
          </div>
          <div style={{flex:1,background:G.sur,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:G.mut,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:3}}>Proteína</div>
            <div style={{fontSize:14,fontWeight:600,color:protOk?G.grn:G.terra}}>{protPct}%</div>
            <div style={{fontSize:9,color:G.mut,marginTop:1}}>esp. {expectedPct}%</div>
          </div>
          <div style={{flex:1,background:G.sur,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:G.mut,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:3}}>Lab hoy</div>
            <div style={{fontSize:11,color:config.color,fontWeight:600}}>
              {suelo==="fertil"?"Listo":"Pendiente"}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const dayTips = {gym_legs:"Día de piernas — +carbs recomendados",gym_upper:"Día de upper body",gym_full:"Full body — carbs moderados",rest:"Día de descanso — menos carbs, más grasas"};
  const cyclePhase = profile?.cycleStart ? getCyclePhase(profile.cycleStart, profile.cycleLength||28) : null;

  const addFood = (food) => {
    const items=Array.isArray(food)?food:[food];
    setMeals(m=>({...m,[addMeal]:[...m[addMeal],...items.map(f=>({...f,id:Date.now()+Math.random()}))]}));

              const over=avg>m.t*1.12;
              const under=avg<m.t*.88;
              const mx=Math.max(...weekData.map(d=>d[m.k]||0),m.t*1.1);
              const statusColor=over?G.err:under?G.acc:G.grn;
              const statusLabel=over?"Por encima":under?"Por debajo":"En objetivo";

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>

                        <span style={{fontSize:10,color:statusColor,fontWeight:500}}>{statusLabel}</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:600,color:statusColor,lineHeight:1}}>{avg}{m.u}</div>
                      <div style={{fontSize:10,color:G.sft,marginTop:2}}>objetivo {m.t}{m.u}</div>
                    </div>
                  </div>

                  {/* Bars */}
                  <div className="wb">
                    {weekData.map((d,i)=>{
                      const val=d[m.k]||0;
                      const p2=val/mx;
                      const tp=m.t/mx;
                      const ov=val>m.t*1.1;
                      const onTarget=val>=m.t*.88&&val<=m.t*1.1;
                      const hasData=val>0;
                      const barColor=!hasData?"#EDE9E0":ov?G.err:onTarget?m.c:"rgba(200,132,90,0.4)";
                      return(
                        <div key={i} className="wbi">
                          <div className="wbr">
                            {/* Target line */}
                            <div className="wtl" style={{bottom:`${tp*100}%`}}/>
                            {/* Bar */}
                            <div className="wbf" style={{
                              height:hasData?`${Math.max(p2*100,3)}%`:"3%",
                              background:barColor,
                              opacity:hasData?1:0.3
                            }}/>
                          </div>
                          <span style={{fontSize:9,color:G.sft,fontWeight:500}}>{d.d}</span>
                        </div>
                      );
                    })}
                  </div>

                  {/* Footer insight */}
                  {(over||under)&&(
                    <div style={{marginTop:10,padding:"8px 12px",borderRadius:10,
                      background:over?"rgba(158,61,26,0.06)":"rgba(200,132,90,0.06)",
                      border:`1px solid ${over?"rgba(158,61,26,0.15)":"rgba(200,132,90,0.15)"}`}}>
                      <span style={{fontSize:11,color:over?G.err:G.acc}}>
                        {over?`+${avg-m.t}${m.u} sobre el objetivo esta semana`:`${m.t-avg}${m.u} por debajo del objetivo esta semana`}
                      </span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {addMeal&&(
        <AddFoodModal
          mealId={addMeal}
          mealLabel={MEAL_CFG.find(m=>m.id===addMeal)?.l||""}
          initialQuery={initialSearchQ}
          savedFoods={savedFoods}
          profile={profile}
          onAdd={addFood}
          onSaveToLib={async food=>{
            const current = await loadJSON("saved") || [];

          onDeleteSaved={async i=>{

            await save("saved", newSf);
            setSavedFoods(newSf);
          }}
          onClose={()=>setAddMeal(null)}
        />
      )}
    </div>
  );
}

const WORKOUT_KEY = "workout_log";


// ─── HISTORIAL VIEW ──────────────────────────────────────────────────────────
function HistorialView({workoutLog}) {
  const [selected, setSelected] = React.useState(null);

  // Extract all exercises across all sessions
  var allExercises = {};
  Object.entries(workoutLog||{}).forEach(function([date, session]) {
    var ejercicios = session.ejercicios || session.miEntreno?.ejercicios || [];
    ejercicios.forEach(function(ej) {
      if(!ej.nombre && !ej.name) return;
      var ejName = ej.nombre || ej.name;
      if(!allExercises[ejName]) allExercises[ejName] = [];
      var maxPeso = 0, maxReps = 0;
      (ej.series||[]).forEach(function(s) {
        if(parseFloat(s.peso)>maxPeso) maxPeso=parseFloat(s.peso)||0;
        if(parseInt(s.reps)>maxReps) maxReps=parseInt(s.reps)||0;
      });
      if(maxPeso>0||maxReps>0) {
        allExercises[ejName].push({date, maxPeso, maxReps});
      }
    });
  });

  // Sort each exercise sessions by date
  Object.keys(allExercises).forEach(function(k) {
    allExercises[k].sort(function(a,b){return a.date.localeCompare(b.date);});
  });

  var exerciseNames = Object.keys(allExercises).sort();

  if(exerciseNames.length===0) return (
    React.createElement("div",{style:{padding:"40px 0",textAlign:"center",color:G.sft,fontSize:13}},
      "Registra entrenamientos de Mi Entreno para ver tu historial"
    )
  );

  if(selected && allExercises[selected]) {
    var sessions = allExercises[selected];
    var pr = Math.max.apply(null, sessions.map(function(s){return s.maxPeso;}));
    return React.createElement("div",null,
      React.createElement("button",{onClick:function(){setSelected(null);},
        style:{background:"transparent",border:"none",color:G.terra,fontSize:13,
          cursor:"pointer",marginBottom:16,padding:0}},
        "← Todos los ejercicios"
      ),
      React.createElement("div",{style:{marginBottom:4}},
        React.createElement("div",{style:{fontSize:18,fontWeight:700,color:G.crm}},selected),
        React.createElement("div",{style:{fontSize:12,color:G.sft}},sessions.length+" sesiones registradas")
      ),
      React.createElement("div",{style:{background:G.terraLight,borderRadius:12,
        padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-between"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:10,color:G.terra,letterSpacing:"0.1em",
            textTransform:"uppercase",fontWeight:600}},"Récord personal"),
          React.createElement("div",{style:{fontSize:22,fontWeight:700,color:G.terra}},pr+"kg")
        ),
        React.createElement("div",{style:{textAlign:"right"}},
          React.createElement("div",{style:{fontSize:10,color:G.terra,letterSpacing:"0.1em",
            textTransform:"uppercase",fontWeight:600}},"Sesiones"),
          React.createElement("div",{style:{fontSize:22,fontWeight:700,color:G.terra}},sessions.length)
        )
      ),
      sessions.slice().reverse().map(function(s, i) {
        var isPR = s.maxPeso===pr && s.maxPeso>0;
        return React.createElement("div",{key:s.date+i,
          style:{background:G.card,borderRadius:12,padding:"12px 16px",marginBottom:8,
            border:"1px solid "+(isPR?G.terra:G.bor),
            display:"flex",justifyContent:"space-between",alignItems:"center"}},
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:12,color:G.sft}},s.date),
            isPR&&React.createElement("div",{style:{fontSize:10,color:G.terra,fontWeight:600}},"🏆 Récord personal")
          ),
          React.createElement("div",{style:{textAlign:"right"}},
            s.maxPeso>0&&React.createElement("div",{style:{fontSize:16,fontWeight:700,color:G.crm}},s.maxPeso+"kg"),
            s.maxReps>0&&React.createElement("div",{style:{fontSize:12,color:G.sft}},s.maxReps+" reps máx")
          )
        );
      })
    );
  }

  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:12,color:G.sft,marginBottom:12}},
      exerciseNames.length+" ejercicios con historial"
    ),
    exerciseNames.map(function(name) {
      var sessions = allExercises[name];
      var last = sessions[sessions.length-1];
      var prev = sessions.length>1?sessions[sessions.length-2]:null;
      var trend = prev&&last.maxPeso>0&&prev.maxPeso>0
        ? (last.maxPeso>prev.maxPeso?"↑":last.maxPeso<prev.maxPeso?"↓":"→")
        : "";
      var trendColor = trend==="↑"?G.grn:trend==="↓"?"#C0392B":G.sft;
      return React.createElement("div",{key:name,
        onClick:function(){setSelected(name);},
        style:{background:G.card,borderRadius:12,padding:"12px 16px",marginBottom:8,
          border:"1px solid "+G.bor,cursor:"pointer",
          display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:14,fontWeight:600,color:G.crm}},name),
          React.createElement("div",{style:{fontSize:11,color:G.sft}},sessions.length+" sesión"+(sessions.length!==1?"es":""))
        ),
        React.createElement("div",{style:{textAlign:"right",display:"flex",alignItems:"center",gap:8}},
          last.maxPeso>0&&React.createElement("div",{style:{fontSize:15,fontWeight:700,color:G.crm}},last.maxPeso+"kg"),
          trend&&React.createElement("div",{style:{fontSize:16,fontWeight:700,color:trendColor}},trend)
        )
      );
    })
  );
}

  const [records, setRecords] = useState({});

  const [showRecs, setShowRecs] = useState(false);
  const [registered, setRegistered] = useState(false); // will sync with records on load
  const [nutriAnalysis, setNutriAnalysis] = useState(null);

  const [reportData, setReportData] = useState(null);

    energia:3, foco:3, sueno:3, piel:3, digestion:3, animo:3,
    notas:"", sintomas:[], fase:"folicular"
  };

  useEffect(()=>{
    loadJSON(BITACORA_KEY).then(d=>{
      if(d) {
        setRecords(d);
        if(d[today]?.registered) setRegistered(true); // Persist registered state
      }
      setLoaded(true);
    });
  },[]);

  const update = (key, val) => {
    // Preserve registered flag when updating individual fields
    const newRec = {...todayRec, [key]: val, registered: todayRec.registered || registered};
    const newRecords = {...records, [today]: newRec};
    setRecords(newRecords);
    save(BITACORA_KEY, newRecords);
    if(onBitacoraUpdate) onBitacoraUpdate(newRecords);
  };

  const toggleSintoma = (s) => {
    const cur = todayRec.sintomas || [];
    const next = cur.includes(s) ? cur.filter(x=>x!==s) : [...cur, s];
    update("sintomas", next);
  };

  // Slider color logic: unselected=green, 1-2=orange, 3=yellow, 4-5=green
  const sliderBtnStyle = (val, selected) => {
    if (!selected) return {bg:G.card, border:G.bor, color:G.sft};
    if (val <= 2) return {bg:"#FDE8E3", border:G.terra, color:G.terra};
    if (val === 3) return {bg:"#FEF3C7", border:"#D4A853", color:"#B8902A"};
    return {bg:"#D8EDDB", border:G.grn, color:G.grn};

  // Hormonal phase
  const FASES = [

    {id:"lutea", label:"Lútea", ic:"🌾", days:"Días 17-28", desc:"Puede haber antojos y fatiga. Normal. No te exijas de más."},

      {registered && (()=>{
        const e = todayRec.energia||3;

        return null;
      })()}
      </div>}

const SLEEP_KEY = "sleep_log";

function SleepScreen({profile}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [bedTime, setBedTime] = useState("21:15");
  const [wakeTime, setWakeTime] = useState("03:30");
  const [wakePattern, setWakePattern] = useState("");
  const [notes, setNotes] = useState("");
  const [showProtocol, setShowProtocol] = useState(false);
  const [showAnalysis, setShowAnalysis] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedOk, setSavedOk] = useState(false);

  useEffect(()=>{
    loadJSON(SLEEP_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          setBedTime(d[today].bedTime||"21:15");
          setWakeTime(d[today].wakeTime||"03:30");
          setWakePattern(d[today].wakePattern||"");
          setNotes(d[today].notes||"");
          if(d[today].hours) setSavedOk(true); // Already saved today
        }
      }
      setLoaded(true);
    });
  },[]);

  const calcHours = (bed, wake) => {
    try {
      const [bh,bm] = bed.split(":").map(Number);
      const [wh,wm] = wake.split(":").map(Number);
      let mins = (wh*60+wm) - (bh*60+bm);
      if(mins < 0) mins += 24*60;
      return Math.round(mins/60*10)/10;
    } catch(e){ return 0; }
  };

  const hours = calcHours(bedTime, wakeTime);

  const saveLog = async () => {
    setSaving(true);
    const entry = {bedTime, wakeTime, wakePattern, notes, hours};
    const newLogs = {...logs, [today]: entry};
    setLogs(newLogs);
    await save(SLEEP_KEY, newLogs);
    setSaving(false);
    setSavedOk(true);
    setShowAnalysis(true);
    setTimeout(()=>setSavedOk(false), 2000);
  };

  // Last 7 days chart data
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const key = localDateStr(d);
    const log = logs[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {
      label: i===6?"Hoy":lbls[d.getDay()],
      hours: log?.hours||0,
      wakePattern: log?.wakePattern||"",
      hasData: !!log
    };
  });

  // Sleep quality color
  const sleepColor = (h) => {
    if(h>=7.5) return G.grn;
    if(h>=6) return "#EAC850";
    return G.err;
  };

  // Analysis engine
  const getAnalysis = () => {
    const pat = wakePattern;
    const isPeri = profile?.gender !== "male" && (profile?.menopause === "peri" || profile?.menopause === "post");
    const isSmoker = profile?.conditions?.includes("smoker");

    if(pat === "mente") {
      return {
        causa: "Cortisol elevado",
        ic: "🧠",
        color: "#E8A87A",
        explanation: "La mente acelerada a las 2-4am es la firma exacta del cortisol. No es ansiedad psicológica — es hormonal. El cortisol activa el sistema nervioso simpático y el cerebro entra en 'modo alerta' en plena madrugada.",
        factores: [
          isPeri ? "Perimenopausia → la caída de progesterona reduce su efecto sedante natural en la segunda mitad de la noche." : null,
          "Entrenamiento intenso 5 días → el cortisol de recuperación muscular puede elevar el basal nocturno.",
          hours < 3 ? "Acostarte temprano y despertar muy pronto sugiere que el ciclo de sueño profundo se interrumpe justo cuando el cortisol empieza a subir (3-4am)." : null,
          isSmoker ? "La nicotina es un estimulante que eleva el cortisol — incluso horas después del último cigarrillo." : null,
        ].filter(Boolean),
        protocolo: [
          {ic:"🥜", title:"Snack antes de dormir", desc:"Mantequilla de maní + avena o yogurt griego. La glucosa estable en madrugada evita que el cortisol se dispare como mecanismo de emergencia."},
          {ic:"💊", title:"Magnesio glicinato 300mg", desc:"Tómalo 45 min antes de acostarte. El magnesio regula el cortisol y activa el GABA — el neurotransmisor del 'apaga la mente'."},
          {ic:"📵", title:"Sin pantallas 60 min antes", desc:"La luz azul suprime la melatonina y mantiene el cortisol elevado. No es un mito — es fisiología."},
          {ic:"🌡️", title:"Temperatura del cuarto", desc:"El cuerpo necesita bajar su temperatura para consolidar el sueño profundo. 18-20°C es el rango óptimo."},
          isPeri ? {ic:"🌿", title:"Ashwagandha (adaptógeno)", desc:"Reduce el cortisol basal de forma consistente en mujeres perimenopáusicas. 300-600mg con la cena. Consulta con tu médico."} : null,
          {ic:"⏰", title:"Horario consistente", desc:"El cuerpo regula el cortisol por ritmo circadiano. Acostarte y levantarte a la misma hora — incluso fines de semana — es la intervención más potente."},
          isSmoker ? {ic:"🚬", title:"Último cigarrillo", desc:"Mínimo 2 horas antes de dormir. La nicotina tiene vida media de ~2 horas y mantiene el sistema nervioso en alerta."} : null,
        ].filter(Boolean),
      };
    }

    if(pat === "calor") {
      return {

        ic: "🔥",
        color: "#E07070",
        explanation: "Los flashes de calor nocturnos son eventos vasomotores — la caída de estrógenos confunde al hipotálamo (el termostato del cuerpo) que activa el sistema de enfriamiento en momentos inapropiados.",
        factores: [
          "La caída de estrógenos afecta directamente al hipotálamo.",

        ].filter(Boolean),
        protocolo: [
          {ic:"🌡️", title:"Cuarto fresco (17-19°C)", desc:"La temperatura más baja que el cuerpo tolera cómodamente. Un ventilador ayuda."},
          {ic:"🥗", title:"Cena ligera", desc:"Las comidas pesadas antes de dormir elevan la temperatura corporal y amplifican los flashes."},
          {ic:"💊", title:"Vitamina E + Omega-3", desc:"Reducen la frecuencia e intensidad de los flashes en varios estudios. No reemplazan la terapia hormonal si es necesaria."},
          {ic:"👩‍⚕️", title:"Consulta médica", desc:"Si los flashes son frecuentes e intensos, la terapia hormonal sustitutiva (THS) es la intervención más efectiva disponible."},
        ].filter(Boolean),
      };
    }

    if(pat === "glucosa") {
      return {
        causa: "Hipoglucemia nocturna",
        ic: "🍯",
        color: "#6BBF8E",
        explanation: "Cuando la glucosa baja demasiado en madrugada, el cuerpo libera cortisol y adrenalina para subirla — y eso te despierta. El gap entre la última comida y la madrugada es demasiado largo.",
        factores: [
          "Cenar temprano + acostarte a las 9pm = 6-8 horas sin combustible.",
          "El entrenamiento intenso agota el glucógeno muscular — más demanda nocturna.",
        ],
        protocolo: [
          {ic:"🥜", title:"Snack nocturno proteico", desc:"30min antes de dormir: 1 cda mantequilla de maní + media tostada de arroz. Grasa + proteína + carbo complejo = glucosa estable toda la noche."},
          {ic:"🚫", title:"Evita carbos simples solos", desc:"El azúcar sola antes de dormir genera un pico y luego una caída — lo peor para el sueño nocturno."},
        ],
      };
    }

    // Generic
    return {
      causa: "Patrón mixto",
      ic: "😴",
      color: G.grn,
      explanation: "Selecciona el patrón de tu despertar para obtener un análisis más específico.",
      factores: [],
      protocolo: [
        {ic:"💊", title:"Magnesio glicinato 300mg", desc:"45 min antes de dormir. Primera intervención para cualquier problema de sueño."},
        {ic:"⏰", title:"Horario consistente", desc:"La misma hora de acostarte y levantarte todos los días es la base."},
      ],
    };
  };

  const analysis = getAnalysis();

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Sueño</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Registra tu descanso. La recuperación ocurre aquí.</div>

      {/* Time inputs */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Registro de hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:12,color:G.sft,display:"block",marginBottom:6}}>Me acosté a las</label>
            <input type="time" value={bedTime} onChange={e=>setBedTime(e.target.value)}
              style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
                padding:"10px 14px",color:G.crm,fontSize:16,outline:"none",textAlign:"center"}}/>

// ─── LAB NOTES ───────────────────────────────────────────────────────────────
function LabNotes({labN}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const NOTES_KEY = "lab_notes:"+labN;
  const [notes, setNotes] = useState([]);
  const [currentNote, setCurrentNote] = useState("");
  const [showHistory, setShowHistory] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    loadJSON(NOTES_KEY).then(d=>{
      if(d) setNotes(d);
      setLoaded(true);
    });
  },[labN]);

  const saveNote = async() => {
    if(!currentNote.trim()) return;
    setSaving(true);
    const newNote = {date:today, text:currentNote.trim()};
    const newNotes = [newNote, ...notes];
    setNotes(newNotes);
    await save(NOTES_KEY, newNotes);
    setCurrentNote("");
    setSaving(false);
  };

  const todayNote = notes.find(n=>n.date===today);
  const pastNotes = notes.filter(n=>n.date!==today);
  const dayLabels = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const monthLabels = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const fmtDate = (str) => { const d=new Date(str+"T12:00:00"); return `${dayLabels[d.getDay()]} ${d.getDate()} ${monthLabels[d.getMonth()]}`; };

  return (
    <div style={{margin:"0 16px 12px"}}>
      <div style={{fontSize:10,color:G.terra,letterSpacing:2,textTransform:"uppercase",
        marginBottom:8,fontWeight:600}}>
        Mis notas
      </div>

      {/* Today's note */}
      {todayNote ? (
        <div style={{background:"rgba(168,158,192,.08)",borderRadius:10,
          padding:"10px 12px",marginBottom:8,fontSize:13,color:G.sft,lineHeight:1.7}}>
          <div style={{fontSize:10,color:"#A89EC0",marginBottom:4}}>{fmtDate(todayNote.date)}</div>
          {todayNote.text}
        </div>
      ) : (
        <div style={{marginBottom:8}}>
          <textarea value={currentNote} onChange={e=>setCurrentNote(e.target.value)}
            placeholder="¿Qué conectaste hoy con este Lab?"
            style={{width:"100%",minHeight:70,background:G.sur,
              border:`1px solid ${currentNote?"#A89EC0":G.bor}`,
              borderRadius:10,padding:"10px 12px",color:G.crm,fontSize:13,
              outline:"none",resize:"none",lineHeight:1.7,
              fontFamily:"'DM Sans',sans-serif"}}/>
          {currentNote.trim() && (
            <button onClick={saveNote} disabled={saving}
              style={{width:"100%",background:"#A89EC0",color:"#fff",border:"none",
                borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,
                cursor:"pointer",marginTop:6}}>
              {saving?"Guardando...":"Guardar nota"}
            </button>
          )}
        </div>
      )}

      {/* Past notes */}
      {pastNotes.length > 0 && (
        <button onClick={()=>setShowHistory(!showHistory)}
          style={{background:"transparent",border:"none",color:"#A89EC0",
            fontSize:11,cursor:"pointer",padding:0,marginBottom:showHistory?8:0}}>
          {showHistory?"▲ Ocultar":"▸ Ver notas anteriores"} ({pastNotes.length})
        </button>
      )}
      {showHistory && pastNotes.map((n,i)=>(
        <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:8,
          padding:"8px 10px",marginBottom:6,fontSize:12,color:G.sft,lineHeight:1.6,
          border:`1px solid ${G.bor}`}}>
          <div style={{fontSize:10,color:G.mut,marginBottom:3}}>{fmtDate(n.date)}</div>
          {n.text}
        </div>
      ))}
    </div>
  );
}

              {activeLab?.n === lab.n ? (
                <div style={{padding:"12px",borderRadius:10,
                  background:"rgba(168,158,192,.1)",border:"1px solid rgba(168,158,192,.3)"}}>
                  <div style={{fontSize:11,color:"#A89EC0",marginBottom:8,fontWeight:600}}>
                    ✨ Lab activo esta semana
                  </div>
                  <button onClick={()=>onClearActive()}
                    style={{width:"100%",background:"transparent",border:`1px solid ${G.bor}`,
                      borderRadius:8,padding:"7px",fontSize:11,color:G.mut,cursor:"pointer"}}>
                    Cambiar de Lab
                  </button>
                </div>
              ) : activeLab ? (
                <div style={{padding:"10px 12px",borderRadius:10,
                  background:"rgba(255,255,255,.02)",border:`1px solid ${G.bor}`,fontSize:11,color:G.mut}}>
                  Ya tienes "{activeLab.title}" como Lab activo. Cámbialo desde ese Lab si quieres usar este.
                </div>
              ) : (
                <button onClick={()=>onSetActive()}
                  style={{width:"100%",background:"linear-gradient(135deg, rgba(168,158,192,.15), rgba(200,132,90,.1))",
                    border:"1px solid rgba(168,158,192,.4)",borderRadius:10,
                    padding:"12px",fontSize:13,color:"#A89EC0",fontWeight:600,cursor:"pointer"}}>
                  ✨ Adoptar como Misión de la Semana
                </button>
              )}
            </div>
          )}

          {/* Lab Completion - Micro Journaling - DESACTIVADO */}
          {false && onComplete && (
            <LabCompletionForm lab={lab} isCompleted={isCompleted} onComplete={onComplete}/>
          )}
        </div>
      )}
    </div>
  );
}


// ─── PREMISE ONBOARDING ───────────────────────────────────────────────────
const PREMISE_KEY = "my_premise";

const PREMISE_AREAS = [
  {id:"cuerpo", ic:"🌿", label:"Cuerpo", q:"¿Cómo es esa versión de ti en tu cuerpo y salud?"},
  {id:"mente", ic:"🧠", label:"Mente", q:"¿Cómo piensa y decide esa versión de ti?"},
  {id:"emociones", ic:"🌊", label:"Emociones", q:"¿Cómo maneja las emociones esa versión de ti?"},
  {id:"relaciones", ic:"🤝", label:"Relaciones", q:"¿Cómo se relaciona con los demás esa versión de ti?"},
  {id:"trabajo", ic:"⚡", label:"Trabajo y acción", q:"¿Cómo actúa y crea esa versión de ti?"},
  {id:"espiritualidad", ic:"✨", label:"Espiritualidad", q:"¿Qué guía a esa versión de ti internamente?"},
  {id:"resultados", ic:"🏆", label:"Resultados", q:"¿Qué ha construido esa versión de ti?"},
];

function PremiseOnboarding({onComplete}) {
  const [step, setStep] = useState(1); // 1=vision, 2=areas, 3=describe, 4=complete
  const [vision, setVision] = useState("");
  const [selectedAreas, setSelectedAreas] = useState([]);
  const [areaIdx, setAreaIdx] = useState(0);
  const [areaTexts, setAreaTexts] = useState({});
  const [currentAreaText, setCurrentAreaText] = useState("");
  const [saving, setSaving] = useState(false);

  const currentArea = PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx];
  const totalAreas = selectedAreas.length;

  const toggleArea = (id) => {
    setSelectedAreas(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };

  const nextArea = () => {
    const newTexts = {...areaTexts, [currentArea.id]: currentAreaText};
    setAreaTexts(newTexts);
    setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx+1]?.id]||"");
    if(areaIdx < totalAreas-1) {
      setAreaIdx(i=>i+1);
    } else {
      setAreaTexts(newTexts);
      setStep(4);
    }
  };

  const savePremise = async () => {
    setSaving(true);
    const premise = {
      vision,
      areas: selectedAreas.map(id=>({
        id,
        ...PREMISE_AREAS.find(a=>a.id===id),
        text: areaTexts[id]||"",
      })),
      createdAt: new Date().toISOString(),
    };
    await save(PREMISE_KEY, premise);
    setSaving(false);
    onComplete(premise);
  };

  return (
    <div style={{minHeight:"100vh",background:G.bg,padding:"32px 20px 60px",maxWidth:480,margin:"0 auto"}}>
      {/* Progress */}
      <div style={{display:"flex",gap:6,marginBottom:32}}>
        {[1,2,3,4].map(s=>(
          <div key={s} style={{flex:1,height:3,borderRadius:2,
            background:s<=step?G.acc:"rgba(255,255,255,.1)",transition:"background .3s"}}/>
        ))}
      </div>

      {/* PASO 1: VISIÓN */}
      {step===1 && (
        <div className="fade-up">
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 1 de 4
            </div>
            <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:12}}>
              Imagina la versión de ti que ya llegó.
            </div>
            <div style={{fontSize:14,color:G.sft,lineHeight:1.8}}>
              No quien quieres ser algún día. La versión que ya decidiste que eres. ¿Cómo es? ¿Cómo se siente? ¿Cómo actúa?
            </div>
          </div>
          <textarea value={vision} onChange={e=>setVision(e.target.value)}
            placeholder="Escribe libremente. No hay respuesta correcta..."
            autoFocus
            style={{width:"100%",height:180,background:G.sur,border:`1.5px solid ${vision?G.acc:G.bor}`,
              borderRadius:16,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={()=>setStep(2)} disabled={vision.trim().length<10}
            style={{width:"100%",background:vision.trim().length>=10?G.acc:"rgba(255,255,255,.06)",
              color:vision.trim().length>=10?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:vision.trim().length>=10?"pointer":"not-allowed"}}>
            Continuar →
          </button>
        </div>
      )}

      {/* PASO 2: ÁREAS */}
      {step===2 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 2 de 4
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              ¿En qué áreas es más diferente esa versión?
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              Elige las que resuenan. No todas tienen que aplicar.
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {PREMISE_AREAS.map(a=>{
              const on = selectedAreas.includes(a.id);
              return (
                <button key={a.id} onClick={()=>toggleArea(a.id)}
                  style={{background:on?"rgba(200,132,90,.1)":"transparent",
                    border:`1.5px solid ${on?G.acc:G.bor}`,borderRadius:16,
                    padding:"13px 16px",cursor:"pointer",textAlign:"left",
                    display:"flex",alignItems:"center",gap:12,transition:"all .2s"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{a.ic}</span>
                  <span style={{fontSize:14,fontWeight:on?600:400,color:on?G.acl:G.crm}}>{a.label}</span>
                  {on && <span style={{marginLeft:"auto",color:G.acc,fontSize:16}}>✓</span>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>{setAreaIdx(0);setCurrentAreaText("");setStep(3);}}
            disabled={selectedAreas.length===0}
            style={{width:"100%",background:selectedAreas.length>0?G.acc:"rgba(255,255,255,.06)",
              color:selectedAreas.length>0?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:selectedAreas.length>0?"pointer":"not-allowed"}}>
            Continuar con {selectedAreas.length} {selectedAreas.length===1?"área":"áreas"} →
          </button>
        </div>
      )}

      {/* PASO 3: DESCRIBIR CADA ÁREA */}
      {step===3 && currentArea && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Tu Premise · Área {areaIdx+1} de {totalAreas}
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:32}}>{currentArea.ic}</span>
              <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>{currentArea.label}</div>
            </div>
            <div style={{fontSize:15,color:G.sft,lineHeight:1.7}}>{currentArea.q}</div>
          </div>
          <textarea value={currentAreaText} onChange={e=>setCurrentAreaText(e.target.value)}
            placeholder="En tus palabras..."
            autoFocus
            style={{width:"100%",height:140,background:G.sur,
              border:`1.5px solid ${currentAreaText?G.acc:G.bor}`,
              borderRadius:16,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={nextArea} disabled={currentAreaText.trim().length<3}
            style={{width:"100%",background:currentAreaText.trim().length>=3?G.acc:"rgba(255,255,255,.06)",
              color:currentAreaText.trim().length>=3?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:currentAreaText.trim().length>=3?"pointer":"not-allowed"}}>
            {areaIdx<totalAreas-1?"Siguiente área →":"Ver mi Premise →"}
          </button>
          {areaIdx>0 && (
            <button onClick={()=>{
                setAreaIdx(i=>i-1);
                setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx-1].id]||"");
              }}
              style={{width:"100%",background:"transparent",border:"none",
                padding:"10px",fontSize:13,color:G.mut,cursor:"pointer",marginTop:4}}>
              ← Volver
            </button>
          )}
        </div>
      )}

      {/* PASO 4: PREMISE COMPLETA */}
      {step===4 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              Esta eres tú.
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              No quien quieres ser — quien ya decidiste que eres. Puedes editarla cuando quieras.
            </div>
          </div>

          {/* Visión */}
          <div style={{background:"rgba(200,132,90,.06)",border:"1px solid rgba(200,132,90,.2)",
            borderRadius:16,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:10,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Mi visión
            </div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:14,color:G.crm,lineHeight:1.8,fontStyle:"italic"}}>
              "{vision}"
            </div>
          </div>

          {/* Áreas */}
          {selectedAreas.map(id=>{
            const area = PREMISE_AREAS.find(a=>a.id===id);
            const text = areaTexts[id];
            if(!text) return null;
            return (
              <div key={id} style={{background:G.card,border:`1px solid ${G.bor}`,
                borderRadius:16,padding:"14px 16px",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:18}}>{area.ic}</span>
                  <span style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>
                    {area.label}
                  </span>
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:13,color:G.sft,lineHeight:1.7,fontStyle:"italic"}}>
                  "{text}"
                </div>
              </div>
            );
          })}

          <button onClick={savePremise} disabled={saving}
            style={{width:"100%",background:G.acc,color:"#fff",border:"none",borderRadius:16,
              padding:"15px",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:8,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {saving?"Guardando...":"✓ Esta soy yo — Guardar mi Premise"}
          </button>
        </div>
      )}
    </div>
  );
}

function HealingScreen({profile, onNavigate, onPremiseSaved, onHealingUpdate, activeLab, setActiveLab, labCompletions, setLabCompletions, labResponses, setLabResponses, initialTab}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const hour = new Date().getHours();
  const [myPremise, setMyPremise] = useState(null);
  const [premiseLoaded, setPremiseLoaded] = useState(false);
  const [editingPremise, setEditingPremise] = useState(false);
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [todayPilar, setTodayPilar] = useState(null);
  const [showSabotaje, setShowSabotaje] = useState(false);
  const [sabStep, setSabStep] = useState(1); // 1=pause, 2=name, 3=decide
  const [sabText, setSabText] = useState("");
  const [sabCountdown, setSabCountdown] = useState(10);
  const [sabTimerActive, setSabTimerActive] = useState(false);
  const [sabResult, setSabResult] = useState(null); // "moved"|"decided"

  useEffect(()=>{
    if(!sabTimerActive) return;
    if(sabCountdown <= 0) { setSabTimerActive(false); setSabStep(2); return; }
    const t = setTimeout(()=>setSabCountdown(n=>n-1), 1000);
    return ()=>clearTimeout(t);
  },[sabTimerActive, sabCountdown]);

  const startProtocol = () => {
    setShowSabotaje(true);
    setSabStep(1);
    setSabText("");
    setSabCountdown(10);
    setSabResult(null);
    setSabTimerActive(true);
  };

  const saveSabResult = async (result, movementType) => {
    setSabResult(result);
    const entry = {
      time: new Date().toISOString(),
      text: sabText,
      result,
      movementType: movementType || null,
    };
    const existing = (logs[today]?.sabotaje || []);
    await saveToday({sabotaje: [...existing, entry]});
  };

  // Count this month's protocol uses
  const thisMonth = Object.entries(logs)
    .filter(([k])=>k.startsWith(new Date().toISOString().slice(0,7)))
    .flatMap(([,v])=>v.sabotaje||[]);
  const movedCount = thisMonth.filter(e=>e.result==="moved").length;
  const decidedCount = thisMonth.filter(e=>e.result==="decided").length;
  const [coherencia, setCoherencia] = useState(null);
  const [aprendizaje, setAprendizaje] = useState("");
  const [showLabs, setShowLabs] = useState(initialTab==="ritual");
  const [healingTab, setHealingTab] = useState(initialTab||"ritual"); // ritual | diario
  const [diaryNotes, setDiaryNotes] = useState({}); // {labN_date: text}
  const [activeDiaryNote, setActiveDiaryNote] = useState(null); // {labN, question, text}
  const [labAction, setLabAction] = useState(null); // {labN, accion, done}
  const [premiseLinks, setPremiseLinks] = useState([]); // [{labN, labTitle}]
  const [showPremiseRitual, setShowPremiseRitual] = useState(false);
  const [ritualText, setRitualText] = useState("");
  const [ritualResult, setRitualResult] = useState(null); // {score, matched, missed}
  const [nightSaved, setNightSaved] = useState(false); // set true on load if already saved today

  const todayLog = logs[today] || {};

  useEffect(()=>{
    loadJSON(PREMISE_KEY).then(p=>{if(p) setMyPremise(p); setPremiseLoaded(true);});
    loadJSON("lab_action").then(d=>{if(d){setLabAction(d);}});
    loadJSON("diary_notes").then(d=>{if(d) setDiaryNotes(d);});
    loadJSON("premise_links").then(d=>{if(d) setPremiseLinks(d);});
    loadJSON(HEALING_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          if(d[today].pilar) setTodayPilar(d[today].pilar);
          if(d[today].coherencia !== undefined) {
            setCoherencia(d[today].coherencia);
            setNightSaved(true);
          }
          if(d[today].aprendizaje) setAprendizaje(d[today].aprendizaje);
        }
      }
      setLoaded(true);
    });
  },[]);

  const saveToday = async (updates) => {
    const newLog = {...logs, [today]: {...(logs[today]||{}), ...updates}};
    setLogs(newLog);
    await save(HEALING_KEY, newLog);
    if(onHealingUpdate) onHealingUpdate(newLog);
  };

  const pilarActual = PREMISE_PILLARS.find(p=>p.id===todayPilar);

  // Premise ritual comparison
  const compareWithPremise = () => {
    if(!myPremise || !ritualText.trim()) return;
    const original = myPremise.vision.toLowerCase();
    const written = ritualText.toLowerCase();
    // Split into key phrases (4+ word chunks)
    const words = original.split(/\s+/);
    const chunks = [];
    for(let i=0; i<words.length-3; i++) {
      chunks.push(words.slice(i,i+4).join(" "));
    }
    const matched = chunks.filter(ch=>written.includes(ch));
    const score = Math.round((matched.length/Math.max(chunks.length,1))*100);
    setRitualResult({score, total:chunks.length, matched:matched.length});
    // Save ritual
    saveToday({premiseRitual:{text:ritualText, score, date:today}});
  };

  // Time of day determines what's highlighted
  const isMorning = hour < 12;
  const isEvening = hour >= 18;

    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];

    return {key, label:i===6?"Hoy":lbls[d.getDay()], log, pil, isToday:i===6};
  });

  if(!loaded || !premiseLoaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  // Show onboarding if no premise yet
  if(!myPremise || editingPremise) return (
    <PremiseOnboarding onComplete={async(p)=>{setMyPremise(p);setEditingPremise(false);if(onPremiseSaved)onPremiseSaved(p);}}/>
  );


  // Lab-specific diary questions
  const LAB_DIARY_Q = {
    1: "¿Qué comportamiento tuyo observaste hoy sin juzgarlo? ¿Qué viste?",
    2: "¿En qué momento de hoy actuaste desde tu Premise — no desde el miedo o el hábito?",
    3: "¿Qué patrón notaste hoy que antes no veías? ¿Cómo se sintió verlo?",
    4: "¿Dónde pusiste o necesitabas poner un límite hoy? ¿Cómo respondiste internamente?",
    5: "¿Identificaste algún pacto de miedo en acción hoy? ¿Cómo se manifestó?",
    6: "¿En qué momento te encontraste pagando por algo que ya no te pertenece? ¿Qué hiciste?",
    7: "¿Tomaste alguna acción que antes evitabas? ¿Cómo te sentiste antes y después?",
    8: "¿Qué comportamiento nuevo de tu identidad apareció hoy de forma natural?",
    9: "¿Sentiste ligereza en algún momento? ¿Qué la produjo?",
    10: "¿Llegó alguna prueba de tu nueva identidad? ¿Cómo respondiste?",
    11: "¿En qué momento usaste el ciclo soberano (nota → decide → actúa/suelta)?",
    12: "¿Qué estabas saboteando que hoy dejaste de sabotear, aunque sea un poco?",
  };
  return (
    <div className="fi">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>Healing</div>
          <div style={{fontSize:13,color:G.sft}}>El entrenamiento de la mente.</div>
        </div>
        {pilarActual && (
          <div style={{background:"rgba(200,132,90,.1)",border:"1px solid rgba(200,132,90,.3)",
            borderRadius:20,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>{pilarActual.ic}</span>
            <span style={{fontSize:11,color:G.sft,fontWeight:500}}>{pilarActual.label}</span>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div className="stab" style={{margin:"0 -20px 16px",paddingLeft:20}}>
        <button className={healingTab==="ritual"?"on":""} onClick={()=>setHealingTab("ritual")}>Ritual</button>
        <button className={healingTab==="diario"?"on":""} onClick={()=>setHealingTab("diario")}>Diario</button>

      {healingTab==="diario" && (
        <div className="fade-in">

            Tu historial de Healing. Se construye solo con lo que haces cada día.
          </div>

          {/* Lab actions with diary */}
          {Object.entries(logs)
            .sort(([a],[b])=>b.localeCompare(a))
            .slice(0,14)
            .map(([date, log])=>{
              if(!log?.labAction?.labN) return null;
              const la = log.labAction;
              const noteKey = `${la.labN}_${date}`;
              const note = diaryNotes[noteKey]||"";
