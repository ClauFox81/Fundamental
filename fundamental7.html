          <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
            {[["#E8A87A","⚡ Energía"],["#A89EC0","🧠 Foco"],["#6BBF8E","✨ Piel"]].map(([col,lbl])=>(
              <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:10,height:3,borderRadius:2,background:col}}/>
                <span style={{fontSize:11,color:G.sft}}>{lbl}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* BOTÓN PRINCIPAL */}
      <button onClick={()=>{
        setRegistered(true);
        setShowRecs(true);
        const newRecords = {...records, [today]: {...(records[today]||{}), registered:true}};
        setRecords(newRecords);
        save(BITACORA_KEY, newRecords);
        if(onBitacoraUpdate) onBitacoraUpdate(newRecords);
      }}
        style={{width:"100%",background:registered?"rgba(74,155,111,.12)":"#4A9B6F",
          color:registered?"#6BBF8E":"#fff",
          border:registered?"1.5px solid #4A9B6F":"none",
          borderRadius:12,padding:"15px 20px",fontSize:15,fontWeight:600,cursor:"pointer",
          marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {registered?"✓ Día registrado — Revelar correlaciones":"📊 Registrar mi día y revelar correlaciones"}
      </button>

      {/* Botón análisis nutricional */}
      <button onClick={analyzeNutrition}
        style={{width:"100%",background:"rgba(168,158,192,.08)",
          border:"1.5px solid #A89EC0",borderRadius:12,padding:"12px 20px",
          fontSize:13,fontWeight:600,cursor:"pointer",color:"#A89EC0",
          marginBottom:20,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        🔬 Analizar mi nutrición de hoy
      </button>

      {/* CORRELACIONES */}
      {showRecs && (
        <div>
          <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:4}}>Correlaciones detectadas</div>
          <div style={{fontSize:12,color:G.sft,marginBottom:14}}>Patrones entre tus síntomas y tu bioquímica.</div>
          {getCorrelations().map((r,i)=>(
            <div key={i} style={{background:`${r.color}11`,border:`1px solid ${r.color}44`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
              <div style={{fontSize:10,color:r.color,letterSpacing:1.2,textTransform:"uppercase",fontWeight:700,marginBottom:5}}>{r.ic} Correlación</div>
              <div style={{fontSize:14,fontWeight:600,color:G.crm,marginBottom:6}}>{r.title}</div>
              <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:10}}>{r.msg}</div>
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"8px 12px",display:"flex",gap:8}}>
                <span style={{color:r.color,flexShrink:0}}>→</span>
                <span style={{fontSize:12,color:G.crm,fontWeight:500}}>{r.accion}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ANÁLISIS NUTRICIONAL */}
      {nutriAnalysis && (
        <div style={{marginTop:8}}>
          <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:4}}>Análisis nutricional personalizado</div>
          <div style={{fontSize:12,color:G.sft,marginBottom:14}}>Basado en tu perfil y síntomas de hoy.</div>
          {nutriAnalysis.map((r,i)=>(
            <div key={i} style={{background:`${r.color}11`,border:`1px solid ${r.color}44`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
              <div style={{fontSize:10,color:r.color,letterSpacing:1.2,textTransform:"uppercase",fontWeight:700,marginBottom:5}}>{r.ic} Recomendación</div>
              <div style={{fontSize:14,fontWeight:600,color:G.crm,marginBottom:6}}>{r.title}</div>
              <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:10}}>{r.msg}</div>
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"8px 12px",display:"flex",gap:8}}>
                <span style={{color:r.color,flexShrink:0}}>→</span>
                <span style={{fontSize:12,color:G.crm,fontWeight:500}}>{r.accion}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:12,padding:14,marginTop:8,fontSize:12,color:G.sft,lineHeight:1.7}}>
        💡 La piel, el sueño y el foco son los primeros indicadores de que tu nutrición funciona — mucho antes que la báscula.
      </div>

      {/* Conexión con Healing */}
      {registered && (()=>{
        const e = todayRec.energia||3;
        const f = todayRec.foco||3;
        const sintomas = todayRec.sintomas||[];
        const hasNegative = sintomas.some(s=>["Hinchazón","Ansiedad por dulce","Fatiga post-comida","Irritabilidad","Niebla mental"].includes(s));
        if((e<=2||f<=2||hasNegative)) return (
          <div style={{background:"rgba(200,132,90,.06)",border:"1px solid rgba(200,132,90,.25)",
            borderRadius:14,padding:"16px",marginTop:12}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              💎 Conexión con Healing
            </div>
            <div style={{fontSize:14,fontWeight:500,color:G.crm,marginBottom:6}}>
              {e<=2&&f<=2?"Energía y foco bajos hoy.":e<=2?"Energía baja hoy.":f<=2?"Foco bajo hoy.":"Síntomas que merecen atención."}
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:14}}>
              Estos síntomas pueden tener una raíz emocional además de nutricional. ¿Activaste el protocolo de soberanía hoy?
            </div>
            <HealingNavButton onNavigate={onNavigate}/>
          </div>
        );
        return null;
      })()}
      </div>}
    </div>
  );
}

// ─── MÓDULO DE SUEÑO ──────────────────────────────────────────────────────
const SLEEP_KEY = "sleep_log";

function SleepScreen({profile}) {
  const today = new Date().toISOString().slice(0,10);
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [bedTime, setBedTime] = useState("21:15");
  const [wakeTime, setWakeTime] = useState("03:30");
  const [wakePattern, setWakePattern] = useState("");
  const [notes, setNotes] = useState("");
  const [showProtocol, setShowProtocol] = useState(false);
  const [showAnalysis, setShowAnalysis] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedOk, setSavedOk] = useState(false);

  useEffect(()=>{
    loadJSON(SLEEP_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          setBedTime(d[today].bedTime||"21:15");
          setWakeTime(d[today].wakeTime||"03:30");
          setWakePattern(d[today].wakePattern||"");
          setNotes(d[today].notes||"");
          if(d[today].hours) setSavedOk(true); // Already saved today
        }
      }
      setLoaded(true);
    });
  },[]);

  const calcHours = (bed, wake) => {
    try {
      const [bh,bm] = bed.split(":").map(Number);
      const [wh,wm] = wake.split(":").map(Number);
      let mins = (wh*60+wm) - (bh*60+bm);
      if(mins < 0) mins += 24*60;
      return Math.round(mins/60*10)/10;
    } catch(e){ return 0; }
  };

  const hours = calcHours(bedTime, wakeTime);

  const saveLog = async () => {
    setSaving(true);
    const entry = {bedTime, wakeTime, wakePattern, notes, hours};
    const newLogs = {...logs, [today]: entry};
    setLogs(newLogs);
    await save(SLEEP_KEY, newLogs);
    setSaving(false);
    setSavedOk(true);
    setShowAnalysis(true);
    setTimeout(()=>setSavedOk(false), 2000);
  };

  // Last 7 days chart data
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const key = d.toISOString().slice(0,10);
    const log = logs[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {
      label: i===6?"Hoy":lbls[d.getDay()],
      hours: log?.hours||0,
      wakePattern: log?.wakePattern||"",
      hasData: !!log
    };
  });

  // Sleep quality color
  const sleepColor = (h) => {
    if(h>=7.5) return G.grn;
    if(h>=6) return "#EAC850";
    return G.err;
  };

  // Analysis engine
  const getAnalysis = () => {
    const pat = wakePattern;
    const isPeri = profile?.gender !== "male" && (profile?.menopause === "peri" || profile?.menopause === "post");
    const isSmoker = profile?.conditions?.includes("smoker");

    if(pat === "mente") {
      return {
        causa: "Cortisol elevado",
        ic: "🧠",
        color: "#E8A87A",
        explanation: "La mente acelerada a las 2-4am es la firma exacta del cortisol. No es ansiedad psicológica — es hormonal. El cortisol activa el sistema nervioso simpático y el cerebro entra en 'modo alerta' en plena madrugada.",
        factores: [
          isPeri ? "Perimenopausia → la caída de progesterona reduce su efecto sedante natural en la segunda mitad de la noche." : null,
          "Entrenamiento intenso 5 días → el cortisol de recuperación muscular puede elevar el basal nocturno.",
          hours < 3 ? "Acostarte temprano y despertar muy pronto sugiere que el ciclo de sueño profundo se interrumpe justo cuando el cortisol empieza a subir (3-4am)." : null,
          isSmoker ? "La nicotina es un estimulante que eleva el cortisol — incluso horas después del último cigarrillo." : null,
        ].filter(Boolean),
        protocolo: [
          {ic:"🥜", title:"Snack antes de dormir", desc:"Mantequilla de maní + avena o yogurt griego. La glucosa estable en madrugada evita que el cortisol se dispare como mecanismo de emergencia."},
          {ic:"💊", title:"Magnesio glicinato 300mg", desc:"Tómalo 45 min antes de acostarte. El magnesio regula el cortisol y activa el GABA — el neurotransmisor del 'apaga la mente'."},
          {ic:"📵", title:"Sin pantallas 60 min antes", desc:"La luz azul suprime la melatonina y mantiene el cortisol elevado. No es un mito — es fisiología."},
          {ic:"🌡️", title:"Temperatura del cuarto", desc:"El cuerpo necesita bajar su temperatura para consolidar el sueño profundo. 18-20°C es el rango óptimo."},
          isPeri ? {ic:"🌿", title:"Ashwagandha (adaptógeno)", desc:"Reduce el cortisol basal de forma consistente en mujeres perimenopáusicas. 300-600mg con la cena. Consulta con tu médico."} : null,
          {ic:"⏰", title:"Horario consistente", desc:"El cuerpo regula el cortisol por ritmo circadiano. Acostarte y levantarte a la misma hora — incluso fines de semana — es la intervención más potente."},
          isSmoker ? {ic:"🚬", title:"Último cigarrillo", desc:"Mínimo 2 horas antes de dormir. La nicotina tiene vida media de ~2 horas y mantiene el sistema nervioso en alerta."} : null,
        ].filter(Boolean),
      };
    }

    if(pat === "calor") {
      return {
        causa: "Flash hormonal (vasomotor)",
        ic: "🔥",
        color: "#E07070",
        explanation: "Los flashes de calor nocturnos son eventos vasomotores — la caída de estrógenos confunde al hipotálamo (el termostato del cuerpo) que activa el sistema de enfriamiento en momentos inapropiados.",
        factores: [
          "La caída de estrógenos afecta directamente al hipotálamo.",
          "El alcohol, la cafeína y las comidas picantes amplifican los flashes.",
          isSmoker ? "El tabaco reduce los niveles de estrógeno — empeora los flashes de calor." : null,
        ].filter(Boolean),
        protocolo: [
          {ic:"🌡️", title:"Cuarto fresco (17-19°C)", desc:"La temperatura más baja que el cuerpo tolera cómodamente. Un ventilador ayuda."},
          {ic:"🥗", title:"Cena ligera", desc:"Las comidas pesadas antes de dormir elevan la temperatura corporal y amplifican los flashes."},
          {ic:"💊", title:"Vitamina E + Omega-3", desc:"Reducen la frecuencia e intensidad de los flashes en varios estudios. No reemplazan la terapia hormonal si es necesaria."},
          {ic:"👩‍⚕️", title:"Consulta médica", desc:"Si los flashes son frecuentes e intensos, la terapia hormonal sustitutiva (THS) es la intervención más efectiva disponible."},
        ].filter(Boolean),
      };
    }

    if(pat === "glucosa") {
      return {
        causa: "Hipoglucemia nocturna",
        ic: "🍯",
        color: "#6BBF8E",
        explanation: "Cuando la glucosa baja demasiado en madrugada, el cuerpo libera cortisol y adrenalina para subirla — y eso te despierta. El gap entre la última comida y la madrugada es demasiado largo.",
        factores: [
          "Cenar temprano + acostarte a las 9pm = 6-8 horas sin combustible.",
          "El entrenamiento intenso agota el glucógeno muscular — más demanda nocturna.",
        ],
        protocolo: [
          {ic:"🥜", title:"Snack nocturno proteico", desc:"30min antes de dormir: 1 cda mantequilla de maní + media tostada de arroz. Grasa + proteína + carbo complejo = glucosa estable toda la noche."},
          {ic:"🚫", title:"Evita carbos simples solos", desc:"El azúcar sola antes de dormir genera un pico y luego una caída — lo peor para el sueño nocturno."},
        ],
      };
    }

    // Generic
    return {
      causa: "Patrón mixto",
      ic: "😴",
      color: G.grn,
      explanation: "Selecciona el patrón de tu despertar para obtener un análisis más específico.",
      factores: [],
      protocolo: [
        {ic:"💊", title:"Magnesio glicinato 300mg", desc:"45 min antes de dormir. Primera intervención para cualquier problema de sueño."},
        {ic:"⏰", title:"Horario consistente", desc:"La misma hora de acostarte y levantarte todos los días es la base."},
      ],
    };
  };

  const analysis = getAnalysis();

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Sueño</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Registra tu descanso. La recuperación ocurre aquí.</div>

      {/* Time inputs */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Registro de hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:12,color:G.mut,display:"block",marginBottom:6}}>😴 Me acosté a las</label>
            <input type="time" value={bedTime} onChange={e=>setBedTime(e.target.value)}
              style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
                padding:"10px 14px",color:G.crm,fontSize:16,outline:"none",textAlign:"center"}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:G.mut,display:"block",marginBottom:6}}>⏰ Me desperté a las</label>
            <input type="time" value={wakeTime} onChange={e=>setWakeTime(e.target.value)}
              style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
                padding:"10px 14px",color:G.crm,fontSize:16,outline:"none",textAlign:"center"}}/>
          </div>
        </div>

        {/* Hours display */}
        <div style={{textAlign:"center",background:G.sur,borderRadius:10,padding:"12px",marginBottom:16}}>
          <div style={{fontSize:32,fontWeight:700,color:sleepColor(hours),fontFamily:"'Fraunces',serif"}}>{hours}h</div>
          <div style={{fontSize:12,color:G.sft,marginTop:2}}>
            {hours>=7.5?"✅ Sueño óptimo":hours>=6?"⚠️ Sueño insuficiente":"❌ Sueño muy corto — el cuerpo no regeneró"}
          </div>
        </div>

        {/* Wake pattern */}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,color:G.mut,display:"block",marginBottom:8}}>¿Cómo fue tu despertar?</label>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[
              {id:"mente", label:"🧠 Mente acelerada — pensamientos que no paran", color:"#E8A87A"},
              {id:"calor", label:"🔥 Flash de calor o sudoración", color:"#E07070"},
              {id:"glucosa", label:"🍯 Sin razón aparente — simplemente desperté", color:"#6BBF8E"},
              {id:"bien", label:"😊 Dormí bien — desperté descansada", color:G.grn},
            ].map(opt=>(
              <button key={opt.id} onClick={()=>setWakePattern(opt.id)}
                style={{padding:"11px 14px",borderRadius:10,fontSize:13,cursor:"pointer",textAlign:"left",
                  border:`1.5px solid ${wakePattern===opt.id?opt.color:G.bor}`,
                  background:wakePattern===opt.id?`${opt.color}15`:"transparent",
                  color:wakePattern===opt.id?opt.color:G.sft,transition:"all .2s"}}>
                {opt.label}
              </button>
            ))}
          </div>
        </div>

        <textarea value={notes} onChange={e=>setNotes(e.target.value)}
          placeholder="Notas opcionales: qué cenaste, si tomaste magnesio, nivel de estrés del día..."
          style={{width:"100%",height:68,background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
            padding:"10px 14px",color:G.txt,fontSize:13,resize:"none",outline:"none",lineHeight:1.6,marginBottom:14}}/>

        <button onClick={saveLog} disabled={saving}
          style={{width:"100%",background:savedOk?"rgba(74,155,111,.2)":G.grn,
            color:savedOk?G.grl:"#fff",border:savedOk?`1.5px solid ${G.grn}`:"none",
            borderRadius:12,padding:"14px",fontSize:15,fontWeight:600,
            cursor:saving?"wait":"pointer",transition:"all .3s"}}>
          {saving?"Guardando...":savedOk?"✓ Guardado":"💤 Guardar y analizar mi sueño"}
        </button>
      </div>

      {/* 7-day chart */}
      {last7.some(d=>d.hasData) && (
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Últimos 7 días</div>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",height:70}}>
            {last7.map((d,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:9,color:d.hours>0?sleepColor(d.hours):G.mut,fontWeight:600}}>{d.hours>0?d.hours+"h":""}</div>
                <div style={{width:"100%",background:d.hours>0?sleepColor(d.hours):G.bor,
                  height:`${Math.max((d.hours/9)*60,d.hours>0?4:2)}px`,borderRadius:"3px 3px 0 0",
                  opacity:.85,transition:"height .3s"}}/>
                <div style={{fontSize:9,color:G.mut}}>{d.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
            {[[G.grn,"≥7.5h óptimo"],["#EAC850","6-7.5h insuficiente"],[G.err,"<6h crítico"]].map(([col,lbl])=>(
              <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:8,height:8,borderRadius:2,background:col}}/>
                <span style={{fontSize:10,color:G.sft}}>{lbl}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Analysis */}
      {showAnalysis && wakePattern && (
        <div>

  {id:"resultados", ic:"🏆", label:"Resultados", q:"¿Qué ha construido esa versión de ti?"},

function PremiseOnboarding({onComplete}) {
  const [step, setStep] = useState(1); // 1=vision, 2=areas, 3=describe, 4=complete
  const [vision, setVision] = useState("");
  const [selectedAreas, setSelectedAreas] = useState([]);
  const [areaIdx, setAreaIdx] = useState(0);
  const [areaTexts, setAreaTexts] = useState({});
  const [currentAreaText, setCurrentAreaText] = useState("");
  const [saving, setSaving] = useState(false);

  const currentArea = PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx];
  const totalAreas = selectedAreas.length;

  const toggleArea = (id) => {
    setSelectedAreas(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };

  const nextArea = () => {
    const newTexts = {...areaTexts, [currentArea.id]: currentAreaText};
    setAreaTexts(newTexts);
    setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx+1]?.id]||"");
    if(areaIdx < totalAreas-1) {
      setAreaIdx(i=>i+1);
    } else {
      setAreaTexts(newTexts);
      setStep(4);
    }
  };

  const savePremise = async () => {
    setSaving(true);
    const premise = {
      vision,
      areas: selectedAreas.map(id=>({
        id,
        ...PREMISE_AREAS.find(a=>a.id===id),
        text: areaTexts[id]||"",
      })),
      createdAt: new Date().toISOString(),
    };
    await save(PREMISE_KEY, premise);
    setSaving(false);
    onComplete(premise);
  };

  return (
    <div style={{minHeight:"100vh",background:G.bg,padding:"32px 20px 60px",maxWidth:480,margin:"0 auto"}}>
      {/* Progress */}
      <div style={{display:"flex",gap:6,marginBottom:32}}>
        {[1,2,3,4].map(s=>(
          <div key={s} style={{flex:1,height:3,borderRadius:2,
            background:s<=step?G.acc:"rgba(255,255,255,.1)",transition:"background .3s"}}/>
        ))}
      </div>

      {/* PASO 1: VISIÓN */}
      {step===1 && (
        <div className="fade-up">
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 1 de 4
            </div>
            <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:12}}>
              Imagina la versión de ti que ya llegó.
            </div>
            <div style={{fontSize:14,color:G.sft,lineHeight:1.8}}>
              No quien quieres ser algún día. La versión que ya decidiste que eres. ¿Cómo es? ¿Cómo se siente? ¿Cómo actúa?
            </div>
          </div>
          <textarea value={vision} onChange={e=>setVision(e.target.value)}
            placeholder="Escribe libremente. No hay respuesta correcta..."
            autoFocus
            style={{width:"100%",height:180,background:G.sur,border:`1.5px solid ${vision?G.acc:G.bor}`,
              borderRadius:12,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={()=>setStep(2)} disabled={vision.trim().length<10}
            style={{width:"100%",background:vision.trim().length>=10?G.acc:"rgba(255,255,255,.06)",
              color:vision.trim().length>=10?"#fff":G.mut,border:"none",borderRadius:12,
              padding:"14px",fontSize:15,fontWeight:600,cursor:vision.trim().length>=10?"pointer":"not-allowed"}}>
            Continuar →
          </button>
        </div>
      )}

      {/* PASO 2: ÁREAS */}
      {step===2 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 2 de 4
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              ¿En qué áreas es más diferente esa versión?
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              Elige las que resuenan. No todas tienen que aplicar.
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {PREMISE_AREAS.map(a=>{
              const on = selectedAreas.includes(a.id);
              return (
                <button key={a.id} onClick={()=>toggleArea(a.id)}
                  style={{background:on?"rgba(200,132,90,.1)":"transparent",
                    border:`1.5px solid ${on?G.acc:G.bor}`,borderRadius:12,
                    padding:"13px 16px",cursor:"pointer",textAlign:"left",
                    display:"flex",alignItems:"center",gap:12,transition:"all .2s"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{a.ic}</span>
                  <span style={{fontSize:14,fontWeight:on?600:400,color:on?G.acl:G.crm}}>{a.label}</span>
                  {on && <span style={{marginLeft:"auto",color:G.acc,fontSize:16}}>✓</span>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>{setAreaIdx(0);setCurrentAreaText("");setStep(3);}}
            disabled={selectedAreas.length===0}
            style={{width:"100%",background:selectedAreas.length>0?G.acc:"rgba(255,255,255,.06)",
              color:selectedAreas.length>0?"#fff":G.mut,border:"none",borderRadius:12,
              padding:"14px",fontSize:15,fontWeight:600,cursor:selectedAreas.length>0?"pointer":"not-allowed"}}>
            Continuar con {selectedAreas.length} {selectedAreas.length===1?"área":"áreas"} →
          </button>
        </div>
      )}

      {/* PASO 3: DESCRIBIR CADA ÁREA */}
      {step===3 && currentArea && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Tu Premise · Área {areaIdx+1} de {totalAreas}
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:32}}>{currentArea.ic}</span>
              <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>{currentArea.label}</div>
            </div>
            <div style={{fontSize:15,color:G.sft,lineHeight:1.7}}>{currentArea.q}</div>
          </div>
          <textarea value={currentAreaText} onChange={e=>setCurrentAreaText(e.target.value)}
            placeholder="En tus palabras..."
            autoFocus
            style={{width:"100%",height:140,background:G.sur,
              border:`1.5px solid ${currentAreaText?G.acc:G.bor}`,
              borderRadius:12,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={nextArea} disabled={currentAreaText.trim().length<3}
            style={{width:"100%",background:currentAreaText.trim().length>=3?G.acc:"rgba(255,255,255,.06)",
              color:currentAreaText.trim().length>=3?"#fff":G.mut,border:"none",borderRadius:12,
              padding:"14px",fontSize:15,fontWeight:600,cursor:currentAreaText.trim().length>=3?"pointer":"not-allowed"}}>
            {areaIdx<totalAreas-1?"Siguiente área →":"Ver mi Premise →"}
          </button>
          {areaIdx>0 && (
            <button onClick={()=>{
                setAreaIdx(i=>i-1);
                setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx-1].id]||"");
              }}
              style={{width:"100%",background:"transparent",border:"none",
                padding:"10px",fontSize:13,color:G.mut,cursor:"pointer",marginTop:4}}>
              ← Volver
            </button>
          )}
        </div>
      )}

      {/* PASO 4: PREMISE COMPLETA */}
      {step===4 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              Esta eres tú.
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              No quien quieres ser — quien ya decidiste que eres. Puedes editarla cuando quieras.
            </div>
          </div>

          {/* Visión */}
          <div style={{background:"rgba(200,132,90,.06)",border:"1px solid rgba(200,132,90,.2)",
            borderRadius:12,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:10,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Mi visión
            </div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:14,color:G.crm,lineHeight:1.8,fontStyle:"italic"}}>
              "{vision}"
            </div>
          </div>

          {/* Áreas */}
          {selectedAreas.map(id=>{
            const area = PREMISE_AREAS.find(a=>a.id===id);
            const text = areaTexts[id];
            if(!text) return null;
            return (
              <div key={id} style={{background:G.card,border:`1px solid ${G.bor}`,
                borderRadius:12,padding:"14px 16px",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:18}}>{area.ic}</span>
                  <span style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>
                    {area.label}
                  </span>
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:13,color:G.sft,lineHeight:1.7,fontStyle:"italic"}}>
                  "{text}"
                </div>
              </div>
            );
          })}

          <button onClick={savePremise} disabled={saving}
            style={{width:"100%",background:G.acc,color:"#fff",border:"none",borderRadius:12,
              padding:"15px",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:8,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {saving?"Guardando...":"✓ Esta soy yo — Guardar mi Premise"}
          </button>
        </div>
      )}
    </div>
  );
}

  const [myPremise, setMyPremise] = useState(null);
  const [premiseLoaded, setPremiseLoaded] = useState(false);
  const [editingPremise, setEditingPremise] = useState(false);
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [todayPilar, setTodayPilar] = useState(null);
  const [showSabotaje, setShowSabotaje] = useState(false);
  const [sabStep, setSabStep] = useState(1); // 1=pause, 2=name, 3=decide
  const [sabText, setSabText] = useState("");
  const [sabCountdown, setSabCountdown] = useState(10);
  const [sabTimerActive, setSabTimerActive] = useState(false);
  const [sabResult, setSabResult] = useState(null); // "moved"|"decided"

  useEffect(()=>{
    if(!sabTimerActive) return;
    if(sabCountdown <= 0) { setSabTimerActive(false); setSabStep(2); return; }
    const t = setTimeout(()=>setSabCountdown(n=>n-1), 1000);
    return ()=>clearTimeout(t);
  },[sabTimerActive, sabCountdown]);

  const startProtocol = () => {
    setShowSabotaje(true);
    setSabStep(1);
    setSabText("");
    setSabCountdown(10);
    setSabResult(null);
    setSabTimerActive(true);
  };

  const saveSabResult = async (result, movementType) => {
    setSabResult(result);
    const entry = {
      time: new Date().toISOString(),
      text: sabText,
      result,
      movementType: movementType || null,
    };
    const existing = (logs[today]?.sabotaje || []);
    await saveToday({sabotaje: [...existing, entry]});
  };

  // Count this month's protocol uses
  const thisMonth = Object.entries(logs)
    .filter(([k])=>k.startsWith(new Date().toISOString().slice(0,7)))
    .flatMap(([,v])=>v.sabotaje||[]);
  const movedCount = thisMonth.filter(e=>e.result==="moved").length;
  const decidedCount = thisMonth.filter(e=>e.result==="decided").length;
  const [coherencia, setCoherencia] = useState(null);
  const [aprendizaje, setAprendizaje] = useState("");
  const [showLabs, setShowLabs] = useState(false);
  const [healingTab, setHealingTab] = useState("ritual"); // ritual | diario
  const [diaryNotes, setDiaryNotes] = useState({}); // {labN_date: text}
  const [activeDiaryNote, setActiveDiaryNote] = useState(null); // {labN, question, text}
  const [labAction, setLabAction] = useState(null); // {labN, accion, done}
  const [premiseLinks, setPremiseLinks] = useState([]); // [{labN, labTitle}]
  const [showPremiseRitual, setShowPremiseRitual] = useState(false);
  const [ritualText, setRitualText] = useState("");
  const [ritualResult, setRitualResult] = useState(null); // {score, matched, missed}
  const [nightSaved, setNightSaved] = useState(false); // set true on load if already saved today

  const todayLog = logs[today] || {};

  useEffect(()=>{
    loadJSON(PREMISE_KEY).then(p=>{if(p) setMyPremise(p); setPremiseLoaded(true);});
    loadJSON("lab_action").then(d=>{if(d){setLabAction(d);}});
    loadJSON("diary_notes").then(d=>{if(d) setDiaryNotes(d);});
    loadJSON("premise_links").then(d=>{if(d) setPremiseLinks(d);});
    loadJSON(HEALING_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          if(d[today].pilar) setTodayPilar(d[today].pilar);
          if(d[today].coherencia !== undefined) {
            setCoherencia(d[today].coherencia);
            setNightSaved(true);
          }
          if(d[today].aprendizaje) setAprendizaje(d[today].aprendizaje);
        }
      }
      setLoaded(true);
    });
  },[]);

  const saveToday = async (updates) => {
    const newLog = {...logs, [today]: {...(logs[today]||{}), ...updates}};
    setLogs(newLog);
    await save(HEALING_KEY, newLog);
    if(onHealingUpdate) onHealingUpdate(newLog);
  };

  const pilarActual = PREMISE_PILLARS.find(p=>p.id===todayPilar);

  // Premise ritual comparison
  const compareWithPremise = () => {
    if(!myPremise || !ritualText.trim()) return;
    const original = myPremise.vision.toLowerCase();
    const written = ritualText.toLowerCase();
    // Split into key phrases (4+ word chunks)
    const words = original.split(/\s+/);
    const chunks = [];
    for(let i=0; i<words.length-3; i++) {
      chunks.push(words.slice(i,i+4).join(" "));
    }
    const matched = chunks.filter(ch=>written.includes(ch));
    const score = Math.round((matched.length/Math.max(chunks.length,1))*100);
    setRitualResult({score, total:chunks.length, matched:matched.length});
    // Save ritual
    saveToday({premiseRitual:{text:ritualText, score, date:today}});
  };

  // Time of day determines what's highlighted
  const isMorning = hour < 12;
  const isEvening = hour >= 18;

  // 7-day history
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const key = d.toISOString().slice(0,10);
    const log = logs[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    const pil = PREMISE_PILLARS.find(p=>p.id===log?.pilar);
    return {key, label:i===6?"Hoy":lbls[d.getDay()], log, pil, isToday:i===6};
  });

  if(!loaded || !premiseLoaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  // Show onboarding if no premise yet
  if(!myPremise || editingPremise) return (
    <PremiseOnboarding onComplete={async(p)=>{setMyPremise(p);setEditingPremise(false);if(onPremiseSaved)onPremiseSaved(p);}}/>
  );


  // Lab-specific diary questions
  const LAB_DIARY_Q = {
    1: "¿Qué comportamiento tuyo observaste hoy sin juzgarlo? ¿Qué viste?",
    2: "¿En qué momento de hoy actuaste desde tu Premise — no desde el miedo o el hábito?",
    3: "¿Qué patrón notaste hoy que antes no veías? ¿Cómo se sintió verlo?",
    4: "¿Dónde pusiste o necesitabas poner un límite hoy? ¿Cómo respondiste internamente?",
    5: "¿Identificaste algún pacto de miedo en acción hoy? ¿Cómo se manifestó?",
    6: "¿En qué momento te encontraste pagando por algo que ya no te pertenece? ¿Qué hiciste?",
    7: "¿Tomaste alguna acción que antes evitabas? ¿Cómo te sentiste antes y después?",
    8: "¿Qué comportamiento nuevo de tu identidad apareció hoy de forma natural?",
    9: "¿Sentiste ligereza en algún momento? ¿Qué la produjo?",
    10: "¿Llegó alguna prueba de tu nueva identidad? ¿Cómo respondiste?",
    11: "¿En qué momento usaste el ciclo soberano (nota → decide → actúa/suelta)?",
    12: "¿Qué estabas saboteando que hoy dejaste de sabotear, aunque sea un poco?",
  };
  return (
    <div className="fi">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>Healing</div>
          <div style={{fontSize:13,color:G.sft}}>El entrenamiento de la mente.</div>
        </div>
        {pilarActual && (
          <div style={{background:"rgba(200,132,90,.1)",border:"1px solid rgba(200,132,90,.3)",
            borderRadius:20,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>{pilarActual.ic}</span>
            <span style={{fontSize:11,color:G.acl,fontWeight:500}}>{pilarActual.label}</span>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div className="stab" style={{margin:"0 -20px 16px",paddingLeft:20}}>
        <button className={healingTab==="ritual"?"on":""} onClick={()=>setHealingTab("ritual")}>🌿 Ritual</button>
        <button className={healingTab==="diario"?"on":""} onClick={()=>setHealingTab("diario")}>📓 Diario</button>
      </div>

      {healingTab==="diario" && (
        <div className="fade-in">
          <div style={{fontSize:13,color:G.sft,marginBottom:16,lineHeight:1.6}}>
            Tu historial de Healing. Se construye solo con lo que haces cada día.
          </div>

          {/* Lab actions with diary */}
          {Object.entries(logs)
            .sort(([a],[b])=>b.localeCompare(a))
            .slice(0,14)
            .map(([date, log])=>{
              if(!log?.labAction?.labN) return null;
              const la = log.labAction;
              const noteKey = `${la.labN}_${date}`;
              const note = diaryNotes[noteKey]||"";
              const q = LAB_DIARY_Q[la.labN]||"¿Qué notaste al hacer esta acción?";
              const dateLabel = new Date(date).toLocaleDateString("es",{day:"numeric",month:"short"});
              return (
                <div key={date} style={{background:G.card,border:`1px solid ${G.bor}`,
                  borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontSize:10,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:3}}>
                        Lab {la.labN} · {dateLabel}
                      </div>
                      <div style={{fontSize:13,fontWeight:500,color:G.crm}}>{la.accion}</div>
                    </div>
                    <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,
                      background:la.done?"rgba(74,155,111,.1)":"rgba(200,132,90,.1)",
                      color:la.done?G.grl:G.acl,flexShrink:0,marginLeft:8}}>
                      {la.done?"✓ hecha":"pendiente"}
                    </span>
                  </div>
                  <div style={{fontSize:12,color:"#A89EC0",lineHeight:1.5,marginBottom:8,fontStyle:"italic"}}>
                    {q}
                  </div>
                  {note ? (
                    <div>
                      <div style={{fontSize:13,color:G.sft,lineHeight:1.7,fontStyle:"italic",
                        background:"rgba(168,158,192,.06)",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                        "{note}"
                      </div>
                      <button onClick={()=>setActiveDiaryNote({key:noteKey,labN:la.labN,q,text:note})}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:G.mut,padding:0}}>
                        ✎ Editar nota
                      </button>
                    </div>
                  ) : (
                    <button onClick={()=>setActiveDiaryNote({key:noteKey,labN:la.labN,q,text:""})}
                      style={{width:"100%",background:"rgba(168,158,192,.06)",
                        border:"1px dashed rgba(168,158,192,.3)",borderRadius:8,
                        padding:"9px",cursor:"pointer",fontSize:12,color:"#A89EC0"}}>
                      ✍️ Escribir mi reflexión
                    </button>
                  )}
                </div>
              );
            })
          }

          {/* Sabotaje history */}
          {Object.entries(logs)
            .sort(([a],[b])=>b.localeCompare(a))
            .slice(0,7)
            .filter(([,log])=>log?.sabotaje?.length>0)
            .map(([date, log])=>{
              const dateLabel = new Date(date).toLocaleDateString("es",{day:"numeric",month:"short"});
              return log.sabotaje.map((s,i)=>(
                <div key={`${date}_${i}`} style={{background:G.card,border:`1px solid ${G.bor}`,
                  borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                  <div style={{fontSize:10,color:"#A89EC0",letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>
                    🛡️ Protocolo · {dateLabel}
                  </div>
                  <div style={{fontSize:13,color:G.sft,fontStyle:"italic",marginBottom:4}}>"{s.text}"</div>
                  <div style={{fontSize:11,color:s.result==="moved"?G.grn:G.acc}}>
                    {s.result==="moved"?`✓ Me moví — ${s.movementType||"movimiento"}`:"Registré el momento"}
                  </div>
                </div>
              ));
            })
          }

          {/* Coherence history */}
          <div className="card" style={{marginTop:8}}>
            <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>
              Coherencia · últimos 7 días
            </div>
            <div style={{display:"flex",gap:4}}>
              {Array.from({length:7},(_,i)=>{
                const d=new Date(); d.setDate(d.getDate()-(6-i));
                const key=d.toISOString().slice(0,10);
                const log=logs[key];
                const lbls=["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
                return (
                  <div key={i} style={{flex:1,textAlign:"center"}}>
                    <div style={{width:"100%",aspectRatio:"1",borderRadius:8,marginBottom:3,
                      background:log?.coherencia===false?G.grn:log?.coherencia===true?"rgba(200,132,90,.3)":
                        log?.pilar?"rgba(255,255,255,.06)":"rgba(255,255,255,.02)",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
                      {log?.coherencia===false?"✓":log?.coherencia===true?"🌱":log?.pilar?"·":""}
                    </div>
                    <div style={{fontSize:9,color:G.mut}}>{lbls[d.getDay()]}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Empty state */}
          {Object.keys(logs).length===0 && (
            <div style={{textAlign:"center",padding:"32px 0",color:G.mut}}>
              <div style={{fontSize:32,marginBottom:12}}>📓</div>
              <div style={{fontSize:14,color:G.sft}}>Tu diario se llenará solo.</div>
              <div style={{fontSize:12,color:G.mut,marginTop:4}}>Haz una acción de un Lab para empezar.</div>
            </div>
          )}
        </div>
      )}


      {/* Mi Premise — colapsable */}
      {myPremise && healingTab==="ritual" && (
        <div style={{background:"rgba(200,132,90,.04)",border:"1px solid rgba(200,132,90,.15)",
          borderRadius:12,padding:"12px 14px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>
              Mi Premise
            </div>
            <button onClick={()=>setEditingPremise(true)}
              style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:G.mut,padding:"2px 6px"}}>
              ✎ Editar
            </button>
          </div>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:13,color:G.sft,lineHeight:1.7,
            fontStyle:"italic",marginBottom:8}}>
            "{myPremise.vision.slice(0,120)}{myPremise.vision.length>120?'...':''}"
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {myPremise.areas.map(a=>(
              <span key={a.id} style={{fontSize:11,padding:"3px 10px",borderRadius:20,
                background:"rgba(200,132,90,.1)",color:G.acl}}>
                {a.ic} {a.label}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* ── SECCIÓN 1: MAÑANA ── */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:isMorning?"rgba(200,132,90,.2)":"rgba(255,255,255,.04)",
            border:`1.5px solid ${isMorning?G.acc:G.bor}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
            ☀️
          </div>
          <span style={{fontSize:12,fontWeight:600,color:isMorning?G.acc:G.mut,letterSpacing:.5}}>MAÑANA · Check-in de Soberanía</span>
        </div>

        {!todayPilar ? (
          <div style={{background:"rgba(200,132,90,.05)",border:`1.5px solid ${isMorning?G.acc:G.bor}`,borderRadius:14,padding:16}}>
            <div className="serif" style={{fontSize:17,fontWeight:500,color:G.crm,marginBottom:12,lineHeight:1.4}}>
              ¿Desde qué versión de ti vas a operar hoy?
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {PREMISE_PILLARS.map(p=>(
                <button key={p.id} onClick={async()=>{
                    setTodayPilar(p.id);
                    await saveToday({pilar:p.id, morningTime:new Date().toISOString()});
                  }}
                  style={{background:"transparent",border:`1.5px solid ${G.bor}`,borderRadius:10,
                    padding:"11px 14px",cursor:"pointer",textAlign:"left",display:"flex",gap:12,alignItems:"center",
                    transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=G.acc;e.currentTarget.style.background="rgba(200,132,90,.06)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=G.bor;e.currentTarget.style.background="transparent";}}>
                  <span style={{fontSize:20,flexShrink:0}}>{p.ic}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:G.crm}}>{p.label}</div>
                    <div style={{fontSize:11,color:G.sft,marginTop:1}}>{p.desc}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        ) : (
          <div style={{background:"rgba(200,132,90,.05)",border:"1px solid rgba(200,132,90,.2)",borderRadius:14,padding:16,
            display:"flex",gap:14,alignItems:"center"}}>
            <span style={{fontSize:32,flexShrink:0}}>{pilarActual?.ic}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Operando desde</div>
              <div style={{fontSize:16,fontWeight:600,color:G.crm,marginBottom:3}}>{pilarActual?.label}</div>
              <div style={{fontSize:12,color:G.sft,lineHeight:1.5}}>{pilarActual?.desc}</div>
            </div>
            <button onClick={()=>setTodayPilar(null)}
              style={{background:"none",border:"none",cursor:"pointer",color:G.mut,fontSize:18,flexShrink:0,padding:4}}>
              ✎
            </button>
          </div>
        )}

        {/* Premise Ritual */}
        {myPremise && (
          <div style={{marginTop:10}}>
            {!showPremiseRitual && !todayLog?.premiseRitual ? (
              <button onClick={()=>{setShowPremiseRitual(true);setRitualText("");setRitualResult(null);}}
                style={{width:"100%",background:"rgba(168,158,192,.08)",
                  border:"1px solid rgba(168,158,192,.25)",borderRadius:12,
                  padding:"12px 16px",cursor:"pointer",textAlign:"left",
                  display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:20,flexShrink:0}}>✍️</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:G.crm,marginBottom:2}}>Ritual de la Premise</div>
                  <div style={{fontSize:11,color:G.sft}}>Escríbela de memoria. Lo que escribes de memoria ya es tuyo.</div>
                </div>
              </button>
            ) : todayLog?.premiseRitual ? (
              <div style={{background:"rgba(168,158,192,.06)",border:"1px solid rgba(168,158,192,.2)",
                borderRadius:12,padding:"12px 14px",display:"flex",gap:8,alignItems:"center"}}>
                <span style={{color:"#A89EC0",fontSize:16}}>✍️</span>
                <div>
                  <span style={{fontSize:12,color:"#A89EC0",fontWeight:500}}>Ritual completado hoy · </span>
                  <span style={{fontSize:12,color:G.sft}}>{todayLog.premiseRitual.score}% arraigado</span>
                </div>
              </div>
            ) : null}

            {showPremiseRitual && !ritualResult && (
              <div style={{background:"rgba(168,158,192,.06)",border:"1.5px solid #A89EC0",
                borderRadius:14,padding:16,marginTop:4}}>
                <div style={{fontSize:11,color:"#A89EC0",letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
                  ✍️ Ritual de la Premise
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:14,color:G.crm,marginBottom:14,lineHeight:1.6}}>
                  Escribe tu Premise de memoria. No la mires. Solo escribe lo que ya es tuyo.
                </div>
                <textarea value={ritualText} onChange={e=>setRitualText(e.target.value)}
                  placeholder="I am..."
                  autoFocus
                  style={{width:"100%",height:140,background:G.sur,
                    border:`1.5px solid ${ritualText?"#A89EC0":G.bor}`,
                    borderRadius:10,padding:"12px 14px",color:G.crm,fontSize:14,
                    resize:"none",outline:"none",lineHeight:1.8,
                    fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:12}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setShowPremiseRitual(false);setRitualText("");}}
                    style={{flex:1,background:"transparent",border:`1px solid ${G.bor}`,
                      borderRadius:10,padding:"10px",fontSize:13,color:G.mut,cursor:"pointer"}}>
                    Cancelar
                  </button>
                  <button onClick={compareWithPremise} disabled={ritualText.trim().length<10}
                    style={{flex:2,background:ritualText.trim().length>=10?"#A89EC0":"rgba(255,255,255,.06)",
                      color:"#fff",border:"none",borderRadius:10,padding:"10px",
                      fontSize:13,fontWeight:600,cursor:ritualText.trim().length>=10?"pointer":"not-allowed"}}>
                    Ver mi resultado →
                  </button>
                </div>
              </div>
            )}

            {ritualResult && (
              <div style={{background:"rgba(168,158,192,.06)",border:"1.5px solid #A89EC0",
                borderRadius:14,padding:16,marginTop:4}}>
                <div style={{textAlign:"center",marginBottom:16}}>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:36,fontWeight:500,
                    color:ritualResult.score>=80?"#6BBF8E":ritualResult.score>=50?"#E8A87A":"#A89EC0"}}>
                    {ritualResult.score}%
                  </div>
                  <div style={{fontSize:13,color:G.sft,marginTop:4}}>
                    {ritualResult.score>=80?"Muy arraigado. Ya es tuyo.":
                     ritualResult.score>=50?"En proceso de integración.":
                     "Todavía construyendo. Sigue escribiéndola."}
                  </div>
                </div>

                {/* Show original for comparison */}
                <div style={{background:"rgba(255,255,255,.03)",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:10,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Tu Premise original</div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:12,color:G.sft,lineHeight:1.8,fontStyle:"italic"}}>
                    "{myPremise.vision}"
                  </div>
                </div>

                <div style={{fontSize:12,color:"#A89EC0",textAlign:"center",marginBottom:12,lineHeight:1.6,fontStyle:"italic"}}>
                  "Lo que escribes de memoria ya es tuyo."
                </div>

                <button onClick={()=>{setShowPremiseRitual(false);setRitualResult(null);setRitualText("");}}
                  style={{width:"100%",background:"transparent",border:`1px solid ${G.bor}`,
                    borderRadius:10,padding:"10px",fontSize:13,color:G.mut,cursor:"pointer"}}>
                  Cerrar
                </button>
              </div>
            )}
          </div>

        {/* Lab action reminder */}
        {labAction && !labAction.done && (
          <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.25)",
            borderRadius:12,padding:"12px 14px",marginTop:10,display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontSize:18,flexShrink:0}}>⚡</span>
            <div style={{flex:1}}>

function SuppsOnlyScreen({profile}) {
  const [suppChecked, setSuppChecked] = useState({});
  const todayStr = new Date().toISOString().slice(0,10);

  useEffect(()=>{
    load("supps:"+todayStr).then(v=>{if(v)try{setSuppChecked(JSON.parse(v));}catch(e){}});
  },[]);

  const toggleSupp = async(name) => {
    const nc = {...suppChecked,[name]:!suppChecked[name]};
    setSuppChecked(nc);
    await save("supps:"+todayStr, nc);
  };

  const sp = SUPPS(profile);
  const taken = sp.filter(s=>suppChecked[s.n]).length;
  const isMale = profile?.gender==="male";
  const isSm = profile?.conditions?.includes("smoker");
  const isPeri = !isMale&&(profile?.menopause==="peri"||profile?.menopause==="post");
  const tags=[];
  if(isMale) tags.push({l:"Hombre activo",c:"#7A9E8A"});
  else tags.push({l:"Mujer activa",c:"#C8845A"});
  if(isPeri) tags.push({l:"Perimenopausia",c:"#E8A87A"});
  if(isSm) tags.push({l:"Fumadora/or",c:"#E07070"});

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Suplementos</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Protocolo personalizado para tu perfil.</div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Protocolo personalizado para</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {tags.map((t,i)=>(
            <span key={i} style={{fontSize:11,padding:"3px 10px",borderRadius:20,
              background:`${t.c}15`,border:`1px solid ${t.c}44`,color:t.c,fontWeight:500}}>
              {t.l}
            </span>
          ))}
        </div>
      </div>
      <div className="card" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Tomados hoy</div>
          <div className="serif" style={{fontSize:28,fontWeight:500,color:G.crm}}>{taken} <span style={{fontSize:14,color:G.sft,fontFamily:"Outfit"}}>/ {sp.length}</span></div>
        </div>
        <svg viewBox="0 0 40 40" width="52" height="52">
          <circle cx="20" cy="20" r="16" fill="none" stroke={G.bor} strokeWidth="3"/>
          <circle cx="20" cy="20" r="16" fill="none"
            stroke={taken===sp.length?G.grn:G.acc} strokeWidth="3"
            strokeDasharray={`${(taken/sp.length)*100} 100`}
            strokeLinecap="round" transform="rotate(-90 20 20)"
            style={{transition:"stroke-dasharray .4s"}}/>
        </svg>
      </div>
      {["alta","media","baja"].map(pr=>{
        const group = sp.filter(s=>s.pr===pr);
        if(!group.length) return null;
        return (
          <div key={pr} style={{marginBottom:16}}>
            <div style={{fontSize:11,color:pr==="alta"?G.err:pr==="media"?G.acc:G.mut,
              letterSpacing:1,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:pr==="alta"?G.err:pr==="media"?G.acc:G.mut,display:"inline-block"}}/>
              Prioridad {pr}
            </div>
            {group.map(s=>(
              <div key={s.n} className="card" style={{marginBottom:10,opacity:suppChecked[s.n]?.7:1,transition:"opacity .3s"}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <button onClick={()=>toggleSupp(s.n)}
                    style={{width:24,height:24,borderRadius:6,flexShrink:0,cursor:"pointer",marginTop:2,
                      background:suppChecked[s.n]?G.grn:"transparent",
                      border:`2px solid ${suppChecked[s.n]?G.grn:G.bor}`,
                      display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    {suppChecked[s.n]&&<span style={{color:"#fff",fontSize:14}}>✓</span>}
                  </button>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                      <div style={{fontSize:14,fontWeight:600,color:G.crm,textDecoration:suppChecked[s.n]?"line-through":"none"}}>{s.n}</div>
                      <div style={{fontSize:11,color:G.acc,marginLeft:8,flexShrink:0}}>{s.d}</div>
                    </div>
                    {s.t && <div style={{fontSize:11,color:G.grn,marginBottom:3}}>⏰ {s.t}</div>}
                    {s.hi
                      ? <div style={{fontSize:11,color:G.acl,marginBottom:3,fontWeight:500}}>⚡ {s.perf}</div>
                      : <div style={{fontSize:11,color:G.mut,marginBottom:3}}>{s.perf}</div>
                    }
                    <div style={{fontSize:12,color:G.sft,lineHeight:1.5}}>{s.why}</div>

      })}
      <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:12,padding:14,fontSize:12,color:G.sft,lineHeight:1.7}}>

      </div>
    </div>
  );

const METRICS_KEY = "daily_metrics";

function MetricsScreen({profile}) {
  const today = new Date().toISOString().slice(0,10);
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);

  // Today's values
  const tod = logs[today] || {};
  const [water, setWater] = useState(0);
  const [weight, setWeight] = useState("");
  const [steps, setSteps] = useState("");
  const [alcohol, setAlcohol] = useState(0);
  const [cycleDay, setCycleDay] = useState("");
  const [cyclePhase, setCyclePhase] = useState("");

  useEffect(()=>{
    loadJSON(METRICS_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          setWater(d[today].water||0);
          setWeight(d[today].weight||"");
          setSteps(d[today].steps||"");
          setAlcohol(d[today].alcohol||0);
          setCycleDay(d[today].cycleDay||"");
          setCyclePhase(d[today].cyclePhase||"");
        }
      }
      setLoaded(true);
    });
  },[]);

  const saveMetrics = async (updates) => {
    const newLogs = {...logs, [today]: {...(logs[today]||{}), ...updates}};
    setLogs(newLogs);
    await save(METRICS_KEY, newLogs);
  };

  // Last 7 days for charts
  const last7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const key=d.toISOString().slice(0,10);
    const lbls=["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {key, label:i===6?"Hoy":lbls[d.getDay()], log:logs[key]||{}};
  });

  const waterGoal = 8; // glasses
  const stepsGoal = profile?.activity==="sedentary"?7000:profile?.activity==="light"?8000:10000;

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  return (
    <div className="fi">
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Métricas</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Tu cuerpo, en números que importan.</div>

      {/* AGUA */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>💧 Agua</div>
            <div className="serif" style={{fontSize:24,fontWeight:500,color:water>=waterGoal?G.grl:G.crm}}>
              {water} <span style={{fontSize:14,color:G.sft}}>/ {waterGoal} vasos</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{const n=Math.max(0,water-1);setWater(n);saveMetrics({water:n});}}
              style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,.05)",
                border:`1px solid ${G.bor}`,cursor:"pointer",color:G.sft,fontSize:18}}>−</button>
            <button onClick={()=>{const n=water+1;setWater(n);saveMetrics({water:n});}}
              style={{width:36,height:36,borderRadius:"50%",background:G.grn,
                border:"none",cursor:"pointer",color:"#fff",fontSize:18}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {Array.from({length:waterGoal}).map((_,i)=>(
            <div key={i} onClick={()=>{const n=i+1;setWater(n);saveMetrics({water:n});}}
              style={{flex:1,height:8,borderRadius:4,cursor:"pointer",
                background:i<water?"#5BB8F5":"rgba(255,255,255,.08)",transition:"background .2s"}}/>
          ))}
        </div>
        {water>=waterGoal && <div style={{fontSize:11,color:"#5BB8F5",marginTop:6}}>✓ Meta de hidratación alcanzada</div>}
      </div>

      {/* PASOS */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>🚶 Pasos</div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
          <input type="number" value={steps} onChange={e=>{setSteps(e.target.value);saveMetrics({steps:e.target.value});}}
            placeholder="0"
            style={{flex:1,background:G.sur,border:`1.5px solid ${steps&&Number(steps)>=stepsGoal?G.grn:G.bor}`,
              borderRadius:10,padding:"10px 14px",color:G.crm,fontSize:18,fontWeight:600,outline:"none",textAlign:"center"}}/>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:G.mut}}>Meta</div>
            <div style={{fontSize:14,fontWeight:600,color:G.sft}}>{stepsGoal.toLocaleString()}</div>
          </div>
        </div>
        {steps && <div style={{fontSize:11,color:Number(steps)>=stepsGoal?G.grn:G.sft}}>
          {Number(steps)>=stepsGoal?"✓ Meta alcanzada":`${(stepsGoal-Number(steps)).toLocaleString()} pasos para la meta`}
        </div>}
      </div>

      {/* PESO */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>⚖️ Peso corporal</div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
          <input type="number" step="0.1" value={weight} onChange={e=>{setWeight(e.target.value);saveMetrics({weight:e.target.value});}}
            placeholder={profile?.weight||"63"}
            style={{flex:1,background:G.sur,border:`1.5px solid ${G.bor}`,
              borderRadius:10,padding:"10px 14px",color:G.crm,fontSize:18,fontWeight:600,outline:"none",textAlign:"center"}}/>
          <span style={{fontSize:13,color:G.sft}}>kg</span>
        </div>
        {/* 7-day weight chart */}
        {last7.some(d=>d.log.weight) && (
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,color:G.mut,marginBottom:6}}>Últimos 7 días</div>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:40}}>
              {last7.map((d,i)=>{
                const w = parseFloat(d.log.weight)||0;
                const weights = last7.map(x=>parseFloat(x.log.weight)||0).filter(x=>x>0);
                const min = Math.min(...weights)-0.5;
                const max = Math.max(...weights)+0.5;
                const h = w>0?Math.max(((w-min)/(max-min))*36,4):0;

const COMBOS_KEY = "my_combos";

function ModoPlato({profile, onAdd, onClose}) {
  const tg = calcTargets(profile);
  const [selections, setSelections] = useState({proteina:"", carbo:"", vegetal:"", grasa:""});
  const [porciones, setPorciones] = useState({proteina:1, carbo:1, vegetal:2, grasa:0.5});

  const PLATO_OPTIONS = {
    proteina: ["Pollo cocido","Res","Salmón","Atún","Huevos","Yogurt griego","Tofu"],
    carbo: ["Arroz blanco cocido","Arroz integral cocido","Papa cocida","Batata cocida","Pasta cocida","Quinoa cocida"],
    vegetal: ["Brócoli cocido","Ensalada mixta","Espinaca","Zanahoria cocida","Zucchini cocido","Pimentón"],
    grasa: ["Aguacate","Aceite de oliva","Nueces","Mantequilla de maní"],
  };

  // Portion sizes in grams
  const PORTION_G = {proteina:120, carbo:150, vegetal:100, grasa:30};

  const getItem = (type, name) => {
    const g = PORTION_G[type] * porciones[type];
    const food = DB.find(f=>f.n===name||f.a?.includes(name.toLowerCase()));
    if(!food) return null;
    const factor = g/100;
    return {n:`${name} (plato)`,g,p:Math.round(food.p*factor*10)/10,c:Math.round(food.c*factor*10)/10,f:Math.round(food.f*factor*10)/10,k:Math.round(food.k*factor),fi:Math.round(food.fi*factor*10)/10};
  };

  const addAll = () => {
    const items = Object.entries(selections)
      .filter(([,v])=>v)
      .map(([type,name])=>getItem(type,name))
      .filter(Boolean);
    if(items.length) onAdd(items);
    onClose();
  };

  const totalCal = Object.entries(selections).reduce((acc,[type,name])=>{
    const item = name ? getItem(type,name) : null;
    return acc + (item?.k||0);
  },0);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:"20px 20px 0 0",
        padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:G.bor,borderRadius:2,margin:"0 auto 16px"}}/>
        <div className="serif" style={{fontSize:20,fontWeight:500,color:G.crm,marginBottom:4}}>Modo Plato</div>
        <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Arma tu plato por secciones. Sin báscula.</div>

        {[
          {key:"proteina",label:"🥩 Proteína (¼ del plato)",color:G.acc},
          {key:"carbo",label:"🍚 Carbohidrato (¼ del plato)",color:"#EAC850"},
          {key:"vegetal",label:"🥦 Vegetales (½ del plato)",color:G.grn},
          {key:"grasa",label:"🥑 Grasa saludable",color:"#A89EC0"},
        ].map(({key,label,color})=>(
          <div key={key} style={{marginBottom:14}}>
            <div style={{fontSize:12,color:color,fontWeight:600,marginBottom:6}}>{label}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
              {PLATO_OPTIONS[key].map(opt=>(
                <button key={opt} onClick={()=>setSelections(s=>({...s,[key]:s[key]===opt?"":opt}))}
                  style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",
                    border:`1.5px solid ${selections[key]===opt?color:G.bor}`,
                    background:selections[key]===opt?`${color}15`:"transparent",
                    color:selections[key]===opt?color:G.sft}}>
                  {opt}
                </button>
              ))}
            </div>
            {selections[key] && (
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:G.mut}}>Porciones:</span>
                <button onClick={()=>setPorciones(p=>({...p,[key]:Math.max(0.5,p[key]-0.5)}))}
                  style={{width:24,height:24,borderRadius:"50%",background:G.sur,border:`1px solid ${G.bor}`,cursor:"pointer",color:G.sft}}>−</button>
                <span style={{fontSize:13,color:G.crm,fontWeight:600}}>{porciones[key]}</span>
                <button onClick={()=>setPorciones(p=>({...p,[key]:p[key]+0.5}))}
                  style={{width:24,height:24,borderRadius:"50%",background:G.grn,border:"none",cursor:"pointer",color:"#fff"}}>+</button>
                <span style={{fontSize:11,color:G.sft}}>{Math.round(PORTION_G[key]*porciones[key])}g est.</span>
              </div>
            )}
          </div>
        ))}

        {totalCal>0 && (
          <div style={{background:G.sur,borderRadius:10,padding:"10px 14px",marginBottom:14,
            display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:G.sft}}>Total estimado</span>
            <span style={{fontSize:13,fontWeight:600,color:G.crm}}>{Math.round(totalCal)} kcal</span>
          </div>
        )}

        <button onClick={addAll} disabled={!Object.values(selections).some(Boolean)}
          style={{width:"100%",background:Object.values(selections).some(Boolean)?G.grn:"rgba(255,255,255,.06)",
            color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Agregar al registro →
        </button>
      </div>
    </div>
  );
}


function MisCombosView({meals, setMeals, mealTime}) {
  const [combos, setCombos] = useState([]);
  const [saving, setSaving] = useState(false);
  const [newName, setNewName] = useState("");
  const [showSave, setShowSave] = useState(false);
  const [added, setAdded] = useState(null);

  useEffect(()=>{
    loadJSON(COMBOS_KEY).then(d=>{if(d) setCombos(d);});
  },[]);

  const currentItems = Object.values(meals||{}).flat().filter(x=>x&&x.n);

  const saveCombo = async () => {
    if(!newName.trim()||!currentItems.length) return;
    setSaving(true);
    const combo = {
      id: Date.now(),
      name: newName.trim(),
      items: currentItems.map(i=>({n:i.n,g:i.g,p:i.p,c:i.c,f:i.f,k:i.k,fi:i.fi})),
      cal: Math.round(currentItems.reduce((a,i)=>a+(i.k||0),0)),
      prot: Math.round(currentItems.reduce((a,i)=>a+(i.p||0),0)),
      createdAt: new Date().toISOString(),
    };
    const newCombos = [...combos, combo];
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
    setNewName("");
    setShowSave(false);
    setSaving(false);
  };

  const addCombo = (combo) => {
    const mt = mealTime || "almuerzo";
    const newItems = combo.items.map(item=>({...item, id:Date.now()+Math.random()}));
    setMeals(prev=>({...prev,[mt]:[...(prev[mt]||[]),...newItems]}));
    setAdded(combo.id);
    setTimeout(()=>setAdded(null), 2000);
  };

  const deleteCombo = async (id) => {
    const newCombos = combos.filter(c=>c.id!==id);
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:G.crm}}>Mis Combos</div>
          <div style={{fontSize:12,color:G.sft}}>Comidas que repites guardadas en un toque</div>
        </div>
        {currentItems.length>0 && (
          <button onClick={()=>setShowSave(s=>!s)}
            style={{background:G.acc,color:"#fff",border:"none",borderRadius:8,
              padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            + Guardar actual
          </button>
        )}
      </div>

      {showSave && (
        <div style={{background:"rgba(200,132,90,.06)",border:`1px solid ${G.acc}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,color:G.sft,marginBottom:8}}>
            Guardando {currentItems.length} alimentos del registro actual
          </div>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            placeholder="Nombre del combo (ej: Desayuno fit habitual)"
            style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:8,
              padding:"10px 12px",color:G.crm,fontSize:13,outline:"none",marginBottom:10}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowSave(false)}
              style={{flex:1,background:"transparent",border:`1px solid ${G.bor}`,borderRadius:8,
                padding:"9px",color:G.sft,fontSize:13,cursor:"pointer"}}>Cancelar</button>
            <button onClick={saveCombo} disabled={!newName.trim()||saving}
              style={{flex:2,background:newName.trim()?G.acc:"rgba(255,255,255,.06)",color:"#fff",
                border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              {saving?"Guardando...":"✓ Guardar combo"}
            </button>
          </div>
        </div>
      )}

      {combos.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 0",color:G.mut}}>
          <div style={{fontSize:32,marginBottom:12}}>🍳</div>
          <div style={{fontSize:14,color:G.sft,marginBottom:6}}>Aún no tienes combos guardados</div>
          <div style={{fontSize:12,color:G.mut,lineHeight:1.6}}>
            Registra una comida que repites seguido y toca "+ Guardar actual" para guardarla aquí.
          </div>
        </div>
      ) : (
        combos.map(combo=>(
          <div key={combo.id} style={{background:G.card,border:`1px solid ${added===combo.id?G.grn:G.bor}`,
            borderRadius:12,padding:"14px",marginBottom:10,transition:"border-color .3s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:G.crm,marginBottom:2}}>{combo.name}</div>
                <div style={{fontSize:11,color:G.sft}}>{combo.cal} kcal · {combo.prot}g proteína · {combo.items.length} items</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>addCombo(combo)}
                  style={{background:added===combo.id?G.grn:G.acc,color:"#fff",border:"none",
                    borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {added===combo.id?"✓ Agregado":"+ Agregar"}
                </button>
                <button onClick={()=>deleteCombo(combo.id)}
                  style={{background:"transparent",border:`1px solid ${G.bor}`,borderRadius:8,
                    padding:"6px 8px",fontSize:12,color:G.mut,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {combo.items.slice(0,4).map((item,i)=>(
                <span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:10,
                  background:"rgba(255,255,255,.04)",color:G.sft}}>
                  {item.n.split(" ").slice(0,3).join(" ")}
                </span>
              ))}
              {combo.items.length>4&&<span style={{fontSize:10,color:G.mut}}>+{combo.items.length-4} más</span>}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function encodeProfile(p) {
  try {
    const parts = [
      (p.name||'').replace(/[|]/g,''),
      p.gender==='male'?'M':'F',
      p.age||0, p.weight||0, p.height||0, p.restingHR||0,
      {sedentary:'S',light:'L',moderate:'M',active:'A',athlete:'AT'}[p.activity]||'M',
      {recomp:'RC',fat_loss:'FL',muscle:'MU',health:'HE'}[p.goal]||'RC',
      {none:'N',pre:'PR',peri:'PE',post:'PO'}[p.menopause]||'N',
      {beginner:'B',intermediate:'I',advanced:'A',expert:'E'}[p.trainingYears]||'B',
      p.muscleLevel||'average',
      (p.conditions||[]).join(',')
    ];
    return 'FND2:' + btoa(parts.join('|'));
  } catch(e) { return ''; }
}
function decodeProfile(code) {
  try {
    if(!code) return null;
    code = code.trim();
    let raw;
    if(code.toUpperCase().startsWith('FND2:')) {
      raw = atob(code.slice(5));
    } else if(code.toUpperCase().startsWith('FND:')) {
      // legacy
      raw = atob(code.slice(4));
    } else return null;
    const parts = raw.split('|');
    const [name,g,age,weight,height,rhr,act,goal,mn,ty,ml,conds] = parts;
    return {
      name: name||'',
      gender: g==='M'?'male':'female',
      age: +age||0, weight: +weight||0, height: +height||0,
      restingHR: +rhr||null,
      activity:{S:'sedentary',L:'light',M:'moderate',A:'active',AT:'athlete'}[act]||'moderate',
      goal:{RC:'recomp',FL:'fat_loss',MU:'muscle',HE:'health'}[goal]||'recomp',
      menopause:{N:'none',PR:'pre',PE:'peri',PO:'post'}[mn]||'none',
      trainingYears:{B:'beginner',I:'intermediate',A:'advanced',E:'expert'}[ty]||'beginner',
      muscleLevel: ml||'average',
      conditions: conds?conds.split(',').filter(Boolean):[]
    };
  } catch(e) { return null; }
}
