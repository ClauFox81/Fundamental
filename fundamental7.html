const sbHeaders = () => ({
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Prefer": "return=representation",
});

const sbGet = async (table, match={}) => {
  const params = new URLSearchParams();
  Object.entries(match).forEach(([k,v])=>params.set(k,`eq.${v}`));
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {headers: sbHeaders()});
  return res.ok ? res.json() : null;
};

const sbUpsert = async (table, data) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: {...sbHeaders(), "Prefer": "resolution=merge-duplicates,return=representation"},
    body: JSON.stringify(data),
  });
  return res.ok ? res.json() : null;
};

const sbSignUp = async (email, password) => {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
    method: "POST",
    headers: {"Content-Type":"application/json","apikey":SUPABASE_KEY},
    body: JSON.stringify({email, password}),
  });
  return res.json();
};

const sbSignIn = async (email, password) => {

// ─── STORAGE ──────────────────────────────────────────────────────
// window.storage is the artifact persistent storage - works in React artifacts
async function save(key, value) {
  const str = typeof value === "string" ? value : JSON.stringify(value);
  try { await window.storage.set(key, str); } catch(e) {}
}
async function load(key) {
  try {
    const r = await window.storage.get(key);
    if (r && r.value) return r.value;
  } catch(e) {}
  return null;
}
async function loadJSON(key) {
  const v = await load(key);
  if (!v) return null;
  try { return JSON.parse(v); } catch(e) { return null; }
}

// ─── CALCS ────────────────────────────────────────────────────────
function todayKey() { return "log:" + new Date().toISOString().slice(0,10); }
function dayStr(off=0) { const d=new Date(); d.setDate(d.getDate()+off); return d.toISOString().slice(0,10); }
function dayLabel(off=0) { const D=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]; const d=new Date(); d.setDate(d.getDate()+off); return D[d.getDay()]; }

function calcTargets(p, dayType) {
  if (!p?.weight||!p?.height||!p?.age) return {calories:1950,protein:130,carbs:215,fat:60,fiber:25,tdee:2080};
  const isMale = p.gender==="male";
  const cr = {low:.93,average:1,high:1.07,very_high:1.13};
  const bmr = Math.round((10*p.weight + 6.25*p.height - 5*p.age + (isMale?5:-161)) * (cr[p.muscleLevel]||1));
  const am = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,athlete:1.9};
  const tdee = Math.round(bmr * (am[p.activity]||1.55));
  const isPeri = !isMale && (p.menopause==="peri"||p.menopause==="post");
  const isAdv = p.trainingYears==="advanced"||p.trainingYears==="expert";
  const pm = isMale?(isAdv?2.2:2.0):isPeri?2.0:isAdv?1.9:1.8;
  const protein = Math.round(p.weight*pm);
  let cal = tdee;
  if(p.goal==="fat_loss") cal=Math.round(tdee*.85);
  if(p.goal==="muscle") cal=Math.round(tdee*1.1);
  if(p.goal==="recomp") cal=Math.round(tdee*.93);
  let fat = Math.round(p.weight*(isMale?1.0:.9));
  let carbMult = 1.0;
  if(dayType==="gym_legs") { cal=Math.round(cal*1.03); carbMult=1.2; }
  else if(dayType==="gym_upper") { cal=Math.round(cal*1.02); carbMult=1.08; }
  else if(dayType==="gym_full") { cal=Math.round(cal*1.02); carbMult=1.1; }
  else if(dayType==="rest") { cal=Math.round(cal*.92); carbMult=.80; fat=Math.round(fat*1.1); }
  const carbs = Math.max(Math.round((cal-protein*4-fat*9)/4*carbMult),80);
  return {calories:cal,protein,carbs,fat,fiber:25,tdee};
}

function calcZones(age, rhr) {
  const max=220-age, r=rhr?max-rhr:0;
  if(rhr&&rhr>0) return {z2lo:Math.round(rhr+r*.6),z2hi:Math.round(rhr+r*.7),z3lo:Math.round(rhr+r*.7),z3hi:Math.round(rhr+r*.8),max,m:"Karvonen"};
  return {z2lo:Math.round(max*.6),z2hi:Math.round(max*.7),z3lo:Math.round(max*.7),z3hi:Math.round(max*.8),max,m:"Estándar"};
}

function getBMI(w,h) {
  const v=(w/((h/100)**2)).toFixed(1);
  return {v,l:v<18.5?"Bajo peso":v<25?"Peso saludable":v<30?"Sobrepeso":"Obesidad",c:v<18.5?G.acc:v<25?G.grn:G.err};
}

function totals(meals) {
  return Object.values(meals).flat().reduce((a,f)=>({p:a.p+f.protein,c:a.c+f.carbs,f:a.f+f.fat,k:a.k+f.calories,fi:a.fi+(f.fiber||0)}),{p:0,c:0,f:0,k:0,fi:0});
}

function getTodayType(gymDay) {
  const g=GYM[gymDay];
  if(!g||g.t==="r") return "rest";
  // B1=upper, B2=legs, B3=upper, B4=legs, B5=full
  if(gymDay===1||gymDay===3) return "gym_legs";
  if(gymDay===4) return "gym_full";
  return "gym_upper";
}

function searchDB(q) {
  const s=q.toLowerCase().trim();
  let grams=null, fq=s;
  const gm=s.match(/^(\d+(?:\.\d+)?)\s*g\s+(.+)/);
  if(gm){grams=+gm[1];fq=gm[2];}
  return DB.map(x=>{
    const nm=x.n.toLowerCase().includes(fq)?2:0;
    const am=x.a.some(a=>a.includes(fq)||fq.includes(a))?3:0;
    const em=x.a.some(a=>a===fq)?5:0;
    return{x,s:nm+am+em};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).slice(0,5).map(r=>({...r.x,_g:grams}));
}

function scaleFood(item, g) {
  const m=g/100;
  const p=item.p??item.protein??0, c=item.c??item.carbs??0,
        f=item.f??item.fat??0, k=item.k??item.calories??0, fi=item.fi??item.fiber??0;
  return {name:`${item.n||item.name} (${g}g)`,protein:Math.round(p*m*10)/10,carbs:Math.round(c*m*10)/10,fat:Math.round(f*m*10)/10,calories:Math.round(k*m),fiber:Math.round(fi*m*10)/10};
}

const BLOG_POSTS = [
  {id:1,tag:"Nutrición",date:"Mayo 2025",title:"Comer MÁS para perder grasa. El error que casi todos cometen.",author:"Claudia Fox",preview:"Durante meses comí muy poco pensando que eso me acercaría a mis objetivos. Me equivoqué completamente.",content:["Cuando empecé mi camino en el fitness, hice lo que hace casi todo el mundo: reduje las calorías drásticamente. Menos comida = menos grasa, lógica simple. Pero mi cuerpo tenía otra opinión.","Lo que realmente pasa cuando comes muy poco: tu metabolismo baja su gasto, tu cuerpo usa músculo como combustible, el cortisol sube favoreciendo la grasa abdominal, y el apetito se dispara.","El punto de quiebre fue cuando un análisis de sangre mostró que mis hormonas estaban desbalanceadas. Entrenaba 5 veces por semana, comía 1200 calorías, y no avanzaba. En realidad, retrocedía.","El cambio real llegó cuando entendí que necesitaba COMER para construir el cuerpo que quería. Subí mis calorías, ajusté mis macros — especialmente las grasas, que tenía extremadamente bajas — y en pocas semanas me sentí completamente diferente. Más energía, mejor sueño, y sí, mejor composición corporal.","La ciencia es clara: un déficit del 10-15% del TDEE es suficiente para perder grasa de forma sostenible, preservando el músculo. Más déficit no es mejor. Es peor."],takeaways:["Un déficit mayor al 20% del TDEE puede destruir músculo y bajar el metabolismo.","Las grasas saludables son esenciales para la producción hormonal.","Comer suficiente proteína (1.8-2g/kg) protege el músculo incluso en déficit.","El cortisol alto por restricción extrema favorece el almacenamiento de grasa abdominal."]},

  {id:3,tag:"Salud",date:"Mayo 2025",title:"Perimenopausia y fitness: lo que nadie te cuenta.",author:"Claudia Fox",preview:"Los cambios hormonales no son el fin del progreso físico. Con la estrategia correcta, este puede ser el momento de mejor forma de tu vida.",content:["Cuando empezaron los cambios, busqué información y encontré muy poco que fuera útil y honesto. La mayoría estaba orientado a 'sobrevivir' la menopausia, no a prosperar en ella.","Lo que aprendí es que la perimenopausia cambia las reglas, pero no las hace imposibles. Cambia cómo tu cuerpo procesa las proteínas (necesitas más), cómo responde al entrenamiento de fuerza (necesitas más intensidad), y cómo maneja los carbohidratos.","Los tres cambios que más impacto tuvieron: aumentar las proteínas a 2g/kg, priorizar el entrenamiento de fuerza sobre el cardio, y asegurar suficientes grasas saludables — los estrógenos se sintetizan a partir del colesterol.","Fundamental tiene en cuenta tu etapa hormonal para calcular tus macros. No es lo mismo ser mujer de 25 que de 45. Las necesidades son diferentes y mereces una app que lo entienda."],takeaways:["La masa muscular protege contra el aumento de grasa visceral en la perimenopausia.","D3+K2 y Calcio son críticos para la densidad ósea en esta etapa.","El entrenamiento de fuerza reduce los síntomas de la menopausia más que el cardio.","Las grasas saludables son necesarias para la producción de estrógenos."]},

  {id:4,tag:"Mi historia",date:"Mayo 2025",title:"De no estar feliz con mi cuerpo a convertirme en científica de mí misma.",author:"Claudia Fox",preview:"No empecé por disciplina ni por una meta estética clara. Empecé porque no estaba feliz. Y esa honestidad cambió todo.",

     "Entonces entendí algo que lo cambió todo: el fitness es matemática pura. No es fuerza de voluntad, no es restricción, no es castigarse en el gym. Es entender cómo funciona tu cuerpo y darle exactamente lo que necesita. Empecé a registrar lo que comía. A buscar el déficit calórico de forma inteligente.",

// ─── RING SVG ─────────────────────────────────────────────────────
function Ring({val,max,color,label,size=64}) {
  const r=size*.42, circ=2*Math.PI*r, pct=Math.min(val/max,1), over=val>max;
  return (
    <div style={{textAlign:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.bor} strokeWidth="6"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={over?G.err:color} strokeWidth="6" strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:"stroke-dashoffset .8s"}}/>
        <text x={size/2} y={size/2+4} textAnchor="middle"
          fill={over?G.err:G.crm}
          style={{fontSize:11,fontWeight:600,fontFamily:"Outfit,sans-serif"}}>{val}</text>
      </svg>
      <div style={{fontSize:10,color:G.sft,marginTop:2}}>{label}</div>
      <div style={{fontSize:9,color:G.mut}}>/{max}</div>
    </div>
  );
}

function Toast({msg}) {

}

// ─── PICKER ──────────────────────────────────────────────────────
function Picker({item, mealLabel, onAdd, onClose}) {
  const defG = item._g||(item.g)||100;
  const [amt, setAmt] = useState(String(defG));
  const baseG = item.g||100;
  const quick = [{l:"100g",g:100}];
  if(item.g&&item.u&&item.g!==100){
    quick.push({l:`${item.u} (~${baseG}g)`,g:baseG});
    quick.push({l:`½ (~${Math.round(baseG/2)}g)`,g:Math.round(baseG/2)});
  }
  const sc = amt&&+amt>0 ? scaleFood(item,+amt) : null;
  return (
    <div className="ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mb su">
        <div className="dh"/>
        <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.n||item.name}</div>
        <div style={{fontSize:11,color:G.sft,marginBottom:14}}>valores por 100g de referencia</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,background:G.sur,borderRadius:10,padding:12,marginBottom:14}}>
          {[["P",item.p??item.protein,G.acc],["C",item.c??item.carbs,G.grn],["G",item.f??item.fat,"#7A9E8A"],["kcal",item.k??item.calories,G.sft],["fi",item.fi??item.fiber??0,"#A0C878"]].map(([l,v,col])=>(
            <div key={l} style={{textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:600,color:col}}>{Math.round(v)}</div>
              <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        <div className="lbl">Porciones rápidas</div>
        <div className="qb">
          {quick.map(o=><button key={o.g} className="qbtn" onClick={()=>setAmt(String(o.g))}>{o.l}</button>)}
        </div>
        <div className="lbl">Cantidad en gramos</div>
        <input className="field" type="number" placeholder="Ej: 150" value={amt} onChange={e=>setAmt(e.target.value)} style={{marginBottom:12}} autoFocus/>
        {sc&&(
          <div style={{background:"rgba(74,155,111,.08)",border:"1px solid rgba(74,155,111,.25)",borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,color:G.grn,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Para {amt}g</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {[["P",sc.protein,G.acc],["C",sc.carbs,G.grn],["G",sc.fat,"#7A9E8A"],["kcal",sc.calories,G.sft],["fi",sc.fiber,"#A0C878"]].map(([l,v,col])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:600,color:col}}>{v}</div>
                  <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <button className="bgh" onClick={onClose}>Cancelar</button>
          <button className="btn" style={{flex:1}} disabled={!amt||+amt<=0} onClick={()=>{if(sc)onAdd(sc);}}>
            Agregar{mealLabel?` al ${mealLabel}`:""}
          </button>
        </div>
      </div>
    </div>
  );
}

      <Sel label="Nivel de actividad" k="activity" req opts={[["sedentary","Sedentaria/o — Solo trabajo"],["light","Levemente activa/o — 1-2 días/sem"],["moderate","Moderadamente activa/o — 3-4 días/sem"],["active","Muy activa/o — 5-6 días/sem"],["athlete","Atleta — Entreno intenso diario"]]}/>

      <Sel label="Masa muscular estimada" k="muscleLevel" opts={[["low","Bajo"],["average","Promedio"],["high","Alto"],["very_high","Muy alto"]]}/>
      <Sel label="Objetivo principal" k="goal" req opts={[["recomp","⚖️ Recomposición corporal"],["fat_loss","🔥 Pérdida de grasa"],["muscle","💪 Ganar músculo"],["health","🌿 Salud general"]]}/>
      <Sel label="Etapa hormonal" k="menopause" opts={[["none","No aplica"],["pre","Premenopausia"],["peri","Perimenopausia"],["post","Posmenopausia"]]}/>

// ─── ADD FOOD MODAL ───────────────────────────────────────────────
function AddFoodModal({mealId, mealLabel, savedFoods, onAdd, onSaveToLib, onDeleteSaved, onClose}) {
  const [mode, setMode] = useState("search");
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [err, setErr] = useState("");
  const [picker, setPicker] = useState(null);
  const [scanImg, setScanImg] = useState(null);
  const [scanData, setScanData] = useState({name:"",serving:"",protein:0,carbs:0,fat:0,calories:0,fiber:0});
  const [man, setMan] = useState({name:"",protein:"",carbs:"",fat:"",calories:"",fiber:""});
  const [impExp, setImpExp] = useState(null);
  const [impTxt, setImpTxt] = useState("");
  const [impMsg, setImpMsg] = useState("");
  const fileRef = useRef();

  const doSearch = () => {
    const s=query.trim();
    if(s.length<2)return;
    const r=searchDB(s);
    setErr(r.length===0?"Sin resultados. Intenta otro nombre.":"");
    setResults(r);
  };

  const handleAdd = (food) => {
    onAdd(food); setQuery(""); setResults([]); setErr("");
    setMan({name:"",protein:"",carbs:"",fat:"",calories:"",fiber:""});
  };

  const addManual = () => {
    if(!man.name.trim()) return;
    const p=+man.protein||0, c=+man.carbs||0, f=+man.fat||0;
    handleAdd({name:man.name,protein:p,carbs:c,fat:f,calories:+man.calories||Math.round(p*4+c*4+f*9),fiber:+man.fiber||0,id:Date.now()});
  };

  const addScan = () => {
    if(!scanData.name.trim()) return;
    handleAdd({...scanData,id:Date.now()});
    setScanImg(null); setScanData({name:"",serving:"",protein:0,carbs:0,fat:0,calories:0,fiber:0});
  };

  const saveScan = () => {
    if(!scanData.name.trim()) return;
    const srvG=parseFloat(scanData.serving)||100, mult=100/srvG;
    onSaveToLib({
      id:"s_"+Date.now(), name:scanData.name,
      p:Math.round(scanData.protein*mult*10)/10, c:Math.round(scanData.carbs*mult*10)/10,
      f:Math.round(scanData.fat*mult*10)/10, k:Math.round(scanData.calories*mult),
      fi:Math.round(scanData.fiber*mult*10)/10,
      g:srvG, u:scanData.serving||"porción", thumb:scanImg,
    });
    setScanImg(null); setScanData({name:"",serving:"",protein:0,carbs:0,fat:0,calories:0,fiber:0});
  };

  const calcScanCal = (d) => Math.round((d.protein||0)*4+(d.carbs||0)*4+(d.fat||0)*9);
  const upScan = (k,v) => setScanData(d=>{const nd={...d,[k]:v};if(k!=="calories"&&k!=="name"&&k!=="serving")nd.calories=calcScanCal(nd);return nd;});

  const modeLabels = ["search","scan","saved","manual"];
  const modeIcons = ["🔍 Buscar","📷 Escanear","⭐ Mis Marcas","✏️ Manual"];

  return (
    <div className="ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mb su">
        <div className="dh"/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm}}>Agregar a {mealLabel}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:G.sft,fontSize:22}}>×</button>
        </div>
        <div className="mdtabs">
          {modeLabels.map((m,i)=>(
            <button key={m} className={`mdtab${mode===m?" on":""}`} onClick={()=>setMode(m)}>{modeIcons[i]}</button>
          ))}
        </div>

        {/* SEARCH */}
        {mode==="search"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input className="field" style={{flex:1}} placeholder="Ej: sancocho, 49g aguacate..." value={query}
                onChange={e=>{setQuery(e.target.value);setResults([]);setErr("");}}
                onKeyDown={e=>e.key==="Enter"&&doSearch()} autoFocus/>
              <button className="btn" onClick={doSearch} disabled={query.trim().length<2} style={{padding:"0 16px",whiteSpace:"nowrap"}}>Buscar</button>
            </div>
            {err&&<div style={{background:"rgba(224,112,112,.1)",border:`1px solid ${G.err}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:G.err,marginBottom:10}}>{err}</div>}
            {results.length>0&&(
              <div>
                <div style={{fontSize:12,color:G.sft,marginBottom:8}}>Toca para elegir porción →</div>
                {results.map((r,i)=>(
                  <div key={i} className="sr" onClick={()=>setPicker(r)}>
                    <div style={{fontSize:14,fontWeight:500,color:G.crm,marginBottom:4}}>{r.n}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[["P",r.p,G.acc],["C",r.c,G.grn],["G",r.f,"#7A9E8A"],["kcal",r.k,G.sft],["fi",r.fi||0,"#A0C878"]].map(([l,v,col])=>(
                        <span key={l} style={{fontSize:11,color:G.mut}}>{l}: <strong style={{color:col}}>{Math.round(v)}</strong></span>
                      ))}
                      <span style={{fontSize:10,color:G.mut,marginLeft:"auto"}}>por 100g</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {!query&&<div style={{marginTop:12,padding:12,background:G.sur,borderRadius:10,fontSize:12,color:G.sft,lineHeight:1.7}}>
              💡 "spaghetti" · "49g aguacate" · "platano maduro" · "atun agua"
            </div>}
          </div>
        )}

        {/* SCAN */}
        {mode==="scan"&&(
          <div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
              onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setScanImg(ev.target.result);r.readAsDataURL(f);}}/>
            {!scanImg?(
              <div className="sz" onClick={()=>fileRef.current?.click()}>
                <div style={{fontSize:36,marginBottom:10}}>📷</div>
                <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:4}}>Fotografía la etiqueta nutricional</div>
                <div style={{fontSize:13,color:G.sft}}>Ingresa los valores de la porción indicada</div>
              </div>
            ):(
              <div className="fi">
                <img src={scanImg} style={{width:"100%",borderRadius:10,maxHeight:160,objectFit:"cover",marginBottom:12}} alt=""/>
                <div className="fsec"><label className="lbl">Nombre del producto</label><input className="field" placeholder="Ej: Yogurt griego Alpina" value={scanData.name} onChange={e=>upScan("name",e.target.value)}/></div>
                <div className="fsec"><label className="lbl">Porción indicada (ej: 30g)</label><input className="field" placeholder="30g" value={scanData.serving} onChange={e=>upScan("serving",e.target.value)}/></div>
                <div style={{fontSize:11,color:G.acc,marginBottom:8}}>Ingresa los valores por la porción indicada en la etiqueta</div>
                <div className="g2" style={{marginBottom:12}}>
                  {[["protein","Proteína (g)",G.acc],["carbs","Carbs (g)",G.grn],["fat","Grasas (g)","#7A9E8A"],["fiber","Fibra (g)","#A0C878"],["calories","Calorías",G.sft]].map(([k,l,col])=>(
                    <div key={k}><label className="lbl" style={{color:col}}>{l}</label><input className="field fsm" type="number" placeholder="0" value={scanData[k]||""} onChange={e=>upScan(k,+e.target.value||0)}/></div>
                  ))}
                </div>
                <button className="btn bw" style={{marginBottom:8}} disabled={!scanData.name.trim()} onClick={addScan}>Agregar a {mealLabel}</button>
                <div style={{display:"flex",gap:8}}>
                  <button className="bgh" style={{flex:1}} disabled={!scanData.name.trim()} onClick={saveScan}>⭐ Guardar en Mis Marcas</button>
                  <button className="bgh" onClick={()=>setScanImg(null)}>Nueva foto</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* SAVED */}
        {mode==="saved"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <button className="bgh" style={{flex:1,fontSize:12}} onClick={()=>{setImpExp("exp");setImpTxt(JSON.stringify(savedFoods));setImpMsg("");}}>📤 Exportar</button>
              <button className="bgh" style={{flex:1,fontSize:12}} onClick={()=>{setImpExp("imp");setImpTxt("");setImpMsg("");}}>📥 Importar</button>
            </div>
            {savedFoods.length===0?(
              <div style={{textAlign:"center",padding:"28px 0"}}>
                <div style={{fontSize:36,marginBottom:10}}>⭐</div>
                <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:6}}>Sin marcas guardadas</div>
                <div style={{fontSize:13,color:G.sft,marginBottom:14}}>Usa 📷 Escanear para guardar tus productos</div>
                <button className="btn" style={{maxWidth:200,margin:"0 auto",display:"block"}} onClick={()=>setMode("scan")}>📷 Escanear etiqueta</button>
              </div>
            ):(
              <div>
                <div style={{fontSize:12,color:G.sft,marginBottom:10}}>{savedFoods.length} producto{savedFoods.length!==1?"s":""}</div>
                {savedFoods.map((food,i)=>(
                  <div key={food.id} className="si" onClick={()=>setPicker({...food,n:food.name})}>
                    <div className="th">{food.thumb?<img src={food.thumb} alt=""/>:"🏷️"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="ell" style={{fontSize:13,fontWeight:500,color:G.crm}}>{food.name}</div>
                      <div style={{fontSize:11,color:G.sft,marginTop:2}}>{Math.round(food.p||0)}P·{Math.round(food.c||0)}C·{Math.round(food.f||0)}G·<strong style={{color:G.txt}}>{Math.round(food.k||0)}kcal</strong>{food.u&&` · por ${food.g}g (${food.u})`}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();onDeleteSaved(i);}} style={{background:"none",border:"none",cursor:"pointer",color:G.mut,fontSize:16,padding:"4px 8px"}}>×</button>
                  </div>
                ))}
              </div>
            )}
            {impExp&&(
              <div className="ov ovc" onClick={e=>{if(e.target===e.currentTarget){setImpExp(null);}}}>
                <div className="mbc fi">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div className="serif" style={{fontSize:17,fontWeight:500,color:G.crm}}>{impExp==="exp"?"📤 Exportar":"📥 Importar"} Mis Marcas</div>
                    <button onClick={()=>setImpExp(null)} style={{background:"none",border:"none",cursor:"pointer",color:G.sft,fontSize:22}}>×</button>
                  </div>
                  {impExp==="exp"?(
                    <div>
                      <p style={{fontSize:13,color:G.sft,marginBottom:10}}>Copia este texto y guárdalo en notas.</p>
                      <textarea readOnly value={impTxt} onFocus={e=>e.target.select()} style={{width:"100%",height:100,background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:8,padding:10,color:G.sft,fontSize:11,fontFamily:"monospace",resize:"none",outline:"none",marginBottom:10}}/>
                      <button className="btn bw" onClick={()=>{navigator.clipboard?.writeText(impTxt).then(()=>setImpMsg("✓ Copiado")).catch(()=>setImpMsg("Selecciona y copia manualmente"));}}>Copiar al portapapeles</button>
                      {impMsg&&<div style={{marginTop:8,fontSize:13,color:G.grl,textAlign:"center"}}>{impMsg}</div>}
                    </div>
                  ):(
                    <div>
                      <p style={{fontSize:13,color:G.sft,marginBottom:10}}>Pega aquí el texto exportado.</p>
                      <textarea placeholder="Pega aquí tus datos..." value={impTxt} onChange={e=>{setImpTxt(e.target.value);setImpMsg("");}} style={{width:"100%",height:100,background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:8,padding:10,color:G.txt,fontSize:11,fontFamily:"monospace",resize:"none",outline:"none",marginBottom:8}}/>
                      {impMsg&&<div style={{marginBottom:8,fontSize:13,color:impMsg.startsWith("✓")?G.grl:G.err}}>{impMsg}</div>}
                      <button className="btn bw" disabled={!impTxt.trim()} onClick={()=>{try{const d=JSON.parse(impTxt.trim());if(!Array.isArray(d))throw 1;d.forEach(onSaveToLib);setImpMsg(`✓ ${d.length} productos importados`);setTimeout(()=>setImpExp(null),1500);}catch(e){setImpMsg("⚠️ Formato inválido.");}}}>Importar</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* MANUAL */}
        {mode==="manual"&&(
          <div>
            <div className="fsec"><label className="lbl">Nombre</label><input className="field" placeholder="Ej: Ensalada mixta" value={man.name} onChange={e=>setMan(m=>({...m,name:e.target.value}))} autoFocus/></div>
            <div className="g2" style={{marginBottom:12}}>
              {[["protein","Proteína (g)",G.acc],["carbs","Carbs (g)",G.grn],["fat","Grasas (g)","#7A9E8A"],["fiber","Fibra (g)","#A0C878"],["calories","Calorías (auto)",G.sft]].map(([k,l,col])=>(
                <div key={k}><label className="lbl" style={{color:col}}>{l}</label>
                  <input className="field fsm" type="number" placeholder="0" value={man[k]} onChange={e=>{const v=e.target.value;setMan(m=>{const nm={...m,[k]:v};if(k!=="calories"){const p=+nm.protein||0,c=+nm.carbs||0,f=+nm.fat||0;nm.calories=String(Math.round(p*4+c*4+f*9));}return nm;});}}/></div>
              ))}
            </div>
            <button className="btn bw" disabled={!man.name.trim()} onClick={addManual}>Agregar al {mealLabel}</button>
          </div>
        )}
      </div>
      {picker&&<Picker item={picker} mealLabel={mealLabel} onAdd={food=>{handleAdd({...food,id:Date.now()});setPicker(null);}} onClose={()=>setPicker(null)}/>}
    </div>
  );
}

          const color = clampedPct>=80?G.grn:clampedPct>=40?"#EAC850":G.bor;
          return (
            <button onClick={()=>onNavigate("log")}
              style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px 5px 6px",
                borderRadius:20,border:`1px solid ${color}`,cursor:"pointer",

                <circle cx="16" cy="16" r={r} fill="none" stroke={G.bor} strokeWidth="2.5"/>

                  strokeDasharray={`${dash} ${circ}`}
                  strokeLinecap="round"
                  transform="rotate(-90 16 16)"/>
                <text x="16" y="20" textAnchor="middle" fontSize="8" fontWeight="600"
                  fill={color} fontFamily="Outfit,sans-serif">
                  {clampedPct}%
                </text>
              </svg>
              <span style={{fontSize:11,color:clampedPct>=80?G.grl:G.mut}}>Nutrición</span>
            </button>
          );
        })()}

        {/* Gym, Bitácora, Healing — píldoras normales */}

              color:item.done?G.grl:G.mut,transition:"all .2s"}}>
            {item.done?"✓ ":""}{item.label}
          </button>
        ))}
      </div>
    </div>
  );
}

          <div className="fi">
            {MEAL_CFG.map(meal=>{
              const mf=meals[meal.id]||[], mt=mf.reduce((a,f)=>({p:a.p+f.protein,c:a.c+f.carbs,f:a.f+f.fat,k:a.k+f.calories}),{p:0,c:0,f:0,k:0});
              const isOpen=expanded[meal.id];
              return (
                <div key={meal.id} style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",cursor:"pointer"}} onClick={()=>setExpanded(e=>({...e,[meal.id]:!e[meal.id]}))}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>{meal.i}</span>
                      <div><div style={{fontSize:14,fontWeight:500,color:G.crm}}>{meal.l}</div><div style={{fontSize:11,color:G.mut}}>{meal.t}</div></div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {mf.length>0&&<div style={{textAlign:"right"}}><div style={{fontSize:13,color:G.grl,fontWeight:500}}>{Math.round(mt.k)} kcal</div><div style={{fontSize:10,color:G.sft}}>{Math.round(mt.p)}P·{Math.round(mt.c)}C·{Math.round(mt.f)}G</div></div>}
                      <span style={{color:G.mut,display:"inline-block",transform:isOpen?"rotate(180deg)":"",transition:"transform .2s"}}>⌄</span>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{borderTop:`1px solid ${G.bor}`,padding:"0 16px"}}>
                      {mf.length===0?<div style={{padding:"14px 0",textAlign:"center",color:G.sft,fontSize:13}}>Nada registrado aún</div>
                        :mf.map(food=>(
                          <div key={food.id} className="frow">
                            <div style={{flex:1,minWidth:0}}>
                              <div className="ell" style={{fontSize:13,fontWeight:500,color:G.crm}}>{food.name}</div>
                              <div style={{fontSize:11,color:G.sft,marginTop:2}}>{Math.round(food.protein)}P·{Math.round(food.carbs)}C·{Math.round(food.fat)}G·<strong style={{color:G.txt}}>{Math.round(food.calories)}kcal</strong>{food.fiber>0?`·${Math.round(food.fiber)}fi`:""}</div>
                            </div>
                            <button onClick={()=>delFood(meal.id,food.id)} style={{background:"none",border:"none",cursor:"pointer",color:G.mut,fontSize:16,padding:"4px 8px"}}>×</button>
                          </div>
                        ))
                      }
                      <button className="afb" onClick={()=>setAddMeal(meal.id)}>+ Agregar alimento</button>
                    </div>
                  )}
                </div>
              );
            })}
            <div className="card" style={{marginTop:6}}>
              <div style={{fontSize:12,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Resumen del día</div>
              <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:8}}>
                {[["Prot",rt.p,tgt.protein,G.acc],["Carbs",rt.c,tgt.carbs,G.grn],["Grasas",rt.f,tgt.fat,"#7A9E8A"],["Fibra",rt.fi,tgt.fiber,"#A0C878"],["Kcal",rt.k,tgt.calories,"#A89EC0"]].map(m=>(
                  <Ring key={m[0]} val={m[1]} max={m[2]} color={m[3]} label={m[0]}/>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* INSIGHTS VIEW */}
        {view==="insights"&&(
          <div className="fi">
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Análisis de hoy</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Basado en tu perfil y lo registrado.</div>
            {ins.map((x,i)=>{const [bc,bg]=icols[x.t]||icols.i;return(
              <div key={i} className="ic" style={{borderLeftColor:bc,background:bg}}>
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <span style={{fontSize:14,flexShrink:0}}>{x.i}</span>
                  <div><div style={{fontSize:13,fontWeight:500,color:G.crm,marginBottom:2}}>{x.ti}</div><div style={{fontSize:12,color:G.sft,lineHeight:1.6}}>{x.m}</div></div>
                </div>
              </div>
            );})}
            <hr className="hr"/>
            <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:14}}>Comparativa</div>
            {[{l:"Calorías",v:rt.k,t:tgt.calories,u:"kcal",c:"#A89EC0"},{l:"Proteína",v:rt.p,t:tgt.protein,u:"g",c:G.acc},{l:"Carbs",v:rt.c,t:tgt.carbs,u:"g",c:G.grn},{l:"Grasas",v:rt.f,t:tgt.fat,u:"g",c:"#7A9E8A"},{l:"Fibra",v:rt.fi,t:tgt.fiber,u:"g",c:"#A0C878"}].map(m=>{
              const ov=m.v>m.t, p2=Math.min(m.v/m.t,1);
              return(
                <div key={m.l} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,color:G.crm}}>{m.l}</span>
                    <span style={{fontSize:13}}><strong style={{color:ov?G.err:G.crm}}>{m.v}{m.u}</strong><span style={{color:G.sft}}> / {m.t}{m.u}</span></span>
                  </div>
                  <div className="bar" style={{height:7}}><div className="bf" style={{height:"100%",width:`${Math.min(p2*100,100)}%`,background:ov?G.err:m.c}}/></div>
                  <div style={{fontSize:11,color:ov?G.err:G.sft,marginTop:3,textAlign:"right"}}>{ov?`+${m.v-m.t}${m.u} sobre objetivo`:`${m.t-m.v}${m.u} restante`}</div>
                </div>
              );
            })}
          {/* Conexión con Bitácora */}
          {rt.k > tgt.calories * 0.5 && (
            <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",
              borderRadius:14,padding:"14px 16px",marginTop:12}}>
              <div style={{fontSize:11,color:G.grn,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
                📊 ¿Cómo te sientes?
              </div>
              <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:12}}>
                Los números son una parte de la historia. ¿Cómo está tu energía, foco y ánimo hoy? Registra tus síntomas en la Bitácora para conectar la nutrición con cómo te sientes.
              </div>
              <button onClick={()=>onNavigateBit&&onNavigateBit("bitacora")}
                style={{width:"100%",background:"rgba(74,155,111,.12)",border:`1.5px solid ${G.grn}`,
                  borderRadius:10,padding:"11px",fontSize:13,fontWeight:600,cursor:"pointer",color:G.grl}}>
                📊 Ir a Bitácora →
              </button>
            </div>
          )}
          </div>
        )}

        {/* MIS COMBOS */}
        {view==="combos"&&(
          <MisCombosView meals={meals} setMeals={setMeals} mealTime={mealTime}/>
        )}

        {/* WEEK VIEW */}
        {view==="week"&&(
          <div className="fi">
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Patrones semanales</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:16}}>Últimos 6 días.</div>
            {weekData.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:G.sft,fontSize:13}}>Cargando historial...</div>}
            {weekData.length>0&&[{k:"p",l:"Proteína",c:G.acc,t:tgt.protein},{k:"c",l:"Carbohidratos",c:G.grn,t:tgt.carbs},{k:"f",l:"Grasas",c:"#7A9E8A",t:tgt.fat},{k:"k",l:"Calorías",c:"#A89EC0",t:tgt.calories},{k:"fi",l:"Fibra",c:"#A0C878",t:tgt.fiber}].map(m=>{
              const avg=Math.round(weekData.reduce((a,d)=>a+(d[m.k]||0),0)/weekData.length);
              const below=avg<m.t*.88;
              const mx=Math.max(...weekData.map(d=>d[m.k]||0),m.t);
              return(
                <div key={m.k} className="card" style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{fontSize:14,fontWeight:500,color:G.crm}}>{m.l}</span>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:12,color:G.sft}}>prom.</span>
                      <span style={{fontSize:15,fontWeight:600,color:below?G.acc:G.grl}}>{avg}</span>
                      <span style={{fontSize:11,color:G.sft}}>/ {m.t}</span>
                    </div>
                  </div>
                  <div className="wb">
                    {weekData.map((d,i)=>{const p2=(d[m.k]||0)/mx,tp=m.t/mx,ov=(d[m.k]||0)>m.t;return(
                      <div key={i} className="wbi">
                        <div className="wbr"><div className="wtl" style={{bottom:`${tp*100}%`}}/><div className="wbf" style={{height:`${p2*100}%`,background:ov?G.err:m.c}}/></div>
                        <span style={{fontSize:9,color:G.sft}}>{d.d}</span>
                      </div>
                    );})}
                  </div>
                  {below&&<div style={{marginTop:8,fontSize:11,color:G.acl,background:"rgba(200,132,90,.08)",borderRadius:6,padding:"5px 10px"}}>⚠️ Promedio {m.t-avg} por debajo del objetivo</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {addMeal&&(
        <AddFoodModal
          mealId={addMeal}
          mealLabel={MEAL_CFG.find(m=>m.id===addMeal)?.l||""}
          savedFoods={savedFoods}
          onAdd={addFood}
          onSaveToLib={food=>setSavedFoods(sf=>[food,...sf])}
          onDeleteSaved={i=>setSavedFoods(sf=>sf.filter((_,idx)=>idx!==i))}
          onClose={()=>setAddMeal(null)}
        />
      )}
    </div>
  );
}

// ─── GYM ──────────────────────────────────────────────────────────
const WORKOUT_KEY = "workout_log";

function GymScreen({profile, gymDay, setGymDay, exPrefs={}, setExPrefs, workoutLog:workoutLogProp={}, setWorkoutLog:setWorkoutLogProp, onNavigate}) {
  const [view, setView] = useState("rutinas");
  const [suppChecked, setSuppChecked] = useState({});
  const [registered, setRegistered] = useState(!!workoutLogProp?.[new Date().toISOString().slice(0,10)]);
  const [showHistory, setShowHistory] = useState(false);
  const todayStr = new Date().toISOString().slice(0,10);
  const workoutLog = workoutLogProp;
  const setWorkoutLog = (newLog) => {
    if(setWorkoutLogProp) setWorkoutLogProp(newLog);
  };

  useEffect(()=>{
    load("supps:"+todayStr).then(v=>{if(v)try{setSuppChecked(JSON.parse(v));}catch(e){}});
    if(!workoutLogProp?.[todayStr]) setRegistered(false);
    else setRegistered(true);
  },[todayStr, workoutLogProp]);

  const registerWorkout = async () => {
    const g = GYM[gymDay];
    const entry = {
      date: todayStr,
      block: g.l,
      blockName: g.n,
      muscles: g.m,
      exercises: g.ex.map(e=>({
        original: e.n,
        performed: exPrefs[e.n]?.n || e.n,
        replaced: !!exPrefs[e.n],
        weight: exWeights[e.n]?.weight || null,
        reps: exWeights[e.n]?.reps || null,
        sets: exWeights[e.n]?.sets || null,
      })),
      timestamp: new Date().toISOString(),
    };
    const newLog = {...workoutLog, [todayStr]: entry};
    setWorkoutLog(newLog);
    await save(WORKOUT_KEY, newLog);
    if(setWorkoutLogProp) setWorkoutLogProp(newLog);
    setRegistered(true);
  };

  // Last 14 days history
  const last14 = Array.from({length:14},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(13-i));
    const key = d.toISOString().slice(0,10);
    const log = workoutLog[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {key, label:lbls[d.getDay()], log, isToday:i===13};
  });
  const workoutDays = last14.filter(d=>d.log).length;

  const toggleSupp = async(name) => {
    const nc={...suppChecked,[name]:!suppChecked[name]};
    setSuppChecked(nc);
    await save("supps:"+todayStr, nc);
  };

  const g=GYM[gymDay], z=profile?.age?calcZones(+profile.age,profile.restingHR?+profile.restingHR:0):null;
  const [swapModal, setSwapModal] = useState(null);
  const [exWeights, setExWeights] = useState({}); // {exerciseName: {weight, reps, sets}}

  return (
    <div>
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Gym</div>
      <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:G.sft,lineHeight:1.6}}>
        🎧 <b style={{color:G.grl}}>Haz los bloques en el orden que tu semana permita.</b> No hay días fijos. Si hoy no tienes energía para B2 (piernas), haz B1 o descansa. Escuchar al cuerpo no es debilidad — es inteligencia.
      </div>
      {(()=>{
        const wDays = Object.keys(workoutLogProp||{}).length;
        const truth = wDays===0
          ? {msg:"El primer entrenamiento no te pone en forma. Te convierte en alguien que entrena.", color:G.acc}
          : wDays<7
          ? {msg:`${wDays} entrenamientos registrados. El hábito se forma entre el día 7 y el 21. Sigue.`, color:G.grn}
          : wDays<21
          ? {msg:"Una semana completa. Tu cuerpo ya empezó a adaptarse — aunque aún no lo veas.", color:G.grn}
          : {msg:"Más de 3 semanas de consistencia. Eso ya no es motivación — es identidad.", color:G.acc};
        return (
          <div style={{fontSize:11,color:truth.color,textAlign:"center",marginBottom:12,
            fontStyle:"italic",fontFamily:"'Fraunces',serif",lineHeight:1.6}}>
            "{truth.msg}"
          </div>
        );
      })()}
      <div className="stab" style={{margin:"0 -20px 16px",paddingLeft:20}}>
        {[["rutinas","Rutinas"],["ejercicios","Ejercicios"]].map(([v,l])=>(
          <button key={v} className={view===v?"on":""} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>

      {view==="rutinas"&&(
        <div className="fi">
          <div className="dt">
            {GYM.map((d,i)=>(
              <button key={i}
                className={`${gymDay===i?"on":""}${d.t==="r"?" rst":""}${d.t==="c"?" cls":""}`}
                onClick={()=>setGymDay(i)}
                title={d.n}>
                {d.l}
              </button>
            ))}
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:g.why?8:4}}>
              <div><div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:2}}>{g.n}</div><div style={{fontSize:12,color:G.sft}}>{g.m}</div></div>
              <span style={{padding:"4px 12px",borderRadius:20,background:"rgba(255,255,255,.04)",border:`1px solid ${G.bor}`,fontSize:11,color:G.sft}}>{g.t==="r"?"Descanso":g.t==="m"?"Mixto":"Fuerza"}</span>
            </div>
            {g.why&&<div style={{fontSize:12,color:G.sft,lineHeight:1.6,background:"rgba(74,155,111,.04)",borderRadius:8,padding:"8px 12px",marginBottom:12}}>{g.why}</div>}
            {g.ex.length>0&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,paddingBottom:8,borderBottom:`1px solid ${G.bor}`,fontSize:10,color:G.mut,letterSpacing:1,textTransform:"uppercase"}}>
                  <span>Ejercicio</span><span style={{textAlign:"center"}}>Series</span><span>Reps</span>
                </div>
                {g.ex.map((e,i)=>{
                  const pref = exPrefs[e.n];
                  const display = pref ? {...e, n:pref.n, mu:pref.mu} : e;
                  return (
                    <div key={i} className="exr">
                      <div style={{display:"flex",gap:8,flex:1,minWidth:0}}>
                        <div className="exn">{i+1}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:G.crm}}>{display.n}</div>
                          {pref && <div style={{fontSize:10,color:G.grn,marginTop:1}}>↩ reemplazado</div>}
                          <div style={{fontSize:11,color:G.sft,marginTop:1}}>{display.mu}</div>
                          <div style={{fontSize:11,color:G.acc,marginTop:2,lineHeight:1.4}}>{e.tip}</div>
                          {ALT[e.n] && (
                            <button onClick={()=>setSwapModal({ex:e, idx:i})}
                              style={{marginTop:6,background:"rgba(74,155,111,.08)",border:"1px solid rgba(74,155,111,.3)",
                                borderRadius:8,padding:"4px 10px",fontSize:11,color:G.grl,cursor:"pointer"}}>
                              🔄 {pref?"Cambiar de nuevo":"Ver alternativas"}
                            </button>
                          )}
                          {/* Weight/Reps tracker */}
                          <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:9,color:G.mut,marginBottom:3}}>Peso (kg)</div>
                              <input type="number" placeholder="–"
                                value={exWeights[e.n]?.weight||""}
                                onChange={ev=>setExWeights(w=>({...w,[e.n]:{...w[e.n],weight:ev.target.value}}))}
                                style={{width:"100%",background:G.sur,border:`1px solid ${G.bor}`,borderRadius:6,
                                  padding:"5px 8px",color:G.crm,fontSize:13,textAlign:"center"}}/>
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:9,color:G.mut,marginBottom:3}}>Reps</div>
                              <input type="number" placeholder="–"
                                value={exWeights[e.n]?.reps||""}
                                onChange={ev=>setExWeights(w=>({...w,[e.n]:{...w[e.n],reps:ev.target.value}}))}
                                style={{width:"100%",background:G.sur,border:`1px solid ${G.bor}`,borderRadius:6,
                                  padding:"5px 8px",color:G.crm,fontSize:13,textAlign:"center"}}/>
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:9,color:G.mut,marginBottom:3}}>Series</div>
                              <input type="number" placeholder={e.s}
                                value={exWeights[e.n]?.sets||""}
                                onChange={ev=>setExWeights(w=>({...w,[e.n]:{...w[e.n],sets:ev.target.value}}))}
                                style={{width:"100%",background:G.sur,border:`1px solid ${G.bor}`,borderRadius:6,
                                  padding:"5px 8px",color:G.crm,fontSize:13,textAlign:"center"}}/>
                            </div>
                          </div>
                        </div>
                      </div>
                      <span style={{fontSize:13,color:G.acl,fontWeight:600,textAlign:"center",flexShrink:0}}>{e.s}</span>
                      <span style={{fontSize:12,color:G.sft,flexShrink:0}}>{e.r}</span>
                    </div>
                  );
                })}
                <hr className="hr"/>
              </div>
            )}
            <div style={{background:"rgba(200,132,90,.06)",borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:10,color:G.acc,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Cardio</div>
              <div style={{fontSize:13,color:G.sft}}>{g.cd}</div>
            </div>
          </div>
          {z&&(
            <div className="card">
              <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Zonas cardíacas · {z.m}</div>
              <div className="g3">
                {[
                  ["FC Máx",String(z.max),G.err,"Límite"],
                  ["Zona 2",`${z.z2lo}–${z.z2hi}`,G.grn,"Quema grasa"],
                  ["Zona 3",`${z.z3lo}–${z.z3hi}`,G.acc,"Resistencia"]
                ].map(([l,v,col,sub])=>(
                  <div key={l} style={{textAlign:"center",background:G.sur,borderRadius:8,padding:"10px 6px"}}>
                    <div style={{fontSize:10,color:G.mut,marginBottom:3}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:600,color:col}}>{v}</div>
                    <div style={{fontSize:9,color:G.mut}}>bpm</div>
                    <div style={{fontSize:8,color:col,marginTop:2}}>{sub}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {view==="rutinas"&&(
        <div>
          {/* REGISTER BUTTON */}
          {(
            <div>
              <button onClick={()=>{if(!registered) registerWorkout();}}
                style={{width:"100%",background:registered?"rgba(74,155,111,.12)":"#4A9B6F",
                  color:registered?"#6BBF8E":"#fff",border:registered?"1.5px solid #4A9B6F":"none",
                  borderRadius:12,padding:"15px 20px",fontSize:15,fontWeight:600,cursor:"pointer",
                  marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {registered
                  ? GYM[gymDay].t==="r" ? "✅ Descanso registrado hoy" : "✅ Entrenamiento registrado hoy"
                  : GYM[gymDay].t==="r" ? "✅ Registrar día de descanso" : `✅ Registrar ${GYM[gymDay].l}: ${GYM[gymDay].n}`}
              </button>
              {registered && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:G.sft,textAlign:"center",marginBottom:12,lineHeight:1.6}}>
                    {GYM[gymDay].l} completado · {new Date().toLocaleDateString("es",{day:"numeric",month:"short"})}
                    {Object.keys(exPrefs).filter(k=>GYM[gymDay].ex.some(e=>e.n===k)).length > 0 &&
                      <span style={{color:G.acc}}> · {Object.keys(exPrefs).filter(k=>GYM[gymDay].ex.some(e=>e.n===k)).length} ejercicio(s) reemplazados</span>
                    }
                  </div>
                  <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",
                    borderRadius:12,padding:"12px 14px",display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:20,flexShrink:0}}>📊</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500,color:G.crm,marginBottom:2}}>¿Cómo te sentiste?</div>
                      <div style={{fontSize:11,color:G.sft}}>Registra tus síntomas post-entreno en la Bitácora</div>
                    </div>
                    <button onClick={()=>onNavigate&&onNavigate("bitacora")}
                      style={{background:G.grn,color:"#fff",border:"none",borderRadius:8,
                        padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>
                      Ir →

                  padding:"12px 16px",cursor:"pointer",marginBottom:12,color:G.acl,fontSize:13,fontWeight:500}}>
                ↩ Volver al ejercicio original
              </button>
            )}
            {(ALT[swapModal.ex.n]||[]).map((alt,i)=>{
              const isActive=exPrefs[swapModal.ex.n]?.n===alt.n;
              return(
                <button key={i} onClick={()=>{const np={...exPrefs,[swapModal.ex.n]:alt};setExPrefs(np);save("exPrefs",np);setSwapModal(null);}}
                  style={{width:"100%",background:isActive?"rgba(74,155,111,.12)":"transparent",
                    border:`1.5px solid ${isActive?G.grn:G.bor}`,borderRadius:12,
                    padding:"14px 16px",cursor:"pointer",marginBottom:10,textAlign:"left",transition:"all .2s"}}>
                  <div style={{fontSize:13,fontWeight:600,color:isActive?G.grl:G.crm,marginBottom:4}}>{alt.n}</div>
                  <div style={{fontSize:11,color:G.acc,marginBottom:4}}>{alt.r}</div>
                  <div style={{fontSize:11,color:G.sft}}>{alt.mu}</div>
                </button>
              );
            })}
            <button onClick={()=>setSwapModal(null)}
              style={{width:"100%",background:"transparent",border:`1px solid ${G.bor}`,
                borderRadius:10,padding:"11px",color:G.sft,fontSize:13,cursor:"pointer",marginTop:4}}>
              Cancelar
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const BITACORA_KEY = "bitacora";


function HealingNavButton({onNavigate}) {

  return (

      style={{width:"100%",background:G.acc,color:"#fff",border:"none",

function BitacoraScreen({profile, meals, onNavigate, onBitacoraUpdate}) {
  const today = new Date().toISOString().slice(0,10);
  const [records, setRecords] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [showRecs, setShowRecs] = useState(false);
  const [registered, setRegistered] = useState(false);
  const [nutriAnalysis, setNutriAnalysis] = useState(null);
  const [tabBit, setTabBit] = useState("sintomas"); // sintomas | sueno

  const todayRec = records[today] || {
    energia:3, foco:3, sueno:3, piel:3, digestion:3, animo:3,
    notas:"", sintomas:[], fase:"folicular"
  };

  useEffect(()=>{
    loadJSON(BITACORA_KEY).then(d=>{
      if(d) {
        setRecords(d);
        if(d[today]?.registered) setRegistered(true); // Persist registered state
      }
      setLoaded(true);
    });
  },[]);

  const update = (key, val) => {
    const newRec = {...todayRec, [key]: val};
    const newRecords = {...records, [today]: newRec};
    setRecords(newRecords);
    save(BITACORA_KEY, newRecords);
    if(onBitacoraUpdate) onBitacoraUpdate(newRecords);
  };

  const toggleSintoma = (s) => {
    const cur = todayRec.sintomas || [];
    const next = cur.includes(s) ? cur.filter(x=>x!==s) : [...cur, s];
    update("sintomas", next);
  };

  // Slider color logic: unselected=green, 1-2=orange, 3=yellow, 4-5=green
  const sliderBtnStyle = (val, selected) => {
    if (!selected) return {bg:"rgba(74,155,111,.08)", border:"#254D3A", color:"#7A9E8A"};
    if (val <= 2) return {bg:"rgba(200,132,90,.15)", border:"#C8845A", color:"#E8A87A"};
    if (val === 3) return {bg:"rgba(234,200,80,.12)", border:"#EAC850", color:"#EAC850"};
    return {bg:"rgba(74,155,111,.15)", border:"#4A9B6F", color:"#6BBF8E"};
  };

  // Hormonal phase
  const FASES = [
    {id:"folicular", label:"Folicular", ic:"🌱", days:"Días 1-13", desc:"Energía alta, ideal para entrenamientos intensos"},
    {id:"ovulatoria", label:"Ovulatoria", ic:"🌸", days:"Días 14-16", desc:"Pico de energía y fuerza. Máximo rendimiento."},
    {id:"lutea", label:"Lútea", ic:"🌾", days:"Días 17-28", desc:"Puede haber antojos y fatiga. Normal. No te exijas de más."},
    {id:"menstrual", label:"Menstrual", ic:"🌊", days:"Días 1-5", desc:"Descansa más. Prioriza hierro y magnesio."},
  ];
  const faseActual = FASES.find(f=>f.id===(todayRec.fase||"folicular")) || FASES[0];

  // 7-day data
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const key = d.toISOString().slice(0,10);
    const rec = records[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {
      key, label: i===6?"Hoy":lbls[d.getDay()],
      energia: rec?.energia||0, foco: rec?.foco||0, piel: rec?.piel||0,
      hasData: !!rec
    };
  });

  // Correlations engine
  const getCorrelations = () => {
    const recs = [];
    const sintomas = todayRec.sintomas || [];
    const allDays = Object.values(records);

    // Fatiga post-comida correlation
    const fatigaDays = allDays.filter(r=>(r.sintomas||[]).includes("Fatiga post-comida"));
    if(sintomas.includes("Fatiga post-comida") && fatigaDays.length >= 2) {
      recs.push({ic:"🔍", color:"#E8A87A",
        title:"Patrón detectado: Fatiga post-comida",
        msg:"Cuando marcas 'Fatiga post-comida', la energía de ese día suele bajar a 1-2. Es la señal de un pico de insulina por carbohidratos sin proteína.",
        accion:"Nunca comas carbos solos. La combinación proteína + grasa + carbos suaviza la curva glucémica."});
    }

    // Low focus days
    const lowFocusDays = allDays.filter(r=>(r.foco||3) <= 2);
    if((todayRec.foco||3) <= 2 && lowFocusDays.length >= 2) {
      recs.push({ic:"🧠", color:"#A89EC0",
        title:"Patrón: Foco bajo recurrente",
        msg:"Tu foco ha estado bajo varios días. El cerebro usa ácidos grasos para producir mielina — el aislante de tus neuronas. Sin suficientes grasas, la señal neuronal se vuelve lenta.",
        accion:"Revisa si las grasas de los últimos días estuvieron por debajo de " + Math.round((profile?.weight||63)*.9) + "g (tu objetivo diario)."});
    }

    // Luteal phase + low mood
    if(todayRec.fase==="lutea" && (todayRec.animo||3) <= 2) {
      recs.push({ic:"🌾", color:"#6BBF8E",
        title:"Fase lútea + ánimo bajo",
        msg:"Es biológicamente normal. La bajada de progesterona en la fase lútea reduce la serotonina. No es debilidad — es química.",
        accion:"Magnesio glicinato + chocolate 85% + reducir el cardio intenso. Tu cuerpo lo agradecerá."});
    }

    // Skin + piel
    const lowPielDays = allDays.filter(r=>(r.piel||3) <= 2);
    if((todayRec.piel||3) <= 2 && lowPielDays.length >= 2) {
      recs.push({ic:"✨", color:"#6BBF8E",
        title:"Patrón: Piel opaca frecuente",
        msg:"La piel opaca de forma recurrente es señal sistémica. Vitamina C (para colágeno), omega-3 (antiinflamatorio) y agua son la triada básica de la piel luminosa.",
        accion:profile?.conditions?.includes("smoker")
          ? "Fumadores necesitan 2x vitamina C. El tabaco destruye el colágeno activamente."
          : "500mg vitamina C + omega-3 diario. La diferencia se ve en 2-3 semanas."});
    }

    if(recs.length===0) {
      recs.push({ic:"📊", color:"#6BBF8E",
        title:"Sin patrones críticos detectados",
        msg:"Necesitas al menos 3-4 días registrados para que la app detecte correlaciones reales. Sigue registrando — los datos cuentan la historia.",
        accion:"Registra cómo te sientes cada día, aunque sea 30 segundos. La consistencia revela los patrones."});
    }
    return recs;
  };

  // Nutrition analysis using REAL macro data from meals
  const analyzeNutrition = () => {
    const tg = calcTargets(profile);
    const sintomas = todayRec.sintomas || [];
    const insights = [];

    // Get real macro totals from meals prop
    const tot = meals ? Object.values(meals).flat().reduce(
      (acc, item) => ({
        p: acc.p + (item.p||0),
        c: acc.c + (item.c||0),
        f: acc.f + (item.f||0),
        k: acc.k + (item.k||0),
        fi: acc.fi + (item.fi||0),
      }), {p:0,c:0,f:0,k:0,fi:0}
    ) : {p:0,c:0,f:0,k:0,fi:0};

    const pctProt = Math.round((tot.p/tg.protein)*100);
    const pctFat = Math.round((tot.f/tg.fat)*100);
    const pctCarb = Math.round((tot.c/tg.carbs)*100);
    const pctCal = Math.round((tot.k/tg.calories)*100);

    // Real macro analysis
    if(tot.k > 0) {
      // Protein check
      if(pctProt < 60) {
        insights.push({
          ic:"💪", color:"#E8A87A",
          title:`Proteína baja — ${Math.round(tot.p)}g de ${tg.protein}g (${pctProt}%)`,
          msg:`Te faltan ${Math.round(tg.protein-tot.p)}g de proteína para tu objetivo de hoy. Sin suficiente proteína, el cuerpo no puede reparar el músculo que trabajaste en el gym.`,
          accion:`Próxima comida: ${Math.round((tg.protein-tot.p)/2)}g de proteína. Una pechuga mediana (150g cocida) aporta ~46g.`
        });
      } else if(pctProt >= 90) {
        insights.push({
          ic:"✅", color:"#6BBF8E",
          title:`Proteína en objetivo — ${Math.round(tot.p)}g (${pctProt}%)`,
          msg:"Tu síntesis proteica está cubierta. El músculo tiene los materiales para crecer y recuperarse.",
          accion:"Mantén este patrón. La consistencia en proteína es lo que más diferencia hace en recomposición."
        });
      }

      // Fat check
      if(pctFat < 50) {
        insights.push({
          ic:"🧠", color:"#A89EC0",
          title:`Grasas bajas — ${Math.round(tot.f)}g de ${tg.fat}g (${pctFat}%)`,
          msg:"Las grasas producen hormonas sexuales y mielinizan las neuronas. Con perimenopausia, las grasas saludables son especialmente críticas para el equilibrio hormonal.",
          accion:`Agrega ${Math.round(tg.fat-tot.f)}g de grasa. ${Math.round((tg.fat-tot.f)/10)} cucharadas de aceite de oliva, o medio aguacate.`
        });
      }

      // Fiber check
      if(tot.fi < tg.fiber * 0.5) {
        insights.push({
          ic:"🌿", color:"#6BBF8E",
          title:`Fibra baja — ${Math.round(tot.fi)}g de ${tg.fiber}g`,
          msg:"La fibra alimenta el microbioma intestinal y regula la glucosa. Con poca fibra, los picos de insulina son más pronunciados.",
          accion:"Agrega vegetales cocidos o crudos en tu próxima comida. 160g de brócoli aportan ~8g de fibra."
        });
      }

      // Calorie check
      if(pctCal < 40 && new Date().getHours() > 14) {
        insights.push({
          ic:"⚡", color:"#EAC850",
          title:`Calorías bajas para este horario — ${Math.round(tot.k)} de ${tg.calories} kcal`,
          msg:"Son más de las 2pm y llevas menos del 40% de tus calorías. Comer muy poco activa el cortisol y ralentiza el metabolismo.",
          accion:"No te saltes comidas. Un déficit agudo en el día eleva el cortisol más que un exceso moderado."
        });
      }

    } else {
      insights.push({
        ic:"🥗", color:"#6BBF8E",
        title:"Sin registros de comida todavía",
        msg:"Registra tus comidas para obtener un análisis personalizado basado en tus macros reales del día.",
        accion:"Ve al tab de Registro y añade lo que has comido hoy."
      });
    }

    // Symptom-based additions
    if(profile?.conditions?.includes("smoker") && (todayRec.piel||3) <= 3) {
      insights.push({
        ic:"🚬", color:"#E8A87A",
        title:"Fumadora: déficit de vitamina C activo",
        msg:`El tabaco destruye ~30mg de vitamina C por cigarrillo. Hoy llevas un déficit estimado de ${10*30}mg solo por el tabaco.`,
        accion:"1000mg vitamina C divididos en dos tomas. No en ayunas."
      });
    }

    setNutriAnalysis(insights);
  };

  const EMOJIS_BY_VAL = (v) => {
    if(!v||v===0) return "·";
    if(v<=2) return "😞";
    if(v===3) return "😐";
    return "🙂";
  };

  const METRICS = [
    {key:"energia", label:"Energía", ic:"⚡"},
    {key:"foco", label:"Foco mental", ic:"🧠", showFase:true},
    {key:"sueno", label:"Calidad del sueño", ic:"😴"},
    {key:"piel", label:"Piel y cabello", ic:"✨"},
    {key:"digestion", label:"Digestión", ic:"🌿"},
    {key:"animo", label:"Ánimo general", ic:"🌟", showFase:true},
  ];

  const SINT_NEG = ["Hinchazón","Ansiedad por dulce","Dolor de cabeza","Calambres","Piel seca","Fatiga post-comida","Irritabilidad","Niebla mental"];
  const SINT_POS = ["Energía estable","Piel luminosa","Buen humor","Sin antojos"];

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>Bitácora</div>
        <span style={{fontSize:11,color:G.mut}}>{new Date().toLocaleDateString("es",{day:"numeric",month:"short"})}</span>
      </div>
      <div style={{fontSize:13,color:G.sft,marginBottom:12}}>¿Cómo te sientes hoy? Más allá del peso.</div>
      <div className="stab" style={{margin:"0 -20px 20px",paddingLeft:20}}>
        <button className={tabBit==="sintomas"?"on":""} onClick={()=>setTabBit("sintomas")}>📊 Síntomas</button>
        <button className={tabBit==="sueno"?"on":""} onClick={()=>setTabBit("sueno")}>😴 Sueño</button>
      </div>
      {tabBit==="sueno" && <SleepScreen profile={profile}/>}
      {tabBit==="sintomas" && <div>

      {/* Fase hormonal */}
      {profile?.gender!=="male" && (
        <div style={{background:"rgba(74,155,111,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Fase hormonal actual</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {FASES.map(f=>(
              <button key={f.id} onClick={()=>update("fase",f.id)}
                style={{flexShrink:0,padding:"8px 12px",borderRadius:10,fontSize:12,cursor:"pointer",
                  border:`1.5px solid ${(todayRec.fase||"folicular")===f.id?"#4A9B6F":"#254D3A"}`,
                  background:(todayRec.fase||"folicular")===f.id?"rgba(74,155,111,.15)":"transparent",
                  color:(todayRec.fase||"folicular")===f.id?"#6BBF8E":"#7A9E8A"}}>
                {f.ic} {f.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:11,color:G.sft,marginTop:8,lineHeight:1.5}}>
            <b style={{color:G.grl}}>{faseActual.days}</b> · {faseActual.desc}
          </div>
        </div>
      )}

      {/* Sliders */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Check-in de hoy</div>
        {METRICS.map(m=>{
          const val = todayRec[m.key]||3;
          return (
            <div key={m.key} style={{marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <span style={{fontSize:13,color:G.crm,fontWeight:500}}>{m.ic} {m.label}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {m.showFase && profile?.gender!=="male" && (
                    <span style={{fontSize:10,color:G.grn,background:"rgba(74,155,111,.1)",padding:"2px 7px",borderRadius:10}}>
                      {faseActual.ic} {faseActual.label}
                    </span>
                  )}
                  <span style={{fontSize:18}}>{EMOJIS_BY_VAL(val)}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:5}}>
                {[1,2,3,4,5].map(v=>{
                  const sel = val >= v;
                  const st = sliderBtnStyle(v, sel);
                  return (
                    <button key={v} onClick={()=>update(m.key, v)}
                      style={{flex:1,height:34,borderRadius:8,
                        border:`1.5px solid ${sel?st.border:"#254D3A"}`,
                        background:sel?st.bg:"rgba(37,77,58,.2)",
                        cursor:"pointer",fontSize:12,
                        color:sel?st.color:"#4A9B6F",
                        fontWeight:600,transition:"all .15s"}}>
                      {v}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Tags separados */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>¿Qué notas hoy?</div>

        <div style={{fontSize:11,color:G.err,letterSpacing:.5,marginBottom:6}}>Síntomas</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
          {SINT_NEG.map(s=>{
            const on = (todayRec.sintomas||[]).includes(s);
            return (
              <button key={s} onClick={()=>toggleSintoma(s)}
                style={{padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",
                  border:`1.5px solid ${on?"#C8845A":"#254D3A"}`,
                  background:on?"rgba(200,132,90,.15)":"transparent",
                  color:on?"#E8A87A":"#7A9E8A",transition:"all .2s"}}>
                {s}
              </button>
            );
          })}
        </div>

        <div style={{fontSize:11,color:G.grn,letterSpacing:.5,marginBottom:6}}>Estados positivos</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {SINT_POS.map(s=>{
            const on = (todayRec.sintomas||[]).includes(s);

              <button key={s} onClick={()=>toggleSintoma(s)}
                style={{padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",

      <div className="card" style={{marginBottom:12}}>

          placeholder="¿Algo especial hoy? ¿Cómo te sentiste en el gym? ¿Qué funcionó?"
          style={{width:"100%",height:72,background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
            padding:"10px 14px",color:G.txt,fontSize:13,resize:"none",outline:"none",lineHeight:1.6}}/>
      </div>

      {/* 7-day trend con líneas */}
      {last7.some(d=>d.hasData) && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Tendencia 7 días</div>
          <div style={{fontSize:11,color:G.sft,marginBottom:12}}>Toca un día para ver contexto nutricional.</div>
          <svg viewBox="0 0 300 90" style={{width:"100%",height:90,overflow:"visible"}}>
            {/* Grid lines */}
            {[1,2,3,4,5].map(v=>(
              <line key={v} x1="0" y1={90-v*16} x2="300" y2={90-v*16}
                stroke="#254D3A" strokeWidth=".5" strokeDasharray="3,3"/>
            ))}
            {/* Lines for each metric */}
            {[
              {key:"energia",color:"#E8A87A"},
              {key:"foco",color:"#A89EC0"},
              {key:"piel",color:"#6BBF8E"},
            ].map(({key,color})=>{
              const pts = last7.map((d,i)=>({x:i*(300/6),y:d[key]>0?90-d[key]*16:null}));
              const path = pts.reduce((acc,p,i)=>{
                if(p.y===null) return acc;
                const prev = pts.slice(0,i).reverse().find(pp=>pp.y!==null);
                return acc + (prev?`L${p.x},${p.y}`:`M${p.x},${p.y}`);
              },"");
              return (
                <g key={key}>
                  <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  {pts.map((p,i)=>p.y!==null&&(
                    <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} stroke="#1A3328" strokeWidth="1.5"/>

                </g>

          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            {last7.map((d,i)=>(
