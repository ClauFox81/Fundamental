function AuthScreen({onAuth}) {
  const [mode, setMode] = useState("login"); // login | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const handle = async () => {
    if(!email.trim() || !password.trim()) { setError("Ingresa tu email y contraseña."); return; }
    setLoading(true); setError(""); setSuccess("");
    try {
      const res = mode === "login" ? await sbSignIn(email, password) : await sbSignUp(email, password);
      if(res.error || res.error_description) {
        setError(res.error_description || res.error?.message || "Error de autenticación.");
      } else if(mode === "signup") {
        setSuccess("✓ Cuenta creada. Revisa tu email para confirmar.");
      } else {
        // Login successful
        const token = res.access_token;
        const userId = res.user?.id;
        if(token && userId) {
          await window.storage.set("sb_token", token);
          await window.storage.set("sb_user_id", userId);
          onAuth({token, userId, email: res.user?.email});
        } else {
          setError("No se pudo iniciar sesión. Intenta de nuevo.");
        }
      }
    } catch(e) {
      setError("Error de conexión. Intenta de nuevo.");
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div className="serif" style={{fontSize:32,fontWeight:500,color:G.crm,marginBottom:4}}>Fundamental</div>
        <div style={{fontSize:13,color:G.sft}}>by Claudia Fox</div>
      </div>

      <div style={{width:"100%",maxWidth:400}}>
        <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:6}}>
          {mode==="login"?"Bienvenida de nuevo.":"Crea tu cuenta."}
        </div>
        <div style={{fontSize:13,color:G.sft,marginBottom:24,lineHeight:1.6}}>
          {mode==="login"
            ? "Tus datos te esperan exactamente donde los dejaste."
            : "Tu cuerpo, tu mente, tu identidad. Todo en un lugar."}
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,color:G.mut,display:"block",marginBottom:6}}>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            placeholder="tu@email.com"
            style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
              padding:"12px 16px",color:G.crm,fontSize:15,outline:"none"}}/>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:G.mut,display:"block",marginBottom:6}}>Contraseña</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
            placeholder="••••••••"
            onKeyDown={e=>e.key==="Enter"&&handle()}
            style={{width:"100%",background:G.sur,border:`1.5px solid ${G.bor}`,borderRadius:10,
              padding:"12px 16px",color:G.crm,fontSize:15,outline:"none"}}/>
        </div>

        {error && <div style={{color:G.err,fontSize:13,marginBottom:14,lineHeight:1.5}}>{error}</div>}
        {success && <div style={{color:G.grn,fontSize:13,marginBottom:14,lineHeight:1.5}}>{success}</div>}

        <button onClick={handle} disabled={loading}
          style={{width:"100%",background:loading?"rgba(74,155,111,.3)":G.grn,
            color:"#fff",border:"none",borderRadius:12,padding:"14px",
            fontSize:15,fontWeight:600,cursor:loading?"wait":"pointer",marginBottom:14}}>
          {loading?"Cargando...":(mode==="login"?"Entrar":"Crear cuenta")}
        </button>

        <button onClick={()=>{setMode(m=>m==="login"?"signup":"login");setError("");setSuccess("");}}
          style={{width:"100%",background:"transparent",border:"none",
            color:G.sft,fontSize:13,cursor:"pointer",padding:"8px"}}>
          {mode==="login"?"¿No tienes cuenta? Crear una →":"¿Ya tienes cuenta? Entrar →"}
        </button>
      </div>
    </div>
  );
}

        {screen==="recetas"&&<RecetasScreen/>}
        {screen==="supps"&&<SuppsOnlyScreen profile={profile}/>}
        {screen==="metrics"&&<MetricsScreen profile={profile}/>}
        {screen==="bitacora"&&<BitacoraScreen profile={profile} meals={meals} onNavigate={setScreen} onBitacoraUpdate={(bl)=>setBitacoraLog(bl)}/>}
        {screen==="sleep"&&<SleepScreen profile={profile}/>}
        {screen==="healing"&&<HealingScreen profile={profile} onNavigate={setScreen} onPremiseSaved={(p)=>{setPremise(p);save(PREMISE_KEY,p);}} onHealingUpdate={(hl)=>setHealingLog(hl)}/>}
        {screen==="blog"&&<BlogScreen/>}
        {screen==="recetas"&&<RecetasScreen/>}
        {screen==="mas"&&(
          <div className="fi">
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Más</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Recursos y herramientas</div>
            {[
              {ic:"🍳",title:"Recetas",sub:"23 recetas con macros calculados",screen:"recetas"},
              {ic:"📖",title:"Blog",sub:"Artículos de Claudia Fox",screen:"blog"},
              {ic:"💊",title:"Suplementos",sub:"Protocolo personalizado para tu perfil",screen:"supps"},
              {ic:"📊",title:"Métricas",sub:"Agua, peso, pasos, ciclo y más",screen:"metrics"},
            ].map(item=>(
              <button key={item.screen} onClick={()=>setScreen(item.screen)}
                style={{width:"100%",background:G.card,border:`1px solid ${G.bor}`,borderRadius:14,
                  padding:"16px",cursor:"pointer",textAlign:"left",display:"flex",gap:14,
                  alignItems:"center",marginBottom:10,transition:"all .2s"}}>
                <span style={{fontSize:28,flexShrink:0}}>{item.ic}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.title}</div>
                  <div style={{fontSize:12,color:G.sft}}>{item.sub}</div>
                </div>
                <span style={{marginLeft:"auto",color:G.mut,fontSize:18}}>›</span>
              </button>
            ))}
          </div>
        )}
        {screen==="profile"&&<ProfileScreen profile={profile} onSave={saveProfile}/>}
      </div>

      {/* Bottom nav */}
      <div className="bnav" style={{left:0,right:0,maxWidth:480,margin:"0 auto"}}>
        {NAV.map(n=>(
          <button key={n.id} className={`ni${screen===n.id?" on":""}`} onClick={()=>setScreen(n.id)}>
            <span className="ico">{n.ic}</span>
            <span className="nlb">{n.l}</span>
          </button>
        ))}
      </div>

      {toast&&<Toast msg={toast}/>}
      {showCode&&<CodeModal profile={profile} onClose={()=>setShowCode(false)} onLoad={async(p)=>{setProfile(p);await save("profile",p);setShowCode(false);showToast(`Bienvenida ${p.name}! ✓`);setScreen("home");}}/>}
    </div>
  );
}

const domRoot = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(domRoot);
reactRoot.render(React.createElement(App));

  </script>
  <script>
    const obs=new MutationObserver(()=>{
      if(document.getElementById('root').children.length>0){
        document.getElementById('loader').style.display='none';
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true});
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.style.display='none';},15000);
  </script>
</body>
</html>
