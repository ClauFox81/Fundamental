  {
    id:"carbos-noche",
    tag:"Mitos",
    title:"Comer carbos de noche engorda",
    preview:"El mito que ha arruinado más cenas que cualquier dieta. Lo que determina si engordas no es el reloj.",
    content:"Pocas creencias han generado más culpa innecesaria a la hora de cenar que esta. La imagen de los carbohidratos acumulándose como grasa mientras duermes es poderosa — y completamente incorrecta.\n\nLo que determina si engordas no es el reloj\n\nEl cuerpo no tiene un interruptor metabólico que se activa a las 7pm y convierte los carbos en grasa. Lo que determina la composición corporal es el balance energético total del día — cuánto comiste versus cuánto gastaste. Si ese balance es neutro o en déficit, no importa a qué hora comiste los carbos: no se almacenan como grasa.\n\nEl timing de los carbos afecta el rendimiento y la recuperación. No la composición corporal a largo plazo.\n\nLo que pasa en el cuerpo de noche\n\nDurante el sueño el cuerpo no entra en modo hibernación. El metabolismo baja entre un 10 y 15% pero sigue activo — reparando tejidos, sintetizando proteínas, regulando hormonas, consolidando memoria. Para todo eso necesita energía.\n\nLos carbos que comes en la cena tienen tres destinos posibles: reponer el glucógeno muscular gastado durante el entrenamiento del día, alimentar la síntesis proteica muscular que ocurre principalmente durante el sueño, o almacenarse como glucógeno hepático — reserva de energía para el cerebro durante la noche.\n\nSolo si todos esos tanques están llenos y el balance calórico total del día está en exceso, el sobrante se convierte en grasa. El problema no son los carbos nocturnos — es el exceso calórico.\n\nDe dónde vino el mito\n\nHay una base parcial de verdad que se distorsionó: la sensibilidad a la insulina es ligeramente menor en la noche que en la mañana. Eso significa que el mismo carbo procesado crea un pico glucémico un poco más alto por la noche.\n\nPero eso aplica principalmente a carbos de alto índice glucémico — pan blanco refinado, cereales azucarados, galletas, jugos de fruta, bebidas deportivas azucaradas. En alguien que entrena, la sensibilidad a la insulina muscular después del ejercicio compensa completamente esa diferencia. Y para carbos de calidad — arroz integral, avena, camote, papa cocida, legumbres, quinoa, frutas enteras — la diferencia es clínicamente insignificante.\n\nLo que cambia cuando dejas de restringir la cena\n\nEl impacto más inmediato no es físico — es psicológico. Y eso importa más de lo que parece.\n\nCuando dejas de tratar la cena como una amenaza, desaparece la negociación mental constante de ¿puedo comerme esto? que drena energía cognitiva y genera ansiedad alrededor de la comida. Comer con presencia en vez de con culpa cambia la relación con la nutrición a largo plazo — y la adherencia es lo único que realmente determina los resultados.\n\nFísicamente: si entrenabas durante el día con carbos restringidos de noche, probablemente amanecías con glucógeno a medias. Entrenamientos con menos energía, recuperación más lenta, más fatiga acumulada. Agregar carbos en la cena cierra ese ciclo correctamente.\n\nY el sueño mejora. Los carbos facilitan la síntesis de serotonina y melatonina. Cenar con carbos de calidad no interrumpe el sueño — en muchos casos lo profundiza.\n\nLa trampa real de evitar carbos de noche\n\nNo es que engorde comerlos. Es que no comerlos en la cena suele llevar a terminar el día con hambre — y el hambre nocturna es la que más frecuentemente derrumba cualquier plan. La restricción crea el atracón que crea la culpa que crea más restricción.\n\nComer una cena completa con carbos de calidad no es debilidad. Es estrategia.",
    takeaways:["El balance calórico total del día determina la composición — no el horario","Los carbos nocturnos reponen glucógeno, alimentan síntesis proteica y mejoran el sueño","El índice glucémico importa más que el horario — elige carbos de calidad","La restricción nocturna genera más hambre, más ansiedad y menos adherencia"],
    myths:["De noche no como carbos","Ceno solo proteína y verdura","Los carbos se van directo a la grasa","Como poco en la noche","El desayuno es la comida más importante","Después de las 6pm nada de carbos","Me acuesto con hambre pero es lo correcto"]
  },
  {
    id:"cardio",
    tag:"Mitos",
    title:"Necesito hacer más cardio para ver resultados",
    preview:"La trampa más cara del fitness femenino. Lo que el cardio excesivo le hace al cuerpo — y qué hacer en cambio.",
    content:"Cuando los resultados no llegan, el instinto casi universal es hacer más cardio. Más tiempo en la caminadora, más clases de spinning, más sesiones de HIIT. La lógica parece impecable — más calorías quemadas, más grasa perdida.\n\nEl problema es que esa lógica ignora lo que el cuerpo hace cuando se le impone demasiado cardio. Y lo que hace es exactamente lo contrario de lo que buscas.\n\nLa aritmética que parece correcta pero no lo es\n\nSí, el cardio quema calorías. Una sesión de 45 minutos de cardio moderado quema entre 250 y 400 calorías. Matemáticamente parece que más cardio = más déficit = más pérdida de grasa.\n\nPero el cuerpo no es una calculadora. Es un sistema adaptativo que responde al estrés de formas que ninguna ecuación simple captura.\n\nLo que el cardio excesivo le hace al cuerpo\n\nCuando el cardio supera la capacidad de recuperación, el cortisol — la hormona del estrés — se eleva crónicamente. El cortisol elevado de forma sostenida hace tres cosas que destruyen la composición corporal.\n\nAumenta la degradación muscular. El cuerpo cataboliza músculo para obtener glucosa rápida. Menos músculo = metabolismo más lento.\n\nAumenta la retención de agua. Cortisol alto dispara aldosterona, que retiene sodio y agua. La báscula sube o se estanca — no por grasa sino por agua.\n\nAumenta el apetito por azúcar y grasa. El cortisol activa los centros de recompensa del cerebro que buscan energía rápida. Hacer más cardio para compensar lo que comes puede estar creando el hambre que te lleva a comer más.\n\nLa diferencia entre cardio y entrenamiento de fuerza\n\nEl cardio quema calorías durante la sesión. Cuando terminas, el gasto extra para. El metabolismo vuelve a la línea base en pocas horas.\n\nEl entrenamiento de fuerza quema calorías durante la sesión Y eleva el metabolismo basal durante 24 a 48 horas después — el efecto EPOC (consumo de oxígeno post-ejercicio). Más músculo construido = más calorías quemadas en reposo de forma permanente.\n\nUna mujer con 2kg más de músculo quema entre 50 y 100 calorías adicionales por día sin hacer nada. En un año eso equivale a entre 18,000 y 36,500 calorías — sin una sola sesión de cardio extra.\n\nLas zonas de frecuencia cardíaca — y por qué la mayoría hace la zona equivocada\n\nNo todo el cardio estresa el cuerpo igual. La intensidad determina qué combustible usa, qué hormonas activa y qué tan rápido puedes recuperarte.\n\nZona 1 (50–60% FC máx): Caminata suave. Recuperación activa. El cuerpo usa casi exclusivamente grasa como combustible. Cortisol mínimo.\n\nZona 2 (60–70% FC máx): Trote ligero, bici suave, ritmo de conversación. La zona de oro para composición corporal. Quema grasa como combustible primario, cortisol bajo, se puede hacer frecuentemente sin comprometer la recuperación. Mejora la capacidad mitocondrial — el motor metabólico del músculo.\n\nZona 3 (70–80% FC máx): Cardio moderado-intenso. El cuerpo empieza a usar más glucosa que grasa. Cortisol empieza a subir. La zona donde pasa la mayoría del cardio de fat loss — paradójicamente no es la más efectiva para ese objetivo.\n\nZona 4 (80–90% FC máx): Trabajo duro. Umbral de lactato. Muy efectivo para rendimiento cardiovascular. Alto costo de recuperación. Cortisol elevado.\n\nZona 5 (90–100% FC máx): Máximo esfuerzo. HIIT real. Muy corto por definición. Útil en dosis pequeñas, devastador en exceso.\n\nLa ironía: la mayoría de las mujeres que hacen cardio para bajar de peso trabajan en Zona 3 — demasiado intensa para quemar grasa eficientemente, demasiado suave para dar los beneficios cardiovasculares de la Zona 4-5, y suficientemente estresante para elevar el cortisol.\n\nEl protocolo que funciona para composición: 2-3 sesiones semanales en Zona 2 de 30-45 minutos. Deberías poder mantener una conversación. Si no puedes, estás en la zona equivocada.\n\n¿Entonces el cardio es malo?\n\nNo. El cardio tiene beneficios reales — salud cardiovascular, bienestar mental, longevidad. El problema no es el cardio en sí. Es usarlo como herramienta principal de composición corporal cuando no lo es.\n\nEl cardio óptimo para composición es el que no compromete la recuperación del entrenamiento de fuerza. Generalmente eso es 2-3 sesiones semanales de 20-40 minutos en Zona 2. Lo que no construye resultados es la hora diaria de cardio con poco o nada de pesas.\n\nLo que pasa cuando cambias el enfoque\n\nSemanas 1–2: Si venías haciendo cardio excesivo, bajar el volumen y agregar fuerza puede hacer que el cortisol baje — y con él, la retención de agua. La báscula baja antes de que el músculo cambie.\n\nSemanas 3–6: La fuerza mejora. Las primeras adaptaciones neurológicas ocurren. Te sientes más capaz en el gym.\n\nMes 2–4: La composición empieza a cambiar visiblemente. Más definición, ropa que cae diferente, más energía durante el día porque el sistema nervioso no está en déficit crónico.",
    takeaways:["El cardio excesivo eleva cortisol — degrada músculo, retiene agua y aumenta el hambre","La Zona 2 es la zona de oro para composición: quema grasa, cortisol bajo, buena recuperación","El entrenamiento de fuerza eleva el metabolismo 24-48h después — el cardio no","2-3 sesiones de 30-45 min en Zona 2 es todo el cardio que necesitas para composición"],
    myths:["Necesito sudar más","Una hora de cardio al día","El HIIT quema más grasa","Cardio en ayunas","Si no me duelen las piernas no sirvió","Más cardio para compensar","El cardio es lo que adelgaza","Las pesas no queman grasa"]
  },
  {
    id:"proteina-rinones",
    tag:"Mitos",
    title:"La proteína daña los riñones",
    preview:"El mito que mantiene a millones de mujeres en déficit proteico crónico — y de dónde viene realmente.",
    content:"Este es probablemente el mito más costoso de todos. No porque sea el más creído — sino porque viene avalado por figuras de autoridad. Médicos, nutricionistas tradicionales, familiares bien intencionados. No comas tanta proteína que eso daña los riñones.\n\nLa ciencia dice algo completamente diferente.\n\nDe dónde viene el mito — y por qué se malinterpretó\n\nEl origen es legítimo. En personas con enfermedad renal crónica preexistente, una dieta alta en proteína puede acelerar el deterioro de la función renal. Eso es real y está bien documentado.\n\nEl error fue extrapolar esa recomendación clínica — diseñada para personas enfermas — a personas sanas. Es como decir que porque los diabéticos deben evitar el azúcar, todos deberían hacerlo.\n\nEn riñones sanos, la proteína alta no causa daño renal. Punto.\n\nLo que realmente pasa en los riñones con proteína alta\n\nLos riñones procesan el nitrógeno que resulta de metabolizar proteína — lo convierten en urea y lo excretan. Con más proteína, trabajan más. Eso se llama hiperfiltración glomerular.\n\nLa hiperfiltración no es daño. Es adaptación funcional — exactamente como el corazón late más rápido cuando corres. El hecho de que un órgano trabaje más no significa que se esté deteriorando.\n\nLos estudios en personas sanas muestran que ingestas de hasta 2.8g de proteína por kg de peso corporal no producen ningún marcador de daño renal — ni en el corto ni en el largo plazo.\n\nLa única precaución real\n\nHidratación. Con más proteína el cuerpo necesita más agua para excretar la urea. No es complicado — tomar suficiente agua resuelve completamente esa ecuación. No es una contraindicación, es una instrucción de uso.\n\nLo que pasa cuando aumentas la proteína correctamente\n\nSemana 1–2: Puede haber un ajuste digestivo si el cambio es brusco. Aumentar gradualmente — 20-30g más por semana — lo evita completamente.\n\nSemana 2–4: La saciedad mejora notablemente. La proteína es el macronutriente más saciante — activa péptidos intestinales que le dicen al cerebro que hay suficiente energía disponible. Menos hambre sin restringir calorías.\n\nMes 1–2: La composición corporal empieza a cambiar. La proteína adecuada preserva el músculo en déficit calórico, lo que significa que el peso que pierdes es más grasa y menos músculo que con proteína baja.\n\nLargo plazo: Menor pérdida de masa muscular con la edad. En perimenopausia y postmenopausia, donde la sarcopenia es un riesgo real, la proteína alta es protección, no riesgo.\n\n¿Cuánta proteína es alta?\n\nLa recomendación oficial de 0.8g por kg de peso corporal fue diseñada para evitar deficiencia — no para optimizar composición, salud muscular o rendimiento.\n\nPara recomposición corporal activa: 1.6 a 2.2g por kg. Para perimenopausia con entrenamiento de fuerza: 2.0 a 2.4g por kg. El máximo estudiado sin efectos adversos en personas sanas: 2.8g por kg.\n\nSi pesas 64kg y entrenas, 128 a 140g de proteína al día no es exceso. Es exactamente lo que la biología pide.\n\nCómo se ven 140g de proteína en un día real\n\nUna de las razones por las que las mujeres no llegan a su objetivo proteico no es el miedo — es que simplemente no saben cómo se ve en la práctica. 140g suena a mucho hasta que lo distribuyes.\n\nDesayuno: 3 huevos + 1 taza de yogur griego natural → 35g. Almuerzo: 150g pechuga de pollo + ½ taza de lentejas → 45g. Snack: 1 scoop de proteína de suero → 25g. Cena: 150g salmón o carne magra → 35g. Total: 140g. Sin obsesionarse, sin pesarlo todo, sin comer de forma antinatural.\n\nY sobre el mito de los 30g por comida\n\nCircula mucho la idea de que el cuerpo solo puede absorber 30g de proteína en una sola comida y el resto se desperdicia o se convierte en grasa. No es así.\n\nLo que los estudios originales mostraron es que la síntesis proteica muscular tiene un techo de estimulación por dosis. Pero absorción y síntesis muscular no son lo mismo. El cuerpo absorbe y usa toda la proteína que ingieres — solo que a través de distintas vías y en distintos tiempos. Una comida de 70g de proteína simplemente tarda más horas en procesarse que una de 30g.\n\nDistribuir la proteína en 3-4 comidas es ideal para maximizar la síntesis muscular a lo largo del día. Pero si en una comida comes 50 o 60g, no se desperdicia nada.\n\nLo que nadie te dice sobre el miedo a la proteína\n\nHay algo profundamente irónico en tener miedo de comer proteína cuando estás en la etapa de tu vida que más la necesita. Perimenopausia es exactamente el momento donde el músculo se vuelve más difícil de construir y más fácil de perder — y la proteína es el único nutriente que tiene el poder directo de protegerlo.\n\nEl miedo a la proteína no es tuyo. Te lo enseñaron. Alguien que aprendió una recomendación diseñada para enfermos renales y la aplicó a mujeres sanas sin cuestionarla.\n\nComer suficiente proteína no es exceso. Es exactamente lo que tu cuerpo lleva años esperando que le des.",
    takeaways:["En riñones sanos, hasta 2.8g/kg no produce ningún marcador de daño renal","La hiperfiltración es adaptación funcional, no daño — igual que el corazón al correr","El cuerpo absorbe toda la proteína que ingieres — los 30g por comida es un mito","140g de proteína al día es completamente alcanzable con comida real"],
    myths:["Tanta proteína daña los riñones","Con 0.8g por kilo es suficiente","Solo 30g por comida se absorben","La proteína animal es tóxica","El exceso de proteína se convierte en grasa","Mi médico me dijo que bajara","La proteína es para atletas","Mucha proteína es mala para los huesos"]
  },
  {
    id:"dolor-sudor",
    tag:"Mitos",
    title:"Si no sudo o me duele, no funcionó",
    preview:"El mito que convirtió el entrenamiento en castigo — y por qué el sufrimiento no es un indicador de efectividad.",
    content:"Hay una narrativa muy arraigada en el fitness que equipara el sufrimiento con la efectividad. Si no quedaste destruida, si no te duelen los músculos al día siguiente, si no sudaste — no sirvió de nada.\n\nEsta narrativa no solo es incorrecta. Es activamente dañina.\n\nEl sudor no es un indicador de nada\n\nEl sudor es el mecanismo de termorregulación del cuerpo. Sudas para bajar la temperatura corporal — no para quemar grasa, no para desintoxicarte, no para indicar que el entrenamiento fue efectivo.\n\nLa cantidad de sudor depende de la temperatura ambiente, la humedad, tu genética, tu nivel de hidratación y qué tan aclimatado está tu cuerpo al ejercicio. Una persona que entrena regularmente suda más y más rápido que una sedentaria — no porque trabaje más duro, sino porque su sistema de termorregulación es más eficiente.\n\nPuedes hacer una sesión de fuerza perfectamente ejecutada, con cargas progresivas, en un gimnasio con aire acondicionado, sin sudar significativamente — y haber dado exactamente el estímulo que el músculo necesita para crecer.\n\nEl dolor muscular no es progreso — es daño\n\nEl dolor que sientes uno o dos días después de entrenar se llama DOMS — dolor muscular de aparición tardía. Es causado por microdesgarros en las fibras musculares, principalmente en la fase excéntrica del movimiento.\n\nEl DOMS no es una señal de que el músculo creció. Es una señal de que el músculo recibió más estrés del que estaba adaptado a manejar. Ocurre más cuando haces ejercicios nuevos, cuando aumentas el volumen bruscamente o cuando llevas tiempo sin entrenar. Un atleta avanzado que entrena consistentemente puede casi no sentir DOMS — no porque sus entrenamientos sean menos efectivos, sino porque su cuerpo está adaptado.\n\nBuscar el dolor como indicador de éxito lleva a entrenar de formas que priorizan el daño sobre el estímulo óptimo. No es lo mismo.\n\nLo que sí indica que el entrenamiento funcionó\n\nProgresión de carga: pudiste levantar más peso o hacer más repeticiones que la semana pasada. Calidad de ejecución: completaste las series con buena técnica sin comprometer el movimiento. Recuperación adecuada: al día siguiente tienes energía, no estás destruida. Tendencias en el tiempo: en semanas o meses, tu fuerza aumenta, tu composición mejora, tu rendimiento sube.\n\nEsos son los indicadores reales. No el charco de sudor ni el dolor al sentarte.\n\nLa trampa psicológica del no pain no gain\n\nCuando el sufrimiento se convierte en el objetivo, el entrenamiento deja de ser una herramienta de salud y se convierte en un mecanismo de castigo. Entrenar para castigarte por lo que comiste, para merecer el descanso, para compensar — esa relación con el ejercicio no es sostenible y tiene un costo mental real.\n\nEl entrenamiento más efectivo a largo plazo es el que puedes hacer consistentemente, del que puedes recuperarte bien y que no te genera ansiedad. La consistencia en el tiempo supera cualquier sesión heroica que te deja fuera de combate tres días.\n\nLo que pasa cuando entrenas con intención en vez de con castigo\n\nSemanas 1–2: Sin el DOMS extremo, la recuperación es más rápida. Puedes entrenar más frecuentemente con mejor calidad.\n\nSemanas 3–6: La progresión de carga se vuelve visible. Las cargas suben semana a semana — ese es el indicador real.\n\nMes 2 en adelante: La relación con el entrenamiento cambia. Deja de ser algo que soportas y se convierte en algo que eliges.\n\nEl entrenamiento no es deuda. Es inversión.\n\nDurante años el fitness le vendió a las mujeres la idea de que el cuerpo es algo que hay que domar, castigar y someter para que obedezca. Que el dolor es el precio que se paga por los resultados. Que si no sufriste, no te lo ganaste.\n\nEl cuerpo no responde mejor al castigo. Responde mejor a la consistencia, a la recuperación, al estímulo progresivo y al descanso. Exactamente las mismas condiciones que necesitas para hacer cualquier otra cosa bien en tu vida.\n\nEntrenar con intención — no con culpa — es la diferencia entre un hábito que dura y uno que se abandona en febrero.\n\nEsa narrativa no viene de la ciencia. Viene de una industria que necesita que sientas que nunca es suficiente.",
    takeaways:["El sudor es termorregulación, no indicador de efectividad","El DOMS indica daño adaptativo, no crecimiento — menos DOMS = más adaptado","El indicador real es la progresión de carga semana a semana","Consistencia supera cualquier sesión heroica que te destruye"],
    myths:["Si no me duele no sirvió","Más sudor más resultados","Tengo que quedar destruida","No sentí el músculo trabajar","Fue muy fácil","Solo me duele si hice bien","Sin dolor no hay ganancia","El gym debería doler"]
  },
  {
    id:"metabolismo-40",
    tag:"Mitos",
    title:"Después de los 40 el metabolismo se frena y ya",
    preview:"La creencia que convierte la edad en una sentencia. Tiene suficiente verdad para que la gente lo acepte — y suficiente mentira para que dejen de intentarlo.",
    content:"De todos los mitos del fitness, este es el más caro. No porque sea el más falso — sino porque tiene suficiente verdad para que la gente lo acepte sin cuestionarlo. Y cuando lo aceptas, dejas de intentarlo.\n\nLa parte verdadera\n\nSí, el metabolismo cambia con la edad. A partir de los 30 años el cuerpo pierde entre 3 y 8% de masa muscular por década si no hay intervención. El músculo es metabólicamente activo — consume calorías en reposo. Menos músculo significa metabolismo basal más bajo.\n\nEn perimenopausia, la caída del estrógeno agrega otra capa: redistribución de grasa hacia el área abdominal, mayor resistencia a la insulina, mayor dificultad para recuperarse del entrenamiento.\n\nTodo eso es real. Pero hay un detalle crítico que la narrativa popular omite completamente.\n\nLo que la narrativa omite\n\nUn estudio publicado en Science en 2021 — uno de los más grandes y rigurosos sobre metabolismo humano — analizó el gasto energético de más de 6,400 personas de 8 días a 95 años de edad. Los hallazgos cambiaron lo que la ciencia creía sobre el metabolismo y la edad.\n\nEl metabolismo no empieza a declinar a los 40. Ni a los 30. El metabolismo basal ajustado por masa corporal se mantiene estable entre los 20 y los 60 años. El declive real y significativo empieza después de los 60.\n\nLo que sí ocurre antes de los 60 es pérdida de masa muscular — que baja el metabolismo basal. Pero esa pérdida no es inevitable. Es consecuencia de la inactividad y la nutrición inadecuada. No de la edad per se.\n\nLa diferencia que lo cambia todo\n\nEl músculo es el órgano metabólico más importante del cuerpo. Y es el único que puedes construir activamente a cualquier edad.\n\nEstudios en mujeres de 50, 60 y 70 años que inician entrenamiento de fuerza muestran ganancias musculares comparables — en términos porcentuales — a las de mujeres de 25. El músculo no sabe cuántos años tienes. Responde al estímulo.\n\nUna mujer de 45 que empieza a entrenar con fuerza y come suficiente proteína no está luchando contra su biología. Está trabajando exactamente con ella.\n\nLo que sí cambia y requiere adaptación\n\nSer honesta sobre lo que sí cambia no es rendirse — es estrategia.\n\nLa recuperación tarda más. Lo que a los 25 tardaba 24 horas puede tardar 48. Eso no significa entrenar menos — significa programar mejor, dormir más y tomar la nutrición post-entrenamiento más en serio.\n\nLa ventana anabólica importa más. Con la caída del estrógeno, la síntesis proteica muscular es menos eficiente. Comer proteína de calidad cerca del entrenamiento — dentro de las 2 horas siguientes — tiene más impacto que a los 25.\n\nEl sueño se vuelve entrenamiento. En perimenopausia el sueño es cuando ocurre la mayor parte de la síntesis proteica y la regulación hormonal. Comprometer el sueño compromete los resultados de formas que a los 25 eran menos evidentes.\n\nLo que pasa cuando dejas de creer el mito\n\nSemanas 1–4: El sistema nervioso responde primero. Fuerza y coordinación mejoran antes de que el músculo cambie. Puedes sentir diferencia en el gym antes de verla en el espejo.\n\nMes 2–3: La composición empieza a cambiar. Con proteína adecuada y entrenamiento de fuerza consistente, el músculo se preserva o crece — independientemente de la edad.\n\nMes 4–6: El metabolismo responde. Más músculo activo significa más calorías quemadas en reposo. El ciclo virtuoso que la narrativa del metabolismo lento dice que es imposible después de los 40.\n\nLos 40 no son el principio del fin metabólico. Son el momento en que las variables que siempre importaron — proteína, fuerza, sueño, estrés — empiezan a importar más. El cuerpo no se rinde. Se vuelve más exigente con las condiciones.\n\nEso no es una condena. Es una instrucción de uso.",
    takeaways:["El metabolismo basal se mantiene estable entre los 20 y 60 años — lo confirma un estudio de 6,400 personas","La pérdida muscular es consecuencia de inactividad y mala nutrición, no de la edad per se","El músculo no sabe cuántos años tienes — responde al estímulo a cualquier edad","Después de los 40 la recuperación, la proteína y el sueño importan más, no menos"],
    myths:["Ya no puedo como antes","El metabolismo lento de los 40","Es la edad","Antes bajaba más fácil","Ya para qué","Mi cuerpo ya no responde","Es la menopausia","Después de los 40 todo cambia","Yo antes era delgada"]
  },

function CompareSlider({photoA, photoB, labelA, labelB, onClose}) {
  const [pos, setPos] = useState(50);
  const containerRef = useRef(null);
  const dragging = useRef(false);

  const getX = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.min(Math.max(0, ((clientX - rect.left) / rect.width) * 100), 100);
  };
  const onStart = (e) => { dragging.current = true; setPos(getX(e)); };
  const onMove  = (e) => { if(dragging.current){ e.preventDefault(); setPos(getX(e)); }};
  const onEnd   = ()  => { dragging.current = false; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,
      background:"#000",zIndex:200,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",
        alignItems:"center",background:"rgba(0,0,0,0.8)"}}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{labelA}</div>
        <div style={{color:G.terra,fontSize:11,fontWeight:600,
          letterSpacing:"0.1em",textTransform:"uppercase"}}>Desliza para comparar</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{labelB}</div>
      </div>
      {/* Slider */}
      <div ref={containerRef}
        style={{flex:1,position:"relative",overflow:"hidden",
          cursor:"col-resize",userSelect:"none"}}
        onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
        onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>
        {/* Photo B — background (after) */}
        <img src={photoB} style={{position:"absolute",top:0,left:0,
          width:"100%",height:"100%",objectFit:"cover"}}/>
        {/* Photo A — clipped (before) */}
        <div style={{position:"absolute",top:0,left:0,
          width:pos+"%",height:"100%",overflow:"hidden"}}>
          <img src={photoA} style={{position:"absolute",top:0,left:0,
            width:containerRef.current?containerRef.current.offsetWidth+"px":"100vw",
            height:"100%",objectFit:"cover",maxWidth:"none"}}/>
        </div>
        {/* Divider line */}
        <div style={{position:"absolute",top:0,bottom:0,
          left:"calc("+pos+"% - 1px)",width:2,
          background:"#fff",boxShadow:"0 0 8px rgba(0,0,0,0.8)"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",
            transform:"translate(-50%,-50%)",width:40,height:40,
            borderRadius:"50%",background:"#fff",
            boxShadow:"0 2px 12px rgba(0,0,0,0.4)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:16,color:"#333",fontWeight:700}}>
            ⇔
          </div>
        </div>
        {/* Labels */}
        <div style={{position:"absolute",bottom:20,left:12,
          background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,
          padding:"4px 10px",borderRadius:20,pointerEvents:"none"}}>{labelA}</div>
        <div style={{position:"absolute",bottom:20,right:12,
          background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,
          padding:"4px 10px",borderRadius:20,pointerEvents:"none"}}>{labelB}</div>
      </div>
      <button onClick={onClose}
        style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",
          padding:"16px",fontSize:14,cursor:"pointer",letterSpacing:"0.05em"}}>
        Cerrar
      </button>
    </div>
  );
}

const ACHIEVEMENTS_KEY = "achievements";

function LogrosScreen({streak, workoutLog, meals, labCompletions, healingLog, profile, onShowToast}) {
  const [unlocked, setUnlocked] = useState([]);
  const [newBadge, setNewBadge] = useState(null);
  const [loaded, setLoaded] = useState(false);

  // Build data snapshot for badge checks
  const buildData = useCallback(async () => {
    const today = localDateStr();

    // Streak days
    let streakDays = 0;
    for(let i=0;i<150;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      if(streak.days?.includes(localDateStr(d))) streakDays++;
      else if(i>0) break;
    }

    // Workout count
    const workoutCount = Object.keys(workoutLog||{}).length;

    // Labs completed
    const labsCompleted = (labCompletions||[]).length;

    // Morning rituals
    const morningKeys = await window.storage.list("morning_done:");
    const morningCount = (morningKeys?.keys||[]).length;

    // Photos
    const photos = await loadJSON(PHOTOS_KEY);
    const photoCount = (photos||[]).length;

    // Protein today
    const tgt = calcTargets(profile);
    const tot = totals(meals);
    const proteinaHoy = Math.round(tot.p) >= tgt.protein;

    return {streakDays, workoutCount, labsCompleted, morningCount, photoCount, proteinaHoy};
  }, [streak, workoutLog, meals, labCompletions, profile]);

  useEffect(()=>{
    (async()=>{
      const saved = await loadJSON(ACHIEVEMENTS_KEY) || [];
      const data = await buildData();

      // Check for new unlocks
      const newUnlocks = [];
      for(const badge of BADGE_DEFS){
        const wasUnlocked = saved.some(u=>u.id===badge.id);
        const isUnlocked = badge.check(data);
        if(isUnlocked && !wasUnlocked){
          newUnlocks.push({id:badge.id, unlockedAt:new Date().toISOString()});
        }
      }

      if(newUnlocks.length > 0){
        const updated = [...saved, ...newUnlocks];
        await save(ACHIEVEMENTS_KEY, updated);
        setUnlocked(updated);
        // Show toast for first new unlock
        setNewBadge(newUnlocks[0]);
        setTimeout(()=>setNewBadge(null), 3000);
      } else {
        setUnlocked(saved);
      }
      setLoaded(true);
    })();
  },[]);

  const unlockedIds = new Set(unlocked.map(u=>u.id));
  const unlockedBadges = BADGE_DEFS.filter(b=>unlockedIds.has(b.id));
  const lockedBadges   = BADGE_DEFS.filter(b=>!unlockedIds.has(b.id));

  const formatDate = (iso) => {
    const d = new Date(iso);
    const months = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  };

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.sft}}>Cargando...</div>;

  return (
    <div className="fu" style={{paddingBottom:80}}>
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Mis Logros</div>
      <div style={{fontSize:13,color:G.sft,marginBottom:24,lineHeight:1.6}}>
        {unlockedBadges.length} de {BADGE_DEFS.length} desbloqueados
      </div>

      {/* New badge toast */}
      {newBadge && (()=>{
        const badge = BADGE_DEFS.find(b=>b.id===newBadge.id);
        return (
          <div style={{background:G.terra,borderRadius:20,padding:"12px 16px",
            marginBottom:20,display:"flex",alignItems:"center",gap:12,
            boxShadow:"0 8px 32px rgba(198,139,119,0.4)",animation:"fadeUp .4s ease"}}>
            <div style={{flexShrink:0}}
              dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,44)}}/>
            <div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.8)",letterSpacing:"0.1em",
                textTransform:"uppercase",marginBottom:2}}>¡Nuevo logro!</div>
              <div style={{fontSize:15,fontWeight:600,color:"#fff"}}>{badge.label}</div>
            </div>
          </div>
        );
      })()}

      {/* Unlocked */}
      {unlockedBadges.length > 0 && (
        <div>
          <div style={{fontSize:10,color:G.terra,letterSpacing:"0.14em",
            textTransform:"uppercase",fontWeight:600,marginBottom:16}}>
            Desbloqueados
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20,marginBottom:32}}>
            {unlockedBadges.map(badge=>{
              const u = unlocked.find(x=>x.id===badge.id);
              return (
                <div key={badge.id} style={{display:"flex",flexDirection:"column",
                  alignItems:"center",gap:8}}>
                  <div style={{transition:"transform .3s cubic-bezier(.34,1.4,.64,1)"}}
                    dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,80)}}/>
                  <div style={{fontSize:11,fontWeight:500,color:G.crm,
                    textAlign:"center",lineHeight:1.4}}>{badge.label}</div>
                  <div style={{fontSize:9,color:G.terra}}>
                    {u?.unlockedAt ? formatDate(u.unlockedAt) : ""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Empty state */}
      {unlockedBadges.length === 0 && (
        <div style={{textAlign:"center",padding:"24px 0 32px",
          background:G.card,borderRadius:20,marginBottom:24,
          boxShadow:"0 4px 24px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:32,marginBottom:10}}>🌱</div>
          <div style={{fontSize:14,fontWeight:500,color:G.crm,marginBottom:6}}>
            Tu colección empieza aquí
          </div>
          <div style={{fontSize:12,color:G.sft,lineHeight:1.6,padding:"0 20px"}}>
            Registra tu primer día para desbloquear tu primer logro.
          </div>
        </div>
      )}

      {/* Locked */}
      <div>
        <div style={{fontSize:10,color:G.mut,letterSpacing:"0.14em",
          textTransform:"uppercase",fontWeight:600,marginBottom:16}}>
          Por desbloquear
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}}>
          {lockedBadges.map(badge=>(
            <div key={badge.id} style={{display:"flex",flexDirection:"column",
              alignItems:"center",gap:8,opacity:1}}>
              <div style={{filter:"grayscale(1) opacity(0.3)"}}
                dangerouslySetInnerHTML={{__html:makeBadgeSVG(badge,80)}}/>
              <div style={{fontSize:11,fontWeight:400,color:G.mut,
                textAlign:"center",lineHeight:1.4}}>{badge.label}</div>
              <div style={{fontSize:9,color:G.mut,textAlign:"center"}}>{badge.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const playFreq = async(hz) => {
    if(audioCtxRef.current) { try{audioCtxRef.current.close();}catch(e){} audioCtxRef.current=null; }
    if(!hz) return;
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      audioCtxRef.current = ctx;
      // iOS requires resume after user gesture
      if(ctx.state === "suspended") await ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = hz;
      osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime+1);
      gain.gain.setValueAtTime(0.12, ctx.currentTime+6);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime+10);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+10);
    } catch(e) { console.log("Audio error:", e); }
  };

    if(audioCtxRef.current) { try{audioCtxRef.current.close();}catch(e){} audioCtxRef.current=null; }

        {/* Frecuencia */}
        <div style={{fontSize:9,color:"rgba(249,245,240,0.4)",letterSpacing:"0.15em",
          textTransform:"uppercase",marginBottom:10}}>Frecuencia</div>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:28,
          scrollbarWidth:"none"}}>

        <button onClick={()=>setScreen("ritual_4")} disabled={!selectedEmocion}

            background:selectedEmocion?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.05)",
            border:`1.5px solid ${selectedEmocion?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.1)"}`,

          Continuar →
        </button>
        <button onClick={()=>{stopAudio();setScreen("home");}}

  // ── RITUAL PANTALLA 4: TU SÍMBOLO + SELLAR ──────────────────────
  if(screen==="ritual_4") return (

          textTransform:"uppercase"}}>Operando desde</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:300,
          color:"#F9F5F0",letterSpacing:"0.05em"}}>
          {selectedEmocion}
        </div>

        {/* Símbolo */}
        {!sealDone ? (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"rgba(249,245,240,0.4)",letterSpacing:"0.1em",
              textTransform:"uppercase",marginBottom:16}}>Tu símbolo de hoy</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",marginBottom:20}}>

                <button key={s} onClick={()=>setSimbolo(s)}
                  style={{width:44,height:44,borderRadius:12,fontSize:22,cursor:"pointer",
                    border:`1.5px solid ${simbolo===s?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.2)"}`,
                    background:simbolo===s?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.06)",
                    color:"#F9F5F0",transition:"all .2s",display:"flex",
                    alignItems:"center",justifyContent:"center"}}>
                  {s}
                </button>
              ))}
            </div>
            <div style={{fontSize:11,color:"rgba(249,245,240,0.3)",marginBottom:8}}>
              o escribe el tuyo
            </div>
            <input value={simbolo} onChange={e=>setSimbolo(e.target.value.slice(0,3))}
              placeholder="..."
              style={{fontSize:32,textAlign:"center",width:80,background:"transparent",
                border:"none",borderBottom:"1px solid rgba(249,245,240,0.2)",
                color:"#F9F5F0",outline:"none",padding:"6px 0",
                fontFamily:"'Cormorant Garamond',serif"}}/>
          </div>
        ) : (
          <div style={{fontSize:80,animation:"pulse 2s ease-in-out infinite"}}>
            {simbolo||"✦"}
          </div>
        )}

        {/* Seal button */}
        {!sealDone ? (
          <div style={{textAlign:"center",marginTop:16}}>
            <div style={{fontSize:12,color:"rgba(249,245,240,0.4)",marginBottom:16}}>
              Mantén pulsado 5 segundos mientras sientes la emoción
            </div>
            <div style={{position:"relative",width:120,height:120,margin:"0 auto"}}>
              <svg width="120" height="120" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="52" fill="none"
                  stroke="rgba(249,245,240,0.1)" strokeWidth="6"/>
                <circle cx="60" cy="60" r="52" fill="none"
                  stroke="rgba(249,245,240,0.7)" strokeWidth="6"
                  strokeLinecap="round"
                  strokeDasharray={String(2*Math.PI*52)}
                  strokeDashoffset={2*Math.PI*52*(1-(sealTimer/5))}
                  transform="rotate(-90 60 60)"
                  style={{transition:"stroke-dashoffset .9s linear"}}/>
              </svg>
              <button
                onMouseDown={()=>{setSealPressed(true);setSealTimer(0);}}
                onMouseUp={()=>setSealPressed(false)}
                onTouchStart={()=>{setSealPressed(true);setSealTimer(0);}}
                onTouchEnd={()=>setSealPressed(false)}
                style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
                  justifyContent:"center",background:"transparent",border:"none",cursor:"pointer"}}>
                <div style={{fontSize:sealPressed?22:18,color:"#F9F5F0",
                  transition:"font-size .2s",userSelect:"none"}}>
                  {sealPressed ? sealTimer : "✦"}
                </div>
              </button>
            </div>
          </div>
        ) : (
          <div style={{textAlign:"center",animation:"fadeIn .5s ease"}}>
            <div style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",
              fontSize:18,color:"rgba(249,245,240,0.9)",lineHeight:1.8,maxWidth:280}}>
              "Suéltalo. Ya está en camino."
            </div>
          </div>
        )}
      </div>

      {sealDone&&(
        <button onClick={async()=>{
          stopAudio();
          // Auto-log as project evidence with #vision-ritual tag
          if(selectedProjForRitual) {
            try {
              const pd = await loadJSON(PROYECTOS_KEY);
              if(pd) {
                const today = localDateStr();
                const newReg = {
                  id:"reg_"+Date.now(),
                  proyectoId: selectedProjForRitual,
                  fecha: today,
                  evidencia: `Ritual de manifestación completado. Emoción: ${selectedEmocion||""}. Símbolo: ${simbolo||"✦"}.`,
                  tag:"vision-ritual",
                  metricas:{}
                };
                const updated = {...pd, registros:[...(pd.registros||[]), newReg]};
                await save(PROYECTOS_KEY, updated);
              }
            } catch(e){}
          }
          setSealDone(false);setSealTimer(0);
          setSelectedEmocion(null);setSimbolo("");setScreen("home");
        }}
          style={{width:"100%",maxWidth:340,background:"rgba(255,255,255,0.2)",
            border:"1.5px solid rgba(255,255,255,0.6)",borderRadius:16,
            padding:"16px",fontSize:14,color:"#F9F5F0",cursor:"pointer",
            boxShadow:"0 4px 24px rgba(0,0,0,0.15)"}}>
          Cerrar ritual
        </button>
      )}

      {!sealDone&&(
        <button onClick={()=>{stopAudio();setScreen("home");}}
          style={{background:"transparent",border:"none",
            color:"rgba(249,245,240,0.3)",fontSize:12,cursor:"pointer",padding:"8px"}}>
          Salir
        </button>
      )}
    </div>
  );

  return null;
}

function ManifestacionScreen({manif, diaryEntries, manifSaved, onSave}) {
  const [editMode, setEditMode] = useState(!manif);
  const [vision, setVision] = useState(manif?.vision || "");
  const [decl1, setDecl1] = useState(manif?.declaraciones?.[0] || "");
  const [decl2, setDecl2] = useState(manif?.declaraciones?.[1] || "");
  const [decl3, setDecl3] = useState(manif?.declaraciones?.[2] || "");

  // Evidencias from evening ritual
  const evidencias = (diaryEntries||[]).filter(e=>e.labN==="manif").reverse().slice(0,20);

  const handleSave = () => {
    const data = {
      vision: vision.trim(),
      declaraciones: [decl1.trim(), decl2.trim(), decl3.trim()].filter(Boolean),
      updatedAt: new Date().toISOString(),
    };
    onSave(data);
    setEditMode(false);
  };

  return (
    <div>
      {/* Edit mode */}
      {editMode ? (
        <div>
          <div style={{fontSize:13,color:G.sft,marginBottom:20,lineHeight:1.7}}>
            Escribe desde el futuro — como si ya existiera. No qué quieres, sino cómo es cuando ya llegó.
          </div>

          {/* Visión */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:G.terra,letterSpacing:"0.1em",
              textTransform:"uppercase",fontWeight:600,marginBottom:8}}>
              Mi Visión
            </div>
            <div style={{fontSize:12,color:G.sft,marginBottom:10,fontStyle:"italic"}}>
              ¿Cómo es tu vida cuando todo lo que estás construyendo ya existe?
            </div>
            <textarea value={vision} onChange={e=>setVision(e.target.value)}
              placeholder="Soy la mujer que..."
              style={{width:"100%",height:160,background:G.card,
                border:`1.5px solid ${vision?"rgba(198,139,119,.5)":G.bor}`,
                borderRadius:14,padding:"14px 16px",color:G.crm,fontSize:14,
                resize:"none",outline:"none",lineHeight:1.8,
                fontFamily:"'Fraunces',serif",fontStyle:"italic",boxSizing:"border-box"}}/>
          </div>

          {/* Declaraciones */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:"#A89EC0",letterSpacing:"0.1em",
              textTransform:"uppercase",fontWeight:600,marginBottom:8}}>
              Mis Declaraciones
            </div>
            <div style={{fontSize:12,color:G.sft,marginBottom:12,fontStyle:"italic"}}>
              Afirmaciones específicas de este capítulo. Cortas, poderosas, en presente.
            </div>
            {[[decl1,setDecl1,"Mi transformación ya está..."],[decl2,setDecl2,"Ya tengo..."],[decl3,setDecl3,"Soy capaz de..."]].map(([val,setter,ph],i)=>(
              <div key={i} style={{marginBottom:10}}>

                  placeholder={ph}
                  style={{width:"100%",height:70,background:G.card,
                    border:`1.5px solid ${val?"rgba(168,158,192,.4)":G.bor}`,
                    borderRadius:12,padding:"12px 14px",color:G.crm,fontSize:14,
                    resize:"none",outline:"none",lineHeight:1.7,
                    fontFamily:"'Fraunces',serif",fontStyle:"italic",boxSizing:"border-box"}}/>
              </div>
            ))}
          </div>

          <button onClick={handleSave} disabled={!vision.trim()}
            style={{width:"100%",background:vision.trim()?G.terra:"rgba(198,139,119,.3)",
              color:"#fff",border:"none",borderRadius:16,padding:"15px",
              fontSize:15,fontWeight:500,cursor:vision.trim()?"pointer":"not-allowed"}}>
            {manifSaved?"✓ Guardado":"Guardar mi Visión"}
          </button>
        </div>
      ) : (

          {/* Visión display */}

            border:"1px solid rgba(198,139,119,.2)",
            borderRadius:18,padding:"20px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

                textTransform:"uppercase",fontWeight:600}}>Mi Visión</div>

                style={{fontSize:11,color:G.sft,background:"transparent",

            </div>
            <div style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",
              fontSize:15,color:G.crm,lineHeight:1.9}}>
              "{manif?.vision}"

          </div>

          {/* Declaraciones display */}
          {(manif?.declaraciones||[]).length>0&&(

      )}
    </div>
  );
}


function EveningRitual({profile, meals, healingLog, sleepLog, workoutLog, gymDay, activeLab, onComplete, bitacoraLog, onBitacoraUpdate}) {
  const today = localDateStr();
  const [step, setStep] = useState(0);
  const [showCheckin, setShowCheckin] = useState(true); // evening pre-check
  const [breatherDone, setBreatherDone] = useState(false);
  const [coherencia, setCoherencia] = useState(null);
  const [aprendizaje, setAprendizaje] = useState("");
  const [conexion, setConexion] = useState("");
  const [manifText, setManifText] = useState("");
  const [manifData, setManifData] = useState(null);
  const [saving, setSaving] = useState(false);
  const [proyectosData, setProyectosData] = useState(null);
  const [proyEvidencias, setProyEvidencias] = useState({});
  const [selloPressed, setSelloPressed] = useState(false);
  const [selloProgress, setSelloProgress] = useState(0); // 0-100
  const [selloDone, setSelloDone] = useState(false);
  const selloInterval = React.useRef(null);
  const selloActive = React.useRef(false);

  const startSello = () => {
    if(selloDone) return;
    selloActive.current = true;
    setSelloPressed(true);
    setSelloProgress(0);
    selloInterval.current = setInterval(()=>{
      if(!selloActive.current){ clearInterval(selloInterval.current); return; }
      setSelloProgress(p=>{
        const next = p + (100/30); // 3s = 30 ticks of 100ms
        if(next >= 100){
          clearInterval(selloInterval.current);
          selloActive.current = false;
          setSelloDone(true);
          setSelloPressed(false);
          return 100;
        }
        return next;
      });
    }, 100);
  };

  const cancelSello = () => {
    if(selloDone) return;
    selloActive.current = false;
    clearInterval(selloInterval.current);
    setSelloPressed(false);
    setSelloProgress(0);
  };

  // Evening check-in state
  const [eComoFue, setEComoFue] = useState(null); // "bien" | "regular" | "dificil"
  const [eEnergiaTags, setEEnergiaTags] = useState([]);

  // Morning project focus (from bitacoraLog)
  const morningFocusId = bitacoraLog?.[today]?.morning?.proyectoFocus || null;
  const [morningProject, setMorningProject] = useState(null);

  useEffect(()=>{
    if(morningFocusId) {
      loadJSON(PROYECTOS_KEY).then(p=>{
        const proj = (p?.proyectos||[]).find(x=>x.id===morningFocusId);
        if(proj) setMorningProject(proj);
      });
    }
  },[morningFocusId]);

  // ── AUDIO ────────────────────────────────────────────────────────────
  const audioCtxRef = React.useRef(null);
  const [selectedSound, setSelectedSound] = useState(null);
  const [audioOn, setAudioOn] = useState(false);

  const EVENING_SOUNDS = [
    {id:"rain",   label:"Lluvia",  ic:"🌧", desc:"Relajación profunda"},
    {id:"ocean",  label:"Océano",  ic:"🌊", desc:"Calma y apertura"},
    {id:"forest", label:"Bosque",  ic:"🌿", desc:"Presencia y tierra"},
  ];

  const playNature = async(type) => {
    if(audioCtxRef.current) { try{audioCtxRef.current.close();}catch(e){} audioCtxRef.current=null; }
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();

      // Brown noise buffer (2s looped)
      const bufSize = 2 * ctx.sampleRate;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const d = buf.getChannelData(0);
      let last = 0;
      for(let i=0;i<bufSize;i++){
        const wn = Math.random()*2-1;
        // Brown noise: integrate white noise
        last = (last + 0.02*wn) / 1.02;
        d[i] = last * 3.5;
      }

      const src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime+2.5);

      if(type==="rain") {
        // Rain: brownish noise, mid-high bandpass, gentle high-freq texture
        const lpf = ctx.createBiquadFilter();
        lpf.type="lowpass"; lpf.frequency.value=1800; lpf.Q.value=0.7;
        const hpf = ctx.createBiquadFilter();
        hpf.type="highpass"; hpf.frequency.value=100; hpf.Q.value=0.5;
        src.connect(lpf); lpf.connect(hpf); hpf.connect(gain);

      } else if(type==="ocean") {
        // Ocean: filtered noise with slow LFO on amplitude and filter (wave rhythm)
        const bpf = ctx.createBiquadFilter();
        bpf.type="bandpass"; bpf.frequency.value=350; bpf.Q.value=0.4;
        // Wave LFO on amplitude
        const waveLfo = ctx.createOscillator();
        const waveLfoGain = ctx.createGain();
        waveLfo.frequency.value = 0.12; // ~8s per wave
        waveLfoGain.gain.value = 0.15;
        waveLfo.connect(waveLfoGain);
        waveLfoGain.connect(gain.gain);
        waveLfo.start();
        // Filter sweep for the "shhh" shape
        const sweepLfo = ctx.createOscillator();
        const sweepGain = ctx.createGain();
        sweepLfo.frequency.value = 0.12;
        sweepGain.gain.value = 250;
        sweepLfo.connect(sweepGain);
        sweepGain.connect(bpf.frequency);
        sweepLfo.start();
        src.connect(bpf); bpf.connect(gain);

      } else if(type==="forest") {
        // Forest night: low-mid filtered, very slow breath-like modulation
        const bpf = ctx.createBiquadFilter();
        bpf.type="bandpass"; bpf.frequency.value=500; bpf.Q.value=0.3;
        const lpf = ctx.createBiquadFilter();
        lpf.type="lowpass"; lpf.frequency.value=2000; lpf.Q.value=0.5;
        const breathLfo = ctx.createOscillator();
        const breathGain = ctx.createGain();
        breathLfo.frequency.value = 0.05; // very slow ambiance pulse
        breathGain.gain.value = 0.06;
        breathLfo.connect(breathGain);
        breathGain.connect(gain.gain);
        breathLfo.start();
        src.connect(bpf); bpf.connect(lpf); lpf.connect(gain);
      }

      gain.connect(ctx.destination);
      src.start();
      audioCtxRef.current = ctx;
      setAudioOn(true);
    } catch(e) { setAudioOn(false); }
  };

            </div>
          )}
        </div>
      </div>
    </div>
  );

  return null;
}

      "apikey": SUPABASE_KEY,

      "Prefer": "resolution=merge-duplicates,return=representation",
    };
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/user_data`, {
        method: "POST",
        headers,
        body: JSON.stringify({
          user_id: user.userId,
          ...data,
          updated_at: new Date().toISOString(),
        }),
      });
    } catch(e) { console.log("Sync error:", e); }

  const loadFromSupabase = async (user) => {
    if(!user?.token || !user?.userId) return null;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/user_data?user_id=eq.${user.userId}&select=*`,
        { headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${user.token}`,
        }}
      );
      if(!res.ok) return null;
      const rows = await res.json();
      return rows?.[0] || null;
    } catch(e) { return null; }

  const navigateTo = (dest) => {

      try {

        if(nightKey?.value === "1") {

          if(hour >= 20 || hour < 6) setNightMode(true); // only keep night mode between 8pm-6am
        }
      } catch(e) {}
      // Load active lab data
      try {
        const al = await loadJSON("active_lab");
        if(al) setActiveLab(al);
        const lc = await loadJSON("lab_completions");
        if(lc) setLabCompletions(lc);
        const lr = await loadJSON("lab_responses");

      setAuthChecked(true);

  useEffect(()=>{
    (async()=>{

        loadJSON("saved"),
        loadJSON("streak"),
        loadJSON("exPrefs"),
        loadJSON(HEALING_KEY),
        loadJSON(PREMISE_KEY),
        loadJSON(WORKOUT_KEY),
        loadJSON(BITACORA_KEY),
        loadJSON("gym_day"),
        loadJSON(SLEEP_KEY),
      ]);
      if(p) setProfile(p);
      // Load Anthropic API key
      load("anthropic_key").then(k=>{ if(k) setAnthropicKey(k); });
      if(m) {
        // Map Spanish keys → English keys (fix from A la carta bug)
        const KEY_MAP = {desayuno:"breakfast", almuerzo:"lunch", cena:"supper"};
        const fixed = {...EMPTY_MEALS,...m};
        let needsSave = false;
        Object.entries(KEY_MAP).forEach(([es, en])=>{
          if(fixed[es]?.length) {
            fixed[en] = [...(fixed[en]||[]), ...fixed[es].map(item=>({
              ...item,
              calories: item.calories||item.k||0,
              protein: item.protein||item.p||0,
              carbs: item.carbs||item.c||0,
              fat: item.fat||item.f||0,
              fiber: item.fiber||item.fi||0,

            delete fixed[es];
            needsSave = true;

      if(sk) setStreak(sk);
      if(ep) setExPrefs(ep);
      if(hl) setHealingLog(hl);
      if(pr) setPremise(pr);

          if(sbData.sleep_log) setSleepLog(JSON.parse(sbData.sleep_log));
          if(sbData.rutinas) { save(RUTINAS_KEY, JSON.parse(sbData.rutinas)); }
          if(sbData.saved_foods) setSavedFoods(JSON.parse(sbData.saved_foods));
          if(sbData.rutinas) { save(RUTINAS_KEY, JSON.parse(sbData.rutinas)); }
          // NOTE: meals are localStorage-only (real-time, too frequent to sync)
          // Supabase is used for profile, streak, workout log, etc. but NOT meals
          if(sbData.bitacora_log) setBitacoraLog(JSON.parse(sbData.bitacora_log));
          if(sbData.streak) setStreak(JSON.parse(sbData.streak));
        }
      }
      setLoading(false);
    })();
  },[authUser]);

  // Persist meals whenever they change (always save, even empty, to clear deleted items)
  useEffect(()=>{
    if(!loading && meals) {

  // savedFoods persisted directly in handlers (no useEffect to avoid race conditions)

  // Persist gymDay
  useEffect(()=>{
    if(!loading) save("gym_day", gymDay);

  useEffect(()=>{
    if(!loading) {

  // Sync saved rutinas
  useEffect(()=>{
    if(!loading && authUser) {
      loadJSON(RUTINAS_KEY).then(r=>{
        if(r && r.length>0) syncToSupabase(authUser, {rutinas: JSON.stringify(r)});
      });
    }
  },[authUser,loading]);

  // Sync workoutLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && workoutLog && Object.keys(workoutLog).length>0) {
      syncToSupabase(authUser, {workout_log: JSON.stringify(workoutLog)});

  },[workoutLog,loading]);

  // Sync bitacoraLog to Supabase
  useEffect(()=>{
    if(!loading && authUser && bitacoraLog && Object.keys(bitacoraLog).length>0) {
      syncToSupabase(authUser, {bitacora_log: JSON.stringify(bitacoraLog)});

  },[bitacoraLog,loading]);

  // Sync sleepLog to Supabase
  useEffect(()=>{

  // Sync healingLog to Supabase
  useEffect(()=>{

  // NOTE: meals are localStorage-only - too frequent to sync, causes overwrite bugs
  // useEffect(()=>{ syncToSupabase meals }, [meals]) intentionally removed

  // Sync savedFoods
  useEffect(()=>{
    if(!loading && authUser && savedFoods && Object.keys(savedFoods).length>0) {
      syncToSupabase(authUser, {saved_foods: JSON.stringify(savedFoods)});
    }
  },[savedFoods,loading]);

  // Supabase sync ready — activar cuando se despliegue en web

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null), 2200);

  const saveProfile = async(p) => {
    const isNew = !profile?.name;
    setProfile(p);

    showToast(`¡Hola, ${p.name}! Perfil guardado ✓`);
    if(isNew) {
      setShowBeliefs(true);
    } else {
      setScreen("home");
      setTimeout(()=>setShowCode(true), 900);
    }
  };

  const dateStr = new Date().toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"});

  // Check and update streak
  useEffect(()=>{
    if(loading||!profile) return;
    const today=localDateStr();
    if(streak.days?.includes(today)) return;
    const tgt=calcTargets(profile,getEffectiveDayType(gymDay,workoutLog),calcAvgSleep(sleepLog));
    const tot2=totals(meals);
    const pct=tot2.k/tgt.calories, pp=tot2.p/tgt.protein;
    load("evening_done:"+today).then(eveningVal=>{
      const eveningDoneToday = !!(eveningVal);
      if(pct>=.8 && pp>=.85 && eveningDoneToday){
        setStreak(s=>{const ns={days:[...(s.days||[]),today],points:(s.points||0)+10};return ns;});

  if(morningChecked && !morningDone && !loading && profile?.name && premise) {

            const todayStr = today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
            await save("morning_done:"+todayStr, "1");

        />
      </div>
    );

  if(loading) return(

      <style>{css}</style>
      <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
        <path d="M20 4 C20 4,10 10,8 20 C6 30,14 36,20 36" stroke="#4A9B6F" strokeWidth="2.5" strokeLinecap="round"/>
        <path d="M20 4 C20 4,30 10,32 20 C34 30,26 36,20 36" stroke="#6BBF8E" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 3" opacity="0.6"/>

        </div>
        <button onClick={()=>setShowCode(true)}

        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div style={{flex:1,height:1,background:'#254D3A'}}/><span style={{fontSize:12,color:'#7A9E8A'}}>o crea tu perfil nuevo</span><div style={{flex:1,height:1,background:'#254D3A'}}/>
        </div>
        <ProfileForm initial={null} onSave={saveProfile}/>
      </div>
      {showCode&&<CodeModal profile={null} onClose={()=>setShowCode(false)} onLoad={async(p)=>{setProfile(p);await save("profile",p);setShowCode(false);showToast(`Bienvenida ${p.name}! ✓`);setScreen("home");}}/>}
    </div>
  );

  const NAV=[
    {id:"home",l:"Inicio",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"log",l:"Registro",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>},
    {id:"gym",l:"Gym",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>},
    {id:"bitacora",l:"Bitácora",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>},
    {id:"healing",l:"Healing",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>},
    {id:"proyectos",l:"Proyectos",svg:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>},
  ];

  return(
    <div style={{background:G.bg,minHeight:"100vh",color:G.txt,fontFamily:"'DM Sans',sans-serif",
      filter: nightMode ? "brightness(0.42) sepia(0.35) saturate(0.8)" : "none",
      transition:"filter 2s ease"}}>
      {nightMode && <style>{`
        * { transition: background 1.5s ease, color 1s ease, border-color 1s ease !important; }
      `}</style>}
      <style>{css}</style>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:G.bg,borderBottom:`1px solid ${G.bor}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <svg width="36" height="36" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="21" fill="#3A2820"/>
            <text x="21" y="29" textAnchor="middle" fontFamily="Cormorant Garamond, serif" fontStyle="italic" fontWeight="400" fontSize="25" fill="#D4A090">F</text>
          </svg>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:G.crm,lineHeight:1.1}}>Fundamental</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:9,color:G.sft,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>by Claudia Fox</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:11,color:G.mut,textTransform:"capitalize"}}>{dateStr}</span>
          <button onClick={()=>setShowCode(true)} style={{background:"none",border:`1px solid ${G.bor}`,borderRadius:20,cursor:"pointer",fontSize:11,color:G.sft,padding:"4px 10px"}}>🔑</button>
          <button onClick={()=>setScreen("mas")} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.sft} strokeWidth="1.8" strokeLinecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <button onClick={()=>setScreen("profile")} style={{background:"none",border:"none",cursor:"pointer",fontSize:18}}>👤</button>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 20px 90px"}}>
        {screen==="home"&&<HomeScreen profile={profile} meals={meals} gymDay={gymDay} streak={streak} onNavigate={navigateTo} healingLog={healingLog} premise={premise} workoutLog={workoutLog} sleepLog={sleepLog} bitacoraLog={bitacoraLog} activeLab={activeLab} labCompletions={labCompletions} nightMode={nightMode} onMarkLabAction={async(done)=>{
  if(!activeLab) return;
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const completedDays = activeLab.completedDays || [];
  const updated = done
    ? {...activeLab, completedDays: [...new Set([...completedDays, today])]}
    : {...activeLab, completedDays: completedDays.filter(d=>d!==today)};
  setActiveLab(updated);
  await save("active_lab", updated);
}}/>}
        {(screen==="log")&&<LogScreen meals={meals} setMeals={setMeals} profile={profile} initialSearch={logSearchQuery} savedFoods={savedFoods} setSavedFoods={setSavedFoods} gymDay={gymDay} workoutLog={workoutLog} sleepLog={sleepLog} onNavigateBit={setScreen} anthropicKey={anthropicKey}/>}

        {screen==="sleep"&&<SleepScreen profile={profile}/>}
        {(screen==="healing"||screen==="healing_labs")&&<HistorialErrorBoundary><HealingScreen

  onPremiseSaved={(p)=>{setPremise(p);save(PREMISE_KEY,p);}}
  onHealingUpdate={(hl)=>setHealingLog(hl)}
  activeLab={activeLab}

  setLabCompletions={async(c)=>{setLabCompletions(c); await save("lab_completions", c);}}

  setLabResponses={async(r)=>{setLabResponses(r); await save("lab_responses", r);}}
  anthropicKey={anthropicKey}
/></HistorialErrorBoundary>}
        {screen==="morning"&&<MorningRitual profile={profile} premise={premise} healingLog={healingLog} bitacoraLog={bitacoraLog} onBitacoraUpdate={(bl)=>{setBitacoraLog(bl);save(BITACORA_KEY,bl);}} onComplete={async()=>{const today=localDateStr();await save("morning_done:"+today,"1");setMorningDone(true);setScreen("home");}} onSaveHealing={(hl)=>{setHealingLog(hl);save("healing_log",hl);}}/>}
        {screen==="evening"&&<EveningRitual profile={profile} meals={meals} healingLog={healingLog} sleepLog={sleepLog} workoutLog={workoutLog} gymDay={gymDay} activeLab={activeLab} bitacoraLog={bitacoraLog} onBitacoraUpdate={(bl)=>{setBitacoraLog(bl);save(BITACORA_KEY,bl);}} onComplete={async()=>{

  initialPost={screen?.startsWith?.("blog_")?parseInt(screen.split("_")[1]):null}
  onBack={screen?.startsWith?.("blog_")?()=>setScreen("home"):null}
/>}

        {screen==="proyectos"&&(

        {screen==="mas"&&(
          <div className="fi">
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Más</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:20}}>Recursos y herramientas</div>
            {[
              {ic:"🏆",title:"Mis Logros",sub:"Badges y hitos desbloqueados",screen:"logros"},
              {ic:"📸",title:"Fotos de progreso",sub:"Registro visual de tu transformación",screen:"progress"},
              {ic:"📖",title:"Aprende",sub:"Ciencia sin ruido — 19 artículos",screen:"learn"},
              {ic:"💊",title:"Suplementos",sub:"Protocolo personalizado para tu perfil",screen:"supps"},
              {ic:"🍽️",title:"A la carta",sub:"Plan personalizado para tu día",screen:"disenado"},
            ].map(item=>(
              <button key={item.screen} onClick={()=>setScreen(item.screen)}
                style={{width:"100%",background:G.card,border:`1px solid ${G.bor}`,borderRadius:20,
                  padding:"16px",cursor:"pointer",textAlign:"left",display:"flex",gap:14,
                  alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:28,flexShrink:0}}>{item.ic}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.title}</div>
                  <div style={{fontSize:12,color:G.sft}}>{item.sub}</div>
                </div>
                <span style={{marginLeft:"auto",color:G.mut,fontSize:18}}>›</span>
              </button>
            ))}

            {/* Anthropic API Key */}
            <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:16,padding:"16px",marginTop:4}}>
              <div style={{fontSize:13,fontWeight:600,color:G.crm,marginBottom:4}}>🤖 Clave IA (Análisis Bitácora)</div>
              <div style={{fontSize:11,color:G.sft,marginBottom:10,lineHeight:1.6}}>
                Ingresa tu API key de Anthropic para activar el análisis inteligente de la Bitácora.
                Se guarda localmente en tu dispositivo.
              </div>
              <input
                type="password"
                placeholder="sk-ant-..."
                value={anthropicKey}
                onChange={e=>setAnthropicKey(e.target.value)}
                style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:10,
                  padding:"10px 12px",fontSize:13,color:G.crm,background:G.bg,
                  boxSizing:"border-box",marginBottom:8}}/>
              <button onClick={async()=>{
                await save("anthropic_key", anthropicKey);
                showToast(anthropicKey ? "Clave guardada ✓" : "Clave eliminada");
              }} style={{width:"100%",background:anthropicKey?G.espresso:G.terra,border:"none",
                borderRadius:10,padding:"10px",fontSize:13,fontWeight:500,
                color:anthropicKey?"rgba(212,168,83,0.9)":"#fff",cursor:"pointer"}}>
                {anthropicKey ? "Guardar clave" : "Sin clave — IA desactivada"}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Breather floating button — solo en Home y Bitácora */}
      {!showTimer&&authChecked&&morningDone&&(screen==="home"||screen==="bitacora")&&(()=>{
        const defaultX = 16;
        const defaultY = typeof window !== "undefined" ? window.innerHeight - 160 : 600;
        const pos = breatherPos || {x: defaultX, y: defaultY};
        const drag = breatherDrag.current;
        return (
          <div
            onTouchStart={e=>{
              const t = e.touches[0];
              drag.on=true; drag.moved=false;
              drag.sx=t.clientX; drag.sy=t.clientY;
              drag.px=pos.x; drag.py=pos.y;
            }}
            onTouchMove={e=>{
              if(!drag.on) return;
              const t = e.touches[0];
              const dx = t.clientX-drag.sx, dy = t.clientY-drag.sy;
              if(Math.abs(dx)>6||Math.abs(dy)>6) drag.moved=true;
              if(drag.moved){
                e.preventDefault();
                const nx = Math.max(4, Math.min(window.innerWidth-60, drag.px+dx));
                const ny = Math.max(60, Math.min(window.innerHeight-80, drag.py+dy));
                setBreatherPos({x:nx, y:ny});
              }
            }}
            onTouchEnd={async()=>{
              drag.on=false;
              if(!drag.moved){ setShowTimer(true); }
              else { await save("breather_pos", breatherPos); }
            }}
            style={{position:"fixed",top:pos.y,left:pos.x,zIndex:100,
              display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              touchAction:"none",userSelect:"none"}}>
            <div style={{width:50,height:50,borderRadius:"50%",
              background:"#3A2820",border:"none",
              boxShadow:"0 4px 16px rgba(198,139,119,0.4)",cursor:"grab",
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D4A090" strokeWidth="1.8" strokeLinecap="round">
                <path d="M3 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
                <path d="M3 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
                <path d="M3 16c2-2 4-2 6 0s4 2 6 0"/>
              </svg>
            </div>
            <div style={{fontSize:9,color:"rgba(58,40,32,0.5)",letterSpacing:"0.08em",
              textTransform:"uppercase",fontWeight:600}}>{(()=>{
              const h = new Date().getHours();
              const cp = profile?.cycleStart ? getCyclePhase(profile.cycleStart, profile.cycleLength||28) : null;
              const isLateLuteal = cp?.phase==="luteal" && (cp?.day||0)>=22;
              if(nightMode) return "Desconecta";
              if(h<10) return "Activa";
              if(h<14) return "Enfoca";
              if(isLateLuteal) return "Regula";
              if(h>=20) return "Desconecta";
              if(h>=17) return "Regula";
              return "Respira";
            })()}</div>
          </div>
        );
      })()}
      {showTimer&&<NinetySecondsTimer onClose={()=>setShowTimer(false)} activeLab={activeLab}/>}

      {/* Bottom nav - silBe pill style */}
      <div className="bnav" style={{left:0,right:0,maxWidth:480,margin:"0 auto"}}>
        <div style={{background:"rgba(242,226,218,0.5)",borderRadius:50,padding:"4px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:2,width:"100%"}}>
          {NAV.map(n=>{
            const isOn = screen===n.id;
            return isOn ? (
              <button key={n.id} onClick={()=>navigateTo(n.id)}
                style={{display:"flex",alignItems:"center",gap:7,background:G.terra,
                  borderRadius:50,padding:"9px 16px",border:"none",cursor:"pointer",
                  boxShadow:`0 4px 14px rgba(198,139,119,0.4)`,flexShrink:0}}>
                <div style={{color:"white",display:"flex"}}>{n.svg}</div>
                <span style={{fontSize:12,fontWeight:500,color:"white",whiteSpace:"nowrap",fontFamily:"'DM Sans',sans-serif"}}>{n.l}</span>
              </button>
            ) : (
              <button key={n.id} onClick={()=>navigateTo(n.id)}
                style={{display:"flex",alignItems:"center",justifyContent:"center",
                  width:42,height:42,borderRadius:50,background:"transparent",
                  border:"none",cursor:"pointer",flex:1}}>
                <div style={{color:"rgba(44,36,32,0.35)",display:"flex"}}>{n.svg}</div>
              </button>
            );
          })}
        </div>
      </div>

      {toast&&<Toast msg={toast}/>}
      {showCode&&<CodeModal profile={profile} onClose={()=>setShowCode(false)} onLoad={async(p)=>{setProfile(p);await save("profile",p);setShowCode(false);showToast(`Bienvenida ${p.name}! ✓`);setScreen("home");}}/>}
    </div>
  );
}


class RootErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return {error:e};}
  render(){
    if(this.state.error) return (
      <div style={{padding:24,fontFamily:"monospace",fontSize:12,color:"#9E3D1A",
        background:"#FEF0EE",minHeight:"100vh"}}>
        <div style={{fontWeight:700,marginBottom:8}}>⚠️ Error — copia para Clau:</div>
        <div style={{background:"#fff",padding:12,borderRadius:8,wordBreak:"break-all",lineHeight:1.6}}>
          {this.state.error.message}
          <br/>{this.state.error.stack?.split('\n').slice(0,4).join('\n')}
        </div>
        <button onClick={()=>this.setState({error:null})}
          style={{marginTop:16,background:"#C68B77",color:"#fff",border:"none",
            borderRadius:10,padding:"10px 20px",cursor:"pointer"}}>
          Intentar de nuevo
        </button>
      </div>
    );
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<RootErrorBoundary><App/></RootErrorBoundary>);

  </script>
  <script>
    const obs=new MutationObserver(()=>{
      if(document.getElementById('root').children.length>0){
        document.getElementById('loader').style.display='none';
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true});
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.style.display='none';},15000);
  </script>
</body>
