function MiEntrenoView({workoutLog, setWorkoutLog, todayStr, onRegister}) {
  const ENTRENO_KEY = "mi_entreno:" + todayStr;
  const [registered, setRegistered] = useState(false);
  const RUTINAS_KEY = "mis_rutinas";
  const [rutinasGuardadas, setRutinasGuardadas] = useState([]);
  const [showGuardarRutina, setShowGuardarRutina] = useState(false);
  const [nombreRutina, setNombreRutina] = useState("");
  const [showRutinas, setShowRutinas] = useState(false);
  const [ejercicios, setEjercicios] = useState([]);
  const [searchQ, setSearchQ] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(true);
  const [sesionGuardada, setSesionGuardada] = useState(false);
  const loadedRutinaRef = useRef(null);

  useEffect(()=>{
    Promise.all([
      loadJSON(ENTRENO_KEY),
      loadJSON(RUTINAS_KEY),
    ]).then(([d, r])=>{
      if(d && d.ejercicios) setEjercicios(d.ejercicios);
      if(r) setRutinasGuardadas(r);
      // Restaurar vínculo: primero por rutinaId guardado, luego por match de nombres
      if(d?.rutinaId) {
        loadedRutinaRef.current = d.rutinaId;
      } else if(d?.ejercicios && r) {
        const loadedNames = d.ejercicios.map(e=>e.nombre).sort().join("|");
        const match = r.find(ru => {
          const ruNames = ru.ejercicios.map(e=>e.nombre).sort().join("|");
          return ruNames === loadedNames;
        });
        if(match) loadedRutinaRef.current = match.id;
      }
      setLoading(false);
    });
  },[]);

  const saveEntreno = async(exs) => {
    const data = {date: todayStr, ejercicios: exs, rutinaId: loadedRutinaRef.current || null};
    await save(ENTRENO_KEY, data);
    // Auto-update saved rutina with latest weights/reps
    if(loadedRutinaRef.current) {
      const updatedRutinas = rutinasGuardadas.map(function(ru) {
        return ru.id === loadedRutinaRef.current
          ? Object.assign({}, ru, {ejercicios: exs, actualizadaEl: todayStr})
          : ru;
      });
      save(RUTINAS_KEY, updatedRutinas);
      setRutinasGuardadas(updatedRutinas);
    }
    // Also update workoutLog and persist to localStorage
    const newLog = {...(workoutLog||{}), [todayStr]: {
      ...((workoutLog||{})[todayStr]||{}),
      miEntreno: data,
      date: todayStr,
      block: "Mi Entreno",
    }};
    setWorkoutLog(newLog);
    await save(WORKOUT_KEY, newLog);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };


const guardarRutina = async() => {
    if(!nombreRutina.trim() || ejercicios.length === 0) return;
    const rutina = {
      id: Date.now(),
      nombre: nombreRutina.trim(),
      ejercicios: ejercicios,  // Save WITH weights/reps as reference
      creadaEl: todayStr,
    };
    const newRutinas = [rutina, ...rutinasGuardadas];
    await save(RUTINAS_KEY, newRutinas);
    setRutinasGuardadas(newRutinas);
    setNombreRutina("");
    setShowGuardarRutina(false);
  };

  const cargarRutina = (rutina) => {
    // Get last session from historial for reference
    const lastSesion = rutina.historial?.slice(-1)[0] || null;

    const newEjs = rutina.ejercicios.map(ex=>{
      // Find matching exercise in last session
      const lastEx = lastSesion?.ejercicios?.find(e=>e.nombre===ex.nombre);
      return {
        ...ex,
        id: Date.now()+Math.random(),
        lastSession: lastEx ? {
          fecha: lastSesion.fecha,
          series: lastEx.series
        } : null,
        series: ex.series.map((s,i)=>({
          ...s,
          id: Date.now()+Math.random(),
          reps: "",   // EMPTY — user fills today
          peso: "",   // EMPTY — user fills today
          refReps: lastEx?.series?.[i]?.reps || s.reps || "",
          refPeso: lastEx?.series?.[i]?.peso || s.peso || "",
        }))
      };
    });
    setEjercicios(newEjs);
    loadedRutinaRef.current = rutina.id;
    saveEntreno(newEjs);
    setShowRutinas(false);
  };

  const guardarSesion = async() => {
    if(!loadedRutinaRef.current || ejercicios.length===0) return;
    const snapshot = {
      fecha: todayStr,
      ejercicios: ejercicios.map(ex=>({
        nombre: ex.nombre,
        series: ex.series.map(s=>({reps:s.reps||"", peso:s.peso||""}))
      }))
    };
    const updatedRutinas = rutinasGuardadas.map(ru=>{
      if(ru.id !== loadedRutinaRef.current) return ru;
      const historial = [...(ru.historial||[]), snapshot];
      const updatedEjs = ru.ejercicios.map(ex=>{
        const cur = ejercicios.find(e=>e.nombre===ex.nombre);
        if(!cur) return ex;
        return {...ex, series: cur.series.map(s=>({...s, reps:s.reps||s.refReps||"", peso:s.peso||s.refPeso||""}))};
      });
      return {...ru, historial, ejercicios: updatedEjs};
    });
    await save(RUTINAS_KEY, updatedRutinas);
    setRutinasGuardadas(updatedRutinas);

    // Also save to workoutLog so Historial view can read it
    const newEntry = {
      date: todayStr,
      block: "Mi Entreno",
      isMiEntreno: true,
      ejercicios: ejercicios.map(ex=>({
        nombre: ex.nombre,
        series: ex.series.map(s=>({reps:s.reps||"", peso:s.peso||""}))
      })),
      savedAt: new Date().toISOString()
    };
    const newLog = {...workoutLog, [todayStr]: {...(workoutLog[todayStr]||{}), ...newEntry}};
    setWorkoutLog(newLog);
    await save("workout_log", newLog);

    return true;
  };

  const deleteRutina = async(id) => {
    const newRutinas = rutinasGuardadas.filter(r=>r.id!==id);
    await save(RUTINAS_KEY, newRutinas);
    setRutinasGuardadas(newRutinas);
  };

  const addEjercicio = (nombre) => {
    const newEx = {id: Date.now(), nombre, series: []};
    const newList = [...ejercicios, newEx];
    setEjercicios(newList);
    saveEntreno(newList);
    setShowSearch(false);
    setSearchQ("");
  };

  const addSerie = (exId) => {
    const newList = ejercicios.map(ex => {
      if(ex.id !== exId) return ex;
      return {...ex, series: [...ex.series, {reps:"", peso:"", id: Date.now()}]};
    });
    setEjercicios(newList);
    saveEntreno(newList);
  };

  const updateSerie = (exId, serieId, field, val) => {
    const newList = ejercicios.map(ex => {
      if(ex.id !== exId) return ex;
      return {...ex, series: ex.series.map(s =>
        s.id === serieId ? {...s, [field]: val} : s
      )};
    });
    setEjercicios(newList);
    saveEntreno(newList);

// ─── 90 SECONDS TIMER ────────────────────────────────────────────────────────
function NinetySecondsTimer({onClose, activeLab}) {
  const [seconds, setSeconds] = useState(90);
  const [phase, setPhase] = useState("breathe-in"); // breathe-in, hold, breathe-out
  const [running, setRunning] = useState(true);
  const [completed, setCompleted] = useState(false);
  const [emotion, setEmotion] = useState("");

  useEffect(()=>{
    if(!running || completed) return;
    if(seconds <= 0) {
      setRunning(false);
      setCompleted(true);
      // Save to log
      const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
      loadJSON("ninety_log").then(log=>{
        const newLog = log || {};
        newLog[today] = (newLog[today] || 0) + 1;
        save("ninety_log", newLog);
      });
      return;
    }
    const t = setTimeout(()=>setSeconds(s=>s-1), 1000);
    return ()=>clearTimeout(t);
  },[seconds, running, completed]);

  // Breathing cycle: 4s in, 4s hold, 6s out (14s cycle)
  useEffect(()=>{
    if(!running || completed) return;
    const cycle = (90 - seconds) % 14;
    if(cycle < 4) setPhase("breathe-in");
    else if(cycle < 8) setPhase("hold");
    else setPhase("breathe-out");
  },[seconds, running, completed]);

  const phaseLabel = {
    "breathe-in":"Inhala",
    "hold":"Sostén",
    "breathe-out":"Exhala"
  }[phase];

  const phaseColor = {
    "breathe-in":"#A89EC0",
    "hold":G.acc,
    "breathe-out":G.grn
  }[phase];

  const circleScale = phase==="breathe-in"?1.3 : phase==="hold"?1.3 : 0.8;

  if(completed) {
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(13,17,23,.96)",zIndex:9999,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
        <div className="serif" style={{fontSize:32,fontWeight:500,color:G.crm,marginBottom:12,textAlign:"center"}}>
          90 segundos.
        </div>
        {(activeLab?.n === 3 || activeLab?.n === 8) ? (
          <>
            <div style={{fontSize:11,color:G.terra,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
              Lab activo: {activeLab.title}
            </div>
            <div style={{fontSize:15,color:G.crm,marginBottom:24,textAlign:"center",lineHeight:1.8,maxWidth:340,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>
              {activeLab.n === 3 
                ? "Las emociones duran 90 segundos si no las alimentas. Acabas de demostrarlo."
                : "Notar → Elegir → Actuar. Los 90 segundos son el espacio donde la elección sucede."}
            </div>
            <div style={{fontSize:13,color:G.sft,marginBottom:24,textAlign:"center",lineHeight:1.7,maxWidth:320}}>
              ¿Cuál es tu próxima elección?
            </div>
          </>
        ) : (
          <div style={{fontSize:15,color:G.sft,marginBottom:32,textAlign:"center",lineHeight:1.7,maxWidth:320}}>
            La emoción ya pasó por su ciclo bioquímico completo. Lo que sientes ahora ya es decisión, no impulso.
          </div>
        )}
        <div style={{width:"100%",maxWidth:360,marginBottom:24}}>
          <label style={{fontSize:12,color:G.acc,display:"block",marginBottom:8}}>
            ¿Qué sentías? (opcional)
          </label>
          <input value={emotion} onChange={e=>setEmotion(e.target.value)}
            placeholder="ej: rabia, ansiedad, urgencia..."
            style={{width:"100%",background:G.sur,border:`1px solid ${G.bor}`,borderRadius:10,
              padding:"10px 14px",color:G.crm,fontSize:14,outline:"none"}}/>
        </div>
        <button onClick={async()=>{
          if(emotion.trim()) {
            const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
            const log = await loadJSON("ninety_emotions") || {};
            log[today] = log[today] || [];
            log[today].push({time:new Date().toISOString(), emotion:emotion.trim()});
            await save("ninety_emotions", log);
          }
          onClose();
        }}
          style={{background:G.grn,color:"#fff",border:"none",borderRadius:16,
            padding:"14px 32px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Cerrar
        </button>
      </div>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,17,23,.96)",zIndex:9999,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
      <button onClick={onClose}
        style={{position:"absolute",top:24,right:24,background:"transparent",border:"none",
          color:G.sft,fontSize:24,cursor:"pointer"}}>×</button>

      <div style={{fontSize:11,color:G.acc,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>
        90 segundos
      </div>
      <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:48,textAlign:"center",maxWidth:320,lineHeight:1.5}}>
        La emoción es una ola. Solo respira.
      </div>

      {/* Breathing circle */}
      <div style={{position:"relative",width:240,height:240,marginBottom:32,
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",width:240,height:240,borderRadius:"50%",
          border:`2px solid ${phaseColor}`,opacity:0.2,
          transform:`scale(${circleScale})`,transition:"transform 4s ease-in-out"}}/>
        <div style={{position:"absolute",width:160,height:160,borderRadius:"50%",
          background:`radial-gradient(circle, ${phaseColor}30, transparent)`,
          transform:`scale(${circleScale})`,transition:"transform 4s ease-in-out"}}/>
        <div style={{textAlign:"center",zIndex:2}}>
          <div style={{fontSize:48,fontWeight:300,color:G.crm,fontFamily:"'Fraunces',serif"}}>
            {seconds}
          </div>
          <div style={{fontSize:13,color:phaseColor,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>
            {phaseLabel}
          </div>
        </div>
      </div>

      <div style={{fontSize:12,color:G.sft,textAlign:"center",maxWidth:280,lineHeight:1.6}}>
        Las emociones duran 90 segundos si no las alimentas con pensamiento.
      </div>
    </div>
  );
}

        <div style={{fontSize:13,color:G.sft,marginBottom:24,lineHeight:1.6}}>
          Tres cosas. El tercero es el que trabaja.
        </div>
        {[

          [gratitud2, setGratitud2, "Un poco más profundo..."],
          [gratitud3, setGratitud3, "La que requiere buscar..."],
        ].map(([val, setter, ph], i) => (
          <div key={i} style={{marginBottom:14}}>
            <div style={{fontSize:11,color:G.terra,letterSpacing:"0.08em",
              textTransform:"uppercase",fontWeight:600,marginBottom:6}}>
              {i+1}.
            </div>
            <textarea value={val} onChange={e=>setter(e.target.value)}
              placeholder={ph}
              style={{width:"100%",height:80,background:G.card,
                border:`1.5px solid ${val?"rgba(90,122,98,.6)":G.bor}`,
                borderRadius:14,padding:"12px 16px",color:G.crm,fontSize:14,
                resize:"none",outline:"none",lineHeight:1.7,
                fontFamily:"'Fraunces',serif",fontStyle:"italic",boxSizing:"border-box"}}/>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setStep(6)}
            disabled={!gratitud1.trim()&&!gratitud2.trim()&&!gratitud3.trim()}
            style={{flex:2,
              background:gratitud1.trim()||gratitud2.trim()||gratitud3.trim()
                ?G.terra:"rgba(198,139,119,.3)",
              color:"#fff",border:"none",borderRadius:16,padding:"15px",
              fontSize:15,fontWeight:500,
              cursor:gratitud1.trim()||gratitud2.trim()||gratitud3.trim()?"pointer":"not-allowed"}}>
            Continuar →
          </button>
          <button onClick={()=>setStep(6)}
            style={{flex:1,background:"transparent",border:`1px solid ${G.bor}`,
              borderRadius:16,padding:"15px",fontSize:13,color:G.sft,cursor:"pointer"}}>
            Saltar
          </button>
        </div>
      </div>
    </div>
  );

  // ── PASO 6: BITÁCORA MATUTINA ───────────────────────────────────
  if(step===6) {
    const SLEEP_OPTS = [
      {id:"bien", label:"Dormí bien", ic:"😴", desc:"7h+"},
      {id:"regular", label:"Regular", ic:"🌙", desc:"6-7h"},
      {id:"mal", label:"Mal", ic:"😵", desc:"-6h"},
    ];
    const ENERGIA_TAGS = [
      {id:"energizada", label:"Energizada", positive:true},
      {id:"clara", label:"Mente clara", positive:true},
      {id:"calmada", label:"Calmada", positive:true},
      {id:"cansada", label:"Cansada", positive:false},
      {id:"ansiosa", label:"Ansiosa", positive:false},
      {id:"pesada", label:"Pesada", positive:false},
    ];

    const handleSaveMorning = async () => {
      const morningData = {
        sueno: mSueno,
        energiaTags: mEnergia,
        intencion: mIntencion.trim(),
        proyectoFocus: mProyecto?.id || null,
        timestamp: new Date().toISOString(),
      };
      const newLog = {
        ...(bitacoraLog||{}),
        [today]: {
          ...((bitacoraLog||{})[today]||{}),
          morning: morningData,
          sueno: mSueno || ((bitacoraLog||{})[today]?.sueno),
        }
      };
      await save(BITACORA_KEY, newLog);
      if(onBitacoraUpdate) onBitacoraUpdate(newLog);
      handleComplete();
    };

    return (
      <div style={{minHeight:"100vh",padding:"40px 24px 80px",background:"linear-gradient(160deg,#FDF6EC 0%,#F8E8D8 60%,#F2DDD0 100%)",overflowY:"auto"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <ProgressBar current={5} total={5}/>
          <div style={{fontSize:11,color:G.terra,letterSpacing:"0.18em",
            textTransform:"uppercase",marginBottom:12}}>Check-in matutino</div>
          <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm,
            lineHeight:1.3,marginBottom:6}}>¿Cómo llegaste hoy?</div>
          <div style={{fontSize:13,color:G.sft,marginBottom:28,lineHeight:1.6}}>
            30 segundos. Sin presión.
          </div>

          {/* Sueño */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:600,color:G.terra,letterSpacing:"0.1em",
              textTransform:"uppercase",marginBottom:12}}>¿Cómo dormiste?</div>
            <div style={{display:"flex",gap:8}}>
              {SLEEP_OPTS.map(opt=>{
                const sel = mSueno===opt.id;
                return (
                  <button key={opt.id} onClick={()=>setMSueno(sel?null:opt.id)}
                    style={{flex:1,padding:"10px 4px",borderRadius:14,cursor:"pointer",
                      border:`2px solid ${sel?"#3D8C5E":G.bor}`,
                      background:sel?"#3D8C5E":G.card,textAlign:"center",
                      transition:"all .15s",transform:sel?"scale(1.04)":"scale(1)"}}>
                    <div style={{fontSize:20,marginBottom:2}}>{opt.ic}</div>
                    <div style={{fontSize:11,fontWeight:sel?700:400,
                      color:sel?"#fff":G.crm}}>{opt.label}</div>
                    <div style={{fontSize:9,color:sel?"rgba(255,255,255,0.7)":G.mut}}>{opt.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Energía */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:600,color:G.terra,letterSpacing:"0.1em",
              textTransform:"uppercase",marginBottom:12}}>¿Cómo amaneciste?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {ENERGIA_TAGS.map(t=>{
                const sel = mEnergia.includes(t.id);
                return (
                  <button key={t.id} onClick={()=>setMEnergia(prev=>
                    sel?prev.filter(x=>x!==t.id):[...prev,t.id])}
                    style={{padding:"8px 14px",
                      borderRadius:t.positive?22:10,
                      cursor:"pointer",fontSize:12,transition:"all .15s",
                      background:sel?(t.positive?"rgba(90,122,98,0.12)":"rgba(198,139,119,0.12)"):G.card,
                      color:sel?(t.positive?G.grn:G.terra):G.sft,
                      border:`1.5px solid ${sel?(t.positive?G.grn:G.terra):G.bor}`}}>
                    {t.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Intención */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:600,color:G.terra,letterSpacing:"0.1em",
              textTransform:"uppercase",marginBottom:12}}>
              Intención del día
              <span style={{color:G.mut,fontWeight:400,fontSize:10}}> · opcional</span>
            </div>
            <textarea value={mIntencion} onChange={e=>setMIntencion(e.target.value)}
              placeholder="Hoy quiero..."
              style={{width:"100%",height:70,background:G.card,
                border:`1.5px solid ${mIntencion?G.terra:G.bor}`,
                borderRadius:14,padding:"12px 16px",color:G.crm,fontSize:14,
                resize:"none",outline:"none",lineHeight:1.7,
                fontFamily:"'Fraunces',serif",fontStyle:"italic",boxSizing:"border-box"}}/>
          </div>

          {/* Proyecto del día */}
          {mProyecto && (
            <div style={{marginBottom:28,background:G.espresso,borderRadius:16,padding:"16px"}}>
              <div style={{fontSize:10,color:"rgba(212,168,83,0.6)",letterSpacing:"0.12em",
                textTransform:"uppercase",marginBottom:6}}>Tu proyecto de hoy</div>
              <div style={{fontSize:15,fontWeight:500,color:"rgba(249,245,240,0.9)",marginBottom:4}}>
                {mProyecto.nombre}
              </div>
              {mProyecto.vision && (
                <div style={{fontSize:11,color:"rgba(249,245,240,0.45)",fontStyle:"italic",
                  lineHeight:1.5,marginBottom:10}}>
                  {mProyecto.vision.slice(0,80)}{mProyecto.vision.length>80?"...":""}
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setMProyecto(null)}
                  style={{flex:1,background:"rgba(255,255,255,0.06)",
                    border:"1px solid rgba(255,255,255,0.1)",
                    borderRadius:10,padding:"8px",fontSize:11,
                    color:"rgba(249,245,240,0.4)",cursor:"pointer"}}>
                  Otro día
                </button>
                {proyectos.filter(p=>p.id!==mProyecto.id&&p.status!=="completado").length>0 && (
                  <button onClick={()=>{
                    const others=proyectos.filter(p=>p.id!==mProyecto.id&&p.status!=="completado");
                    setMProyecto(others[0]);
                  }} style={{flex:1,background:"rgba(255,255,255,0.06)",
                    border:"1px solid rgba(255,255,255,0.1)",
                    borderRadius:10,padding:"8px",fontSize:11,
                    color:"rgba(249,245,240,0.4)",cursor:"pointer"}}>
                    Cambiar
                  </button>
                )}
              </div>
            </div>
          )}

          <button onClick={handleSaveMorning}
            style={{width:"100%",background:G.terra,color:"#fff",border:"none",
              borderRadius:16,padding:"18px",fontSize:16,fontWeight:500,cursor:"pointer",
              boxShadow:"0 8px 32px rgba(198,139,119,0.3)",marginBottom:8}}>
            Iniciar mi día ✦
          </button>
          <button onClick={handleComplete}
            style={{width:"100%",background:"transparent",border:"none",
              color:G.mut,fontSize:13,cursor:"pointer",padding:"8px"}}>
            Saltar
          </button>
        </div>
      </div>
    );
  }

  return null;
}


function MisCombosView({meals, setMeals, savedFoods, setSavedFoods, profile}) {
  const [combos, setCombos] = useState([]);
  const [mode, setMode] = useState("list"); // list | create
  const [added, setAdded] = useState(null);

  // Create mode state
  const [comboName, setComboName] = useState("");
  const [comboItems, setComboItems] = useState([]);
  const [searchQ, setSearchQ] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [saving, setSaving] = useState(false);
  const [createMode, setCreateMode] = useState("ingredients");
  const [macroEntry, setMacroEntry] = useState({p:"",c:"",f:"",k:"",fi:""});
  const [showFoodPicker, setShowFoodPicker] = useState(false);

  useEffect(()=>{
    loadJSON(COMBOS_KEY).then(d=>{if(d) setCombos(d);});
  },[]);

  // Search foods
  useEffect(()=>{
    if(!searchQ.trim()) { setSearchResults([]); return; }
    const q = searchQ.toLowerCase();
    const res = DB.filter(f=>
      f.n.toLowerCase().includes(q) ||
      (f.a||[]).some(a=>a.toLowerCase().includes(q))
    ).slice(0,8);
    setSearchResults(res);
  },[searchQ]);

  const addItemToCombo = (food, grams=100) => {
    const factor = grams/100;
    const p = food.p??food.protein??0;
    const carb = food.c??food.carbs??0;
    const fat = food.f??food.fat??0;
    const cal = food.k??food.calories??0;
    const fi = food.fi??food.fiber??0;
    setComboItems(prev=>[...prev, {
      name: `${food.n} (${grams}g)`,
      n: food.n,
      g: grams,
      protein: Math.round(p*factor*10)/10,
      carbs: Math.round(carb*factor*10)/10,
      fat: Math.round(fat*factor*10)/10,
      calories: Math.round(cal*factor),
      fiber: Math.round(fi*factor*10)/10,
      // Also keep short props for internal use
      p: Math.round(p*factor*10)/10,
      c: Math.round(carb*factor*10)/10,
      f: Math.round(fat*factor*10)/10,
      k: Math.round(cal*factor),
      fi: Math.round(fi*factor*10)/10,
      id: Date.now()+Math.random(),
    }]);
    setSearchQ("");
    setSearchResults([]);
  };

  const removeItem = (id) => setComboItems(prev=>prev.filter(x=>x.id!==id));

  const updateGrams = (id, g) => {
    setComboItems(prev=>prev.map(item=>{
      if(item.id!==id) return item;
      const orig = DB.find(f=>f.n===item.n);
      if(!orig) return {...item,g};
      const factor = g/100;
      const p=Math.round(orig.p*factor*10)/10;
      const carb=Math.round(orig.c*factor*10)/10;
      const fat=Math.round(orig.f*factor*10)/10;
      const cal=Math.round(orig.k*factor);
      const fi=Math.round((orig.fi||0)*factor*10)/10;
      return {
        ...item, g,
        name: `${orig.n} (${g}g)`,
        p, c:carb, f:fat, k:cal, fi,
        protein:p, carbs:carb, fat, calories:cal, fiber:fi,
      };
    }));
  };

  const saveCombo = async () => {
    if(!comboName.trim()||!comboItems.length) return;
    setSaving(true);
    const combo = {
      id: Date.now(),
      name: comboName.trim(),
      items: comboItems,
      cal: Math.round(comboItems.reduce((a,i)=>a+i.k,0)),
      prot: Math.round(comboItems.reduce((a,i)=>a+i.p,0)),
    };
    const newCombos = [...combos, combo];
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
    setComboName("");
    setComboItems([]);
    setMode("list");
    setSaving(false);
  };

  const addComboToMeal = (combo, mealId) => {
    setMeals(prev=>({
      ...prev,
      [mealId]: [...(prev[mealId]||[]),
        ...combo.items.map(i=>({
          ...i,
          // Ensure both property formats exist
          name: i.name || `${i.n||"Alimento"} (${i.g||100}g)`,
          protein: i.protein ?? i.p ?? 0,
          carbs: i.carbs ?? i.c ?? 0,
          fat: i.fat ?? i.f ?? 0,
          calories: i.calories ?? i.k ?? 0,
          fiber: i.fiber ?? i.fi ?? 0,
          id: Date.now()+Math.random(),
        }))
      ]
    }));
    setAdded(combo.id);
    setTimeout(()=>setAdded(null), 2000);
  };

  const deleteCombo = async (id) => {
    const newCombos = combos.filter(c=>c.id!==id);
    setCombos(newCombos);
    await save(COMBOS_KEY, newCombos);
  };

  const MEAL_OPTS = [
    {id:"breakfast",l:"Desayuno",i:"🌅"},
    {id:"lunch",l:"Almuerzo",i:"☀️"},
    {id:"dinner",l:"Comida",i:"🍽️"},
    {id:"snack",l:"Snack",i:"🥜"},
    {id:"supper",l:"Cena",i:"🌙"},
  ];

  const comboTotals = {
    k: Math.round((comboItems||[]).reduce((a,i)=>a+(i.k||0),0)),
    p: Math.round((comboItems||[]).reduce((a,i)=>a+(i.p||0),0)),
    c: Math.round((comboItems||[]).reduce((a,i)=>a+(i.c||0),0)),
    f: Math.round((comboItems||[]).reduce((a,i)=>a+(i.f||0),0)),
  };

  // CREATE MODE
  if(mode==="create") return (
    <div style={{paddingBottom:80}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button onClick={()=>{setMode("list");setComboName("");setComboItems([]);}}
          style={{background:"transparent",border:"none",color:G.sft,cursor:"pointer",
            fontSize:13,padding:0}}>
          ← Volver
        </button>
        <div style={{fontSize:15,fontWeight:600,color:G.crm}}>Nuevo Combo</div>
      </div>

      {/* Nombre */}
      <input value={comboName} onChange={e=>setComboName(e.target.value)}
        placeholder="Nombre del combo (ej: Desayuno de piernas)"
        style={{width:"100%",background:G.card,
          border:`1.5px solid ${comboName?G.terra:G.bor}`,
          borderRadius:14,padding:"12px 16px",color:G.crm,fontSize:14,
          outline:"none",marginBottom:16,boxSizing:"border-box"}}/>

      {/* Ingredientes agregados */}
      {comboItems.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:G.mut,letterSpacing:"0.1em",
            textTransform:"uppercase",marginBottom:10}}>
            Ingredientes ({comboItems.length})
          </div>
          {comboItems.map(item=>(
            <div key={item.id} style={{background:G.card,border:`1px solid ${G.bor}`,
              borderRadius:12,padding:"10px 14px",marginBottom:8,
              display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:G.crm}}>{item.n}</div>
                <div style={{fontSize:11,color:G.sft,marginTop:2}}>
                  {item.g||100}g · {Math.round(item.k||item.calories||0)} kcal · {Math.round(item.p||item.protein||0)}g P
                </div>
              </div>
              <button onClick={()=>setComboItems(prev=>prev.filter(x=>x.id!==item.id))}
                style={{background:"transparent",border:"none",color:G.mut,
                  cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>
                ×
              </button>
            </div>
          ))}
          {/* Totales */}
          <div style={{background:"rgba(90,122,98,.06)",border:"1px solid rgba(90,122,98,.2)",
            borderRadius:12,padding:"10px 14px",display:"flex",gap:16,flexWrap:"wrap"}}>
            {[
              ["kcal", comboItems.reduce((a,i)=>a+(+(i.k??i.calories??0)),0), ""],
              ["P",    comboItems.reduce((a,i)=>a+(+(i.p??i.protein??0)),0),  "g"],
              ["C",    comboItems.reduce((a,i)=>a+(+(i.c??i.carbs??0)),0),    "g"],
              ["G",    comboItems.reduce((a,i)=>a+(+(i.f??i.fat??0)),0),      "g"],
            ].map(([l,v,unit])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:600,color:G.grn}}>
                  {Math.round(v)}{unit}
                </div>
                <div style={{fontSize:9,color:G.sft,textTransform:"uppercase",
                  letterSpacing:"0.08em",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Botón agregar ingrediente */}
      <button onClick={()=>setShowFoodPicker(true)}
        style={{width:"100%",background:"transparent",
          border:`1.5px dashed ${G.bor}`,borderRadius:14,
          padding:"14px",fontSize:13,color:G.terra,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          marginBottom:20}}>
        + Agregar ingrediente
      </button>

      {/* Food picker modal */}
      {showFoodPicker&&(
        <AddFoodModal
          mealId="combo"
          mealLabel="Combo"
          savedFoods={savedFoods||[]}
          profile={profile}
          onAdd={(food)=>{
            const items = Array.isArray(food)?food:[food];
            setComboItems(prev=>[...prev, ...items.map(f=>{
              const name = f.n||f.name||"";
              const p = +(f.p??f.protein??0);
              const carbVal = +(f.c??f.carbs??0);
              const fat = +(f.f??f.fat??0);
              const cal = +(f.k??f.calories??0);
              const fi = +(f.fi??f.fiber??0);
              // Extract grams from name like "Huevo (53g)" or use f.g
              const gMatch = name.match(/\((\d+)g\)/);
              const g = f.g || (gMatch ? +gMatch[1] : 100);
              // Clean name (remove "(Xg)" suffix if present)
              const cleanName = name.replace(/\s*\(\d+g\)$/, '');
              return {
                id: Date.now()+Math.random(),
                n: cleanName,
                name: cleanName,
                g, k: cal, p, c: carbVal, f: fat, fi,
                calories: cal, protein: p, carbs: carbVal, fat, fiber: fi,
              };
            })]);
            setShowFoodPicker(false);
          }}
          onSaveToLib={async food=>{
            const current = await loadJSON("saved")||[];
            const newSf=[food,...current];
            await save("saved",newSf);
            if(setSavedFoods) setSavedFoods(newSf);
          }}
          onClose={()=>setShowFoodPicker(false)}
        />
      )}

      {/* Guardar */}
      <button onClick={saveCombo}
        disabled={!comboName.trim()||comboItems.length===0||saving}
        style={{width:"100%",
          background:comboName.trim()&&comboItems.length?G.grn:"rgba(90,122,98,.3)",
          color:"#fff",border:"none",borderRadius:14,padding:"15px",
          fontSize:15,fontWeight:500,cursor:"pointer"}}>
        {saving?"Guardando...":"✓ Guardar combo"}
      </button>
    </div>
  );


  // LIST MODE
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:G.crm}}>Mis Combos</div>
          <div style={{fontSize:12,color:G.sft}}>Tus recetas guardadas</div>
        </div>
        <button onClick={()=>setMode("create")}
          style={{background:G.acc,color:"#fff",border:"none",borderRadius:8,
            padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          + Nuevo combo
        </button>
      </div>

      {combos.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 0"}}>
          <div style={{fontSize:32,marginBottom:12}}>🍳</div>
          <div style={{fontSize:14,color:G.sft,marginBottom:6}}>Sin combos guardados</div>
          <div style={{fontSize:12,color:G.mut,lineHeight:1.6,marginBottom:16}}>
            Crea un combo con los alimentos que repites — pancakes de proteína, tu desayuno habitual, etc.
          </div>
          <button onClick={()=>setMode("create")}
            style={{background:G.grn,color:"#fff",border:"none",borderRadius:10,
              padding:"11px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            Crear mi primer combo →
          </button>
        </div>
      ) : (
        combos.map(combo=>(
          <div key={combo.id} style={{background:G.card,
            border:`1px solid ${added===combo.id?G.grn:G.bor}`,
            borderRadius:16,padding:"14px 16px",marginBottom:10,transition:"border-color .3s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <div style={{fontSize:14,fontWeight:600,color:G.crm}}>{combo.name}</div>
                  {combo.isFav&&<span style={{fontSize:10,color:"#EAC850"}}>★ Favorito</span>}
                  {combo.isMacro&&<span style={{fontSize:10,color:"#A89EC0"}}>📊 Macros</span>}
                </div>
                <div style={{fontSize:11,color:G.sft}}>{combo.cal} kcal · {combo.prot}g prot · {combo.isFav?"1 ítem":`${combo.items.length} ítems`}</div>
              </div>

                  <div>

    </div>
  );

    content:"Más entrenamiento no siempre es mejor entrenamiento. El gym es el estímulo — la recuperación es donde ocurre la adaptación. Sin recuperación adecuada, el entrenamiento produce estrés sin beneficio. El sobreentrenamiento no es un mito. Es el resultado de acumular más carga de la que el cuerpo puede absorber y reparar.\n\nQué pasa durante la recuperación: en las primeras 2 horas post-entreno el cuerpo está en su ventana de mayor absorción de nutrientes. La proteína inicia la reparación de fibras musculares dañadas. Los carbos reponen el glucógeno. Entre 24 y 48 horas ocurre la síntesis proteica muscular — el proceso de reconstruir las fibras más fuertes que antes. Este es el momento en que técnicamente crece el músculo. Entre 48 y 72 horas el sistema nervioso central se recupera. Este es el factor más ignorado — entrenar con el sistema nervioso agotado produce rendimiento bajo y riesgo de lesión alto.\n\nLas señales de recuperación insuficiente: rendimiento estancado o en descenso, fatiga persistente que no mejora con descanso, irritabilidad y niebla mental, frecuencia cardíaca en reposo elevada, pérdida de motivación para entrenar, lesiones frecuentes o molestias que no ceden. Ninguna de estas señales es debilidad. Son información.\n\nLas herramientas de recuperación: sueño (la más poderosa y la más subestimada — la hormona de crecimiento se secreta principalmente durante el sueño profundo), nutrición post-entreno (proteína más carbos en las primeras 2 horas maximiza la síntesis muscular), recuperación activa (moverse suavemente en días de descanso — caminar, movilidad, zona 2 suave — acelera la recuperación mejor que el reposo total), hidratación (el músculo es 75% agua — la deshidratación ralentiza todos los procesos de recuperación) y gestión del estrés (el cortisol crónico compite directamente con la recuperación).\n\nCuánto tiempo necesita cada músculo: grupos musculares grandes — piernas, espalda, pecho — necesitan entre 48 y 72 horas de recuperación entre sesiones intensas. Grupos más pequeños — bíceps, tríceps, hombros — entre 24 y 48 horas. Respetar estos tiempos no es perder días. Es respetar la biología.\n\nCómo lo lee Fundamental: los días de descanso no son días perdidos — son días de trabajo invisible. La app los reconoce como parte del protocolo y ajusta la nutrición para apoyar la recuperación, no sabotearla.",
    takeaways:["El músculo crece en las 24-48h post-entreno, no durante el ejercicio","El sistema nervioso necesita 48-72h para recuperarse completamente","Señales de sobreentrenamiento son información, no debilidad","Proteína + carbos en las primeras 2h post-entreno es parte del entrenamiento"]

    preview:"La información no es control. Es claridad.",
    content:"Mucha gente evita registrar lo que come porque teme que los números se conviertan en una obsesión. Es un miedo válido — especialmente en una cultura que durante décadas convirtió la comida en un campo minado de culpa, restricción y compensación. Pero hay una diferencia fundamental entre contar para controlar y entender para decidir.\n\nLo que pasa cuando no sabes: cuando no tienes información, el cerebro llena el vacío con suposiciones. Y las suposiciones tienden hacia el extremo — esto debe ser malísimo o esto no cuenta. Sin datos reales, las decisiones se toman desde el miedo o desde la ignorancia. La incertidumbre no libera. Genera ansiedad.\n\nLo que pasa cuando sí sabes: cuando entiendes qué hace un alimento en tu cuerpo — no como juicio sino como información — la relación con la comida cambia. El aguacate deja de ser prohibido o permitido y se convierte en grasa saludable que sacia y nutre. El arroz deja de ser carbos malos y se convierte en glucógeno para tu próximo entrenamiento. El conocimiento neutraliza el miedo.\n\nLa diferencia entre información y obsesión: la información sirve cuando te ayuda a tomar decisiones más conscientes. Se convierte en problema cuando reemplaza la intuición, genera ansiedad o dicta el valor de un día. Fundamental está diseñada para darte contexto, no para convertirse en árbitro de lo que puedes comer. El registro es una herramienta — no una sentencia.\n\nLo que transforma la relación con la comida: no es saber exactamente cuánto de cada cosa comes. Es entender el patrón. Ver que en días de entreno tu cuerpo pide más. Que el sueño afecta el hambre. Que la fase del ciclo explica los antojos. Que la proteína cambia cómo te sientes a las 4pm. Eso no es restricción. Es entendimiento.\n\nLa Premise de Fundamental: esta app nació de una convicción simple — que la mayoría de las personas no tienen una mala relación con la comida. Tienen falta de información real. Y que cuando esa información llega sin juicio, sin reglas rígidas y sin culpa, las personas toman mejores decisiones naturalmente. Saber qué comes no te encarcela. El miedo a saber sí puede hacerlo.",

    content:"El efecto whoosh describe un patrón que muchas personas experimentan pero pocas entienden: llevas días o semanas comiendo bien, entrenando con consistencia — y la báscula no se mueve. O peor, sube. Luego, de un día para otro, baja 1 o 2 kilos de golpe. No es magia. Es biología.\n\nLo que pasa dentro: cuando el cuerpo libera grasa almacenada, las células adiposas no desaparecen de inmediato. Al vaciar su contenido lipídico, se llenan temporalmente de agua — un mecanismo de retención hídrica que el cuerpo usa mientras procesa el cambio. Durante ese tiempo, el peso en la báscula puede mantenerse igual o incluso aumentar ligeramente. Luego, cuando el cuerpo decide que ya no necesita retener esa agua, la libera toda junta. Ahí ocurre el whoosh.\n\nPor qué la báscula sube antes de bajar: el agua pesa — un litro pesa exactamente un kilo. El cuerpo puede retener entre 1 y 3 litros adicionales durante períodos de déficit calórico, especialmente si el estrés es alto, el sueño es irregular o el consumo de sodio y carbohidratos varía. Esto explica por qué puedes hacer todo bien durante dos semanas y no ver movimiento — y luego bajar 1.5kg en 48 horas sin cambiar nada.\n\nCuánto dura el estancamiento aparente: varía. Puede ser días o semanas. Factores que prolongan la retención: estrés crónico elevado, poco sueño, ciclo hormonal en fase lútea, alta variabilidad en sodio o carbohidratos. No hay forma de forzar el whoosh — solo de no sabotearlo.\n\nLa trampa más costosa: desesperarse durante las semanas planas y abandonar el proceso justo antes del whoosh. El cuerpo está trabajando en silencio. Los cambios metabólicos, hormonales y en composición corporal ocurren antes de que la báscula los refleje.\n\nCómo lo lee Fundamental: la báscula es un dato, no una sentencia. Fundamental registra tendencias, no momentos. Un peso estancado durante dos semanas seguido de una caída de 1.5kg es progreso real — el gráfico lo muestra como lo que es. Si estás en fase lútea, el efecto puede ser más pronunciado: la progesterona favorece la retención hídrica, y el whoosh suele ocurrir al inicio de la menstruación.",

    content:"Hay un momento que casi todas vivimos. Llevas semanas entrenando, comiendo con conciencia, durmiendo mejor. Te subes a la báscula o te miras al espejo — y nada. O peor: sientes que retrocediste.\n\nLa conclusión más natural es que algo está mal. Que el plan no funciona. Que tu cuerpo es especial en el peor sentido de la palabra.\n\nPero hay otra explicación. Una que cambia todo cuando la entiendes.\n\nEl metabolismo adaptativo: cuando el cuerpo aprende a esconderse\n\nDespués de años de estrés crónico, déficit calórico agresivo o ciclos de restricción-atracón, el metabolismo no simplemente se lentifica. Hace algo más sofisticado: aprende que los recursos escasean y reorganiza sus prioridades.\n\nLa termogénesis baja. La conversión de T4 a T3 (hormona tiroidea activa) se reduce. El cortisol sube como mecanismo de emergencia. La leptina —la hormona que le dice al cerebro que hay energía suficiente— cae. El cuerpo prioriza la supervivencia sobre la composición.\n\nEste no es un defecto. Es una maravilla de adaptación. El problema es que esa adaptación tarda meses en deshacerse, no días.\n\nEl despertar metabólico no se ve en el espejo\n\nCuando empiezas a comer suficiente, a entrenar con consistencia y a descansar de verdad, algo ocurre que los espejos no capturan.\n\nLa termogénesis empieza a recuperarse — produces más calor, el metabolismo basal sube. La señalización hormonal se reorganiza — leptina, grelina, insulina empiezan a funcionar con más precisión. El glucógeno muscular se repone — literalmente, tus músculos pesan más porque están más llenos. La inflamación crónica de bajo grado empieza a ceder — lo que puede hacer que la retención de agua fluctúe antes de bajar.\n\nTodo eso es progreso real. Pero en las fotos de las semanas 1 a 4, nada de eso se ve.\n\nLa paradoja del despertar: los primeros signos de que el metabolismo se está recuperando a veces parecen un retroceso. La retención de agua fluctúa. El peso puede subir levemente. El cuerpo está redistribuyendo recursos — no acumulando grasa.\n\nEl calendario real de la recomposición\n\nLa industria del fitness vende resultados de 4 semanas. La biología opera en otro tiempo.\n\nSemanas 1–2: El sistema nervioso registra el cambio. El metabolismo empieza a recalibrar. Externamente: poco visible. Internamente: todo.\n\nSemanas 3–4: La señalización hormonal mejora. Puede haber fluctuaciones de retención de agua — señal de que el metabolismo está activo, no inactivo.\n\nSemanas 5–8: Aquí empieza a verse. La composición corporal empieza a cambiar de forma visible. La ropa cae diferente antes de que la báscula se mueva.\n\nSemanas 9–12: Con metabolismo activo y consistencia sostenida, los resultados se aceleran. El cuerpo ya confía en que el suministro es estable.\n\nLas metas irracionales que nos imponemos\n\nEl problema no es la impaciencia. Es que medimos con la escala temporal equivocada.\n\nSi llevas 3, 5, 10 años con un metabolismo adaptado a la escasez, pedirle resultados visibles en 10 días no es ambición — es una expectativa que garantiza frustración.\n\nLa pregunta correcta en las primeras semanas no es ¿se ve diferente? sino ¿estoy siendo consistente? y ¿mi metabolismo tiene las condiciones para despertar?\n\nProteína suficiente, entrenamiento de fuerza, sueño reparador, estrés gestionado. Si esas cuatro variables están alineadas, el resultado no es una posibilidad — es una consecuencia biológica inevitable. La única variable que puedes controlar es el tiempo que le das.\n\nLo que la frustración realmente significa\n\nHay una trampa silenciosa en el proceso: la frustración de no ver resultados puede llevarte a hacer exactamente lo que más daño hace — bajar más calorías, entrenar más fuerte, dormir menos, estresarte más.\n\nCada una de esas respuestas le dice al metabolismo que la amenaza no terminó. Que debe seguir en modo supervivencia.\n\nLa tolerancia a la frustración no es un rasgo de carácter. Es una habilidad técnica. Y se construye entendiendo lo que está pasando debajo de la superficie.\n\nCuando sabes que las semanas 1-4 son biológicamente el período de recalibración — no el período de resultados —, la frustración cambia de forma. No desaparece, pero ya no se convierte en autosabotaje.\n\nNo hay una versión de este proceso que sea rápida y duradera al mismo tiempo. El metabolismo que despiertas despacio, con nutrición adecuada y consistencia real, es el que se queda despierto. El que forzaste con déficit agresivo siempre estuvo contando los días para volver a dormirse.\n\nEl plan está funcionando. Solo que todavía no tiene cara.",
    takeaways:["Las semanas 1-4 son de recalibración metabólica, no de resultados visibles","El metabolismo adaptado por años de restricción tarda meses en despertar, no días","Frustración + más restricción = decirle al cuerpo que la amenaza sigue","El plan funciona — la única variable que controlas es el tiempo que le das"]

    title:"La creatina me va a hacer subir de peso",
    preview:"El suplemento más investigado de la historia — y el más malentendido por las mujeres. Lo que realmente pasa en tu cuerpo.",
    content:"Pocas cosas han alejado a más mujeres de uno de los suplementos más investigados de la historia que una sola palabra: retención.\n\nSí, la creatina sube el número en la báscula. Típicamente entre 0.5 y 2kg en las primeras semanas. Pero ese número no es lo que parece — y entender la diferencia lo cambia todo.\n\nLo que realmente pasa cuando tomas creatina\n\nLa creatina aumenta los fosfatos disponibles en el músculo. Para almacenarlos, el músculo necesita agua — específicamente, atrae agua hacia adentro de la célula muscular. Eso se llama hidratación intracelular.\n\nNo es agua subcutánea (la que hace que te veas hinchada). No es grasa. Es agua dentro del músculo, que hace que ese músculo tenga más energía disponible, se vea más lleno y funcione mejor.\n\nLa báscula sube. El espejo dice otra cosa.\n\nLo que pasa semana a semana\n\nDías 1–5: La creatina empieza a acumularse en el tejido muscular. El cuerpo comienza a retener agua intracelular. La báscula puede subir 0.5–1kg. Todavía no sientes nada diferente en el gym.\n\nSemana 1–2: Los depósitos de fosfocreatina alcanzan saturación — cerca de un 20% más de reserva energética disponible en el músculo. El primer cambio que notas: aguantas un poco más antes de fatigarte.\n\nSemana 2–3: La recuperación entre series mejora. Puedes hacer una repetición más, levantar un poco más de peso. Esto no es psicológico — es química.\n\nSemana 3–4: Los músculos se ven más llenos. No más grandes — más definidos, más densos. La retención de agua intracelular les da volumen sin inflamación subcutánea.\n\nMes 2 en adelante: Los beneficios se componen. Más calidad de entrenamiento sostenida en el tiempo genera mejor adaptación muscular. La diferencia ya no es solo de rendimiento — es de composición.\n\n¿Quién debería tomarla?\n\nEsta es la pregunta con más mala información en internet. La respuesta honesta es: depende de qué quieres.\n\nSi entrenas con pesas: es donde más impacto tiene. Los beneficios de rendimiento, recuperación y composición requieren el estímulo del entrenamiento. Sin él, la creatina tiene menos con qué trabajar.\n\nSi haces ejercicio cardiovascular: beneficios moderados en recuperación y reducción de daño muscular, pero menores que con entrenamiento de fuerza.\n\nSi no haces ejercicio: los beneficios musculares y de composición son mínimos. Pero la creatina tiene receptores en el cerebro. Los estudios muestran mejoras cognitivas en personas bajo estrés crónico o privación de sueño, independientemente de si entrenan.\n\nSi eres vegetariana o vegana: el beneficio basal es mayor porque casi toda la creatina dietética viene de la carne y el pescado. Tu punto de partida es más bajo, la ganancia más notable.\n\nSi estás en perimenopausia o postmenopausia: aquí el argumento se vuelve especialmente sólido. Más allá del rendimiento, los estudios muestran beneficios en densidad ósea, preservación de masa muscular en déficit calórico y función cognitiva — todos factores críticos en esta etapa.\n\nLo que la ciencia dice sobre creatina y mujeres\n\nPreserva masa muscular en déficit calórico — el músculo que tanto cuesta construir, la creatina ayuda a protegerlo.\n\nMejora la densidad ósea — en mujeres peri y postmenopáusicas, los estudios muestran reducción significativa en marcadores de resorción ósea.\n\nEfecto neuroprotector — evidencia creciente de beneficios cognitivos, especialmente en estrés y falta de sueño. Exactamente el perfil de muchas mujeres en perimenopausia.\n\nMejora el estado de ánimo — el cerebro también usa fosfocreatina como fuente de energía.\n\nEs el suplemento con más respaldo científico que existe después de la proteína. Más de 500 estudios en 30 años. No es un suplemento de bodybuilders. Es un suplemento de rendimiento y salud que históricamente se vendió mal hacia las mujeres porque nadie les explicó cómo funciona.\n\nLa única forma de saber si funciona para ti: darle 6–8 semanas, medir rendimiento y composición. No la báscula sola.",
    takeaways:["El peso que sube con creatina es agua intracelular, no grasa","En perimenopausia los beneficios van más allá del gym: huesos, cerebro, músculo","Sin entrenamiento de fuerza los beneficios de composición son mínimos","Vegetarianas y veganas tienen más que ganar — parten de niveles más bajos"],
    myths:["Me va a poner enorme","Es solo para hombres","El peso que subí es grasa","Hincha","Solo si eres atleta","Daña los riñones","Necesito ciclarla","Para qué si no compito"]

  {
    id:"pesas",
    tag:"Mitos",
    title:"Levantar pesas te pone grande",
    preview:"El miedo que le ha costado más músculo a más mujeres que cualquier otra cosa. La biología dice algo completamente distinto.",
    content:"Si has evitado los pesos pesados por miedo a despertar un día convertida en culturista, este artículo es para ti. Porque ese miedo — aunque completamente comprensible dado lo que la industria del fitness ha comunicado históricamente — está basado en una biología que no es la tuya.\n\nLa razón por la que ese miedo no tiene base\n\nLos hombres que se ponen grandes levantando pesas tienen entre 10 y 30 veces más testosterona que las mujeres. La testosterona es la hormona que regula directamente la síntesis proteica muscular — qué tan rápido y cuánto músculo construye el cuerpo.\n\nTú produces entre 0.1 y 0.5 mg de testosterona al día. Un hombre produce entre 3 y 10 mg. Esa diferencia no es cosmética — es la razón biológica por la que la hipertrofia masiva en mujeres requiere años de entrenamiento extremadamente específico, excedentes calóricos sostenidos y, en la mayoría de los casos, intervención farmacológica.\n\nLevantar pesas con buena técnica y nutrición adecuada no te pone grande. Te pone definida. Son cosas distintas.\n\nLo que realmente pasa cuando una mujer levanta pesas\n\nEl músculo que construyes ocupa menos espacio que la grasa que reemplaza. Una mujer que pierde 2kg de grasa y gana 2kg de músculo pesa igual en la báscula pero cabe en una talla menos. La composición corporal cambió — el número no.\n\nEl tono que la mayoría de las mujeres busca no es otra cosa que músculo visible con poca grasa encima. No se logra evitando los pesos — se logra exactamente al revés.\n\nLo que pasa semana a semana\n\nSemanas 1–3: Las ganancias son neurológicas, no musculares. El sistema nervioso aprende a reclutar más fibras con más eficiencia. Te sientes más fuerte pero el músculo aún no ha crecido visiblemente.\n\nSemanas 4–8: Empieza la síntesis proteica muscular real. Las fibras se reparan más gruesas que antes. Todavía no es visible en el espejo, pero es real.\n\nMes 2–4: Aquí empieza a notarse. La ropa cae diferente. Los brazos se ven más definidos. Los glúteos cambian de forma — no de tamaño, de forma.\n\nMes 4–12: Cambios visibles sostenidos. En un año de entrenamiento consistente con buena nutrición, una mujer puede ganar entre 1 y 2.5kg de músculo. No 10. No 20. Entre 1 y 2.5kg — distribuidos en todo el cuerpo, que se traduce en una transformación visible pero proporcional.\n\nPara ponerte grande como temes: necesitarías años de entrenamiento especializado, un excedente calórico sostenido de cientos de calorías diarias, y la genética específica para ello. No ocurre por accidente.\n\nPor qué el cardio solo no funciona\n\nEl cardio quema calorías en el momento. Las pesas queman calorías en el momento Y aumentan el metabolismo basal — el número de calorías que quemas en reposo — porque el músculo es metabólicamente activo. Más músculo = más calorías quemadas las 24 horas, incluyendo mientras duermes.\n\nUna mujer que solo hace cardio puede perder peso pero pierde músculo junto con la grasa. Una que levanta pesas preserva el músculo y pierde grasa preferentemente. La báscula puede mostrar el mismo número pero el espejo cuenta una historia completamente diferente.\n\nEn perimenopausia el argumento se vuelve urgente\n\nA partir de los 35 años el cuerpo pierde entre 0.5 y 1% de masa muscular por año si no hay entrenamiento de fuerza que lo contrarreste. En perimenopausia, con la caída del estrógeno, ese proceso se acelera.\n\nEl entrenamiento de fuerza no es opcional en esta etapa — es el mecanismo más efectivo que existe para mantener composición corporal, densidad ósea y metabolismo activo. Evitarlo por miedo a ponerse grande es exactamente lo contrario de lo que la biología pide.",
    takeaways:["Las mujeres tienen 10-30x menos testosterona que los hombres — la masa extrema no ocurre por accidente","El tono que buscas ES músculo — no se logra evitando las pesas sino levantándolas","En un año de consistencia, una mujer gana 1-2.5kg de músculo — visible, proporcional","Después de los 35 el entrenamiento de fuerza no es opcional — es protección"],
    myths:["Me voy a poner como un hombre","Solo quiero tonificar","Prefiero el cardio","Los pesos livianos son suficientes","Eso es para competidoras","Se me van a agrandar los brazos","Empiezo con máquinas primero","El yoga es mejor para las mujeres"]
