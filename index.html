        )
      );
    }
    return this.props.children;
  }
}

// ─── HISTORIAL VIEW ──────────────────────────────────────────────────────────
function HistorialView({workoutLog}) {
  const [selected, setSelected] = React.useState(null);

  // Build merged session map: mi_entreno:* keys (sync) + workout_log entries
  var mergedLog = {};
  try {
    var lr = window.storage.list("mi_entreno:");
    if(lr && lr.keys) {
      lr.keys.forEach(function(k) {
        try {
          var r = window.storage.get(k);
          if(!r || !r.value) return;
          var d = JSON.parse(r.value);
          if(d && d.date) mergedLog[d.date] = d;
        } catch(e) {}
      });
    }
  } catch(e) {}
  // workout_log takes precedence (more recent/complete data)
  Object.assign(mergedLog, workoutLog||{});

  // Extract all exercises across all sessions — handles both data formats
  var allExercises = {};
  Object.entries(mergedLog).forEach(function([date, session]) {
    try {
      if(!session || typeof session !== "object") return;

      // ── Format A: MiEntreno ─────────────────────────────────────
      // session.ejercicios (direct) or session.miEntreno.ejercicios (nested)
      var miEjs = session.ejercicios ||
        (session.miEntreno && Array.isArray(session.miEntreno.ejercicios)
          ? session.miEntreno.ejercicios : null) ||
        [];
      miEjs.forEach(function(ej) {
        if(!ej || (!ej.nombre && !ej.name)) return;
        var ejName = ej.nombre || ej.name;
        if(!allExercises[ejName]) allExercises[ejName] = [];
        var maxPeso = 0, maxReps = 0;
        var series = Array.isArray(ej.series) ? ej.series : [];
        series.forEach(function(s) {
          if(!s) return;
          var p = parseFloat(s.peso); var r = parseInt(s.reps);
          if(!isNaN(p) && p > maxPeso) maxPeso = p;
          if(!isNaN(r) && r > maxReps) maxReps = r;
        });
        // Always register the session (even with 0 values — tracks times done)
        allExercises[ejName].push({date:date, maxPeso:isNaN(maxPeso)?0:maxPeso, maxReps:isNaN(maxReps)?0:maxReps});
      });

      // ── Format B: Standard gym workout ──────────────────────────
      // session.exercises[].{performed, weight, reps}
      var gymEjs = Array.isArray(session.exercises) ? session.exercises : [];
      gymEjs.forEach(function(ex) {
        if(!ex || !ex.performed) return;
        var ejName = ex.performed;
        if(!allExercises[ejName]) allExercises[ejName] = [];
        var maxPeso = parseFloat(ex.weight)||0;
        var maxReps = parseInt(ex.reps)||0;
        allExercises[ejName].push({date:date, maxPeso:isNaN(maxPeso)?0:maxPeso, maxReps:isNaN(maxReps)?0:maxReps});
      });
    } catch(e) { /* skip malformed entries */ }
  });

  // Sort each exercise's sessions by date
  Object.keys(allExercises).forEach(function(k) {
    allExercises[k].sort(function(a,b){return a.date.localeCompare(b.date);});
  });

  var exerciseNames = Object.keys(allExercises).sort();

  if(exerciseNames.length === 0) return (
    React.createElement("div", {style:{padding:"40px 20px",textAlign:"center"}},
      React.createElement("div", {style:{fontSize:32,marginBottom:12}}, "📈"),
      React.createElement("div", {style:{fontSize:14,color:G.crm,fontWeight:500,marginBottom:6}},
        "Aún no hay datos de historial"
      ),
      React.createElement("div", {style:{fontSize:12,color:G.sft,lineHeight:1.7}},
        "Registra pesos o repeticiones en Mi Entreno para ver tu progreso aquí."
      )
    )
  );

  // ── HELPERS ───────────────────────────────────────────────────────
  function relDate(dateStr) {
    try {
      var parts = dateStr.split("-");
      var d = new Date(+parts[0], +parts[1]-1, +parts[2]);
      var today = new Date(); today.setHours(0,0,0,0);
      var diff = Math.round((today - d) / 86400000);
      if(diff === 0) return "hoy";
      if(diff === 1) return "ayer";
      if(diff < 7) return "hace "+diff+" días";
      if(diff < 14) return "hace 1 sem";
      return "hace "+Math.round(diff/7)+" sem";
    } catch(e) { return dateStr; }
  }

  function fmtDate(dateStr) {
    var months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    try {
      var parts = dateStr.split("-");
      return parts[2]+" "+months[parseInt(parts[1])-1];
    } catch(e) { return dateStr; }
  }

  // Mini bar sparkline — last 5 sessions
  function Sparkline(props) {
    var svSessions = props.sessions;
    var last5 = svSessions.slice(-5);
    var vals = last5.map(function(s){ return s.maxPeso||0; });
    var maxVal = Math.max.apply(null, vals);
    if(maxVal === 0) return null;
    var H=16, barW=5, gap=3;
    return React.createElement("svg",{width:last5.length*(barW+gap)-gap,height:H,
      style:{display:"block",marginTop:5}},
      vals.map(function(v,i){
        var bh = Math.max(3, Math.round((v/maxVal)*H));
        var isLast = i===vals.length-1;
        return React.createElement("rect",{key:i,
          x:i*(barW+gap), y:H-bh, width:barW, height:bh, rx:2,
          fill: isLast ? G.terra : G.mut
        });
      })
    );
  }

  // Sort: most recently trained first
  var sortedNames = Object.keys(allExercises).sort(function(a,b){
    var la = allExercises[a][allExercises[a].length-1].date;
    var lb = allExercises[b][allExercises[b].length-1].date;
    return lb.localeCompare(la);
  });

  // ── DETAIL VIEW ───────────────────────────────────────────────────
  if(selected && allExercises[selected]) {
    var sessions = allExercises[selected];
    var pr = sessions.reduce(function(max,s){return s.maxPeso>max?s.maxPeso:max;},0);
    var first = sessions[0];
    var lastS = sessions[sessions.length-1];
    var totalGain = (pr>0 && first.maxPeso>0) ? +(pr-first.maxPeso).toFixed(1) : 0;
    // Bar chart for all sessions with peso
    var pesoSessions = sessions.filter(function(s){return s.maxPeso>0;});
    var chartMax = pr || 1;
    return React.createElement("div", null,
      React.createElement("button",{

function RestTimer({suggestedSecs}) {
  const [active, setActive] = useState(false);
  const [secs, setSecs] = useState(suggestedSecs||90);
  const [remaining, setRemaining] = useState(null);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);
  const totalRef = useRef(secs);

  const start = (s) => {
    if(intervalRef.current) clearInterval(intervalRef.current);
    totalRef.current = s;
    setSecs(s);
    setRemaining(s);
    setDone(false);
    setActive(true);
    intervalRef.current = setInterval(()=>{
      setRemaining(r=>{
        if(r<=1){
          clearInterval(intervalRef.current);
          setDone(true);
          setActive(false);
          if(navigator.vibrate) navigator.vibrate([200,100,200]);
          return 0;
        }
        return r-1;
      });
    },1000);
  };

  const stop = () => {
    clearInterval(intervalRef.current);
    setActive(false);
    setRemaining(null);
    setDone(false);
  };

  useEffect(()=>()=>clearInterval(intervalRef.current),[]);

  const pct = active && remaining!==null ? remaining/totalRef.current : 0;
  const r = 22, circ = 2*Math.PI*r;

  if(done) return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:"rgba(90,122,98,0.15)",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:18,border:"2px solid rgba(90,122,98,0.4)"}}>✓</div>
      <span style={{fontSize:12,color:G.grn,fontWeight:600}}>¡A por ello!</span>
      <button onClick={stop} style={{marginLeft:"auto",fontSize:11,color:G.mut,
        background:"transparent",border:"none",cursor:"pointer"}}>✕</button>
    </div>
  );

  if(active && remaining!==null) return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8,
      background:"rgba(90,122,98,0.06)",borderRadius:12,padding:"8px 12px"}}>
      <svg width={50} height={50}>
        <circle cx={25} cy={25} r={r} fill="none" stroke="rgba(90,122,98,0.15)" strokeWidth={3}/>
        <circle cx={25} cy={25} r={r} fill="none" stroke={G.grn} strokeWidth={3}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          strokeLinecap="round" transform="rotate(-90 25 25)"
          style={{transition:"stroke-dashoffset .9s linear"}}/>
        <text x={25} y={30} textAnchor="middle" fontSize={12} fontWeight={700}
          fill={G.crm}>{remaining}</text>
      </svg>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:G.crm}}>Descansando</div>
        <div style={{fontSize:11,color:G.sft}}>{Math.ceil(remaining/60)}:{String(remaining%60).padStart(2,"0")} restante</div>
      </div>
      <button onClick={stop} style={{marginLeft:"auto",fontSize:11,color:G.mut,
        background:"transparent",border:"none",cursor:"pointer",padding:"4px 8px"}}>✕</button>
    </div>
  );

  return (
    <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
      <span style={{fontSize:10,color:G.mut}}>⏱</span>
      {[60,90,120].map(s=>(
        <button key={s} onClick={()=>start(s)}
          style={{fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",
            background:s===suggestedSecs?"rgba(90,122,98,0.12)":"transparent",
            border:`1px solid ${s===suggestedSecs?"rgba(90,122,98,0.4)":G.bor}`,
            color:s===suggestedSecs?G.grn:G.sft,
            fontWeight:s===suggestedSecs?600:400}}>
          {s===60?"1min":s===90?"1:30":"2min"}
        </button>
      ))}
    </div>
  );
}

                    <div className="eg-hd" onClick={()=>{const el=document.getElementById(id);const btn=document.getElementById(id+"_btn");if(el){el.classList.toggle("open");btn.textContent=el.classList.contains("open")?"−":"+";}}}>

      {view==="supps"&&(

            const sp=SUPPS(profile);
            const taken=sp.filter(s=>suppChecked[s.n]).length;
            const isMale=profile?.gender==="male";

            const tags=[];
            if(isMale) tags.push({l:"Hombre activo",c:"#7A9E8A"});

                <div style={{marginBottom:16}}>

                    {tags.map((t,i)=>(

                    ))}
                  </div>
                </div>
                <div className="card" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                  <div>
                    <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Tomados hoy</div>
                    <div className="serif" style={{fontSize:28,fontWeight:500,color:G.crm}}>{taken} <span style={{fontSize:14,color:G.sft,fontFamily:"DM Sans"}}>/ {sp.length}</span></div>
                  </div>
                  <svg width={60} height={60} viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="24" fill="none" stroke={G.bor} strokeWidth="5"/>
                    <circle cx="30" cy="30" r="24" fill="none" stroke={taken===sp.length?G.grl:G.grn}
                      strokeWidth="5" strokeLinecap="round"
                      strokeDasharray={2*Math.PI*24} strokeDashoffset={2*Math.PI*24*(1-taken/sp.length)}
                      transform="rotate(-90 30 30)"/>
                  </svg>
                </div>
                {["alta","media"].map(pr=>(
                  <div key={pr}>
                    <div style={{fontSize:11,color:pr==="alta"?G.acc:G.mut,letterSpacing:1,textTransform:"uppercase",margin:"16px 0 10px"}}>● Prioridad {pr==="alta"?"Alta":"Media"}</div>
                    {sp.filter(s=>s.pr===pr).map((s,i)=>{
                      const done=!!suppChecked[s.n];
                      return(
                        <div key={i} className={`supi${done?" done":""}`} onClick={()=>toggleSupp(s.n)}>
                          <div className="supck">{done?"✓":""}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                              <span style={{fontSize:14,fontWeight:500,color:G.crm,textDecoration:done?"line-through":"none",opacity:done?.6:1}}>{s.n}</span>
                              <span style={{fontSize:11,color:G.sft,whiteSpace:"nowrap",flexShrink:0}}>{s.d}</span>
                            </div>
                            {s.t && <div style={{fontSize:11,color:G.grn,marginTop:3,fontWeight:500}}>⏰ {s.t}</div>}
                  {s.hi
                              ? <div style={{fontSize:11,color:G.sft,marginTop:3,fontWeight:500}}>⚡ {s.perf}</div>
                              : <div style={{fontSize:11,color:G.mut,marginTop:3}}>{s.perf}</div>
                            }
                            <div style={{fontSize:12,color:G.sft,marginTop:4,lineHeight:1.5}}>{s.why}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
                <div style={{background:"rgba(90,122,98,.06)",border:"1px solid rgba(74,155,111,.2)",borderRadius:20,padding:14,marginTop:16,fontSize:12,color:G.sft,lineHeight:1.7}}>
                  💡 Consulta con tu médico antes de iniciar cualquier protocolo. Para D3 solicita un análisis de sangre primero.
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* SWAP MODAL */}
      {swapModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,
          display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}
          onClick={e=>{if(e.target===e.currentTarget)setSwapModal(null);}}>
          <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:"20px 20px 0 0",
            padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:G.bor,borderRadius:2,margin:"0 auto 20px"}}/>
            <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:4}}>Alternativas para</div>
            <div style={{fontSize:14,color:G.acc,fontWeight:600,marginBottom:16}}>{swapModal.ex.n}</div>
            {exPrefs[swapModal.ex.n]&&(
              <button onClick={()=>{const np={...exPrefs};delete np[swapModal.ex.n];setExPrefs(np);save("exPrefs",np);setSwapModal(null);}}
                style={{width:"100%",background:"rgba(200,132,90,.08)",border:`1.5px solid ${G.acc}`,borderRadius:20,
                  padding:"12px 16px",cursor:"pointer",marginBottom:12,color:G.sft,fontSize:13,fontWeight:500}}>
                ↩ Volver al ejercicio original
              </button>
            )}
            {(ALT[swapModal.ex.n]||[]).map((alt,i)=>{
              const isActive=exPrefs[swapModal.ex.n]?.n===alt.n;
              return(
                <button key={i} onClick={()=>{const np={...exPrefs,[swapModal.ex.n]:alt};setExPrefs(np);save("exPrefs",np);setSwapModal(null);}}
                  style={{width:"100%",background:isActive?"rgba(90,122,98,.12)":"transparent",
                    border:`1.5px solid ${isActive?G.grn:G.bor}`,borderRadius:16,
                    padding:"14px 16px",cursor:"pointer",marginBottom:10,textAlign:"left",transition:"all .2s"}}>
                  <div style={{fontSize:13,fontWeight:600,color:isActive?G.grl:G.crm,marginBottom:4}}>{alt.n}</div>
                  <div style={{fontSize:11,color:G.acc,marginBottom:4}}>{alt.r}</div>
                  <div style={{fontSize:11,color:G.sft}}>{alt.mu}</div>
                </button>
              );
            })}
            <button onClick={()=>setSwapModal(null)}
              style={{width:"100%",background:"transparent",border:`1px solid ${G.bor}`,
                borderRadius:10,padding:"11px",color:G.sft,fontSize:13,cursor:"pointer",marginTop:4}}>
              Cancelar

      )}
    </div>
  );
}

// ─── DISEÑADO SCREEN ──────────────────────────────────────────────────────────
function DisenadoScreen({gymDay, workoutLog, profile, meals, setMeals, onShowToast}) {
  const [swaps, setSwaps] = useState({desayuno:0,almuerzo:0,cena:0,snack:0});
  const [expanded, setExpanded] = useState(null);
  const [added, setAdded] = useState({});

  const todayType = getEffectiveDayType(gymDay||0, workoutLog||{});
  // If profile has macros, use calcTargets for personalized values; fallback to fixed table
  const calcTarget = profile?.weight ? calcTargets(profile, todayType) : null;
  const target = calcTarget
    ? {cal:calcTarget.calories, p:calcTarget.protein, c:calcTarget.carbs, f:calcTarget.fat,
       label:PLAN_MACROS[todayType]?.label||"Hoy", emoji:PLAN_MACROS[todayType]?.emoji||"🍽️"}
    : (PLAN_MACROS[todayType] || PLAN_MACROS.rest);

  // Daily seed: changes each day, deterministic
  const today = new Date();
  const start = new Date(today.getFullYear(),0,0);
  const dayOfYear = Math.floor((today-start)/86400000);
  const seed = today.getFullYear()*400+dayOfYear;

  // SVG line icons per meal slot
  const SLOT_ICONS = {
    desayuno: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>,
    almuerzo: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/><circle cx="12" cy="12" r="8"/><path d="M8 12a4 4 0 0 1 8 0"/></svg>,
    cena:     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
    snack:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  };

  // Day type → compatible recipe tags
  const DAY_COMPAT = {
    gym_legs:  ["legs","gym","all",undefined],
    gym_upper: ["upper","gym","all",undefined],
    gym_full:  ["gym","all",undefined],
    rest:      ["rest","all",undefined],
  };
  const compat = DAY_COMPAT[todayType] || ["all",undefined];

  // Build today's plan — filter by dayType, then sort by calorie proximity, rotate within top 4
  const plan = MEAL_SLOTS.map(function(slot,slotIdx){
    var pool = RECIPES.filter(function(r){
      return slot.cats.indexOf(r.cat) !== -1 &&
             compat.indexOf(r.dayType) !== -1;
    });
    // Fallback: if no day-typed recipes found, use all recipes for this category
    if(pool.length === 0) {
      pool = RECIPES.filter(function(r){ return slot.cats.indexOf(r.cat) !== -1; });
    }
    if(!pool.length) return {slot, recipe:RECIPES[0]};
    // Sort by distance from slot calorie target
    var slotTarget = target.cal * slot.pct;
    var sorted = pool.slice().sort(function(a,b){
      return Math.abs(a.cal-slotTarget) - Math.abs(b.cal-slotTarget);
    });
    // Rotate within top 4 closest for variety
    var topN = Math.min(4, sorted.length);
    var idx = (seed + slotIdx*7 + (swaps[slot.id]||0)) % topN;
    return {slot, recipe:sorted[idx]};
  });

  // Macro totals
  const totals = plan.reduce(function(acc,item){
    return {cal:acc.cal+(item.recipe.cal||0), p:acc.p+(item.recipe.p||0),
            c:acc.c+(item.recipe.c||0), f:acc.f+(item.recipe.f||0)};
  },{cal:0,p:0,c:0,f:0});

  const pctCal = Math.min(100,Math.round((totals.cal/target.cal)*100));
  const pctP   = Math.min(100,Math.round((totals.p/target.p)*100));

  const swap = (slotId,e)=>{e.stopPropagation();setSwaps(prev=>({...prev,[slotId]:(prev[slotId]||0)+1}));};

  // Per-slot accent colors (left border only)
  const SLOT_ACCENT = {
    desayuno: "#C8922A",
    almuerzo: "#4A7A56",
    cena:     "#3D5278",
    snack:    "#C68B77",
  };

  return(
    <div className="fi" style={{paddingBottom:32}}>

      {/* ── HEADER ── */}
      <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:11,color:G.sft,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:2}}>Tu plan</div>
          <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm,lineHeight:1}}>A la carta</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:G.terra,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>{target.label}</div>
          <div style={{fontSize:22,fontWeight:700,color:G.crm,lineHeight:1.1}}>{target.cal}<span style={{fontSize:12,color:G.sft,fontWeight:400}}> kcal</span></div>
        </div>
      </div>

      {/* ── MEAL CARDS ── */}
      {plan.map(function(item){
        const isExp = expanded===item.slot.id;
        const r = item.recipe;
        const accent = SLOT_ACCENT[item.slot.id];
        return(
          <div key={item.slot.id} style={{background:G.card,borderRadius:16,marginBottom:12,
            border:`1px solid ${G.bor}`,overflow:"hidden",
            borderLeft:`4px solid ${accent}`}}>

            {/* Card header */}
            <div style={{padding:"14px 14px 14px 12px",display:"flex",
              alignItems:"flex-start",gap:12,cursor:"pointer"}}
              onClick={()=>setExpanded(isExp?null:item.slot.id)}>
              {/* Icon circle with accent color */}
              <div style={{width:36,height:36,borderRadius:"50%",flexShrink:0,
                background:accent+"18",display:"flex",alignItems:"center",
                justifyContent:"center",marginTop:1,color:accent}}>
                {SLOT_ICONS[item.slot.id]}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:G.sft,textTransform:"uppercase",
                  letterSpacing:"0.1em",fontWeight:600,marginBottom:3}}>{item.slot.label}</div>
                <div style={{fontSize:15,fontWeight:600,color:G.crm,lineHeight:1.3,
                  marginBottom:5}}>{r.n}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:700,color:accent}}>{r.cal} kcal</span>
                  <span style={{fontSize:11,color:G.sft}}>{r.p}g P · {r.c}g C · {r.f}g G</span>
                  <span style={{fontSize:11,color:G.mut}}>⏱ {r.time}</span>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",
                gap:8,flexShrink:0,paddingTop:2}}>
                <button onClick={(e)=>swap(item.slot.id,e)}
                  style={{width:30,height:30,background:G.bg,border:`1px solid ${G.bor}`,
                    borderRadius:"50%",cursor:"pointer",color:G.sft,
                    display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                  </svg>
                </button>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={G.mut} strokeWidth="2.5" strokeLinecap="round">
                  {isExp ? <polyline points="18 15 12 9 6 15"/> : <polyline points="6 9 12 15 18 9"/>}
                </svg>
              </div>
            </div>

            {/* Expanded detail */}
            {isExp&&(
              <div style={{padding:"0 14px 16px 12px",borderTop:`1px solid ${G.bor}`}}>
                <div style={{marginBottom:12,paddingTop:12}}>
                  <div style={{fontSize:10,fontWeight:700,color:G.crm,letterSpacing:"0.1em",
                    textTransform:"uppercase",marginBottom:8}}>Ingredientes</div>
                  {r.ing.map((ing,i)=>(
                    <div key={i} style={{fontSize:13,color:G.sft,padding:"5px 0",
                      borderBottom:`1px solid ${G.bor}`}}>· {ing}</div>
                  ))}
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,color:G.crm,letterSpacing:"0.1em",
                    textTransform:"uppercase",marginBottom:8}}>Preparación</div>
                  {r.steps.map((step,i)=>(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                      <div style={{width:18,height:18,borderRadius:"50%",background:accent,
                        color:"#fff",fontSize:10,fontWeight:700,flexShrink:0,
                        display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
                      <span style={{fontSize:13,color:G.sft,lineHeight:1.6}}>{step}</span>
                    </div>
                  ))}
                </div>
                {r.tip&&(
                  <div style={{background:G.bg,borderRadius:10,padding:"10px 12px",
                    borderLeft:`3px solid ${accent}`,marginBottom:12}}>
                    <span style={{fontSize:12,color:G.crm}}>💡 {r.tip}</span>
                  </div>
                )}
                {/* Agregar al registro */}
                {setMeals && (
                  <button
                    onClick={e=>{
                      e.stopPropagation();
                      const SLOT_MAP = {desayuno:"breakfast",almuerzo:"lunch",cena:"supper",snack:"snack"};
                      const key = SLOT_MAP[item.slot.id] || item.slot.id;
                      const foodItem = {
                        id: Date.now()+Math.random(),
                        name: r.n,
                        k: r.cal, calories: r.cal,
                        p: r.p,   protein: r.p,
                        c: r.c,   carbs: r.c,
                        f: r.f,   fat: r.f,
                        fi: r.fi||0, fiber: r.fi||0,
                        grams: 100,
                      };
                      setMeals(m=>({...m,[key]:[...(m[key]||[]),foodItem]}));
                      setAdded(a=>({...a,[key]:true}));
                      if(onShowToast) onShowToast(`✓ ${r.n} agregado al ${item.slot.label||key}`);
                      setTimeout(()=>setAdded(a=>({...a,[key]:false})),2500);

function ProyectoSintesisCard({proj, projRegs, projColor, anthropicKey}) {
  const [loading, setLoading] = useState(false);
  const [sintesis, setSintesis] = useState(null);
  const [savedAt, setSavedAt] = useState(null);
  const weekKey = "sintesis_semanal:" + proj.id + ":" + (()=>{
    const d = new Date(); const mon = new Date(d);
    mon.setDate(d.getDate() - d.getDay() + 1);
    return mon.toISOString().slice(0,10);
  })();

  useEffect(()=>{
    loadJSON(weekKey).then(s=>{ if(s?.result){setSintesis(s.result);setSavedAt(s.savedAt);} });
  },[]);

  const generate = async() => {
    if(!anthropicKey){setSintesis({error:"Sin clave IA. Configúrala en ≡ → Más."});return;}
    setLoading(true);
    const today = new Date(); const weekAgo = new Date(today); weekAgo.setDate(today.getDate()-7);
    const recentRegs = projRegs.filter(r=> new Date(r.fecha) >= weekAgo);
    const evidenciasText = recentRegs.map(r=>`  [${r.fecha}] ${r.tag?"#"+r.tag+" ":""}"${r.evidencia||""}"`).join("\n") || "  Sin evidencias esta semana";
    const metricTrends = (proj.metricas||[]).map(m=>{
      const vals = recentRegs.map(r=>parseFloat(r.metricas?.[m.id])||null).filter(v=>v);
      if(!vals.length) return null;
      const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const trend = vals.length>1?(vals[vals.length-1]>vals[0]?"↑":vals[vals.length-1]<vals[0]?"↓":"→"):"";
      return `  ${m.nombre}: promedio ${avg}/5 ${trend} (${vals.length} registros)`;
    }).filter(Boolean).join("\n") || "  Sin métricas esta semana";

    const prompt = `Eres el coach de Fundamental. Analiza la semana de este proyecto.

PROYECTO: ${proj.nombre}
AFIRMACIÓN: "${proj.afirmacion||""}"
VISIÓN: "${(proj.vision||"").slice(0,200)}"

EVIDENCIAS ÚLTIMOS 7 DÍAS (${recentRegs.length}):
${evidenciasText}

MÉTRICAS:
${metricTrends}

HITOS: ${(proj.milestones||[]).filter(m=>m.texto).map(m=>`${m.texto} (${m.done?"✓ logrado":"pendiente "+m.fecha})`).join(" · ")}

Genera una síntesis semanal concisa. Responde SOLO con JSON válido:
{"patron":"1-2 frases sobre el patrón principal que emerge de las evidencias","numeros":"1-2 frases sobre tendencias en métricas. Si no hay datos, di que aún no hay suficientes.","pregunta":"Una pregunta específica y poderosa para llevar a la próxima semana, basada en los datos reales"}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":anthropicKey,
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,
          system:"Responde ÚNICAMENTE con JSON válido y completo. Sin texto adicional.",
          messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||"").join("");
      const jsonStart = text.indexOf("{"); const jsonEnd = text.lastIndexOf("}");
      const clean = jsonStart!==-1&&jsonEnd>jsonStart ? text.slice(jsonStart,jsonEnd+1) : text;
      const parsed = JSON.parse(clean);
      setSintesis(parsed);
      const at = new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
      setSavedAt(at);
      save(weekKey,{result:parsed,savedAt:at,generatedAt:new Date().toISOString()});
    } catch(e){ setSintesis({error:"Error generando síntesis. Intenta de nuevo."}); }
    setLoading(false);
  };

  return (
    <div style={{marginBottom:16}}>
      {sintesis && !sintesis.error && (
        <div style={{background:"linear-gradient(135deg,#1A1410,#2A1E14)",borderRadius:16,
          padding:"16px",marginBottom:10,border:`1px solid ${projColor.hex}33`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:10,color:`${projColor.hex}99`,letterSpacing:"0.12em",
              textTransform:"uppercase",fontWeight:600}}>✦ Síntesis de la semana</div>
            {savedAt&&<button onClick={generate} disabled={loading}
              style={{fontSize:9,color:"rgba(249,245,240,0.25)",background:"transparent",
                border:"none",cursor:"pointer"}}>Actualizar →</button>}
          </div>
          {sintesis.patron&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:`${projColor.hex}66`,textTransform:"uppercase",
                letterSpacing:"0.1em",marginBottom:4}}>Patrón</div>
              <div style={{fontSize:13,color:"rgba(249,245,240,0.85)",lineHeight:1.65}}>
                {sintesis.patron}
              </div>
            </div>
          )}
          {sintesis.numeros&&(
            <div style={{marginBottom:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:9,color:`${projColor.hex}66`,textTransform:"uppercase",
                letterSpacing:"0.1em",marginBottom:4}}>Números</div>
              <div style={{fontSize:13,color:"rgba(249,245,240,0.7)",lineHeight:1.65}}>
                {sintesis.numeros}
              </div>
            </div>
          )}
          {sintesis.pregunta&&(
            <div style={{paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",
                fontSize:14,color:`rgba(212,168,83,0.85)`,lineHeight:1.7}}>
                "{sintesis.pregunta}"
              </div>
            </div>
          )}
        </div>
      )}
      {sintesis?.error&&(
        <div style={{background:"rgba(198,80,80,0.08)",border:"1px solid rgba(198,80,80,0.2)",
          borderRadius:12,padding:"12px",marginBottom:10,fontSize:12,color:"#C65050"}}>
          {sintesis.error}
        </div>
      )}
      <button onClick={sintesis&&!sintesis.error?generate:generate} disabled={loading}
        style={{width:"100%",background:"transparent",border:`1px solid ${projColor.hex}55`,
          borderRadius:14,padding:"12px",fontSize:13,fontWeight:500,
          color:projColor.hex,cursor:loading?"wait":"pointer"}}>
        {loading?"Analizando semana...":sintesis&&!sintesis.error?"✦ Re-generar síntesis":"✦ Síntesis de la semana"}
      </button>
    </div>
  );
}

function MetricaSparkline({vals, color, H=32}) {
  if(!vals || vals.length < 2) return null;
  const max = Math.max(...vals) || 1;
  const min = Math.min(...vals);
  const range = max - min || 1;
  const n = Math.min(7, vals.length);
  const last = vals.slice(-n);
  const bW = 10, gap = 3, W = n*(bW+gap)-gap;
  return (
    <svg width={W} height={H} style={{display:"block"}}>
      {last.map((v,i)=>{
        const h = Math.max(3, Math.round(((v-min)/range)*H));
        const isLast = i===last.length-1;
        return <rect key={i} x={i*(bW+gap)} y={H-h} width={bW} height={h} rx={2}
          fill={isLast ? color : color+"55"}/>;
      })}
    </svg>
  );
}

}

function ProyectosScreen({profile, anthropicKey}) {
  const [data, setData] = useState({projects:[], registros:[]});
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("list");
  const [selectedId, setSelectedId] = useState(null);
  const [detailTab, setDetailTab] = useState("vision");
  const [editingId, setEditingId] = useState(null);

  const EMPTY_FORM = {nombre:"",fechaInicio:"",fechaFin:"",vision:"",color:"terra",metricas:[],
    premiseAncla:"",afirmacion:"",visualizacion:"",milestones:[{id:"m1",texto:"",fecha:"",done:false},{id:"m2",texto:"",fecha:"",done:false},{id:"m3",texto:"",fecha:"",done:false}]};
  const [cForm, setCForm] = useState(EMPTY_FORM);
  const [newMetrica, setNewMetrica] = useState({nombre:"",tipo:"escala",unidad:""});
  const [cStep, setCStep] = useState(1);
  const [regForm, setRegForm] = useState({evidencia:"",tag:""});

  useEffect(()=>{
    loadJSON(PROYECTOS_KEY).then(d=>{ if(d) setData(d); setLoading(false); });
  },[]);

  const persist = async(nd) => { setData(nd); await save(PROYECTOS_KEY, nd); };
  const today = localDateStr();

  if(loading) return <div style={{padding:40,textAlign:"center",color:G.sft,fontSize:13}}>Cargando...</div>;

  const projects = data.projects || [];
  const registros = data.registros || [];
  const proj = projects.find(p=>p.id===selectedId);
  const projColor = proj ? (PROJ_COLORS.find(c=>c.id===proj.color)||PROJ_COLORS[0]) : PROJ_COLORS[0];
  const projRegs = proj ? registros.filter(r=>r.proyectoId===proj.id).sort((a,b)=>b.fecha.localeCompare(a.fecha)) : [];

  // ── REGISTRO MODAL ──────────────────────────────────────────────
  // ── REGISTER EVIDENCE SCREEN ────────────────────────────────────
  if(view==="registerEvidence" && proj) return (
    <div className="fi">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <button onClick={()=>{setView("detail");setDetailTab("evidencias");setRegForm({evidencia:"",tag:"",metricas:{}});}}
          style={{background:"transparent",border:"none",color:G.terra,fontSize:13,cursor:"pointer",padding:0}}>
          ← Volver
        </button>
      </div>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:400,color:G.crm,marginBottom:4}}>
        Registrar evidencia
      </div>
      <div style={{fontSize:12,color:G.sft,marginBottom:24}}>{proj.nombre}</div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:600,color:G.crm,letterSpacing:"0.08em",
          textTransform:"uppercase",marginBottom:8}}>¿Qué hiciste hoy hacia este proyecto?</div>
        <textarea value={regForm.evidencia}
          onChange={e=>setRegForm(p=>({...p,evidencia:e.target.value}))}
          placeholder="Describe tu acción o avance de hoy..."
          autoFocus
          style={{width:"100%",minHeight:120,border:`1.5px solid ${regForm.evidencia.trim()?projColor.hex:G.bor}`,
            borderRadius:14,padding:"14px",fontSize:14,color:G.crm,background:G.card,
            resize:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",
            lineHeight:1.7,outline:"none",transition:"border-color .2s"}}/>
      </div>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:600,color:G.crm,letterSpacing:"0.08em",
          textTransform:"uppercase",marginBottom:10}}>Tag (opcional)</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["consistencia","progreso","foco","energía","conexión","desafío"].map(t=>(
            <button key={t} onClick={()=>setRegForm(p=>({...p,tag:p.tag===t?"":t}))}
              style={{fontSize:12,padding:"7px 14px",borderRadius:20,cursor:"pointer",
                background:regForm.tag===t?projColor.hex:projColor.light,
                color:regForm.tag===t?"#fff":projColor.hex,
                border:`1px solid ${projColor.hex}44`,fontWeight:regForm.tag===t?600:400}}>
              #{t}
            </button>
          ))}
        </div>
      </div>
      <button disabled={!regForm.evidencia.trim()}
        onClick={async()=>{
          const reg = {id:"reg_"+Date.now(),proyectoId:proj.id,fecha:today,
            evidencia:regForm.evidencia.trim(),tag:regForm.tag,
            metricas:{},createdAt:new Date().toISOString()};
          const nd = {...data,registros:[...(data.registros||[]),reg]};
          await persist(nd);
          setRegForm({evidencia:"",tag:""});
          setView("detail");
          setDetailTab("evidencias");
        }}
        style={{width:"100%",padding:"16px",borderRadius:14,border:"none",
          background:regForm.evidencia.trim()?projColor.hex:"#C8C0B8",
          fontSize:15,fontWeight:600,color:"#fff",
          cursor:regForm.evidencia.trim()?"pointer":"default"}}>
        Guardar evidencia →
      </button>
    </div>
  );

  // ── DETAIL VIEW ──────────────────────────────────────────────────
  if(view==="detail" && proj) return (
    <div className="fi">
      {/* Back + actions */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={()=>{setView("list");setDetailTab("vision");}}
          style={{background:"transparent",border:"none",color:G.terra,
            fontSize:13,cursor:"pointer",padding:0}}>← Proyectos</button>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <button onClick={()=>{
            // Pre-populate create form with existing project data
            setCForm({
              nombre: proj.nombre,
              fechaInicio: proj.fechaInicio||"",
              fechaFin: proj.fechaFin||"",
              vision: proj.vision||"",
              color: proj.color||"terra",
              metricas: proj.metricas||[],
              premiseAncla: proj.premiseAncla||"",
              afirmacion: proj.afirmacion||"",
              visualizacion: proj.visualizacion||"",
              milestones: proj.milestones||[{id:"m1",texto:"",fecha:"",done:false},{id:"m2",texto:"",fecha:"",done:false},{id:"m3",texto:"",fecha:"",done:false}],
            });
            setEditingId(proj.id);
            setCStep(1);
            setView("create");
          }} style={{background:"transparent",border:"none",color:projColor.hex,
            fontSize:12,fontWeight:600,cursor:"pointer"}}>
            Editar
          </button>
          <button onClick={async()=>{
            if(!confirm("¿Eliminar este proyecto?")) return;
            const nd = {...data,
              projects:projects.filter(p=>p.id!==proj.id),
              registros:registros.filter(r=>r.proyectoId!==proj.id)};
            await persist(nd); setView("list");
          }} style={{background:"transparent",border:"none",color:G.sft,fontSize:12,cursor:"pointer"}}>
            Eliminar
          </button>
        </div>
      </div>

      {/* Header */}
      <div style={{background:G.card,borderRadius:16,padding:"16px",
        borderLeft:`4px solid ${projColor.hex}`,border:`1px solid ${G.bor}`,
        borderLeftWidth:4,marginBottom:16}}>
        <div style={{fontSize:19,fontWeight:700,color:G.crm,marginBottom:2}}>{proj.nombre}</div>
        <div style={{fontSize:12,color:G.sft,marginBottom:10}}>{proj.horizonte}</div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1,textAlign:"center",background:projColor.light,
            borderRadius:10,padding:"8px 4px"}}>
            <div style={{fontSize:16,fontWeight:700,color:projColor.hex}}>{projRegs.length}</div>
            <div style={{fontSize:9,color:G.sft}}>registros</div>
          </div>
          <div style={{flex:1,textAlign:"center",background:projColor.light,
            borderRadius:10,padding:"8px 4px"}}>
            <div style={{fontSize:16,fontWeight:700,color:projColor.hex}}>
              {projRegs[0]?.fecha===today ? "Hoy ✓" : projRegs[0] ?
                Math.floor((new Date()-new Date(projRegs[0].fecha))/86400000)+"d" : "—"}
            </div>
            <div style={{fontSize:9,color:G.sft}}>último registro</div>
          </div>
          <div style={{flex:1,textAlign:"center",background:projColor.light,
            borderRadius:10,padding:"8px 4px"}}>
            <div style={{fontSize:16,fontWeight:700,color:projColor.hex}}>
              {([...new Map((proj.metricas||[]).map(m=>[m.nombre,m])).values()]).length||0}
            </div>
            <div style={{fontSize:9,color:G.sft}}>métricas</div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {["vision","metricas","evidencias"].map(t=>(
          <button key={t} onClick={()=>setDetailTab(t)}
            style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",cursor:"pointer",
              fontSize:12,fontWeight:500,
              background:detailTab===t?projColor.hex:G.bg,
              color:detailTab===t?"#fff":G.sft}}>
            {t==="vision"?"Visión":t==="metricas"?"Métricas":"Evidencias"}
          </button>
        ))}
      </div>

      {/* Tab: Visión */}
      {detailTab==="vision" && (
        <ProyectoVisionTab proj={proj} projColor={projColor} data={data}
          projects={projects} persist={persist} setView={setView}/>
      )}

      {/* Tab: Métricas */}
      {detailTab==="metricas" && (
        <div>
          {proj.metricas?.length===0 ? (
            <div style={{textAlign:"center",padding:"30px 0",color:G.sft,fontSize:13}}>
              Sin métricas. Edita el proyecto para agregar.
            </div>
          ) : proj.metricas
              .filter((m,i,arr)=>arr.findIndex(x=>x.id===m.id||x.nombre===m.nombre)===i)
              .map(m=>{
            const vals = projRegs.slice().reverse()
              .map(r=>parseFloat(r.metricas?.[m.id])||null)
              .filter(v=>v!==null);
            const lastVal = vals[vals.length-1];
            const prevVal = vals.length>1 ? vals[vals.length-2] : null;
            const trend = prevVal && lastVal ? (lastVal>prevVal?"↑":lastVal<prevVal?"↓":"→") : "";
            const trendColor = trend==="↑"?G.grn:trend==="↓"?"#C0392B":G.sft;
            return (
              <div key={m.id} style={{background:G.card,borderRadius:14,padding:"14px 16px",
                marginBottom:10,border:`1px solid ${G.bor}`}}>
                <div style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",marginBottom:vals.length>1?10:0}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:G.crm}}>{m.nombre}</div>
                    <div style={{fontSize:10,color:G.sft,marginTop:1}}>
                      {m.tipo==="cuantitativa"?"Numérica · "+m.unidad:m.tipo==="escala"?"Escala 1-5":"Cualitativa 1-5"}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {lastVal !== undefined && (
                      <div style={{fontSize:20,fontWeight:700,color:projColor.hex}}>
                        {lastVal}{m.tipo==="cuantitativa"&&m.unidad?" "+m.unidad:""}
                      </div>
                    )}
                    {trend && <div style={{fontSize:13,fontWeight:700,color:trendColor}}>{trend}</div>}
                  </div>
                </div>
                {vals.length > 1 && (
                  <MetricaSparkline vals={vals} color={projColor.hex}/>
                )}
                {vals.length === 0 && (
                  <div style={{fontSize:11,color:G.mut,fontStyle:"italic"}}>
                    Sin datos aún — registra tu primera entrada.
                  </div>
                )}
              </div>
            );
          })}
          <button onClick={()=>setView("registerEvidence")}
            style={{width:"100%",background:projColor.hex,border:"none",borderRadius:14,
              padding:"14px",fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer",marginTop:4}}>
            + Registrar métricas de hoy
          </button>
        </div>
      )}

      {/* Tab: Evidencias */}
      {detailTab==="evidencias" && (
        <div>
          <ProyectoSintesisCard proj={proj} projRegs={projRegs}
            projColor={projColor} anthropicKey={anthropicKey}/>

          <button onClick={()=>setView("registerEvidence")}
            style={{width:"100%",background:projColor.hex,border:"none",borderRadius:14,
              padding:"14px",fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer",marginBottom:16}}>
            + Registrar evidencia de hoy
          </button>

          {/* Inline metrics for today's evidence */}
          {(()=>{
            const todayReg = projRegs.find(r=>r.fecha===today);
            const dedupedMetricas = (proj.metricas||[])
              .filter((m,i,arr)=>arr.findIndex(x=>x.id===m.id||x.nombre===m.nombre)===i);
            if(!todayReg || dedupedMetricas.length===0) return null;
            return <InlineMetricas key={todayReg.id} reg={todayReg} metricas={dedupedMetricas}
              projColor={projColor} registros={registros} data={data} persist={persist}/>;
          })()}
          {projRegs.length===0 ? (
            <div style={{textAlign:"center",padding:"30px 0",color:G.sft,fontSize:13}}>
              Sin evidencias aún. El primer paso es el más importante.
            </div>
          ) : projRegs.map(r=>{
            const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            const parts = r.fecha.split("-");
            const dateLabel = parts[2]+" "+months[parseInt(parts[1])-1];
            const hasMetricas = r.metricas && Object.keys(r.metricas).length > 0;
            return (
              <div key={r.id} style={{background:G.card,borderRadius:14,padding:"14px 16px",
                marginBottom:8,border:`1px solid ${G.bor}`}}>
                <div style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:11,color:G.sft}}>{dateLabel}</div>
                  {r.tag && (
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,
                      background:projColor.light,color:projColor.hex,fontWeight:500}}>
                      #{r.tag}
                    </span>
                  )}
                </div>
                <div style={{fontSize:13,color:G.crm,lineHeight:1.6}}>{r.evidencia}</div>
                {hasMetricas && (
                  <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                    {Object.entries(r.metricas).map(([mid, val])=>{
                      const met = proj.metricas?.find(m=>m.id===mid);
                      if(!met) return null;
                      return (
                        <span key={mid} style={{fontSize:10,color:projColor.hex,
                          background:projColor.light,padding:"2px 8px",borderRadius:20}}>
                          {met.nombre}: {val}{met.unidad?" "+met.unidad:""}
                        </span>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ── CREATE VIEW ──────────────────────────────────────────────────
  if(view==="create") {
    const selColor = PROJ_COLORS.find(c=>c.id===cForm.color)||PROJ_COLORS[0];
    const addMetrica = () => {
      if(!newMetrica.nombre.trim()) return;
      const m = {id:"m_"+Date.now(),nombre:newMetrica.nombre.trim(),
        tipo:newMetrica.tipo,unidad:newMetrica.unidad};
      setCForm(p=>({...p,metricas:[...p.metricas,m]}));
      setNewMetrica({nombre:"",tipo:"escala",unidad:""});
    };
    const removeMetrica = (id) => setCForm(p=>({...p,metricas:p.metricas.filter(m=>m.id!==id)}));

    return (
      <div className="fi">
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button onClick={()=>{
            if(editingId){setView("detail");setEditingId(null);}
            else setView("list");
            setCStep(1);
            setCForm(EMPTY_FORM);
          }}
            style={{background:"transparent",border:"none",color:G.terra,fontSize:13,cursor:"pointer",padding:0}}>
            {editingId ? "← Cancelar edición" : "← Cancelar"}
          </button>
          <div style={{flex:1,height:4,background:G.bg,borderRadius:2}}>
            <div style={{width:(cStep/4*100)+"%",height:"100%",background:selColor.hex,borderRadius:2,transition:"width 0.3s"}}/>
          </div>
          <div style={{fontSize:11,color:G.sft}}>{cStep}/4</div>
        </div>

        {/* Step 1: Nombre + horizonte + color */}
        {cStep===1 && (
          <div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Nuevo proyecto</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:20}}>¿Qué horizonte estás construyendo?</div>

            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Nombre</div>
              <input value={cForm.nombre} onChange={e=>setCForm(p=>({...p,nombre:e.target.value}))}
                placeholder="Ej: Recomposición corporal Q2"
                style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:12,
                  padding:"12px 14px",fontSize:14,color:G.crm,background:G.bg,boxSizing:"border-box"}}/>
            </div>

            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Horizonte</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <div style={{fontSize:10,color:G.sft,marginBottom:4}}>Inicio</div>
                  <input type="date" value={cForm.fechaInicio} onChange={e=>setCForm(p=>({...p,fechaInicio:e.target.value}))}
                    style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:10,
                      padding:"10px 12px",fontSize:13,color:G.crm,background:G.bg,boxSizing:"border-box"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:G.sft,marginBottom:4}}>Fin</div>
                  <input type="date" value={cForm.fechaFin} onChange={e=>setCForm(p=>({...p,fechaFin:e.target.value}))}
                    style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:10,
                      padding:"10px 12px",fontSize:13,color:G.crm,background:G.bg,boxSizing:"border-box"}}/>
                </div>
              </div>
            </div>

            <div style={{marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Color</div>
              <div style={{display:"flex",gap:10}}>
                {PROJ_COLORS.map(c=>(
                  <button key={c.id} onClick={()=>setCForm(p=>({...p,color:c.id}))}
                    style={{width:32,height:32,borderRadius:"50%",background:c.hex,border:"none",
                      cursor:"pointer",outline:cForm.color===c.id?`3px solid ${c.hex}`:"none",
                      outlineOffset:2,opacity:cForm.color===c.id?1:0.5}}/>
                ))}
              </div>
            </div>

            <button disabled={!cForm.nombre.trim()} onClick={()=>setCStep(2)}
              style={{width:"100%",background:cForm.nombre.trim()?selColor.hex:G.mut,
                border:"none",borderRadius:14,padding:"14px",
                fontSize:14,fontWeight:600,color:"#fff",cursor:cForm.nombre.trim()?"pointer":"default"}}>
              Continuar →
            </button>
          </div>
        )}

        {/* Step 2: Identidad */}
        {cStep===2 && (
          <div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Identidad</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:20,lineHeight:1.7}}>
              Este proyecto es fruto de quién ya eres. Ancla desde dónde nace.
            </div>

            {/* Premise anchor */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,
                textTransform:"uppercase",letterSpacing:"0.08em"}}>Ancla de Premise</div>
              <div style={{fontSize:11,color:G.sft,marginBottom:8,lineHeight:1.6}}>
                ¿Qué parte de tu identidad expresa este proyecto?
              </div>
              <input value={cForm.premiseAncla}
                onChange={e=>setCForm(p=>({...p,premiseAncla:e.target.value}))}
                placeholder="Ej: Soy una mujer saludable y fuerte"
                style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:12,
                  padding:"12px 14px",fontSize:14,color:G.crm,background:G.bg,
                  boxSizing:"border-box",fontFamily:"'Fraunces',serif",fontStyle:"italic"}}/>
            </div>

            {/* Afirmación corta */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,
                textTransform:"uppercase",letterSpacing:"0.08em"}}>Afirmación del proyecto</div>
              <div style={{fontSize:11,color:G.sft,marginBottom:8,lineHeight:1.6}}>
                Una sola línea, tiempo presente, máximo 10 palabras. Esta aparecerá en tu Morning Ritual.
              </div>
              <input value={cForm.afirmacion}
                onChange={e=>setCForm(p=>({...p,afirmacion:e.target.value}))}
                placeholder="Ej: Soy la mujer que construyó Fundamental"
                style={{width:"100%",border:`1px solid ${selColor.hex}55`,borderRadius:12,
                  padding:"12px 14px",fontSize:15,color:G.crm,background:G.bg,
                  boxSizing:"border-box",fontFamily:"'Fraunces',serif",fontStyle:"italic"}}/>
              <div style={{fontSize:10,color:G.mut,marginTop:4,textAlign:"right"}}>
                {cForm.afirmacion.split(" ").filter(Boolean).length}/10 palabras
              </div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setCStep(1)}
                style={{flex:1,padding:"14px",borderRadius:12,border:`1px solid ${G.bor}`,
                  background:"transparent",fontSize:14,color:G.sft,cursor:"pointer"}}>← Atrás</button>
              <button onClick={()=>setCStep(3)}
                style={{flex:2,background:selColor.hex,border:"none",borderRadius:14,
                  padding:"14px",fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer"}}>
                Continuar →
              </button>
            </div>
          </div>
        )}

        {/* Step 3: Visión + Visualización + Milestones */}
        {cStep===3 && (
          <div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Visión</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:16,lineHeight:1.7}}>
              Escribe desde el futuro. ¿Cómo se siente haberlo logrado?
            </div>

            {/* Vision */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,
                textTransform:"uppercase",letterSpacing:"0.08em"}}>Mi visión</div>
              <textarea value={cForm.vision} onChange={e=>setCForm(p=>({...p,vision:e.target.value}))}
                placeholder="Esta versión mía..."
                style={{width:"100%",minHeight:100,border:`1px solid ${selColor.hex}44`,borderRadius:14,
                  padding:"14px",fontSize:14,background:"linear-gradient(135deg,#2A1E14,#1A1210)",
                  color:"rgba(212,168,83,0.85)",fontFamily:"'Fraunces',serif",fontStyle:"italic",
                  resize:"none",lineHeight:1.8,boxSizing:"border-box",outline:"none"}}/>
            </div>

            {/* Visualización de completión */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,
                textTransform:"uppercase",letterSpacing:"0.08em"}}>Carta desde el futuro</div>
              <div style={{fontSize:11,color:G.sft,marginBottom:8,lineHeight:1.6}}>
                Escríbelo como si ya ocurrió. "Llegó septiembre y..."
              </div>
              <textarea value={cForm.visualizacion} onChange={e=>setCForm(p=>({...p,visualizacion:e.target.value}))}
                placeholder="Llegó la fecha y miré atrás..."
                style={{width:"100%",minHeight:80,border:`1px solid ${G.bor}`,borderRadius:14,
                  padding:"14px",fontSize:13,color:G.crm,background:G.bg,
                  fontFamily:"'Fraunces',serif",fontStyle:"italic",
                  resize:"none",lineHeight:1.8,boxSizing:"border-box",outline:"none"}}/>
            </div>

            {/* Milestones */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:6,
                textTransform:"uppercase",letterSpacing:"0.08em"}}>Hitos clave (máx. 3)</div>
              <div style={{fontSize:11,color:G.sft,marginBottom:10,lineHeight:1.6}}>
                Los momentos que sabrás que vas por el camino correcto.
              </div>
              {cForm.milestones.map((ms,i)=>(
                <div key={ms.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:selColor.light,
                    border:`2px solid ${selColor.hex}44`,flexShrink:0,display:"flex",
                    alignItems:"center",justifyContent:"center",fontSize:9,color:selColor.hex,fontWeight:700}}>
                    {i+1}
                  </div>
                  <input value={ms.texto}
                    onChange={e=>setCForm(p=>({...p,milestones:p.milestones.map((m,j)=>j===i?{...m,texto:e.target.value}:m)}))}
                    placeholder={["Primera entrega visible","Punto de no retorno","Meta final"][i]}
                    style={{flex:1,border:`1px solid ${G.bor}`,borderRadius:10,
                      padding:"8px 12px",fontSize:13,color:G.crm,background:G.bg,boxSizing:"border-box"}}/>
                  <input type="date" value={ms.fecha}
                    onChange={e=>setCForm(p=>({...p,milestones:p.milestones.map((m,j)=>j===i?{...m,fecha:e.target.value}:m)}))}
                    style={{border:`1px solid ${G.bor}`,borderRadius:10,padding:"8px 10px",
                      fontSize:12,color:G.sft,background:G.bg,width:130,boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setCStep(3)}
                style={{flex:1,padding:"14px",borderRadius:12,border:`1px solid ${G.bor}`,
                  background:"transparent",fontSize:14,color:G.sft,cursor:"pointer"}}>← Atrás</button>
              <button onClick={()=>setCStep(4)}
                style={{flex:2,background:selColor.hex,border:"none",borderRadius:14,
                  padding:"14px",fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer"}}>
                Continuar →
              </button>
            </div>
          </div>
        )}

        {/* Step 4: Métricas */}
        {cStep===4 && (
          <div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,marginBottom:4}}>Métricas</div>
            <div style={{fontSize:13,color:G.sft,marginBottom:16,lineHeight:1.7}}>
              ¿Cómo medirás tu progreso? Combina cuantitativas, escalas y cualitativas.
            </div>

            {/* Existing metrics */}
            {cForm.metricas.map(m=>(
              <div key={m.id} style={{background:G.card,borderRadius:12,padding:"10px 14px",
                marginBottom:8,border:`1px solid ${G.bor}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:G.crm}}>{m.nombre}</div>
                  <div style={{fontSize:10,color:G.sft}}>
                    {m.tipo==="cuantitativa"?"Numérica"+(m.unidad?" · "+m.unidad:""):m.tipo==="escala"?"Escala 1-5":"Cualitativa 1-5"}
                  </div>
                </div>
                <button onClick={()=>removeMetrica(m.id)}
                  style={{background:"transparent",border:"none",color:G.sft,fontSize:18,cursor:"pointer"}}>×</button>
              </div>
            ))}

            {/* Add new metric */}
            <div style={{background:G.bg,borderRadius:14,padding:"14px",marginBottom:14,border:`1px solid ${G.bor}`}}>
              <div style={{fontSize:11,fontWeight:600,color:G.crm,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>Agregar métrica</div>

              {/* Type selector */}
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[["cuantitativa","#"],["escala","★"],["cualitativa","♡"]].map(([t,ic])=>(
                  <button key={t} onClick={()=>setNewMetrica(p=>({...p,tipo:t}))}
                    style={{flex:1,padding:"7px 4px",borderRadius:10,border:"none",cursor:"pointer",
                      fontSize:11,fontWeight:500,
                      background:newMetrica.tipo===t?selColor.hex:G.card,
                      color:newMetrica.tipo===t?"#fff":G.sft}}>
                    {ic} {t==="cuantitativa"?"Número":t==="escala"?"Escala":"Cualitativa"}
                  </button>
                ))}
              </div>

              {/* Name input or suggestion */}
              <div style={{marginBottom:8}}>
                <input value={newMetrica.nombre} onChange={e=>setNewMetrica(p=>({...p,nombre:e.target.value}))}
                  placeholder="Nombre de la métrica"
                  style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:10,
                    padding:"10px 12px",fontSize:13,color:G.crm,background:G.card,boxSizing:"border-box"}}/>
              </div>

              {/* Suggestions */}
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                {(METRIC_SUGG[newMetrica.tipo]||[]).slice(0,4).map(s=>(
                  <button key={s} onClick={()=>setNewMetrica(p=>({...p,nombre:s}))}
                    style={{fontSize:10,padding:"3px 8px",borderRadius:20,cursor:"pointer",
                      background:selColor.light,color:selColor.hex,border:"none"}}>
                    {s}
                  </button>
                ))}
              </div>

              {newMetrica.tipo==="cuantitativa" && (
                <input value={newMetrica.unidad} onChange={e=>setNewMetrica(p=>({...p,unidad:e.target.value}))}
                  placeholder="Unidad (kg, reps, h...)"
                  style={{width:"100%",border:`1px solid ${G.bor}`,borderRadius:10,
                    padding:"10px 12px",fontSize:13,color:G.crm,background:G.card,
                    marginBottom:8,boxSizing:"border-box"}}/>
              )}

              <button onClick={addMetrica} disabled={!newMetrica.nombre.trim()}
                style={{width:"100%",padding:"10px",borderRadius:10,border:"none",cursor:"pointer",
                  background:newMetrica.nombre.trim()?selColor.hex:G.mut,
                  fontSize:13,fontWeight:600,color:"#fff"}}>
                + Agregar
              </button>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setCStep(2)}
                style={{flex:1,padding:"14px",borderRadius:12,border:`1px solid ${G.bor}`,
                  background:"transparent",fontSize:14,color:G.sft,cursor:"pointer"}}>← Atrás</button>
              <button onClick={async()=>{
                const horizonte = (cForm.fechaInicio && cForm.fechaFin)
                  ? (() => {
                      const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
                      const s = cForm.fechaInicio.split("-");
                      const e = cForm.fechaFin.split("-");
                      return months[parseInt(s[1])-1]+" "+s[0]+" → "+months[parseInt(e[1])-1]+" "+e[0];
                    })()
                  : "";
                if(editingId) {
                  // Update existing project
                  const nd = {...data, projects: projects.map(p=>
                    p.id===editingId
                      ? {...p, nombre:cForm.nombre, horizonte, fechaInicio:cForm.fechaInicio,
                          fechaFin:cForm.fechaFin, vision:cForm.vision, color:cForm.color,
                          metricas:cForm.metricas, premiseAncla:cForm.premiseAncla,
                          afirmacion:cForm.afirmacion, visualizacion:cForm.visualizacion,
                          milestones:cForm.milestones.filter(m=>m.texto.trim())}
                      : p
                  )};
                  await persist(nd);
                  setSelectedId(editingId);
                  setEditingId(null);
                } else {
                  // Create new project
                  const newProj = {id:"proj_"+Date.now(),nombre:cForm.nombre,horizonte,
                    fechaInicio:cForm.fechaInicio,fechaFin:cForm.fechaFin,
                    vision:cForm.vision,color:cForm.color,metricas:cForm.metricas,activo:true,
                    premiseAncla:cForm.premiseAncla, afirmacion:cForm.afirmacion,
                    visualizacion:cForm.visualizacion,
                    milestones:cForm.milestones.filter(m=>m.texto.trim()),
                    createdAt:new Date().toISOString()};
                  const nd = {...data,projects:[...projects,newProj]};
                  await persist(nd);
                  setSelectedId(newProj.id);
                }
                setCStep(1);
                setCForm(EMPTY_FORM);
                setView("detail");
              }}
                style={{flex:2,background:selColor.hex,border:"none",borderRadius:14,
                  padding:"14px",fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer"}}>
                {editingId ? "Guardar cambios ✓" : "Crear proyecto ✓"}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── LIST VIEW ────────────────────────────────────────────────────
  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:G.sft,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:2}}>Mi horizonte</div>
          <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm}}>Proyectos</div>
        </div>
        {projects.length < 3 && (
          <button onClick={()=>setView("create")}
            style={{background:G.terra,border:"none",borderRadius:20,padding:"8px 16px",
              fontSize:13,color:"#fff",cursor:"pointer",fontWeight:500}}>+ Nuevo</button>
        )}
      </div>

      {projects.length===0 ? (
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:44,marginBottom:12}}>🎯</div>
          <div style={{fontSize:16,fontWeight:600,color:G.crm,marginBottom:6}}>Sin proyectos activos</div>
          <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:20}}>
            Un proyecto es un horizonte con intención.<br/>Máximo 3 activos a la vez.
          </div>
          <button onClick={()=>setView("create")}
            style={{background:G.terra,border:"none",borderRadius:16,
              padding:"12px 28px",fontSize:14,color:"#fff",cursor:"pointer",fontWeight:500}}>
            Crear primer proyecto
          </button>
        </div>
      ) : projects.map(p=>{
        const c = PROJ_COLORS.find(col=>col.id===p.color)||PROJ_COLORS[0];
        const pRegs = registros.filter(r=>r.proyectoId===p.id);
        const lastReg = pRegs.sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
        const daysSince = lastReg ? Math.floor((new Date()-new Date(lastReg.fecha))/86400000) : null;
        return (
          <div key={p.id} onClick={()=>{setSelectedId(p.id);setView("detail");setDetailTab("vision");}}
            style={{background:G.card,borderRadius:16,marginBottom:12,cursor:"pointer",
              borderLeft:`4px solid ${c.hex}`,border:`1px solid ${G.bor}`,borderLeftWidth:4,padding:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:16,fontWeight:600,color:G.crm,marginBottom:2}}>{p.nombre}</div>
                <div style={{fontSize:11,color:G.sft}}>{p.horizonte}</div>
              </div>
              <div style={{fontSize:11,color:c.hex,fontWeight:600,flexShrink:0,marginLeft:12}}>
                {daysSince===null?"Sin registros":daysSince===0?"Hoy ✓":"hace "+daysSince+"d"}
              </div>
            </div>
            {p.vision && (
              <div style={{fontSize:12,color:G.sft,fontStyle:"italic",lineHeight:1.6,marginBottom:8,
                overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                "{p.vision}"
              </div>
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {(p.metricas||[]).filter((m,i,arr)=>arr.findIndex(x=>x.nombre===m.nombre)===i).slice(0,3).map(m=>(
                <span key={m.id} style={{fontSize:10,padding:"2px 8px",borderRadius:20,
                  background:c.light,color:c.hex,fontWeight:500}}>{m.nombre}</span>
              ))}
              {(p.metricas||[]).length>3 && (
                <span style={{fontSize:10,color:G.sft}}>+{p.metricas.length-3} más</span>
              )}
            </div>
          </div>
        );
      })}

      {projects.length===3 && (
        <div style={{textAlign:"center",fontSize:12,color:G.sft,padding:"8px 0"}}>
          Máximo 3 proyectos activos alcanzado
        </div>
      )}
    </div>
  );
}

const BITACORA_KEY = "bitacora";


function HealingNavButton({onNavigate}) {
  if(!onNavigate) return null;
  return (
    <button onClick={()=>onNavigate("healing")}
      style={{width:"100%",background:G.acc,color:"#fff",border:"none",
        borderRadius:10,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      💎 Ir a Healing ahora
    </button>
