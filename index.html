    // IndexedDB storage - persists on iOS Safari unlike localStorage
    // ─── STORAGE: localStorage primary (reliable on iOS Safari) ───────
    window.storage = {
      set: (k,v) => {
        try {
          const str = typeof v === "string" ? v : JSON.stringify(v);
          localStorage.setItem("fund_" + k, str);
          return {key:k, value:str};
        } catch(e) { return null; }
      },
      get: (k) => {
        try {
          const v = localStorage.getItem("fund_" + k);
          if(v === null) return null;
          return {key:k, value:v};
        } catch(e) { return null; }
      },
      delete: (k) => {
        try { localStorage.removeItem("fund_" + k); return {key:k, deleted:true}; } catch(e) { return null; }
      },
      list: (prefix) => {
        try {
          const keys = [];
          for(let i=0; i<localStorage.length; i++){
            const k = localStorage.key(i);
            if(k && k.startsWith("fund_")){
              const stripped = k.slice(5);
              if(!prefix || stripped.startsWith(prefix)) keys.push(stripped);
            }
          }
          return {keys};
        } catch(e) { return {keys:[]}; }
      }
    };

// ─── MIGRATION: IndexedDB → localStorage (runs once) ────────────
    async function migrateFromIndexedDB() {
      if(localStorage.getItem("fund_migrated_v2")) return;
      try {
        const DB_NAME = "FundamentalDB", STORE = "data";
        const db = await new Promise((res,rej) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onsuccess = e => res(e.target.result);
          req.onerror = () => rej();
          req.onupgradeneeded = () => rej(); // DB didn't exist
        });
        const keys = await new Promise((res,rej) => {
          const tx = db.transaction(STORE,"readonly");
          const req = tx.objectStore(STORE).getAllKeys();
          req.onsuccess = () => res(req.result);
          req.onerror = () => res([]);
        });
        for(const k of keys) {
          const val = await new Promise((res) => {
            const tx = db.transaction(STORE,"readonly");
            const req = tx.objectStore(STORE).get(k);
            req.onsuccess = () => res(req.result?.v || null);
            req.onerror = () => res(null);
          });
          if(val && !localStorage.getItem("fund_" + k)) {
            localStorage.setItem("fund_" + k, val);
          }
        }
        db.close();
        localStorage.setItem("fund_migrated_v2","1");
        console.log("Migration complete:", keys.length, "keys");
      } catch(e) {
        // IndexedDB not available or empty — mark as done
        localStorage.setItem("fund_migrated_v2","1");
      }
    }
    migrateFromIndexedDB();

    const {useState,useEffect,useRef,useCallback,useMemo}=React;
  </script>

// ─── STORAGE ──────────────────────────────────────────────────────
// window.storage is the artifact persistent storage - works in React artifacts
async function save(key, value) {
  try {
    const str = typeof value === "string" ? value : JSON.stringify(value);
    window.storage.set(key, str);
  } catch(e) { console.error("Save failed:", key, e); }
}
async function load(key) {
  try {
    const r = window.storage.get(key);
    if (r && r.value) return r.value;
  } catch(e) {}
  return null;
}
async function loadJSON(key) {
  const v = await load(key);
  if (!v) return null;
  try { return JSON.parse(v); } catch(e) { return null; }
}

function todayKey() {

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return "log:" + y + "-" + m + "-" + day;
}
function dayStr(off=0) { const d=new Date(); d.setDate(d.getDate()+off);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day; }

// ─── CYCLE PHASE ─────────────────────────────────────────────────────────────
function getCyclePhase(cycleStartDate, cycleLength=28, dayOffset=0) {
  if(!cycleStartDate) return null;
  // Use local date strings to avoid timezone issues
  const startStr = cycleStartDate.slice(0,10);
  const d = new Date(); d.setDate(d.getDate() + (dayOffset||0));
  const todayStr = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const startParts = startStr.split("-").map(Number);
  const todayParts = todayStr.split("-").map(Number);
  const startLocal = new Date(startParts[0], startParts[1]-1, startParts[2]);
  const todayLocal = new Date(todayParts[0], todayParts[1]-1, todayParts[2]);
  const diff = Math.floor((todayLocal - startLocal) / (1000*60*60*24));
  const dayInCycle = (diff % cycleLength) + 1;
  if(dayInCycle <= 5) return {phase:"menstruation", day:dayInCycle, label:"Menstruación", ic:"🔴", days:"1-5"};
  if(dayInCycle <= 13) return {phase:"follicular", day:dayInCycle, label:"Folicular", ic:"🌱", days:"6-13"};
  if(dayInCycle <= 16) return {phase:"ovulation", day:dayInCycle, label:"Ovulación", ic:"⭐", days:"14-16"};
  return {phase:"luteal", day:dayInCycle, label:"Lútea", ic:"🌙", days:"17-28"};
}

function getCycleCalAdjustment(phase) {
  if(!phase) return {cal:0, carbs:0, fat:0, note:""};
  switch(phase) {
    case "menstruation": return {cal:0, carbs:0, fat:5, note:"Más grasas antiinflamatorias. Prioriza hierro."};
    case "follicular": return {cal:0, carbs:0, fat:0, note:"Energía óptima. Buen momento para entrenar fuerte."};
    case "ovulation": return {cal:50, carbs:13, fat:0, note:"Pico de energía. Más proteína para capitalizar la fuerza."};
    case "luteal": return {cal:75, carbs:19, fat:0, note:"Metabolismo elevado. El hambre es real y fisiológica."};
    default: return {cal:0, carbs:0, fat:0, note:""};
  }
}


function calcTargets(p, dayType, avgSleep) {
  if(!p?.weight||!p?.height||!p?.age) return {calories:1800,protein:128,carbs:160,fat:64,fiber:25,tdee:2100};

  const isMale  = p.gender==="male";
  const isPeri  = !isMale && (p.menopause==="peri"||p.menopause==="post");
  const isGymDay = dayType && dayType !== "rest" && dayType !== "rest_active";

  // ── Proteína ────────────────────────────────────────────────────
  const protein = Math.round(p.weight * (isMale ? 2.0 : isPeri ? 2.0 : 1.8));

  // ── Grasas ──────────────────────────────────────────────────────
  // Aprobado: descanso 1.0g/kg, gym 0.86g/kg (peri)
  const fatPerKg = isMale
    ? (isGymDay ? 0.9 : 1.0)
    : isPeri
      ? 1.0
      : (isGymDay ? 0.85 : 1.0);
  let fat = Math.max(Math.round(p.weight * fatPerKg), Math.round(p.weight * 0.7));

  // ── Carbos por tipo de día ───────────────────────────────────────
  // Aprobado para 64kg peri: rest=150→2.34, upper=210→3.28, full=225→3.52, legs=245→3.83
  const carbPerKg = isMale ? {
    rest: 2.7, rest_active: 3.1, gym_upper: 3.8, gym_full: 4.0, gym_legs: 4.4
  } : isPeri ? {
    rest: 2.5938, rest_active: 3.3, gym_upper: 3.375, gym_full: 3.5625, gym_legs: 3.9531
  } : {
    rest: 2.2, rest_active: 2.6, gym_upper: 3.1, gym_full: 3.3, gym_legs: 3.7
  };
  const dayKey = dayType || "rest";
  let carbs = Math.round(p.weight * (carbPerKg[dayKey] || carbPerKg.rest));

  // ── Ajuste por objetivo ─────────────────────────────────────────
  if(p.goal === "fat_loss") {
    carbs = Math.round(carbs * 0.85);
  } else if(p.goal === "muscle") {
    carbs = Math.round(carbs * 1.1);
  }

  // ── Fibra ───────────────────────────────────────────────────────
  const fiber = Math.max(Math.round(p.weight * 0.4), 25);

  // ── Calorías = resultado de macros ─────────────────────────────
  let cal = protein*4 + carbs*4 + fat*9;

  // ── Ajuste de sueño ─────────────────────────────────────────────
  if(avgSleep !== null && avgSleep !== undefined) {
    if(avgSleep < 5.5) protein += Math.round(p.weight * 0.1);
    else if(avgSleep < 6.5) protein += Math.round(p.weight * 0.05);
  }

  // ── TDEE estimado ───────────────────────────────────────────────
  const muscleCr = {low:0.93, average:1.0, high:1.07, very_high:1.13};
  const bmr = Math.round((10*p.weight+6.25*p.height-5*p.age+(isMale?5:-161))*(muscleCr[p.muscleLevel]||1.0));
  const actMult = {sedentary:1.2, light:1.375, moderate:1.55, mod_active:1.64, active:1.725, athlete:1.9};
  const tdee = Math.round(bmr*(actMult[p.activity]||1.55));

  // ── Ajuste fase del ciclo ───────────────────────────────────────
  if(!isMale && p.cycleStart) {
    const phase = getCyclePhase(p.cycleStart, p.cycleLength||28);
    if(phase) {
      const adj = getCycleCalAdjustment(phase.phase);
      carbs = Math.round(carbs + adj.carbs);
      fat   = Math.round(fat   + adj.fat);
      cal   = protein*4 + carbs*4 + fat*9;
    }
  }

  return {calories:cal, protein, carbs, fat, fiber, tdee};
}


function calcZones(age, rhr) {
  const max=220-age, r=rhr?max-rhr:0;
  if(rhr&&rhr>0) return {z2lo:Math.round(rhr+r*.6),z2hi:Math.round(rhr+r*.7),z3lo:Math.round(rhr+r*.7),z3hi:Math.round(rhr+r*.8),max,m:"Karvonen"};
  return {z2lo:Math.round(max*.6),z2hi:Math.round(max*.7),z3lo:Math.round(max*.7),z3hi:Math.round(max*.8),max,m:"Estándar"};
}

function getBMI(w,h) {
  const v=(w/((h/100)**2)).toFixed(1);
  return {v,l:v<18.5?"Bajo peso":v<25?"Peso saludable":v<30?"Sobrepeso":"Obesidad",c:v<18.5?G.acc:v<25?G.grn:G.err};
}

function totals(meals) {
  if(!meals) return {p:0,c:0,f:0,k:0,fi:0};
  return Object.values(meals)
    .filter(Boolean)
    .flat()
    .filter(Boolean)
    .reduce((a,f)=>({
      p:  a.p  + (parseFloat(f.protein||f.p)||0),
      c:  a.c  + (parseFloat(f.carbs||f.c)||0),
      f:  a.f  + (parseFloat(f.fat||f.f)||0),
      k:  a.k  + (parseFloat(f.calories||f.k)||0),
      fi: a.fi + (parseFloat(f.fiber||f.fi)||0),
    }), {p:0,c:0,f:0,k:0,fi:0});
}

function getTodayType(gymDay) {
  const g=GYM[gymDay];
  if(!g||g.t==="r") return "rest";
  if(g.t==="ra") return "rest_active";
  if(gymDay===1||gymDay===3) return "gym_legs";
  if(gymDay===4) return "gym_full";
  return "gym_upper";
}

function localDateStr(d) {
  var dt = d || new Date();
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}

function calcAvgSleep(sleepLog) {
  if(!sleepLog) return null;
  var days = [], i;
  for(i=0; i<7; i++) {
    var d = new Date(); d.setDate(d.getDate()-i);
    var key = localDateStr(d);
    if(sleepLog[key]?.hours) days.push(sleepLog[key].hours);
  }
  return days.length >= 3 ? Math.round((days.reduce(function(a,b){return a+b;},0)/days.length)*10)/10 : null;
}

function getEffectiveDayType(gymDay, workoutLog) {
  const today = localDateStr();
  const entry = workoutLog?.[today];
  if(!entry) return getTodayType(gymDay);
  // Rest day
  if(entry.block === "D" || entry.block === "Descanso") return "rest";
  if(entry.block === "DA") return "rest_active";
  // Mi Entreno = detect type from exercise names
  if(entry.isMiEntreno || entry.miEntreno) {
    // Try muscle field first (standard entries)
    const muscles = (entry.muscles||entry.miEntreno?.muscles||[]).join(" ").toLowerCase();
    if(muscles.includes("pierna")||muscles.includes("glut")||muscles.includes("cuad")||
       muscles.includes("isquio")||muscles.includes("pantorr")) return "gym_legs";
    if(muscles.includes("pecho")||muscles.includes("hombro")||muscles.includes("tricep")||
       muscles.includes("bicep")||muscles.includes("espalda")||muscles.includes("dorsal"))
      return "gym_upper";
    // Detect from exercise names (Mi Entreno stores ejercicios with nombres)
    const ejes = (entry.ejercicios || entry.miEntreno?.ejercicios || [])
      .map(function(e){ return (e.nombre||e.name||"").toLowerCase(); });
    const allNames = ejes.join(" ");
    const legKw = ["sentadilla","squat","femoral","prensa","hip thrust","peso muerto","rdl","estocada","lunges","leg press","leg curl","leg extension","glut","abductor","aductor","sumo","búlgara","bulgar","zancada"];
    const upperKw = ["press banca","press inclinado","curl","bicep","tricep","pecho","hombro","dominada","remo","jalón","polea","fondos","dip","pullover","face pull","espalda","dorsal"];
    const legScore = legKw.filter(function(k){ return allNames.includes(k); }).length;
    const upperScore = upperKw.filter(function(k){ return allNames.includes(k); }).length;
    if(legScore > 0 && legScore >= upperScore) return "gym_legs";
    if(upperScore > 0 && upperScore > legScore) return "gym_upper";
    // Last resort: use selected gymDay block
    return getTodayType(gymDay);
  }
  // Class blocks — map by label emoji or name
  const blockLabel = entry.block || "";
  const blockNameLower = (entry.blockName || entry.n || "").toLowerCase();
  // Low intensity classes → rest targets
  if(blockLabel==="🧘"||blockLabel==="🌊"||blockNameLower.includes("pilates")||blockNameLower.includes("yoga"))
    return "rest";
  // Leg-dominant cardio → gym_legs targets
  if(blockLabel==="🚴"||blockNameLower.includes("spinning")||blockNameLower.includes("cycling"))
    return "gym_legs";
  // High intensity classes → gym_full targets
  if(["💃","🥊","⚡","🏊"].includes(blockLabel)) return "gym_full";
  // Scheduled block — map to day type by label or name
  const block = blockLabel.toUpperCase();
  const blockName = (entry.blockName||entry.n||"").toLowerCase();
  // B2 = Tren Inferior A, B4 = Tren Inferior B
  if(block==="B2"||block==="B4") return "gym_legs";
  // B1 = Empuje Superior, B3 = Tirón Superior
  if(block==="B1"||block==="B3") return "gym_upper";
  // Fallback by name keywords
  if(blockName.includes("inferior")||blockName.includes("pierna")||blockName.includes("glut")) return "gym_legs";
  if(blockName.includes("superior")||blockName.includes("empuje")||blockName.includes("tirón")) return "gym_upper";
  if(blockName.includes("full")||blockName.includes("completo")) return "gym_full";
  if(entry.block && entry.block !== "D") return "gym_full";
  // Fallback to gym plan
  return getTodayType(gymDay);
}

function searchDB(q) {
  const s=q.toLowerCase().trim();
  let grams=null, fq=s;
  const gm=s.match(/^(\d+(?:\.\d+)?)\s*g\s+(.+)/);
  if(gm){grams=+gm[1];fq=gm[2];}
  return DB.map(x=>{
    const nm=x.n.toLowerCase().includes(fq)?2:0;
    const am=x.a.some(a=>a.includes(fq)||fq.includes(a))?3:0;
    const em=x.a.some(a=>a===fq)?5:0;
    return{x,s:nm+am+em};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).slice(0,5).map(r=>({...r.x,_g:grams}));
}

function scaleFood(item, g) {
  const m=g/100;
  const p=item.p??item.protein??0, c=item.c??item.carbs??0,
        f=item.f??item.fat??0, k=item.k??item.calories??0, fi=item.fi??item.fiber??0;
  const pr=Math.round(p*m*10)/10, cr=Math.round(c*m*10)/10,
        fr=Math.round(f*m*10)/10, kr=Math.round(k*m), fir=Math.round(fi*m*10)/10;
  return {
    name:`${item.n||item.name} (${g}g)`,
    // Long field names (used by LogScreen render)
    protein:pr, carbs:cr, fat:fr, calories:kr, fiber:fir,
    // Short field names (used by totals/CaloriesCard)
    p:pr, c:cr, f:fr, k:kr, fi:fir,
    grams:g,
  };
}

  {n:"Pancakes proteicos de avena",cat:"Desayuno fit",cal:420,p:34,c:46,f:8,fi:5,time:"15 min",ing:["80g avena en hojuelas","1 scoop whey vainilla","2 huevos","100ml leche","1/2 cdita polvo de hornear","Canela al gusto"],steps:["Licúa todos los ingredientes hasta obtener mezcla homogénea.","Calienta sartén antiadherente a fuego medio con spray.","Cocina porciones de 1/4 taza, 2-3 min por lado.","Sirve con fruta fresca o un hilo de miel."],tip:"Si la mezcla queda espesa agrega leche de a poco. El secreto es fuego medio, no alto — o quedan crudos por dentro."},
  {n:"Shakshuka fit",cat:"Desayuno internacional",cal:340,p:26,c:22,f:14,fi:6,time:"20 min",ing:["3 huevos","400g tomate triturado","1/2 pimentón rojo","1/2 cebolla","Ajo, comino, paprika ahumada","Aceite de oliva, sal"],steps:["Sofríe cebolla y pimentón en aceite 5 min.","Agrega ajo y especias 1 min.","Vierte el tomate y cocina 8 min hasta espesar.","Haz pozos en la salsa y rompe los huevos adentro.","Tapa y cocina 5-7 min hasta que las claras cuajen."],tip:"El huevo con yema líquida es el punto ideal. 5 min con tapa a fuego medio — controla sin levantar la tapa."},
  {n:"Yogurt griego con granola y frutos rojos",cat:"Desayuno sin cocción",cal:350,p:24,c:44,f:8,fi:5,time:"3 min",ing:["200g yogurt griego 0%","30g granola","100g frutos rojos mixtos","1 cda miel","1 cdita semillas de chía"],steps:["Sirve el yogurt en un bowl.","Agrega los frutos rojos y la granola encima.","Termina con miel y chía."],tip:"Haz las capas en orden: yogurt - fruta - granola - miel. La granola encima queda crujiente. Si la pones abajo se moja."},
  {n:"Bagel con salmón ahumado y queso crema",cat:"Desayuno especial",cal:440,p:36,c:42,f:12,fi:4,time:"5 min",ing:["1 bagel integral","80g salmón ahumado","2 cdas queso crema light","Alcaparras y cebolla morada","Eneldo, limón, pimienta negra"],steps:["Tuesta el bagel.","Extiende el queso crema en ambas mitades.","Agrega el salmón ahumado.","Termina con alcaparras, cebolla morada en aros finos, eneldo y limón."],tip:"La cebolla morada 5 min en agua fría pierde el amargor. Vale el extra paso."},
  {n:"Crepes de avena y proteína",cat:"Desayuno fit",cal:360,p:30,c:40,f:7,fi:4,time:"15 min",ing:["60g avena licuada (harina)","2 huevos","150ml leche","1 scoop whey vainilla","Spray de aceite de coco","Fruta fresca al gusto"],steps:["Mezcla todos los ingredientes hasta obtener mezcla líquida sin grumos.","Calienta sartén a fuego medio con spray.","Vierte 1/4 de la mezcla, inclina la sartén para extender fino.","Cocina 2 min, voltea suavemente y 1 min más.","Rellena con fruta fresca."],tip:"La clave es que la mezcla sea líquida, más que para pancakes. El crepe fino es más fácil de voltear."},
  {n:"Bowl de cottage cheese con fruta",cat:"Desayuno sin cocción",cal:320,p:28,c:36,f:6,fi:4,time:"5 min",ing:["200g cottage cheese bajo en grasa","1 banano en rodajas","100g fresas","2 cdas nueces picadas","1 cda miel","Canela al gusto"],steps:["Sirve el cottage cheese en un bowl.","Agrega las frutas encima.","Termina con nueces, miel y canela."],tip:"El cottage cheese licuado queda cremoso como ricotta. Si la textura grumosa no te convence, prueba licuado 30 seg."},

  // ── ALMUERZOS NUEVOS ───────────────────────────────────────────────
  {n:"Buddha bowl mediterráneo",cat:"Almuerzo mediterráneo",cal:540,p:36,c:54,f:18,fi:9,time:"20 min",ing:["150g pollo a la plancha","100g quinoa cocida","1/2 pepino","10 aceitunas kalamata","80g hummus","Tomates cherry","Limón, orégano, aceite de oliva"],steps:["Cocina la quinoa y el pollo con orégano y limón.","Corta pepino y tomates cherry.","Arma el bowl: quinoa base, pollo, pepino, tomates, aceitunas.","Agrega una porción de hummus a un lado.","Aliña con aceite de oliva y limón."],tip:"El hummus hace las veces de aderezo cremoso — no necesitas otro. La clave del bowl es que cada ingrediente tenga su zona."},
  {n:"Pollo teriyaki con arroz y edamame",cat:"Almuerzo asiático",cal:560,p:46,c:58,f:10,fi:5,time:"25 min",ing:["200g pechuga de pollo","120g arroz blanco cocido","80g edamame cocido","2 cdas salsa de soya","1 cda miel","1 cdita jengibre rallado","1 diente ajo"],steps:["Mezcla salsa de soya, miel, jengibre y ajo para el teriyaki.","Corta el pollo en tiras, sella en sartén caliente 4 min.","Agrega la salsa y cocina 3 min más hasta que caramelice.","Sirve sobre el arroz con edamame al lado."],tip:"La salsa se concentra rápido — fuego medio-alto y no dejes de mover para que no se queme."},
  {n:"Pasta integral con atún y tomate",cat:"Almuerzo rápido",cal:490,p:38,c:58,f:10,fi:8,time:"20 min",ing:["100g pasta integral","2 latas atún en agua","300g tomate triturado","2 dientes ajo","Albahaca, sal, aceite de oliva"],steps:["Cocina la pasta al dente según instrucciones.","Sofríe el ajo en aceite, agrega el tomate y cocina 8 min.","Incorpora el atún escurrido y mezcla bien.","Combina con la pasta y sirve con albahaca."],tip:"Guarda una taza del agua de cocción — si la salsa queda seca, agrégala. El almidón natural une todo."},
  {n:"Tacos de pollo con guacamole",cat:"Almuerzo rápido",cal:510,p:44,c:44,f:16,fi:8,time:"20 min",ing:["180g pechuga de pollo","4 tortillas de maíz pequeñas","1 aguacate","Tomate, cebolla morada, cilantro","Lima, comino, paprika, sal"],steps:["Sazona el pollo con comino, paprika y sal. Plancha 6 min por lado.","Aplasta el aguacate con lima y sal para el guacamole.","Calienta las tortillas en sartén seca 30 seg por lado.","Arma: tortilla + pollo en tiras + guacamole + tomate + cebolla + cilantro."],tip:"Las tortillas de maíz son mejor opción que las de trigo — más fibra y menos grasa saturada."},
  {n:"Poke bowl de salmón",cat:"Almuerzo asiático",cal:560,p:42,c:52,f:16,fi:5,time:"15 min",ing:["180g salmón fresco sushi-grade","120g arroz para sushi cocido","1/2 aguacate","Pepino y zanahoria rallada","2 cdas salsa de soya baja en sodio","Sésamo, cebollín"],steps:["Corta el salmón en cubos de 2cm.","Mezcla con salsa de soya y sésamo, marinar 5 min.","Arma el bowl: arroz base + salmón marinado.","Agrega aguacate, pepino y zanahoria en zonas separadas.","Termina con cebollín y más sésamo."],tip:"El arroz de sushi sazonado con vinagre de arroz + azúcar + sal es lo que hace que sea poke y no arroz con salmón."},
  {n:"Curry de pollo ligero con arroz basmati",cat:"Almuerzo internacional",cal:580,p:48,c:56,f:12,fi:4,time:"30 min",ing:["200g pechuga en cubos","120g arroz basmati","200ml leche de coco light","1/2 cebolla, 2 dientes ajo, jengibre","Curry en polvo, cúrcuma, comino, sal"],steps:["Sofríe cebolla, ajo y jengibre hasta dorar.","Agrega las especias y cocina 1 min.","Incorpora el pollo y sella 3 min.","Vierte la leche de coco, cocina a fuego medio 12 min.","Sirve sobre el arroz con cilantro fresco."],tip:"La leche de coco light tiene 60% menos grasa que la regular. El sabor es casi idéntico porque las especias dominan."},
  {n:"Ensalada César fit con pollo",cat:"Almuerzo mediterráneo",cal:440,p:42,c:24,f:20,fi:4,time:"15 min",ing:["180g pechuga a la plancha","Lechuga romana","40g queso parmesano","Crutones integrales","Dressing: 3 cdas yogurt griego, ajo, mostaza Dijon, limón, aceite de oliva"],steps:["Mezcla todos los ingredientes del dressing.","Corta la lechuga y el pollo en tiras.","Mezcla todo con el dressing.","Agrega parmesano y crutones al final para que queden crujientes."],tip:"Esta versión usa yogurt griego en vez de mayonesa — tiene el doble de proteína con la mitad de grasa."},
  {n:"Bowl de pollo al limón con cous cous",cat:"Almuerzo mediterráneo",cal:520,p:44,c:48,f:14,fi:5,time:"20 min",ing:["180g pechuga de pollo","150g cous cous cocido","Espárragos o zucchini a la plancha","Limón, ajo, perejil, menta","Aceite de oliva, sal, pimienta"],steps:["Marina el pollo con limón, ajo y hierbas 10 min.","Plancha el pollo 6-7 min por lado.","Prepara el cous cous: igual proporción de agua caliente, tapa 5 min.","Asa los espárragos con aceite y sal.","Sirve todo junto con limón y hierbas frescas."],tip:"El cous cous es el grano más rápido: agua caliente y 5 minutos. Ideal cuando el pollo ya está listo."},

  // ── CENAS NUEVAS ───────────────────────────────────────────────────
  {n:"Bowl de quinoa con vegetales asados",cat:"Cena ligera",cal:380,p:18,c:48,f:14,fi:10,time:"30 min",ing:["100g quinoa","Pimentón, zucchini, cebolla morada, champiñones","Aceite de oliva, ajo, romero","50g queso feta","Limón"],steps:["Precalienta horno 200°C. Corta todos los vegetales en cubos.","Mezcla con aceite, ajo y romero. Hornea 25 min.","Cocina la quinoa en paralelo.","Sirve quinoa + vegetales + queso feta desmenuzado + limón."],tip:"La clave de los vegetales asados es no apilarlos — en capa única se asan, apilados se cuecen al vapor."},
  {n:"Tilapia a la plancha con ensalada verde",cat:"Cena mediterránea",cal:310,p:40,c:10,f:12,fi:4,time:"15 min",ing:["200g filete de tilapia","Espinaca, lechuga, pepino, tomate","Limón, ajo en polvo, paprika","Aceite de oliva, sal, pimienta"],steps:["Sazona la tilapia con limón, ajo en polvo, paprika y sal.","Plancha 4 min por lado a fuego medio-alto.","Arma la ensalada con espinaca, lechuga, pepino y tomate.","Aliña con aceite y limón.","Sirve el pescado sobre la ensalada."],tip:"La tilapia está lista cuando se separa en capas fácilmente con el tenedor. Sobrecocinada queda seca y sin sabor."},
  {n:"Wok de tofu y vegetales al sésamo",cat:"Cena asiática",cal:340,p:22,c:28,f:14,fi:7,time:"20 min",ing:["200g tofu firme escurrido y prensado","Brócoli, zanahoria, pimentón, champiñones","Salsa de soya, aceite de sésamo, jengibre, ajo","Semillas de sésamo"],steps:["Corta el tofu en cubos, seca muy bien con papel absorbente.","Dora el tofu en sartén bien caliente con aceite hasta dorado — sin moverlo.","Retira el tofu, saltea los vegetales 5 min.","Agrega ajo, jengibre, salsa de soya y el tofu de nuevo.","Termina con aceite de sésamo y semillas."],tip:"El tofu seco dora perfecto. Húmedo solo se cuece al vapor. Clave: sartén muy caliente, no muevas hasta que dore."},
  {n:"Pechuga rellena de espinaca y queso",cat:"Cena ligera",cal:370,p:48,c:6,f:16,fi:2,time:"30 min",ing:["200g pechuga de pollo","50g espinaca fresca","30g mozzarella light","Ajo, sal, pimienta, paprika","Palillos de madera"],steps:["Precalienta horno 190°C.","Abre la pechuga como libro (butterfly cut).","Saltea la espinaca con ajo 2 min, coloca sobre la pechuga con el queso.","Cierra con palillos, sazona por fuera.","Hornea 22-25 min hasta que el jugo salga claro."],tip:"Los 25 min son exactos para 200g. Si la pechuga es más grande, agrega 5 min. El jugo claro (no rosado) indica que está lista."},
  {n:"Sopa de pollo reconfortante",cat:"Cena ligera",cal:290,p:34,c:22,f:7,fi:3,time:"30 min",ing:["200g pechuga en trozos","Zanahoria, apio, cebolla, pimentón","60g fideos finos","Ajo, cilantro, comino","Caldo de pollo bajo en sodio"],steps:["Hierve el caldo con ajo y cebolla.","Agrega el pollo y cocina 15 min. Saca y desmenuza.","Incorpora zanahoria, apio y fideos.","Regresa el pollo, cocina 8 min más.","Sirve con cilantro fresco."],tip:"Si congelas porciones no agregues los fideos antes de congelar — quedan pastosos. Agrégalos al recalentar."},
  {n:"Frittata de vegetales al horno",cat:"Cena rápida",cal:310,p:28,c:12,f:18,fi:3,time:"20 min",ing:["4 huevos + 2 claras","Espinaca, champiñones, cebolla, pimentón","50g queso feta","Aceite de oliva, sal, pimienta, orégano"],steps:["Precalienta horno a 180°C.","Saltea los vegetales en sartén apta para horno 5 min.","Bate los huevos con sal y pimienta, vierte sobre los vegetales.","Agrega el queso feta desmenuzado.","Cocina en sartén 3 min, luego al horno 10-12 min."],tip:"La frittata está lista cuando el centro no se mueve al mover el sartén. Ligeramente húmedo en el centro: perfecto."},

  // ── SNACKS NUEVOS ──────────────────────────────────────────────────
  {n:"Edamame con sal marina y limón",cat:"Snack fit",cal:180,p:16,c:14,f:6,fi:7,time:"5 min",ing:["200g edamame congelado","Sal marina gruesa","Limón","Chili flakes opcional"],steps:["Cocina el edamame en agua hirviendo 3-4 min.","Escurre y seca bien.","Mezcla con sal marina, limón y chili."],tip:"El edamame es la proteína vegetal más completa — tiene los 9 aminoácidos esenciales. Mejor snack que cualquier barra proteica procesada."},
  {n:"Cottage cheese tropical",cat:"Snack proteico",cal:210,p:24,c:20,f:4,fi:1,time:"3 min",ing:["150g cottage cheese bajo en grasa","80g piña en cubos","1 cda coco rallado sin azúcar","1 cdita miel"],steps:["Sirve el cottage cheese en un bowl.","Agrega la piña y el coco.","Termina con miel."],tip:"La piña fresca contiene bromelina, enzima que ayuda a digerir la proteína. Combinación rica y funcional a la vez."},
  {n:"Hummus con bastones de verdura",cat:"Snack fit",cal:200,p:8,c:24,f:8,fi:7,time:"5 min",ing:["80g hummus (4 cdas)","1 zanahoria grande","1/2 pepino","2 tallos apio","Paprika para el hummus"],steps:["Corta todas las verduras en bastones.","Sirve el hummus en un bowl pequeño con paprika encima.","Úsalo como dip."],tip:"El hummus casero es trivial: garbanzos + tahini + limón + ajo + aceite, licuados 2 min. Sale el triple que el comercial."},
  {n:"Batido de caseína nocturno",cat:"Snack proteico",cal:230,p:28,c:22,f:4,fi:2,time:"3 min",ing:["1 scoop proteína caseína o whey","250ml leche descremada fría","1 cda cacao en polvo","1 cdita vainilla","Hielo al gusto"],steps:["Mezcla todos los ingredientes en licuadora o shaker.","Sirve bien frío."],tip:"La caseína se digiere en 6-8 horas — ideal antes de dormir para síntesis proteica nocturna. Con whey el efecto es más rápido pero también válido."},
  {n:"Tostadas de arroz con pavo y mostaza",cat:"Snack proteico",cal:170,p:16,c:18,f:3,fi:1,time:"3 min",ing:["3 tostadas de arroz","80g pechuga de pavo laminada","1 cda mostaza Dijon","Pepino en rodajas","Pimienta negra"],steps:["Extiende la mostaza sobre las tostadas.","Agrega las láminas de pavo.","Coloca rodajas de pepino encima.","Termina con pimienta negra."],tip:"Las tostadas de arroz tienen solo 35 kcal cada una. Base perfecta para snacks proteicos sin excederse en calorías."},
  {n:"Mix energético de nueces y chocolate",cat:"Snack fit",cal:240,p:7,c:14,f:18,fi:3,time:"1 min",ing:["15g nueces","15g almendras","10g maní","20g chocolate 70% en trozos"],steps:["Mezcla todos los ingredientes.","Divide en porciones de ~60g en bolsitas para la semana."],tip:"Pesa la porción una vez y visualízala bien — los frutos secos son densos en calorías y es fácil excederse. 60g es la porción correcta."},
  {n:"Manzana con mantequilla de almendra",cat:"Snack fit",cal:210,p:5,c:28,f:10,fi:5,time:"2 min",ing:["1 manzana grande","2 cdas mantequilla de almendra","Canela al gusto"],steps:["Corta la manzana en gajos.","Sirve con la mantequilla de almendra como dip.","Espolvorea canela encima."],tip:"Carbohidrato + grasa buena + proteína: combinación ideal 30-60 min antes de un entreno ligero."},

// ─── RING SVG ─────────────────────────────────────────────────────
function Ring({val,max,color,label,size=64}) {
  const r=size*.42, circ=2*Math.PI*r, pct=Math.min(val/max,1), over=val>max;
  const pctNum = Math.round(pct*100);
  const isKcal = label==="Kcal";
  const valDisplay = isKcal ? Math.round(val) : Math.round(val)+"g";
  return (
    <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",display:"block"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.bor} strokeWidth="5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none"
            stroke={over?G.err:color} strokeWidth="5" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            style={{transition:"stroke-dashoffset .8s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:0}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:size>60?13:11,
            fontWeight:600,color:over?G.err:G.crm,lineHeight:1}}>{valDisplay}</span>
          <span style={{fontSize:size>60?10:9,color:over?G.err:color,
            fontWeight:500,marginTop:1}}>{pctNum}%</span>
        </div>
      </div>
      <span style={{fontSize:9,color:G.sft,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</span>
      <span style={{fontSize:9,color:G.mut}}>/{max}{isKcal?"":"g"}</span>
    </div>
  );
}

function Picker({item, mealLabel, onAdd, onClose}) {
  const defG = item._g||(item.g)||100;
  const [amt, setAmt] = useState(String(defG));
  const baseG = item.g||100;
  const quick = [{l:"100g",g:100}];
  if(item.g&&item.u&&item.g!==100){
    quick.push({l:`${item.u} (~${baseG}g)`,g:baseG});
    quick.push({l:`½ (~${Math.round(baseG/2)}g)`,g:Math.round(baseG/2)});
  }
  const sc = amt&&+amt>0 ? scaleFood(item,+amt) : null;
  return (
    <div className="ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mb su">
        <div className="dh"/>
        <div style={{fontSize:15,fontWeight:500,color:G.crm,marginBottom:2}}>{item.n||item.name}</div>
        <div style={{fontSize:11,color:G.sft,marginBottom:14}}>valores por 100g de referencia</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,background:G.sur,borderRadius:10,padding:12,marginBottom:14}}>
          {[["P",item.p??item.protein,G.acc],["C",item.c??item.carbs,G.grn],["G",item.f??item.fat,"#7A9E8A"],["kcal",item.k??item.calories,G.sft],["fi",item.fi??item.fiber??0,"#A0C878"]].map(([l,v,col])=>(
            <div key={l} style={{textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:600,color:col}}>{Math.round(v)}</div>
              <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        <div className="lbl">Porciones rápidas</div>
        <div className="qb">
          {quick.map(o=><button key={o.g} className="qbtn" onClick={()=>setAmt(String(o.g))}>{o.l}</button>)}
        </div>
        <div className="lbl">Cantidad en gramos</div>
        <input className="field" type="number" placeholder="Ej: 150" value={amt} onChange={e=>setAmt(e.target.value)} style={{marginBottom:12}} autoFocus/>
        {sc&&(
          <div style={{background:"rgba(90,122,98,.08)",border:"1px solid rgba(74,155,111,.25)",borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,color:G.grn,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Para {amt}g</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {[["P",sc.protein,G.acc],["C",sc.carbs,G.grn],["G",sc.fat,"#7A9E8A"],["kcal",sc.calories,G.sft],["fi",sc.fiber,"#A0C878"]].map(([l,v,col])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:600,color:col}}>{v}</div>
                  <div style={{fontSize:9,color:G.mut,marginTop:1}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <button className="bgh" onClick={onClose}>Cancelar</button>
          <button className="btn" style={{flex:1}} disabled={!amt||+amt<=0} onClick={()=>{if(sc)onAdd(sc);}}>
            Agregar{mealLabel?` al ${mealLabel}`:""}
          </button>
        </div>
      </div>
    </div>
  );
}

function StarSaveBtn({food}) {
  const [saved, setSaved] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(()=>{
    loadJSON(COMBOS_KEY).then(combos=>{
      const exists = (combos||[]).some(c=>c.isFav && c.foodN===food.n);
      setSaved(exists);
      setChecking(false);
    });
  },[food.n]);

  const toggle = async(e) => {
    e.stopPropagation();
    const combos = await loadJSON(COMBOS_KEY) || [];
    if(saved) {
      const newCombos = combos.filter(c=>!(c.isFav && c.foodN===food.n));
      await save(COMBOS_KEY, newCombos);
      setSaved(false);
    } else {
      const newCombo = {
        id: Date.now(),
        name: food.n,
        foodN: food.n,
        isFav: true,
        items: [{
          n: food.n,
          name: food.n,
          g: 100,
          p: food.p, protein: food.p,
          c: food.c, carbs: food.c,
          f: food.f, fat: food.f,
          k: food.k, calories: food.k,
          fi: food.fi||0, fiber: food.fi||0,
        }],
        cal: food.k,
        prot: food.p,
      };
      await save(COMBOS_KEY, [newCombo, ...combos]);
      setSaved(true);
    }
  };

  return (
    <button onClick={toggle}
      style={{position:"absolute",top:6,right:6,background:"rgba(255,255,255,0.85)",
        border:"none",borderRadius:20,cursor:"pointer",fontSize:16,padding:"4px 8px",
        color:saved?"#EAC850":"rgba(0,0,0,0.4)",transition:"all .2s"}}
      title={saved?"Quitar de Favoritos":"Guardar en Favoritos"}>
      {saved?"★":"☆"}
    </button>
  );
}

// ─── PROGRESS PHOTOS ─────────────────────────────────────────────────────────
const PHOTOS_KEY = "progress_photos";

function ProgressScreen() {
  const [photos, setPhotos]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [comparing, setComparing] = useState(null);
  const [pickMode, setPickMode] = useState(null);
  const [compareA, setCompareA] = useState(null);
  const [compareB, setCompareB] = useState(null);

  useEffect(()=>{
    loadJSON(PHOTOS_KEY).then(p=>{ if(p) setPhotos(p); setLoading(false); });
  },[]);

  const addPhoto = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = async() => {
        const MAX=900, ratio=Math.min(MAX/img.width,MAX/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        const compressed=canvas.toDataURL("image/jpeg",0.72);
        const newPhoto={id:Date.now(),date:localDateStr(),src:compressed};
        const updated=[...photos,newPhoto].sort((a,b)=>a.date.localeCompare(b.date));
        setPhotos(updated);
        await save(PHOTOS_KEY,updated);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const deletePhoto = async(id) => {
    const updated=photos.filter(p=>p.id!==id);
    setPhotos(updated); await save(PHOTOS_KEY,updated);
    if(selected?.id===id) setSelected(null);
  };

  const resetCompare = () => { setPickMode(null); setCompareA(null); setCompareB(null); };

  const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const formatDate=(d)=>{ const p=d.split("-"); return p[2]+" "+months[parseInt(p[1])-1]+" "+p[0]; };

  if(loading) return <div style={{padding:40,textAlign:"center",color:G.sft}}>Cargando...</div>;

  // Slider fullscreen
  if(comparing) return <CompareSlider
    photoA={comparing.a.src} photoB={comparing.b.src}
    labelA={formatDate(comparing.a.date)} labelB={formatDate(comparing.b.date)}
    onClose={()=>{setComparing(null);resetCompare();}}/>;

  // Full photo view
  if(selected) return (
    <div style={{position:"fixed",inset:0,background:"#000",
      display:"flex",flexDirection:"column",justifyContent:"space-between",zIndex:100}}>
      <div style={{padding:"16px 20px",display:"flex",
        justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>setSelected(null)}
          style={{background:"transparent",border:"none",color:"#fff",fontSize:15,cursor:"pointer"}}>
          ← Volver
        </button>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{formatDate(selected.date)}</div>
        <button onClick={()=>deletePhoto(selected.id)}
          style={{background:"transparent",border:"none",color:"rgba(255,100,100,0.8)",
            fontSize:13,cursor:"pointer"}}>Eliminar</button>
      </div>
      <img src={selected.src} style={{width:"100%",flex:1,objectFit:"contain"}}/>
      <div style={{height:40}}/>
    </div>
  );

  const sortedPhotos = photos.slice().reverse();

  return (
    <div style={{paddingBottom:80}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",
        alignItems:"center",marginBottom:16}}>
        <div>
          <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>Progreso</div>
          <div style={{fontSize:12,color:G.sft}}>
            {photos.length} foto{photos.length!==1?"s":""} registrada{photos.length!==1?"s":""}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {photos.length>=2&&!pickMode&&(
            <button onClick={()=>setPickMode("a")}
              style={{background:G.card,border:`1px solid ${G.bor}`,
                borderRadius:12,padding:"9px 14px",fontSize:12,fontWeight:500,
                cursor:"pointer",color:G.terra,display:"flex",alignItems:"center",gap:5,
                boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
              ⇔ Comparar
            </button>
          )}
          <label style={{background:G.terra,color:"#fff",borderRadius:12,
            padding:"9px 16px",fontSize:13,fontWeight:500,cursor:"pointer"}}>
            + Foto
            <input type="file" accept="image/*" onChange={addPhoto} style={{display:"none"}}/>
          </label>
        </div>
      </div>

      {/* Pick mode banner */}
      {pickMode&&(
        <div style={{background:G.card,borderRadius:16,padding:"14px 16px",
          marginBottom:16,border:`1.5px solid ${G.terra}`,
          boxShadow:"0 4px 20px rgba(198,139,119,0.1)"}}>
          <div style={{fontSize:12,color:G.terra,fontWeight:600,
            letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>
            {pickMode==="a"
              ? "Toca la foto de ANTES"
              : compareA&&compareB ? "¡Listo! Ver comparación" : "Toca la foto de DESPUÉS"}
          </div>
          <div style={{fontSize:12,color:G.sft,marginBottom:12}}>
            {pickMode==="a"
              ? "Selecciona la foto más antigua"
              : compareA ? `✓ Antes: ${formatDate(compareA.date)}` : "Selecciona la foto más reciente"}
            {pickMode==="b"&&compareB&&` · ✓ Después: ${formatDate(compareB.date)}`}
          </div>
          <div style={{display:"flex",gap:8}}>
            {compareA&&compareB&&(
              <button onClick={()=>setComparing({a:compareA,b:compareB})}
                style={{flex:2,background:G.terra,color:"#fff",border:"none",
                  borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Ver comparación →
              </button>
            )}
            <button onClick={resetCompare}
              style={{flex:1,background:"transparent",border:`1px solid ${G.bor}`,
                borderRadius:10,padding:"10px",fontSize:12,color:G.sft,cursor:"pointer"}}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* Tip */}
      <div style={{fontSize:11,color:G.sft,marginBottom:16,lineHeight:1.6}}>
        📅 Recomendado: una foto cada 2 semanas. El cuerpo cambia más despacio de lo que la mente espera.
      </div>

      {/* Empty state */}
      {photos.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:40,marginBottom:16}}>📸</div>
          <div style={{fontSize:16,fontWeight:600,color:G.crm,marginBottom:8}}>
            Tu línea de tiempo empieza aquí
          </div>
          <div style={{fontSize:13,color:G.sft,lineHeight:1.6}}>
            Agrega tu primera foto hoy.<br/>
            En 4 semanas tendrás algo poderoso que ver.
          </div>
        </div>
      )}

      {/* Photo grid */}
      {sortedPhotos.map((photo,i)=>(
        <div key={photo.id} style={{marginBottom:20}}>
          <div style={{fontSize:11,color:G.terra,letterSpacing:"0.1em",
            textTransform:"uppercase",fontWeight:600,marginBottom:8,
            display:"flex",alignItems:"center",gap:8}}>
            {formatDate(photo.date)}
            {i===0&&<span style={{background:G.terra,color:"#fff",
              borderRadius:20,padding:"2px 8px",fontSize:9}}>Más reciente</span>}
            {pickMode&&compareA?.id===photo.id&&
              <span style={{background:"rgba(198,139,119,.15)",color:G.terra,
                borderRadius:20,padding:"2px 8px",fontSize:9,border:`1px solid ${G.terra}`}}>
                ANTES ✓
              </span>}
            {pickMode&&compareB?.id===photo.id&&
              <span style={{background:"rgba(90,122,98,.15)",color:G.grn,
                borderRadius:20,padding:"2px 8px",fontSize:9,border:`1px solid ${G.grn}`}}>
                DESPUÉS ✓
              </span>}
          </div>
          <div style={{position:"relative",borderRadius:16,overflow:"hidden",
            cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.1)",
            border:pickMode&&(compareA?.id===photo.id||compareB?.id===photo.id)
              ?`2px solid ${compareA?.id===photo.id?G.terra:G.grn}`:"none"}}
            onClick={()=>{
              if(pickMode==="a"){
                setCompareA(photo);
                setPickMode("b");
              } else if(pickMode==="b"){
                setCompareB(photo);
              } else {
                setSelected(photo);
              }
            }}>
            <img src={photo.src}
              style={{width:"100%",height:300,objectFit:"cover",display:"block"}}/>
            {pickMode&&(
              <div style={{position:"absolute",inset:0,
                background:"rgba(198,139,119,0.08)",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:G.terra,color:"#fff",borderRadius:20,
                  padding:"8px 20px",fontSize:13,fontWeight:600,opacity:0.9}}>
                  {pickMode==="a"?"Seleccionar como ANTES":"Seleccionar como DESPUÉS"}
                </div>
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}


function SuppsPill({profile, onNavigate}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const hour = new Date().getHours();
  const [checked, setChecked] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    loadJSON("supps:"+today).then(d=>{
      if(d) setChecked(d);
      setLoaded(true);
    });
  },[]);

  const allSupps = SUPPS(profile)||[];
  const total = allSupps.length;
  const taken = allSupps.filter(s=>checked[s.n]).length;
  const allDone = total > 0 && taken === total;

  // Time-based filtering
  const isMorning = hour >= 4 && hour < 12;
  const isAfternoon = hour >= 12 && hour < 19;
  const isNight = hour >= 19 || hour < 4;

  const getMomentSupps = () => {
    if(isMorning) return allSupps.filter(s=>s.t?.includes("Mañana") || s.t?.includes("Post-entreno"));
    if(isAfternoon) return allSupps.filter(s=>s.t?.includes("almuerzo") || s.t?.includes("cena") || s.t?.includes("Post-entreno"));
    if(isNight) return allSupps.filter(s=>s.t?.includes("dormir") || s.t?.includes("cena"));
    return [];
  };

  const momentSupps = getMomentSupps();

      }
      {" Supls "}{taken}/{total}

}

// Suplementos card for HomeScreen - time aware
function SuppsReminderCard({profile, onNavigate}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const [checked, setChecked] = useState({});
  const [suppTimes, setSuppTimes] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [now, setNow] = useState(new Date());

  useEffect(()=>{
    loadJSON("supps:"+today).then(d=>{ if(d) setChecked(d); setLoaded(true); });
    loadJSON("supp_times").then(d=>{ if(d) setSuppTimes(d); });
    const interval = setInterval(()=>setNow(new Date()), 60000);
    return ()=>clearInterval(interval);
  },[]);

  const allSupps = SUPPS(profile)||[];

  // Show supps whose configured time is within 15 min before or anytime after (until taken)
  const momentSupps = allSupps.filter(s=>{
    const t = suppTimes[s.n];
    if(!t) return false;
    const [hh,mm] = t.split(":").map(Number);
    const configMin = hh*60+mm;
    const nowMin = now.getHours()*60+now.getMinutes();
    return nowMin >= configMin-15;
  });

  const momentLabel = "Suplementos";
  const pending = momentSupps.filter(s=>!checked[s.n]);
  const allMomentDone = momentSupps.length>0 && pending.length===0;

  const toggleSupp = async(name) => {
    const nc = {...checked,[name]:!checked[name]};
    setChecked(nc);
    await save("supps:"+today, nc);
  };

  const [expanded, setExpanded] = React.useState(false);

  if(!loaded || momentSupps.length===0) return null;

  const doneCount = momentSupps.filter(function(s){return checked[s.n];}).length;

  return (
    <div style={{background:G.card,borderRadius:20,marginBottom:12,
      boxShadow:"0 4px 24px rgba(0,0,0,0.05)",overflow:"hidden"}}>
      <div onClick={()=>setExpanded(function(e){return !e;})}
        style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"13px 16px",cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={allMomentDone?G.grn:G.terra} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span style={{fontSize:13,fontWeight:500,color:G.crm}}>{momentLabel}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",gap:3}}>
            {momentSupps.map(function(_,i){return(
              <div key={i} style={{width:6,height:6,borderRadius:"50%",
                background:checked[momentSupps[i].n]?G.grn:"#EDE9E0"}}/>
            );})}
          </div>
          <span style={{fontSize:11,color:allMomentDone?G.grn:G.sft}}>{doneCount}/{momentSupps.length}</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={G.sft} strokeWidth="2" strokeLinecap="round">
            <path d={expanded?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/>
          </svg>
        </div>
      </div>
      {expanded&&(
        <div style={{borderTop:`1px solid ${G.bor}`,padding:"12px 16px 14px",display:"flex",flexDirection:"column",gap:8}}>
          {momentSupps.map(function(s,i){
            const done=!!checked[s.n];
            return(
              <button key={i} onClick={()=>toggleSupp(s.n)}
                style={{display:"flex",alignItems:"center",gap:10,
                  background:"none",border:"none",cursor:"pointer",padding:"3px 0",textAlign:"left"}}>
                <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                  border:"1.5px solid "+(done?G.grn:G.bor),background:done?G.grn:"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {done&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><path d="M5 12l5 5L19 7"/></svg>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:done?G.sft:G.crm,textDecoration:done?"line-through":"none"}}>{s.n}</div>
                  <div style={{fontSize:10,color:G.mut}}>{s.d}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SueloNightMode({state, cfg, gymDay, profile, today}) {
  const [answer, setAnswer] = React.useState("");
  const [saved, setSaved] = React.useState(false);

  React.useEffect(()=>{
    load("suelo_night:"+today).then(v=>{ if(v){ setAnswer(v); setSaved(true); }});
  },[today]);

  const saveAnswer = async() => {
    if(!answer.trim()) return;
    await save("suelo_night:"+today, answer);
    // Also append to diary notes
    loadJSON("diary_notes").then(async notes=>{
      const n = notes||{};
      const existing = n[today]||"";
      n[today] = existing ? existing+"\n\n"+answer : answer;
      await save("diary_notes", JSON.stringify(n));
    });
    setSaved(true);
  };

  const questions = {
    optimo:       "¿Qué hiciste diferente hoy que funcionó?",
    construyendo: "¿Qué te faltó para cerrar el día completo?",
    recuperacion: "¿Qué necesita tu cuerpo esta noche?",
    atencion:     "¿Qué estuvo difícil hoy?",
    neutro:       "¿Cómo estuvo tu día hoy?",
  };

  const tmrLabel = (() => {
    if(!gymDay) return null;
    const labels = {
      B1:"Push", B2:"Piernas A", B3:"Pull", B4:"Piernas B",
      B5:"Full Body", DA:"Descanso Activo", D:"Descanso"
    };
    const l = labels[gymDay] || gymDay;
    if(gymDay==="D") return "Mañana es día de descanso. Duerme bien.";
    if(gymDay==="DA") return "Mañana es Descanso Activo. Muévete suave.";
    return `Mañana es ${l}. Duerme bien y llega lista.`;
  })();

  const q = questions[state] || questions.neutro;

  return (
    <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.08)"}}>
      {/* Pregunta */}
      {!saved ? (
        <>
          <div style={{fontSize:13,color:"rgba(249,245,240,0.8)",
            fontFamily:"'Fraunces',serif",fontStyle:"italic",
            lineHeight:1.5,marginBottom:10}}>
            {q}
          </div>
          <textarea
            value={answer}
            onChange={e=>setAnswer(e.target.value)}
            placeholder="Escribe aquí..."
            rows={2}
            style={{width:"100%",background:"rgba(255,255,255,0.06)",
              border:`1px solid ${cfg.accent}33`,borderRadius:10,
              padding:"10px 12px",color:"rgba(249,245,240,0.9)",
              fontSize:13,fontFamily:"'Fraunces',serif",fontStyle:"italic",
              resize:"none",outline:"none",lineHeight:1.6,
              boxSizing:"border-box",marginBottom:8}}/>
          <button onClick={saveAnswer}
            disabled={!answer.trim()}
            style={{background:answer.trim()?cfg.accent:"rgba(255,255,255,0.08)",
              border:"none",borderRadius:10,padding:"8px 16px",
              color:answer.trim()?"#fff":"rgba(255,255,255,0.3)",
              fontSize:12,fontWeight:600,cursor:answer.trim()?"pointer":"default",
              transition:"all .2s"}}>
            Guardar en Bitácora
          </button>
        </>
      ) : (
        <div style={{fontSize:12,color:`${cfg.accent}99`,
          fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>
          ✓ Guardado en tu Bitácora
        </div>
      )}
      {/* Micro-intención de mañana */}
      {tmrLabel && (
        <div style={{marginTop:12,paddingTop:10,
          borderTop:"1px solid rgba(255,255,255,0.06)",
          display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:cfg.accent,opacity:0.6}}>↑</span>
          <span style={{fontSize:11,color:"rgba(249,245,240,0.4)",
            fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>
            {tmrLabel}
          </span>
        </div>
      )}
    </div>
  );
}

function SueloCard({meals, targets, cyclePhase, onNavigate, bitacoraLog, dayType, streak, curStreak, profile, nightClosed, gymDay, premise, cta}) {
  const today = localDateStr();
  const hour = new Date().getHours();
  const tot = totals(meals);
  const totalCal = tot.k, totalP = tot.p;

  const calPct  = targets?.calories ? Math.round((totalCal/targets.calories)*100) : 0;
  const protPct = targets?.protein  ? Math.round((totalP/targets.protein)*100)    : 0;

  const rawProgress = (hour - 7) / (21 - 7);
  const dayProgress = Math.max(0.08, Math.min(1, rawProgress));
  const expectedPct = Math.round(dayProgress * 100);
  const calOk  = calPct  >= expectedPct * 0.70;
  const protOk = protPct >= expectedPct * 0.70;
  const noData = calPct === 0 && protPct === 0;

  // Bitácora data for today
  const todayBit  = bitacoraLog?.[today] || {};
  const suenoId   = todayBit.sueno;
  const coherence = todayBit.coherencia ?? null;
  const energiaNum = todayBit.energia || null; // 1-5 from check-in
  const estresNum  = todayBit.estres  || null; // 1-5 from check-in
  const suenoHoras = todayBit.suenoHoras || null;
  const hasBit    = !!(suenoId || coherence);

  // Sleep score
  const sleepScore = {bien:3, regular:2, mal:1}[suenoId] || null;
  const sleepBad   = sleepScore === 1;
  const sleepOk    = sleepScore === 3;

  const isRest     = dayType === "rest";
  const phaseName  = cyclePhase?.phase;
  const phaseDay   = cyclePhase?.day;
  const lateLuteal = phaseName === "luteal" && phaseDay >= 22;

  // Low energia or high estres from check-in
  const energiaLow  = energiaNum !== null && energiaNum <= 2;
  const estresHigh  = estresNum  !== null && estresNum  >= 4;
  const checkinBad  = energiaLow || estresHigh;

  // ── DETERMINE STATE ──────────────────────────────────────────────
  const state = noData ? "neutro"
    : (sleepBad || checkinBad) && !calOk ? "atencion"
    : calOk && protOk && !sleepBad && !checkinBad ? "optimo"
    : isRest || sleepBad || checkinBad ? "recuperacion"
    : "construyendo";

  // ── STATE CONFIG ─────────────────────────────────────────────────
  const STATES = {
    optimo: {
      gradient: "linear-gradient(135deg,#1C3A2A,#2A4D37)",
      accent:   "#6FCF97",
      badge:    "Óptimo",
      badgeBg:  "rgba(111,207,151,0.18)",
      icon:     "✦",
    },
    construyendo: {
      gradient: "linear-gradient(135deg,#2A2210,#3D3218)",
      accent:   "#D4A853",
      badge:    "Construyendo",
      badgeBg:  "rgba(212,168,83,0.18)",
      icon:     "◎",
    },
    recuperacion: {
      gradient: "linear-gradient(135deg,#1A2030,#222840)",
      accent:   "#90A8D4",
      badge:    "Recuperación",
      badgeBg:  "rgba(144,168,212,0.18)",
      icon:     "◌",
    },
    atencion: {
      gradient: "linear-gradient(135deg,#2A1810,#3D2418)",
      accent:   "#E8A87A",
      badge:    "Atención",
      badgeBg:  "rgba(232,168,122,0.18)",
      icon:     "△",
    },
    neutro: {
      gradient: "linear-gradient(135deg,#1A1410,#2A1E14)",
      accent:   "rgba(212,168,83,0.6)",
      badge:    "Sin registrar",
      badgeBg:  "rgba(212,168,83,0.1)",
      icon:     "○",
    },
  };

  const cfg = STATES[state];

  // ── DYNAMIC INSIGHT ───────────────────────────────────────────────
  const firstName = profile?.name?.split(" ")[0] || "";
  const dayLabel  = {gym:"entreno", legs:"piernas", rest:"descanso"}[dayType] || "hoy";
  const phaseLbl  = {menstruation:"fase menstrual",follicular:"fase folicular",
    ovulation:"ovulación",luteal:"fase lútea"}[phaseName] || "";

  const insight = (() => {
    if(noData) return "Registra tus comidas para activar tu lectura del día.";

    if(state === "optimo") {
      if(isRest && sleepOk)
        return `Día de descanso bien ejecutado — nutrición completa y sueño reparador. El músculo se recupera esta noche en condiciones óptimas.`;
      if(lateLuteal)
        return `Fase lútea avanzada con ${protPct}g de proteína. Tu sistema hormonal tiene lo que necesita para el cierre del ciclo.`;
      if(hour >= 19)
        return `Cerraste el día de ${dayLabel} con nutrición completa. Eso es exactamente el ciclo que construye resultados.`;
      return `Tu hardware está operando bien. ${protPct >= 100 ? "Proteína al 100% — el músculo tiene combustible." : "Sigue construyendo el día con intención."}`;
    }

    if(state === "construyendo") {
      if(hour < 12)
        return `Buen inicio de ${dayLabel}. Tienes el resto del día para llegar al objetivo — no hay prisa, hay plan.`;
      if(protPct < 60)
        return `A estas horas tu proteína está al ${protPct}%. Priorízala en la próxima comida — es la variable que más impacta.`;
      return `Sistema construyendo. Calorías al ${calPct}%, proteína al ${protPct}%. El día aún no terminó.`;
    }

    if(state === "recuperacion") {
      if(sleepBad && isRest)
        return `Sueño comprometido + día de descanso. Hoy el trabajo es nutrir y descansar — sin exigencia extra.`;
      if(sleepBad)
        return `El sueño de anoche estuvo difícil. Prioriza proteína y carbos de calidad — tu sistema necesita más hoy, no menos.`;
      if(isRest)
        return `Día de descanso activo${phaseLbl ? ` en ${phaseLbl}` : ""}. La recuperación también es entrenamiento.`;
      return `Tu sistema está en modo recuperación. Hidratación, proteína y sueño esta noche son la prioridad.`;
    }

    if(state === "atencion") {
      if(sleepBad && protPct < 50)
        return `Sueño malo + proteína baja son las dos variables que más afectan la composición. Hoy, una comida proteica cambia el panorama.`;
      if(sleepBad)
        return `El sueño de anoche fue difícil. Come bien hoy — tu cuerpo compensa con nutrición lo que no pudo con descanso.`;
      return `Proteína al ${protPct}% a estas horas. Una comida con 30-40g de proteína ahora reencuadra el día.`;
    }

    return "Registra tu nutrición para activar la lectura del día.";
  })();

  // Prompt if bitácora not filled
  const bitPrompt = !hasBit && !noData
    ? "Registra cómo amaneciste para una lectura más precisa →"
    : null;

  return (
    <div style={{borderRadius:20,overflow:"hidden",marginBottom:12,
      boxShadow:"0 6px 24px rgba(0,0,0,0.12)"}}>
      <div style={{background:cfg.gradient,padding:"16px"}}>

        {/* Premise */}
        {premise?.vision && (()=>{
          const full = premise.vision.trim();
          const sentenceEnd = full.search(/[.!?]/);
          const display = sentenceEnd > 0 && sentenceEnd < 120
            ? full.slice(0, sentenceEnd + 1)
            : full.slice(0, 90).replace(/\s\S+$/, "...");
          return (
            <div style={{textAlign:"center",marginBottom:14,padding:"0 4px"}}>
              <span style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",
                fontSize:13,color:"rgba(249,245,240,0.5)",lineHeight:1.6}}>
                "{display}"
              </span>
            </div>
          );
        })()}

        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14,color:cfg.accent}}>{cfg.icon}</span>
            <span style={{fontSize:11,fontWeight:600,color:"rgba(249,245,240,0.9)",
              letterSpacing:"0.04em"}}>
              {phaseLbl ? `${phaseLbl}${phaseDay?` · día ${phaseDay}`:""}` : "Suelo fértil"}
            </span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {curStreak>0&&(
              <span style={{fontSize:11,color:cfg.accent,
                background:"rgba(255,255,255,0.06)",borderRadius:20,
                padding:"3px 9px",border:`1px solid ${cfg.accent}22`}}>
                🔥 {curStreak}d
              </span>
            )}
            <span style={{fontSize:10,fontWeight:600,color:cfg.accent,
              background:cfg.badgeBg,borderRadius:20,padding:"3px 9px",
              border:`1px solid ${cfg.accent}33`}}>
              {cfg.badge}
            </span>
          </div>
        </div>

        {/* Insight */}
        <div style={{fontSize:13,color:"rgba(249,245,240,0.9)",lineHeight:1.65,marginBottom:8}}>
          {insight}
        </div>

        {/* Bitácora prompt */}
        {bitPrompt && (
          <button onClick={()=>onNavigate("bitacora")}
            style={{background:"transparent",border:"none",padding:0,cursor:"pointer",
              fontSize:11,color:cfg.accent,textDecoration:"underline",
              textDecorationColor:`${cfg.accent}55`,textUnderlineOffset:"3px"}}>
            {bitPrompt}
          </button>
        )}

        {/* Sleep + horas */}
        {suenoId && (
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:"rgba(249,245,240,0.4)",letterSpacing:"0.06em",textTransform:"uppercase"}}>Sueño</span>
            <span style={{fontSize:11,fontWeight:600,
              color:sleepOk?cfg.accent:sleepBad?"rgba(232,168,122,0.8)":"rgba(249,245,240,0.5)"}}>
              {{bien:"Bien",regular:"Regular",mal:"Difícil"}[suenoId]}
              {suenoHoras ? ` · ${suenoHoras}h` : ""}
            </span>
            {energiaNum && (
              <span style={{fontSize:11,color:energiaLow?"rgba(232,168,122,0.7)":"rgba(249,245,240,0.35)"}}>
                · ⚡{energiaNum}/5
              </span>
            )}
          </div>
        )}

        {/* ── CTA CONTEXTUAL ── */}
        {cta&&(
          <div style={{marginTop:10,display:"flex",alignItems:"center",
            justifyContent:"space-between",paddingTop:10,
            borderTop:"1px solid rgba(255,255,255,0.08)"}}>
            <div style={{fontSize:12,color:"rgba(249,245,240,0.65)",flex:1,minWidth:0,lineHeight:1.5}}>
              <span style={{fontWeight:500,color:"rgba(249,245,240,0.85)"}}>{cta.msg}</span>
              {cta.sub&&<span> · {cta.sub.slice(0,40)}{cta.sub.length>40?"...":""}</span>}
            </div>
            {cta.btn&&cta.screen&&(
              <button onClick={()=>onNavigate(cta.screen)}
                style={{background:"rgba(255,255,255,0.1)",border:`1px solid ${cfg.accent}44`,
                  borderRadius:8,padding:"5px 10px",color:cfg.accent,fontSize:11,
                  fontWeight:600,cursor:"pointer",flexShrink:0,marginLeft:10}}>
                {cta.btn.replace(" →","")}
              </button>
            )}
          </div>
        )}

        {/* ── MODO NOCHE (7pm+) ── */}
        {hour >= 19 && !nightClosed && (
          <SueloNightMode
            state={state}
            cfg={cfg}
            gymDay={gymDay}
            profile={profile}
            today={today}/>
        )}

        {/* Día cerrado — aparece después del Evening Ritual */}
        {nightClosed && hour >= 19 && (
          <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",
            display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"rgba(212,168,83,0.7)"}}>✦</span>
            <span style={{fontSize:11,color:"rgba(212,168,83,0.6)",
              fontFamily:"'Fraunces',serif",fontStyle:"italic",letterSpacing:"0.04em"}}>
              Día cerrado
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

          <span style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",

function LabHomeCard({activeLab, labCompletions, meals, onMarkLabAction, onNavigate}) {
  const today = localDateStr();
  const tot = totals(meals);

  // Nutrient anchors per lab
  const LAB_ANCHORS = {
    1: {nutrient:"calorías",  field:"k",  target:100, unit:"kcal", msg:(pct)=>`Lab activo: Cortisol. Estás al ${pct}% de tus calorías — el déficit severo activa el modo amenaza.`},
    2: {nutrient:"grasa",     field:"f",  target:100, unit:"g",    msg:(pct)=>`Lab activo: Mielina. Tu grasa hoy está al ${pct}% — las grasas de calidad construyen la claridad mental.`},
    3: {nutrient:"carbos",    field:"c",  target:100, unit:"g",    msg:(pct)=>`Lab activo: Serotonina. Tus carbos están al ${pct}% — el triptófano necesita carbos para cruzar la barrera hematoencefálica.`},
    4: {nutrient:"fibra",     field:"fi", target:25,  unit:"g",    msg:(pct,val)=>`Lab activo: Nervio vago. Tu fibra hoy es ${val}g de 25g recomendados — el eje intestino-cerebro necesita este ancla.`},
    5: {nutrient:"proteína",  field:"p",  target:100, unit:"g",    msg:(pct)=>`Lab activo: Dopamina. Tu proteína está al ${pct}% — la tirosina (precursora de dopamina) viene de la proteína.`},
    6: {nutrient:"proteína",  field:"p",  target:100, unit:"g",    msg:(pct)=>`Lab activo: Testosterona. Proteína al ${pct}% — el músculo y la hormona compiten por el mismo sustrato.`},
    7: {nutrient:"carbos",    field:"c",  target:100, unit:"g",    msg:(pct)=>`Lab activo: GABA. Carbos al ${pct}% — la transición necesita glucosa estable para no activar la ansiedad.`},
    8: {nutrient:"calorías",  field:"k",  target:100, unit:"kcal", msg:(pct)=>`Lab activo: Ciclo soberano. Nutrición al ${pct}% — el ciclo completo empieza con el cuerpo nutrido.`},
  };

  const allDone = labCompletions && Object.keys(labCompletions).length >= 8;
  const hasActive = !!activeLab;

  // No labs started
  if(!hasActive && !allDone) {
    return (
      <div className="card" style={{marginBottom:12,
        background:"linear-gradient(135deg,#2A1E14,#3D2E1E)",
        border:"1px solid rgba(212,168,83,0.2)"}}>
        <div style={{fontSize:10,color:"rgba(212,168,83,0.7)",letterSpacing:2,
          textTransform:"uppercase",marginBottom:10}}>The Healing Labs</div>
        <div className="serif" style={{fontSize:16,fontWeight:400,
          color:"rgba(249,245,240,0.95)",lineHeight:1.6,marginBottom:12}}>
          "Lo Fundamental no es un plan de comidas. La dieta es el ancla desde donde sanas, creas y avanzas."
        </div>
        <div style={{fontSize:12,color:"rgba(249,245,240,0.5)",lineHeight:1.6,marginBottom:14}}>
          Descubre cómo tu cortisol, serotonina y capacidad de cambiar empiezan en lo que comes.
        </div>
        <button onClick={()=>onNavigate("healing")}
          style={{background:"rgba(212,168,83,0.15)",border:"1px solid rgba(212,168,83,0.4)",
            borderRadius:10,padding:"10px 16px",color:"#D4A853",
            fontSize:13,fontWeight:600,cursor:"pointer"}}>
          Comenzar los Healing Labs →
        </button>
      </div>
    );
  }

  // All completed
  if(allDone) {
    return (
      <div className="card" style={{marginBottom:12,
        background:"linear-gradient(135deg,#1C3A2A,#2A4D37)",
        border:"1px solid rgba(111,207,151,0.2)"}}>
        <div style={{fontSize:10,color:"rgba(111,207,151,0.7)",letterSpacing:2,
          textTransform:"uppercase",marginBottom:8}}>The Healing Labs</div>
        <div className="serif" style={{fontSize:15,color:"rgba(249,245,240,0.9)",lineHeight:1.6}}>
          Completaste el ciclo. Tu nutrición y tu sanación ya hablan el mismo idioma.
        </div>
      </div>
    );
  }

  // Active lab
  const completedDays = activeLab.completedDays || [];
  const doneToday = completedDays.includes(today);
  const startDate = new Date(activeLab.startDate);
  const todayDate = new Date(today);
  const dayInLab = Math.min(7, Math.floor((todayDate - startDate) / (1000*60*60*24)) + 1);
  const anchor = LAB_ANCHORS[activeLab.n];

  // Calculate nutrient pct
  let nutrientInsight = null;
  if(anchor) {
    const val = tot[anchor.field] || 0;
    const pct = anchor.target === 100
      ? Math.round(val)
      : Math.round((val / anchor.target) * 100);
    nutrientInsight = anchor.msg(pct, Math.round(val));
  }

  return (
    <div className="card" style={{marginBottom:12,
      border:`1px solid ${doneToday?G.grn+"44":G.bor}`}}>

            {activeLab.title}
          </div>
          <div style={{fontSize:12,color:G.sft,fontStyle:"italic"}}>{activeLab.sub}</div>
        </div>
      </div>
      {/* Nutrient insight */}
      {nutrientInsight && (
        <div style={{fontSize:12,color:G.sft,lineHeight:1.6,marginBottom:10,
          paddingLeft:10,borderLeft:`2px solid rgba(212,168,83,0.4)`}}>

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onMarkLabAction(!doneToday)}
          style={{flex:1,padding:"11px",borderRadius:10,
            background:doneToday?G.grn:G.terraLight,
            color:doneToday?"#fff":G.terra,
            border:`1px solid ${doneToday?G.grn:G.terra+"44"}`,
            fontSize:13,fontWeight:600,cursor:"pointer"}}>
          {doneToday?"✓ Hecho hoy":"Marcar como hecho"}
        </button>
        <button onClick={()=>onNavigate("healing")}
          style={{padding:"11px 16px",borderRadius:10,
            background:"transparent",border:`1px solid ${G.bor}`,
            color:G.sft,fontSize:13,cursor:"pointer"}}>
          Ver Lab →
        </button>
      </div>
      <div style={{display:"flex",gap:4,marginTop:10}}>
        {[1,2,3,4,5,6,7].map(d=>{
          const dayDate = new Date(startDate);
          dayDate.setDate(dayDate.getDate()+(d-1));
          const dayStr = dayDate.getFullYear()+"-"+String(dayDate.getMonth()+1).padStart(2,"0")+"-"+String(dayDate.getDate()).padStart(2,"0");
          const wasCompleted = completedDays.includes(dayStr);
          const isToday = dayStr === today;
          const isFuture = dayDate > todayDate;
          return (
            <div key={d} style={{flex:1,height:4,borderRadius:2,
              background:wasCompleted?G.grn:isToday?G.terra:isFuture?G.bor:"rgba(0,0,0,0.06)"}}/>
          );
        })}
      </div>
    </div>
  );
}

  const rem = tgt.calories-rt.k, pct=Math.min(rt.k/tgt.calories,1);

  const g = GYM[gymDay];

    const effectiveDayType = getEffectiveDayType(gymDay, workoutLog);

  // Streak
  const days7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));

    return {l:["D","L","M","X","J","V","S"][d.getDay()],done:streak.days?.includes(key),today:i===6};

  // Today's healing state

      : null;

function MacroSuggestions({rt, tgt}) {
  const LEVERS = {
    protein: [
      {name:"Claras pasteurizadas", p:11, c:1, f:0, fi:0, k:52},
      {name:"Whey protein",         p:24, c:3, f:2, fi:0, k:126},
      {name:"Pechuga cocida",       p:31, c:0, f:3, fi:0, k:151},
      {name:"Camarones cocidos",    p:24, c:0, f:1, fi:0, k:99},
    ],
    carbs: [
      {name:"Arroz blanco cocido",  p:3,  c:28, f:0, fi:0.4, k:130},
      {name:"Papa cocida",          p:2,  c:20, f:0, fi:1.8, k:86},
      {name:"Banano maduro",        p:1,  c:23, f:0, fi:2.6, k:89},
      {name:"Dátiles",              p:2,  c:75, f:0, fi:6.7, k:282},
    ],
    fat: [
      {name:"Aceite de oliva",      p:0,  c:0,  f:100, fi:0, k:884},
      {name:"Aguacate",             p:2,  c:9,  f:15,  fi:6.7, k:160},
      {name:"Almendras",            p:21, c:22, f:49,  fi:12.5, k:579},
    ],
    fiber: [
      {name:"Espinaca cruda",       p:3,  c:4,  f:1, fi:2.2, k:23},
      {name:"Brócoli cocido",       p:3,  c:7,  f:0, fi:3.3, k:34},
      {name:"Manzana",              p:0,  c:14, f:0, fi:2.4, k:52},
    ],
  };

  const gaps = [];
  const protGap = (tgt.protein||0) - rt.p;
  const carbGap = (tgt.carbs||0) - rt.c;
  const fatGap  = (tgt.fat||0) - rt.f;
  const fibGap  = (tgt.fiber||25) - rt.fi;
  const calGap  = (tgt.calories||0) - rt.k;

  if(protGap > 8)  gaps.push({macro:"protein", gap:protGap, unit:"g", label:"Proteína", color:"#C68B77"});
  if(carbGap > 10) gaps.push({macro:"carbs",   gap:carbGap, unit:"g", label:"Carbos",   color:"#5A7A62"});
  if(fatGap  > 6)  gaps.push({macro:"fat",     gap:fatGap,  unit:"g", label:"Grasas",   color:"#D4A853"});
  if(fibGap  > 4)  gaps.push({macro:"fiber",   gap:fibGap,  unit:"g", label:"Fibra",    color:"#A89EC0"});

  if(gaps.length===0) return (
    <div style={{background:"rgba(90,122,98,0.06)",border:"1px solid rgba(90,122,98,0.2)",
      borderRadius:12,padding:"12px 14px",marginBottom:12,
      display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:16}}>✦</span>
      <div style={{fontSize:12,color:G.grn,fontWeight:500}}>
        Macros en target — distribución óptima para hoy.
      </div>
    </div>
  );

  return (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,color:G.mut,letterSpacing:"0.1em",
        textTransform:"uppercase",marginBottom:8}}>Ajustes sugeridos</div>
      {gaps.map(({macro, gap, label, color})=>{
        const foods = LEVERS[macro];
        // Find the food that covers the gap with least collateral damage
        const suggestions = foods.map(food=>{
          const macroKey = macro==="protein"?"p":macro==="carbs"?"c":macro==="fat"?"f":"fi";
          const gramsNeeded = Math.round((gap / food[macroKey]) * 100);
          const collateral = {
            p: Math.round(food.p * gramsNeeded/100),
            c: Math.round(food.c * gramsNeeded/100),
            f: Math.round(food.f * gramsNeeded/100),
            k: Math.round(food.k * gramsNeeded/100),
          };
          // Score: lower collateral on OTHER macros = better
          const otherImpact = Object.entries(collateral)
            .filter(([k])=>k!==macroKey&&k!=="k")
            .reduce((a,[,v])=>a+v, 0);
          return {food, gramsNeeded, collateral, otherImpact};
        }).sort((a,b)=>a.otherImpact-b.otherImpact).slice(0,2);

        return (
          <div key={macro} style={{background:G.card,border:`1px solid ${G.bor}`,
            borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:600,color:G.crm}}>
                Te faltan ~{gap}g de {label.toLowerCase()}
              </span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {suggestions.map(({food, gramsNeeded, collateral})=>(
                <div key={food.name} style={{background:`${color}0D`,border:`1px solid ${color}33`,
                  borderRadius:10,padding:"7px 10px",flex:1,minWidth:120}}>
                  <div style={{fontSize:12,fontWeight:500,color:G.crm,marginBottom:2}}>
                    {food.name}
                  </div>
                  <div style={{fontSize:11,fontWeight:600,color:color}}>
                    {gramsNeeded}g
                  </div>
                  <div style={{fontSize:9,color:G.mut,marginTop:2}}>
                    +{collateral.k}kcal
                    {collateral.p>2 ? ` · +${collateral.p}P`:""}
                    {collateral.c>3 ? ` · +${collateral.c}C`:""}
                    {collateral.f>2 ? ` · +${collateral.f}G`:""}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

class HistorialErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }

  render() {
    if(this.state.error) {
      return React.createElement("div", {
        style:{background:"#FFF0EE",border:"1px solid #C68B77",borderRadius:12,padding:"20px",margin:"16px 0"}
      },

          "⚠️ Error en Historial — copia este mensaje para Clau:"
        ),
        React.createElement("div", {style:{fontSize:11,color:"#3A2820",fontFamily:"monospace",
          background:"#FFF",padding:"8px",borderRadius:6,wordBreak:"break-all"}},
