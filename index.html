}

function BitacoraScreen({profile, meals, gymDay, workoutLog, sleepLog, onNavigate, onBitacoraUpdate, anthropicKey}) {
  const today = localDateStr();
  const [records, setRecords] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [nutriAnalysis, setNutriAnalysis] = useState(null);
  const [analysisDate, setAnalysisDate] = useState(null);

  // Load saved analysis for today on mount
  useEffect(()=>{
    loadJSON("ai_analysis:"+today).then(saved=>{
      if(saved?.result) {
        // Check if meal data changed significantly since analysis was saved
        const todayMealsKey = "log:" + today;
        const freshRaw = window.storage.get(todayMealsKey);
        let freshKcal = 0;
        if(freshRaw?.value) {
          try {
            const fm = JSON.parse(freshRaw.value);
            freshKcal = Object.values(fm).flat().reduce((s,i)=>s+(i.k??0),0);
          } catch(e) {}
        }
        const savedKcal = saved.kcalAtAnalysis || 0;
        // If calories changed by more than 200 kcal, don't load cache
        if(Math.abs(freshKcal - savedKcal) > 200) return;
        setNutriAnalysis(saved.result);
        setAnalysisDate(saved.savedAt);
      }
    });
  },[]);
  const [showHistory, setShowHistory] = useState(false);
  const [selectedHistoryDay, setSelectedHistoryDay] = useState(null);
  const [yesterdayMeals, setYesterdayMeals] = useState(null);

  // Load yesterday's meals for causalidad cruzada
  useEffect(()=>{
    const yd = new Date(); yd.setDate(yd.getDate()-1);
    const yKey = yd.getFullYear()+"-"+String(yd.getMonth()+1).padStart(2,"0")+"-"+String(yd.getDate()).padStart(2,"0");
    loadJSON("log:"+yKey).then(m=>{ if(m) setYesterdayMeals(m); });
  },[]);

  // ── TAG DEFINITIONS ────────────────────────────────────────────────
  const MENTAL_TAGS = [
    {id:"en_foco",        label:"En Foco",         dot:"#A89EC0", pos:true},
    {id:"paz_mental",     label:"Paz Mental",       dot:"#A89EC0", pos:true},
    {id:"conexion",       label:"Conexión",         dot:"#A89EC0", pos:true},
    {id:"mente_dispersa", label:"Mente Dispersa",   dot:"#C8922A", pos:false},
    {id:"modo_control",   label:"Modo Control",     dot:"#C8922A", pos:false},
  ];
  const CUERPO_TAGS = [
    {id:"energia_estable",  label:"Energía Estable",  dot:"#7A9A82", pos:true},
    {id:"piel_luminosa",    label:"Piel Luminosa",    dot:"#7A9A82", pos:true},
    {id:"fuerza_real",      label:"Fuerza Real",      dot:"#7A9A82", pos:true},
    {id:"digestion_ligera", label:"Digestión Ligera", dot:"#7A9A82", pos:true},
    {id:"hinchazón",        label:"Hinchazón",        dot:"#D4A090", pos:false},
    {id:"transito_lento",   label:"Tránsito Lento",   dot:"#D4A090", pos:false},
    {id:"fatiga_cronica",   label:"Fatiga Crónica",   dot:"#D4A090", pos:false},
  ];
  const NUTRI_TAGS = [
    {id:"nutricion_limpia", label:"Nutrición Limpia",    dot:"#D4B86A", pos:true},
    {id:"comi_presencia",   label:"Comí con Presencia",  dot:"#D4B86A", pos:true},
    {id:"ansiedad_dulce",   label:"Ansiedad por Dulce",  dot:"#D4A090", pos:false},
    {id:"comi_prisa",       label:"Comí con Prisa",      dot:"#D4A090", pos:false},
  ];
  const SLEEP_OPTS = [
    {id:"bien",    label:"Dormí bien",  ic:"😴", val:4, desc:"7h+"},
    {id:"regular", label:"Regular",     ic:"🌙", val:3, desc:"6-7h"},
    {id:"mal",     label:"Mal",         ic:"😵", val:1, desc:"-6h"},
  ];

  useEffect(()=>{
    loadJSON(BITACORA_KEY).then(d=>{
      if(d) setRecords(d);
      setLoaded(true);
    });
  },[]);

  const todayRec = records[today] || {
    coherencia: 50,
    mentalTags: [], cuerpoTags: [], nutriTags: [],
    sueno: null, suenoHoras: "",
    energia: null, estres: null,
    digestion: null, hambre: null,
    fase: profile?.cycleStart ? (getCyclePhase(profile.cycleStart, profile.cycleLength||28)?.id||"folicular") : "folicular",
    notas: "", registered: false,
  };

  // Derive legacy 1-5 values for correlations engine backwards compat
  const deriveLegacy = (rec) => {
    const all = [...(rec.mentalTags||[]), ...(rec.cuerpoTags||[])];
    return {
      energiaScore: all.includes("energia_estable") ? 4 : all.includes("fatiga_cronica") ? 1 : 3,
      foco:    all.includes("en_foco") ? 5 : (all.includes("mente_dispersa")||all.includes("modo_control")) ? 2 : 3,
      piel:    all.includes("piel_luminosa") ? 5 : 3,
      digestionScore: rec.digestion==="ligera"?5:rec.digestion==="pesada"?2:
        (all.includes("digestion_ligera") ? 5 : (all.includes("hinchazón")||all.includes("transito_lento")) ? 2 : 3),
      animo:   all.includes("conexion") ? 5 : all.includes("paz_mental") ? 4 : all.includes("modo_control") ? 2 : 3,
      suenoScore: {"bien":4,"regular":3,"mal":1}[rec.sueno] || 3,
      sintomas: all,
    };
  };

  const persist = (newRec) => {
    const legacy = deriveLegacy(newRec);
    const full = {...newRec, ...legacy};
    const newRecords = {...records, [today]: full};
    setRecords(newRecords);
    save(BITACORA_KEY, newRecords);
    // Also update sleepLog if hours provided
    if(newRec.suenoHoras && parseFloat(newRec.suenoHoras) > 0) {
      loadJSON(SLEEP_KEY).then(sl => {
        const updated = {...(sl||{}), [today]: {hours: parseFloat(newRec.suenoHoras), quality: newRec.sueno}};
        save(SLEEP_KEY, updated);
      });
    }
    if(onBitacoraUpdate) onBitacoraUpdate({...records, [today]: full});
  };

  const toggleTag = (field, id) => {
    const cur = todayRec[field] || [];
    const next = cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id];
    persist({...todayRec, [field]: next});
  };

  const setField = (key, val) => persist({...todayRec, [key]: val});

  // ── CORRELATIONS ENGINE ─────────────────────────────────────────────
  const getCorrelations = () => {
    const insights = [];
    const allDays = Object.values(records);
    const allTags = [...(todayRec.mentalTags||[]), ...(todayRec.cuerpoTags||[]), ...(todayRec.nutriTags||[])];

    // Trigger: Cortisol/Estrés (Modo Control / Mente Dispersa ≥4 veces en 7 días)
    const last7vals = Object.entries(records)
      .filter(([k])=>{ const d=new Date(k); const now=new Date(); return (now-d)/86400000 <= 7; })
      .map(([,v])=>v);
    const stressCount = last7vals.filter(v=>(v.mentalTags||v.sintomas||[]).some(t=>t==="modo_control"||t==="mente_dispersa")).length;
    const avgSleep = last7vals.filter(v=>v.sueno||v.suenoNum).length > 0
      ? last7vals.reduce((a,v)=>a+({"bien":7.5,"regular":6.5,"mal":5}[v.sueno]||v.suenoNum||6.5), 0) / last7vals.length
      : null;
    if(stressCount >= 4 && avgSleep && avgSleep < 7) {
      insights.push({ic:"🧠", color:"#A89EC0",
        title:"Patrón: Mente en modo sobrevivencia",
        msg:"Llevas "+stressCount+" días en estado de estrés o control, con sueño promedio de "+avgSleep.toFixed(1)+"h. El cortisol elevado retiene agua y ralentiza la digestión. No es un retroceso — es química.",
        accion:"Magnesio glicinato 300mg antes de dormir + protocolo de respiración 4-7-8. El sistema nervioso se regula en 48h."});
    }

    // Trigger: Espejo de la piel (coherencia ≥75% por 5 días + piel luminosa)
    const highCoherence = last7vals.filter(v=>v.coherencia && v.coherencia >= 75).length;
    if(highCoherence >= 5 && allTags.includes("piel_luminosa")) {
      insights.push({ic:"✨", color:G.grn,
        title:"Tu software está sanando tu hardware",
        msg:"Llevas "+highCoherence+" días con coherencia alta y hoy tu piel lo refleja. La reducción de cortisol disminuye la inflamación sistémica — eso es literalmente lo que estás viendo en el espejo.",
        accion:"Esto es evidencia real de progreso. Guárdalo en tu proyecto de manifestación."});
    }

    // Trigger: Antojos de dulce + intestino inflamado
    if(allTags.includes("ansiedad_dulce")) {
      const prevDayKey = localDateStr(new Date(Date.now()-86400000));
      const prevDay = records[prevDayKey];
      const prevTags = [...(prevDay?.mentalTags||[]), ...(prevDay?.cuerpoTags||[]), ...(prevDay?.sintomas||[])];
      if(prevTags.some(t=>t==="transito_lento"||t==="hinchazón")) {
        insights.push({ic:"🔍", color:G.terra,
          title:"Descifrador de antojos",

                        border:`1.5px solid ${todayRec[key]===v?c:"rgba(255,255,255,0.08)"}`,
                        background:todayRec[key]===v?`${c}35`:"transparent",
                        fontSize:10,fontWeight:todayRec[key]===v?600:400,
                        color:todayRec[key]===v?"rgba(249,245,240,0.95)":"rgba(249,245,240,0.35)",

                      {l}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>


        </div>
      </div>
      {/* ── LA HISTORIA DEL DÍA ── */}
      {(()=>{
        const ytot = yesterdayMeals ? totals(yesterdayMeals) : null;
        const tgt = calcTargets(profile, getEffectiveDayType(gymDay||0, workoutLog||{}), calcAvgSleep(sleepLog||{}));
        const yProtPct = ytot && tgt?.protein ? Math.round((ytot.p/tgt.protein)*100) : null;
        const cuerpo = todayRec.cuerpoTags || [];
        const mente = todayRec.mentalTags || [];
        const mTags = morningRec?.energiaTags || [];
        const sleep = morningRec?.sueno;
        const phase = cp?.phase;
        const phaseDay = cp?.day || 0;
        const isLateLuteal = phase==="luteal" && phaseDay>=22;
        const isMenstrual = phase==="menstruation";
        const isOvulation = phase==="ovulation";
        const hasFatigue = cuerpo.includes("fatiga_cronica");
        const hasHinchazon = cuerpo.includes("hinchazón");
        const hasBrainFog = mente.includes("mente_dispersa");
        const hasControl = mente.includes("modo_control");
        const hasEnergy = cuerpo.includes("energia_estable") || mTags.includes("energizada");
        const hasBadSleep = sleep==="mal";
        const hasGoodSleep = sleep==="bien";
        const hasData = ytot || sleep || cuerpo.length || mente.length || mTags.length;

        if(!hasData) return null;

        const parts = [];

        // Sentence 1: Yesterday's nutrition
        if(yProtPct !== null) {
          if(yProtPct >= 90) parts.push(`Ayer entraste el ${yProtPct}% de tu proteína.`);
          else if(yProtPct >= 60) parts.push(`Ayer la proteína estuvo a ${yProtPct}% — algo corta.`);
          else if(yProtPct > 0) parts.push(`Ayer la proteína estuvo baja — solo el ${yProtPct}% del objetivo.`);
          else parts.push(`Ayer no registraste comidas.`);
        }

        // Sentence 2: Connect symptoms with biology
        if(hasFatigue && isLateLuteal) {
          parts.push(`La fatiga en lútea tardía es química, no debilidad — la progesterona alta consume energía real.`);
        } else if(hasFatigue && hasBadSleep) {
          parts.push(`Sueño difícil más fatiga — tu sistema nervioso necesita recuperación hoy, no rendimiento.`);
        } else if(hasHinchazon && yProtPct !== null && yProtPct < 70) {
          parts.push(`Hinchazón con proteína baja puede ser inflamación sin sustrato para reparar.`);
        } else if(hasBrainFog && yProtPct !== null && yProtPct < 70) {
          parts.push(`Mente dispersa y proteína baja ayer — el triptófano para serotonina viene de la proteína.`);
        } else if(hasControl) {
          parts.push(`Modo control activo — suele ser cortisol alto respondiendo a algo que no se ha expresado.`);
        } else if(hasEnergy && yProtPct !== null && yProtPct >= 90 && hasGoodSleep) {
          parts.push(`Sueño bien, proteína completa, energía estable. Tu biología está alineada hoy.`);
        } else if(hasBadSleep) {
          parts.push(`Noche difícil — el cortisol sube cuando el sueño es corto. Hoy come antes y bien.`);
        }

        // Sentence 3: Phase context
        if(isLateLuteal && !parts.some(p=>p.includes("lútea"))) {
          parts.push(`Día ${phaseDay} de lútea — metabolismo activo, energía más corta. Es el ciclo, no tú.`);
        } else if(isMenstrual) {
          parts.push(`Primeros días del ciclo — el cuerpo pide recuperación, no rendimiento.`);
        } else if(isOvulation) {
          parts.push(`Ovulación — tu ventana de mayor claridad y energía del mes.`);
        }

        if(parts.length === 0) return null;

        return (
          <div style={{background:G.card,border:`1px solid ${G.bor}`,
            borderRadius:16,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:10,color:G.terra,letterSpacing:"0.12em",

                marginBottom:i<parts.length-1?8:0}}>
                {p}
              </p>
            ))}
          </div>
        );
      })()}

// ─── MÓDULO DE SUEÑO ──────────────────────────────────────────────────────
const SLEEP_KEY = "sleep_log";

function SleepScreen({profile}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [bedTime, setBedTime] = useState("21:15");
  const [wakeTime, setWakeTime] = useState("03:30");
  const [wakePattern, setWakePattern] = useState("");
  const [notes, setNotes] = useState("");
  const [showProtocol, setShowProtocol] = useState(false);
  const [showAnalysis, setShowAnalysis] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedOk, setSavedOk] = useState(false);

  useEffect(()=>{
    loadJSON(SLEEP_KEY).then(d=>{
      if(d){
        setLogs(d);
        if(d[today]){
          setBedTime(d[today].bedTime||"21:15");
          setWakeTime(d[today].wakeTime||"03:30");
          setWakePattern(d[today].wakePattern||"");
          setNotes(d[today].notes||"");
          if(d[today].hours) setSavedOk(true); // Already saved today
        }
      }
      setLoaded(true);
    });
  },[]);

  const calcHours = (bed, wake) => {
    try {
      const [bh,bm] = bed.split(":").map(Number);
      const [wh,wm] = wake.split(":").map(Number);
      let mins = (wh*60+wm) - (bh*60+bm);
      if(mins < 0) mins += 24*60;
      return Math.round(mins/60*10)/10;
    } catch(e){ return 0; }
  };

  const hours = calcHours(bedTime, wakeTime);

  const saveLog = async () => {
    setSaving(true);
    const entry = {bedTime, wakeTime, wakePattern, notes, hours};
    const newLogs = {...logs, [today]: entry};
    setLogs(newLogs);
    await save(SLEEP_KEY, newLogs);
    setSaving(false);
    setSavedOk(true);
    setShowAnalysis(true);
    setTimeout(()=>setSavedOk(false), 2000);
  };

  // Last 7 days chart data
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const key = localDateStr(d);
    const log = logs[key];
    const lbls = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {
      label: i===6?"Hoy":lbls[d.getDay()],
      hours: log?.hours||0,
      wakePattern: log?.wakePattern||"",
      hasData: !!log
    };
  });

  // Sleep quality color
  const sleepColor = (h) => {
    if(h>=7.5) return G.grn;
    if(h>=6) return "#EAC850";
    return G.err;
  };

  // Analysis engine
  const getAnalysis = () => {
    const pat = wakePattern;

          {ic:"⏰", title:"Horario consistente", desc:"El cuerpo regula el cortisol por ritmo circadiano. Acostarte y levantarte a la misma hora — incluso fines de semana — es la intervención más potente."},
          isSmoker ? {ic:"🚬", title:"Último cigarrillo", desc:"Mínimo 2 horas antes de dormir. La nicotina tiene vida media de ~2 horas y mantiene el sistema nervioso en alerta."} : null,

    if(pat === "calor") {
      return {

        ic: "🔥",
        color: "#E07070",

                <div style={{width:"100%",background:d.hours>0?sleepColor(d.hours):G.bor,

        </div>
      )}

      {/* Analysis */}
      {showAnalysis && wakePattern && (
        <div>
          <div style={{background:`${analysis.color}15`,border:`1px solid ${analysis.color}44`,
            borderRadius:16,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:11,color:analysis.color,letterSpacing:1.2,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>
              {analysis.ic} Causa probable
            </div>
            <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:10}}>{analysis.causa}</div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:12}}>{analysis.explanation}</div>
            {analysis.factores.length>0&&(
              <div>
                <div style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Factores en tu caso</div>
                {analysis.factores.map((f,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
                    <span style={{color:analysis.color,flexShrink:0}}>·</span>
                    <span style={{fontSize:12,color:G.sft,lineHeight:1.6}}>{f}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="serif" style={{fontSize:18,fontWeight:500,color:G.crm,marginBottom:4}}>Tu protocolo de sueño</div>
          <div style={{fontSize:12,color:G.sft,marginBottom:14}}>Personalizado para tu perfil.</div>
          {analysis.protocolo.map((p,i)=>(
            <div key={i} style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:20,
              padding:"14px 16px",marginBottom:10,display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:22,flexShrink:0}}>{p.ic}</span>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:G.crm,marginBottom:4}}>{p.title}</div>
                <div style={{fontSize:12,color:G.sft,lineHeight:1.6}}>{p.desc}</div>
              </div>
            </div>
          ))}

          <div style={{background:G.card,border:"1px solid rgba(74,155,111,.2)",
            borderRadius:16,padding:14,marginTop:4,fontSize:12,color:G.sft,lineHeight:1.7}}>
            💡 El sueño óptimo (7.5-9h) es cuando se libera el 80% de la hormona de crecimiento diaria — la misma que construye músculo y quema grasa mientras duermes. No es descanso. Es entrenamiento invisible.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── LAB NOTES ───────────────────────────────────────────────────────────────
function LabNotes({labN}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const NOTES_KEY = "lab_notes:"+labN;
  const [notes, setNotes] = useState([]);
  const [currentNote, setCurrentNote] = useState("");
  const [showHistory, setShowHistory] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    loadJSON(NOTES_KEY).then(d=>{
      if(d) setNotes(d);
      setLoaded(true);
    });
  },[labN]);

  const saveNote = async() => {
    if(!currentNote.trim()) return;
    setSaving(true);
    const newNote = {date:today, text:currentNote.trim()};
    const newNotes = [newNote, ...notes];
    setNotes(newNotes);
    await save(NOTES_KEY, newNotes);
    setCurrentNote("");
    setSaving(false);
  };

  const todayNote = notes.find(n=>n.date===today);
  const pastNotes = notes.filter(n=>n.date!==today);
  const dayLabels = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const monthLabels = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const fmtDate = (str) => { const d=new Date(str+"T12:00:00"); return `${dayLabels[d.getDay()]} ${d.getDate()} ${monthLabels[d.getMonth()]}`; };

  return (
    <div style={{margin:"0 16px 12px"}}>
      <div style={{fontSize:10,color:G.terra,letterSpacing:2,textTransform:"uppercase",
        marginBottom:8,fontWeight:600}}>
        Mis notas
      </div>

      {/* Today's note */}
      {todayNote ? (
        <div style={{background:"rgba(168,158,192,.08)",borderRadius:10,
          padding:"10px 12px",marginBottom:8,fontSize:13,color:G.sft,lineHeight:1.7}}>
          <div style={{fontSize:10,color:"#A89EC0",marginBottom:4}}>{fmtDate(todayNote.date)}</div>
          {todayNote.text}
        </div>
      ) : (
        <div style={{marginBottom:8}}>
          <textarea value={currentNote} onChange={e=>setCurrentNote(e.target.value)}
            placeholder="¿Qué conectaste hoy con este Lab?"
            style={{width:"100%",minHeight:70,background:G.sur,
              border:`1px solid ${currentNote?"#A89EC0":G.bor}`,
              borderRadius:10,padding:"10px 12px",color:G.crm,fontSize:13,
              outline:"none",resize:"none",lineHeight:1.7,
              fontFamily:"'DM Sans',sans-serif"}}/>
          {currentNote.trim() && (
            <button onClick={saveNote} disabled={saving}
              style={{width:"100%",background:"#A89EC0",color:"#fff",border:"none",
                borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,
                cursor:"pointer",marginTop:6}}>
              {saving?"Guardando...":"Guardar nota"}
            </button>
          )}
        </div>
      )}

      {/* Past notes */}
      {pastNotes.length > 0 && (
        <button onClick={()=>setShowHistory(!showHistory)}
          style={{background:"transparent",border:"none",color:"#A89EC0",
            fontSize:11,cursor:"pointer",padding:0,marginBottom:showHistory?8:0}}>
          {showHistory?"▲ Ocultar":"▸ Ver notas anteriores"} ({pastNotes.length})
        </button>
      )}
      {showHistory && pastNotes.map((n,i)=>(
        <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:8,
          padding:"8px 10px",marginBottom:6,fontSize:12,color:G.sft,lineHeight:1.6,
          border:`1px solid ${G.bor}`}}>
          <div style={{fontSize:10,color:G.mut,marginBottom:3}}>{fmtDate(n.date)}</div>
          {n.text}
        </div>
      ))}
    </div>
  );
}


function LabCompletionForm({lab, isCompleted, onComplete}) {

  const [response, setResponse] = useState("");
  const minChars = 10;

  if(isCompleted) {
    return (
      <div style={{margin:"0 16px 16px",padding:"10px 12px",borderRadius:10,
        background:"rgba(90,122,98,.08)",border:"1px solid rgba(74,155,111,.3)",

      </div>
    );

  if(!showForm) {
    return (
      <div style={{margin:"0 16px 16px"}}>
        <button onClick={()=>setShowForm(true)}
          style={{width:"100%",background:"transparent",
            border:"1px dashed rgba(74,155,111,.4)",borderRadius:10,
            padding:"10px",fontSize:12,color:"#6BBF8E",cursor:"pointer"}}>
          ✓ Marcar Lab como completado
        </button>
      </div>
    );
  }

  return (
    <div style={{margin:"0 16px 16px",padding:"14px",borderRadius:16,
      background:"rgba(90,122,98,.04)",border:"1px solid rgba(74,155,111,.2)"}}>

        style={{width:"100%",minHeight:80,background:G.sur,

function isLabLocked(labN, labCompletions, premise) {
  const completed = (n) => labCompletions?.some(c=>c.n===n);
  // Etapa 1: always available
  if(labN===1 || labN===3) return false;
  // Etapa 2: needs Lab 1 completed OR premise saved
  if(labN===2) return !completed(1) && !premise?.vision;
  // Etapa 3: needs Lab 2 completed
  if(labN===4 || labN===5) return !completed(2);
  // Etapa 4: needs Labs 4 AND 5 completed
  if(labN===6 || labN===7 || labN===8) return !completed(4) || !completed(5);
  return false;
}

function LabCierreReport({lab, labMeta, labDetail, bitacoraLog, anthropicKey}) {
  const [loading, setLoading] = React.useState(false);
  const [report, setReport] = React.useState(null);
  const [savedAt, setSavedAt] = React.useState(null);
  const cacheKey = "lab_cierre_report:" + lab.n;

  React.useEffect(()=>{
    loadJSON(cacheKey).then(s=>{ if(s?.result){setReport(s.result);setSavedAt(s.savedAt);} });
  },[]);

  const generate = async() => {
    if(!anthropicKey){ setReport({error:"Sin clave IA. Configúrala en ≡ → Más."}); return; }
    setLoading(true);

    // Get lab date range
    const startDate = new Date(lab.startDate);
    const labDays = Array.from({length:7},(_,i)=>{
      const d = new Date(startDate); d.setDate(d.getDate()+i);
      return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    });
    const preDays = Array.from({length:7},(_,i)=>{
      const d = new Date(startDate); d.setDate(d.getDate()-7+i);
      return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    });

    // Load meals for both periods
    const loadMealsForDays = async(days) => {
      const results = await Promise.all(days.map(d=>loadJSON("log:"+d)));
      return results.map((m,i)=>({date:days[i], meals:m||{}}));
    };

    const [labMealsData, preMealsData] = await Promise.all([
      loadMealsForDays(labDays),
      loadMealsForDays(preDays)
    ]);

    const avgMacros = (mealsArr) => {
      const days = mealsArr.filter(d=>Object.values(d.meals).flat().length>0);
      if(!days.length) return null;
      const sums = days.reduce((acc,d)=>{
        const tot = totals(d.meals);
        return {k:acc.k+tot.k, p:acc.p+tot.p, c:acc.c+tot.c, f:acc.f+tot.f, n:acc.n+1};
      },{k:0,p:0,c:0,f:0,n:0});
      return {k:Math.round(sums.k/sums.n), p:Math.round(sums.p/sums.n), c:Math.round(sums.c/sums.n), f:Math.round(sums.f/sums.n), days:sums.n};
    };

    const avgBitacora = (days) => {
      const recs = days.map(d=>(bitacoraLog||{})[d]).filter(Boolean);
      if(!recs.length) return null;
      const avgEnergy = recs.filter(r=>r.energia).reduce((s,r)=>s+r.energia,0) / (recs.filter(r=>r.energia).length||1);
      const avgStress = recs.filter(r=>r.estres).reduce((s,r)=>s+r.estres,0) / (recs.filter(r=>r.estres).length||1);
      const avgCoherence = recs.reduce((s,r)=>s+(r.coherencia||50),0)/recs.length;
      const sleepGood = recs.filter(r=>r.sueno==="bien").length;
      const notes = recs.map(r=>r.notaDia).filter(Boolean);
      return {avgEnergy:avgEnergy.toFixed(1), avgStress:avgStress.toFixed(1), avgCoherence:Math.round(avgCoherence), sleepGood, total:recs.length, notes};
    };

    const labMacros = avgMacros(labMealsData);
    const preMacros = avgMacros(preMealsData);
    const labBit = avgBitacora(labDays);
    const preBit = avgBitacora(preDays);
    const completedCount = (lab.completedDays||[]).length;

    const macroCompare = labMacros && preMacros
      ? `Pre-lab: ${preMacros.k}kcal · ${preMacros.p}gP · ${preMacros.c}gC · ${preMacros.f}gG (${preMacros.days} días)\nDurante lab: ${labMacros.k}kcal · ${labMacros.p}gP · ${labMacros.c}gC · ${labMacros.f}gG (${labMacros.days} días)`
      : "Sin suficientes datos de nutrición para comparar";

    const bitCompare = labBit && preBit
      ? `Pre-lab: Energía ${preBit.avgEnergy}/5 · Estrés ${preBit.avgStress}/5 · Coherencia ${preBit.avgCoherence}/100 · Sueño bien ${preBit.sleepGood}/${preBit.total} días\nDurante lab: Energía ${labBit.avgEnergy}/5 · Estrés ${labBit.avgStress}/5 · Coherencia ${labBit.avgCoherence}/100 · Sueño bien ${labBit.sleepGood}/${labBit.total} días`
      : (labBit ? `Durante lab: Energía ${labBit.avgEnergy}/5 · Estrés ${labBit.avgStress}/5 · Coherencia ${labBit.avgCoherence}/100 · Sueño bien ${labBit.sleepGood}/${labBit.total} días` : "Sin datos de bienestar");

    const prompt = `Eres el coach de Fundamental. Genera el reporte de cierre del Lab ${lab.n}.

LAB: "${labMeta?.title}" — ${labMeta?.sub}
MECANISMO: ${labDetail?.bio?.slice(0,200)||""}
ALIMENTOS DEL LAB: ${labDetail?.alimentos||""} (${labDetail?.alimentosNota||""})
DÍAS COMPLETADOS: ${completedCount}/7

DATOS DE BIENESTAR (Bitácora):
${bitCompare}
${labBit?.notes?.length ? `Notas del período: "${labBit.notes.slice(0,3).join(" / ")}"` : ""}

DATOS DE NUTRICIÓN:
${macroCompare}

Analiza el impacto real del lab. Conecta ESPECÍFICAMENTE los cambios de nutrición con el mecanismo biológico del lab. Si la proteína subió durante el lab de serotonina — dilo. Si el estrés bajó cuando mejoró la nutrición — conéctalo.

Responde SOLO con JSON válido:
{"resumen":"2 frases sobre el impacto real observado con números","nutricion":{"titulo":"título conectando lab y nutrición","observacion":"qué cambió en la nutrición y por qué importa para este lab específico","accion":"ajuste nutricional concreto para mantener el beneficio"},"bienestar":{"titulo":"título del patrón de bienestar","observacion":"qué cambió en energía/estrés/sueño/coherencia","conexion":"cómo conecta con el mecanismo biológico del lab"},"paraLlevar":"una sola acción o práctica para integrar el beneficio del lab en la rutina"}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":anthropicKey,
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,
          system:"Responde ÚNICAMENTE con JSON válido y completo. Sin texto adicional ni markdown.",
          messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||"").join("");
      const s = text.indexOf("{"); const e = text.lastIndexOf("}");
      const parsed = JSON.parse(s!==-1&&e>s?text.slice(s,e+1):text);
      setReport(parsed);
      const at = new Date().toLocaleDateString("es",{day:"numeric",month:"short"})+" "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
      setSavedAt(at);
      save(cacheKey,{result:parsed,savedAt:at,labN:lab.n,generatedAt:new Date().toISOString()});
    } catch(e){ setReport({error:"Error generando reporte. Intenta de nuevo."}); }
    setLoading(false);
  };

  const color = "#C68B77";

  return (
    <div style={{marginTop:16}}>
      {report && !report.error && (
        <div style={{background:"linear-gradient(135deg,#1A1410,#2A1E14)",borderRadius:16,
          padding:"16px",marginBottom:12,border:"1px solid rgba(212,168,83,0.2)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:10,color:"rgba(212,168,83,0.6)",letterSpacing:"0.15em",
              textTransform:"uppercase",fontWeight:600}}>✦ Reporte de cierre</div>
            {savedAt&&<span style={{fontSize:9,color:"rgba(249,245,240,0.2)"}}>{savedAt}</span>}
          </div>
          {report.resumen&&(
            <div style={{fontSize:13,color:"rgba(249,245,240,0.85)",lineHeight:1.7,marginBottom:14}}>
              {report.resumen}
            </div>
          )}
          {[
            report.nutricion&&{ic:"🥗",data:report.nutricion,border:"rgba(90,122,98,0.3)"},
            report.bienestar&&{ic:"🧠",data:report.bienestar,border:"rgba(168,158,192,0.3)"},
          ].filter(Boolean).map((item,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,
              padding:"12px",marginBottom:8,border:`1px solid ${item.border}`}}>
              <div style={{fontSize:12,fontWeight:600,color:"rgba(249,245,240,0.85)",marginBottom:6}}>
                {item.ic} {item.data.titulo}
              </div>
              <div style={{fontSize:12,color:"rgba(249,245,240,0.6)",lineHeight:1.65,marginBottom:4}}>
                {item.data.observacion}
              </div>
              {(item.data.accion||item.data.conexion)&&(
                <div style={{fontSize:11,color:"rgba(212,168,83,0.7)",fontStyle:"italic",lineHeight:1.6}}>
                  → {item.data.accion||item.data.conexion}
                </div>
              )}
            </div>
          ))}
          {report.paraLlevar&&(
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:12,
              fontFamily:"'Fraunces',serif",fontStyle:"italic",
              fontSize:13,color:"rgba(212,168,83,0.8)",lineHeight:1.7}}>
              "{report.paraLlevar}"
            </div>
          )}
        </div>
      )}
      {report?.error&&(
        <div style={{background:"rgba(198,80,80,0.08)",border:"1px solid rgba(198,80,80,0.2)",
          borderRadius:12,padding:"12px",marginBottom:10,fontSize:12,color:"#C65050"}}>
          {report.error}
        </div>
      )}
      <button onClick={generate} disabled={loading}
        style={{width:"100%",background:"transparent",
          border:`1px solid rgba(212,168,83,${report&&!report.error?0.3:0.5})`,
          borderRadius:14,padding:"13px",fontSize:13,fontWeight:500,
          color:`rgba(212,168,83,${report&&!report.error?0.5:0.9})`,
          cursor:loading?"wait":"pointer"}}>
        {loading?"Analizando 7 días...":report&&!report.error?"✦ Regenerar reporte":"✦ Generar reporte de cierre"}
      </button>
    </div>
  );
}

            {!lab.bio && <div style={{fontSize:13,color:G.sft,lineHeight:1.85}}>{lab.desc}</div>}

            {/* Ciencia */}
            {lab.ciencia && (
              <div style={{marginTop:12,padding:"12px 14px",

                borderLeft:"3px solid "+G.bor}}>

                  textTransform:"uppercase",marginBottom:6,fontWeight:600}}>

                </div>
                <div style={{fontSize:12,color:G.sft,lineHeight:1.8,fontStyle:"italic"}}>
                  {lab.ciencia}
                </div>
              </div>

          </div>
          {lab.insight && (
            <div style={{margin:"0 16px 12px",background:G.card,border:`1px solid ${G.bor}`,borderLeft:"3px solid "+G.terra,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:G.terra,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>La verdad más profunda</div>
              <div style={{fontSize:13,color:G.crm,lineHeight:1.7,fontStyle:"italic"}}>"{lab.insight}"</div>
            </div>
          )}
          {lab.pregunta && (
            <div style={{margin:"0 16px 12px",background:G.card,border:`1px solid ${G.bor}`,borderLeft:"3px solid "+"#A89EC0",borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:G.terra,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>Pregunta de reflexión</div>
              <div style={{fontSize:13,color:G.crm,lineHeight:1.7}}>{lab.pregunta}</div>
            </div>
          )}
          {lab.accion && (
            <div style={{margin:"0 16px 0",background:G.card,border:`1px solid ${G.bor}`,borderLeft:"3px solid "+G.terra,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:10,color:G.terra,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>Acción de hoy</div>
              <div style={{fontSize:13,color:G.sft,lineHeight:1.7,marginBottom:actionSet?8:12}}>{lab.accion}</div>
              {!actionSet ? (
                <button onClick={()=>{setActionSet(true);onActionSet&&onActionSet({labN:lab.n,accion:lab.accion,done:false});}}
                  style={{width:"100%",background:G.grn,color:"#fff",border:"none",borderRadius:8,
                    background:G.terra,color:"#fff",border:"none",borderRadius:14,
                  padding:"12px",fontSize:13,fontWeight:500,cursor:"pointer",width:"100%"}}>
                  Hacer esta acción hoy →
                </button>
              ) : (
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setActionDone(true);onActionSet&&onActionSet({labN:lab.n,accion:lab.accion,done:true});}}
                    style={{flex:1,background:actionDone?"rgba(90,122,98,.15)":"transparent",
                      border:`1.5px solid ${actionDone?G.grn:G.bor}`,borderRadius:8,
                      padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer",
                      color:actionDone?G.grl:G.sft}}>
                    {actionDone?"✓ Hecha":"Marcar como hecha"}
                  </button>
                  <button onClick={()=>{setActionSet(false);setActionDone(false);onActionSet&&onActionSet(null);}}
                    style={{background:"transparent",border:`1px solid ${G.bor}`,borderRadius:8,
                      padding:"9px 12px",fontSize:12,cursor:"pointer",color:G.mut}}>
                    ✕
                  </button>
                </div>
              )}
            </div>
          )}
          {/* Alimentos para este Lab */}
          {lab.alimentos && (
            <div style={{margin:"0 16px 12px",padding:"12px 14px",
              background:"rgba(200,132,90,.04)",border:"1px solid rgba(200,132,90,.2)",
              borderRadius:10}}>
              <div style={{fontSize:10,color:G.terra,letterSpacing:"0.12em",
                textTransform:"uppercase",marginBottom:6,fontWeight:600}}>
                Alimentos para este Lab
              </div>
              <div style={{fontSize:13,color:G.crm,lineHeight:1.7,marginBottom:lab.alimentosNota?6:0}}>
                {lab.alimentos}
              </div>
              {lab.alimentosNota && (
                <div style={{fontSize:11,color:G.sft,fontStyle:"italic",lineHeight:1.6}}>
                  {lab.alimentosNota}
                </div>
              )}
            </div>
          )}

          {/* Puente Lab → Registro */}
          {lab.alimentos && onNavigate && (
            <div style={{margin:"0 16px 12px"}}>
              <div style={{fontSize:10,color:G.sft,letterSpacing:"0.12em",textTransform:"uppercase",
                marginBottom:8,fontWeight:600}}>
                Lleva estos alimentos a tu registro
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {lab.alimentos.split(",").map((food,i)=>{
                  const f = food.trim().split(" ")[0].toLowerCase();
                  return (
                    <button key={i} onClick={()=>onNavigate("log_search:"+f)}
                      style={{padding:"5px 12px",borderRadius:20,fontSize:12,
                        background:G.sur,border:`1px solid ${G.bor}`,color:G.crm,cursor:"pointer"}}>
                      + {food.trim().split(" ").slice(0,2).join(" ")}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Notas del Lab */}
          <LabNotes labN={lab.n}/>

          {/* Opción A: Link a Premise */}
          {onPremiseLink && (
            <div style={{margin:"0 16px 12px"}}>
              <button onClick={()=>onPremiseLink(lab)}
                style={{width:"100%",background:isLinkedToPremise?"rgba(168,158,192,.1)":"transparent",
                  border:`1px solid ${isLinkedToPremise?"#A89EC0":G.bor}`,borderRadius:8,
                  padding:"9px",fontSize:12,cursor:"pointer",
                  color:isLinkedToPremise?"#A89EC0":G.mut}}>
                {isLinkedToPremise?"✓ Vinculado a tu Premise":"💎 Agregar a mi Premise"}
              </button>
            </div>
          )}

          {/* Lab Activo - Adoptar como Misión - DESACTIVADO temporalmente */}
          {false && onSetActive && !isCompleted && (
            <div style={{margin:"0 16px 12px"}}>
              {activeLab?.n === lab.n ? (
                <div style={{padding:"12px",borderRadius:10,
                  background:"rgba(168,158,192,.1)",border:"1px solid rgba(168,158,192,.3)"}}>
                  <div style={{fontSize:11,color:"#A89EC0",marginBottom:8,fontWeight:600}}>
                    ✨ Lab activo esta semana
                  </div>
                  <button onClick={()=>onClearActive()}
                    style={{width:"100%",background:"transparent",border:`1px solid ${G.bor}`,
                      borderRadius:8,padding:"7px",fontSize:11,color:G.mut,cursor:"pointer"}}>
                    Cambiar de Lab
                  </button>
                </div>
              ) : activeLab ? (
                <div style={{padding:"10px 12px",borderRadius:10,
                  background:"rgba(255,255,255,.02)",border:`1px solid ${G.bor}`,fontSize:11,color:G.mut}}>
                  Ya tienes "{activeLab.title}" como Lab activo. Cámbialo desde ese Lab si quieres usar este.
                </div>
              ) : (
                <button onClick={()=>onSetActive()}
                  style={{width:"100%",background:"linear-gradient(135deg, rgba(168,158,192,.15), rgba(200,132,90,.1))",
                    border:"1px solid rgba(168,158,192,.4)",borderRadius:10,
                    padding:"12px",fontSize:13,color:"#A89EC0",fontWeight:600,cursor:"pointer"}}>
                  ✨ Adoptar como Misión de la Semana
                </button>
              )}
            </div>
          )}

          {/* Lab Completion - Micro Journaling - DESACTIVADO */}
          {false && onComplete && (
            <LabCompletionForm lab={lab} isCompleted={isCompleted} onComplete={onComplete}/>
          )}
        </div>
      )}
    </div>
  );
}


// ─── PREMISE ONBOARDING ───────────────────────────────────────────────────
const PREMISE_KEY = "my_premise";

const PREMISE_AREAS = [
  {id:"cuerpo", ic:"🌿", label:"Cuerpo", q:"¿Cómo es esa versión de ti en tu cuerpo y salud?"},
  {id:"mente", ic:"🧠", label:"Mente", q:"¿Cómo piensa y decide esa versión de ti?"},
  {id:"emociones", ic:"🌊", label:"Emociones", q:"¿Cómo maneja las emociones esa versión de ti?"},
  {id:"relaciones", ic:"🤝", label:"Relaciones", q:"¿Cómo se relaciona con los demás esa versión de ti?"},
  {id:"trabajo", ic:"⚡", label:"Trabajo y acción", q:"¿Cómo actúa y crea esa versión de ti?"},
  {id:"espiritualidad", ic:"✨", label:"Espiritualidad", q:"¿Qué guía a esa versión de ti internamente?"},
  {id:"resultados", ic:"🏆", label:"Resultados", q:"¿Qué ha construido esa versión de ti?"},
];

function PremiseOnboarding({onComplete}) {
  const [step, setStep] = useState(1); // 1=vision, 2=areas, 3=describe, 4=complete
  const [vision, setVision] = useState("");
  const [selectedAreas, setSelectedAreas] = useState([]);
  const [areaIdx, setAreaIdx] = useState(0);
  const [areaTexts, setAreaTexts] = useState({});
  const [currentAreaText, setCurrentAreaText] = useState("");
  const [saving, setSaving] = useState(false);

  const currentArea = PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx];
  const totalAreas = selectedAreas.length;

  const toggleArea = (id) => {
    setSelectedAreas(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };

  const nextArea = () => {
    const newTexts = {...areaTexts, [currentArea.id]: currentAreaText};
    setAreaTexts(newTexts);
    setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx+1]?.id]||"");
    if(areaIdx < totalAreas-1) {
      setAreaIdx(i=>i+1);
    } else {
      setAreaTexts(newTexts);
      setStep(4);
    }
  };

  const savePremise = async () => {
    setSaving(true);
    const premise = {
      vision,
      areas: selectedAreas.map(id=>({
        id,
        ...PREMISE_AREAS.find(a=>a.id===id),
        text: areaTexts[id]||"",
      })),
      createdAt: new Date().toISOString(),
    };
    await save(PREMISE_KEY, premise);
    setSaving(false);
    onComplete(premise);
  };

  return (
    <div style={{minHeight:"100vh",background:G.bg,padding:"32px 20px 60px",maxWidth:480,margin:"0 auto"}}>
      {/* Progress */}
      <div style={{display:"flex",gap:6,marginBottom:32}}>
        {[1,2,3,4].map(s=>(
          <div key={s} style={{flex:1,height:3,borderRadius:2,
            background:s<=step?G.acc:"rgba(255,255,255,.1)",transition:"background .3s"}}/>
        ))}
      </div>

      {/* PASO 1: VISIÓN */}
      {step===1 && (
        <div className="fade-up">
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 1 de 4
            </div>
            <div className="serif" style={{fontSize:26,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:12}}>
              Imagina la versión de ti que ya llegó.
            </div>
            <div style={{fontSize:14,color:G.sft,lineHeight:1.8}}>
              No quien quieres ser algún día. La versión que ya decidiste que eres. ¿Cómo es? ¿Cómo se siente? ¿Cómo actúa?
            </div>
          </div>
          <textarea value={vision} onChange={e=>setVision(e.target.value)}
            placeholder="Escribe libremente. No hay respuesta correcta..."
            autoFocus
            style={{width:"100%",height:180,background:G.sur,border:`1.5px solid ${vision?G.acc:G.bor}`,
              borderRadius:16,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={()=>setStep(2)} disabled={vision.trim().length<10}
            style={{width:"100%",background:vision.trim().length>=10?G.acc:"rgba(255,255,255,.06)",
              color:vision.trim().length>=10?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:vision.trim().length>=10?"pointer":"not-allowed"}}>
            Continuar →
          </button>
        </div>
      )}

      {/* PASO 2: ÁREAS */}
      {step===2 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise · Paso 2 de 4
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              ¿En qué áreas es más diferente esa versión?
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              Elige las que resuenan. No todas tienen que aplicar.
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {PREMISE_AREAS.map(a=>{
              const on = selectedAreas.includes(a.id);
              return (
                <button key={a.id} onClick={()=>toggleArea(a.id)}
                  style={{background:on?"rgba(200,132,90,.1)":"transparent",
                    border:`1.5px solid ${on?G.acc:G.bor}`,borderRadius:16,
                    padding:"13px 16px",cursor:"pointer",textAlign:"left",
                    display:"flex",alignItems:"center",gap:12,transition:"all .2s"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{a.ic}</span>
                  <span style={{fontSize:14,fontWeight:on?600:400,color:on?G.acl:G.crm}}>{a.label}</span>
                  {on && <span style={{marginLeft:"auto",color:G.acc,fontSize:16}}>✓</span>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>{setAreaIdx(0);setCurrentAreaText("");setStep(3);}}
            disabled={selectedAreas.length===0}
            style={{width:"100%",background:selectedAreas.length>0?G.acc:"rgba(255,255,255,.06)",
              color:selectedAreas.length>0?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:selectedAreas.length>0?"pointer":"not-allowed"}}>
            Continuar con {selectedAreas.length} {selectedAreas.length===1?"área":"áreas"} →
          </button>
        </div>
      )}

      {/* PASO 3: DESCRIBIR CADA ÁREA */}
      {step===3 && currentArea && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Tu Premise · Área {areaIdx+1} de {totalAreas}
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:32}}>{currentArea.ic}</span>
              <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm}}>{currentArea.label}</div>
            </div>
            <div style={{fontSize:15,color:G.sft,lineHeight:1.7}}>{currentArea.q}</div>
          </div>
          <textarea value={currentAreaText} onChange={e=>setCurrentAreaText(e.target.value)}
            placeholder="En tus palabras..."
            autoFocus
            style={{width:"100%",height:140,background:G.sur,
              border:`1.5px solid ${currentAreaText?G.acc:G.bor}`,
              borderRadius:16,padding:"16px",color:G.crm,fontSize:14,resize:"none",outline:"none",
              lineHeight:1.8,fontFamily:"'Fraunces',serif",fontStyle:"italic",marginBottom:20}}/>
          <button onClick={nextArea} disabled={currentAreaText.trim().length<3}
            style={{width:"100%",background:currentAreaText.trim().length>=3?G.acc:"rgba(255,255,255,.06)",
              color:currentAreaText.trim().length>=3?"#fff":G.mut,border:"none",borderRadius:16,
              padding:"14px",fontSize:15,fontWeight:600,cursor:currentAreaText.trim().length>=3?"pointer":"not-allowed"}}>
            {areaIdx<totalAreas-1?"Siguiente área →":"Ver mi Premise →"}
          </button>
          {areaIdx>0 && (
            <button onClick={()=>{
                setAreaIdx(i=>i-1);
                setCurrentAreaText(areaTexts[PREMISE_AREAS.filter(a=>selectedAreas.includes(a.id))[areaIdx-1].id]||"");
              }}
              style={{width:"100%",background:"transparent",border:"none",
                padding:"10px",fontSize:13,color:G.mut,cursor:"pointer",marginTop:4}}>
              ← Volver
            </button>
          )}
        </div>
      )}

      {/* PASO 4: PREMISE COMPLETA */}
      {step===4 && (
        <div className="fade-up">
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>
              Tu Premise
            </div>
            <div className="serif" style={{fontSize:22,fontWeight:500,color:G.crm,lineHeight:1.3,marginBottom:8}}>
              Esta eres tú.
            </div>
            <div style={{fontSize:13,color:G.sft,lineHeight:1.7}}>
              No quien quieres ser — quien ya decidiste que eres. Puedes editarla cuando quieras.
            </div>
          </div>

          {/* Visión */}
          <div style={{background:"rgba(200,132,90,.06)",border:"1px solid rgba(200,132,90,.2)",
            borderRadius:16,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:10,color:G.acc,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>
              Mi visión
            </div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:14,color:G.crm,lineHeight:1.8,fontStyle:"italic"}}>
              "{vision}"
            </div>
          </div>

          {/* Áreas */}
          {selectedAreas.map(id=>{
            const area = PREMISE_AREAS.find(a=>a.id===id);
            const text = areaTexts[id];
            if(!text) return null;
            return (
              <div key={id} style={{background:G.card,border:`1px solid ${G.bor}`,
                borderRadius:16,padding:"14px 16px",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:18}}>{area.ic}</span>
                  <span style={{fontSize:11,color:G.mut,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>
                    {area.label}
                  </span>
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:13,color:G.sft,lineHeight:1.7,fontStyle:"italic"}}>
                  "{text}"
                </div>
              </div>
            );
          })}

          <button onClick={savePremise} disabled={saving}
            style={{width:"100%",background:G.acc,color:"#fff",border:"none",borderRadius:16,
              padding:"15px",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:8,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {saving?"Guardando...":"✓ Esta soy yo — Guardar mi Premise"}
          </button>
        </div>
      )}
    </div>
  );
}

function HealingScreen({profile, meals, workoutLog, sleepLog, healingLog, gymDay, onNavigate, onPremiseSaved, onHealingUpdate, activeLab, setActiveLab, labCompletions, setLabCompletions, labResponses, setLabResponses, initialTab, bitacoraLog, cyclePhase, anthropicKey}) {
  const today = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const hour = new Date().getHours();
  const [myPremise, setMyPremise] = useState(null);
  const [premiseLoaded, setPremiseLoaded] = useState(false);
  const [editingPremise, setEditingPremise] = useState(false);
  const [logs, setLogs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [todayPilar, setTodayPilar] = useState(null);
  const [showSabotaje, setShowSabotaje] = useState(false);
  const [sabStep, setSabStep] = useState(1); // 1=pause, 2=name, 3=decide
  const [sabText, setSabText] = useState("");
  const [sabCountdown, setSabCountdown] = useState(10);
  const [sabTimerActive, setSabTimerActive] = useState(false);
  const [sabResult, setSabResult] = useState(null); // "moved"|"decided"

  useEffect(()=>{
    if(!sabTimerActive) return;
    if(sabCountdown <= 0) { setSabTimerActive(false); setSabStep(2); return; }
    const t = setTimeout(()=>setSabCountdown(n=>n-1), 1000);
    return ()=>clearTimeout(t);
  },[sabTimerActive, sabCountdown]);

  const startProtocol = () => {
    setShowSabotaje(true);
    setSabStep(1);
    setSabText("");
    setSabCountdown(10);
    setSabResult(null);
    setSabTimerActive(true);
  };

  const saveSabResult = async (result, movementType) => {
    setSabResult(result);
    const entry = {
      time: new Date().toISOString(),
      text: sabText,
      result,
      movementType: movementType || null,
    };
    const existing = (logs[today]?.sabotaje || []);
    await saveToday({sabotaje: [...existing, entry]});
  };

  // Count this month's protocol uses
  const thisMonth = Object.entries(logs)
    .filter(([k])=>k.startsWith(new Date().toISOString().slice(0,7)))
    .flatMap(([,v])=>v.sabotaje||[]);
  const movedCount = thisMonth.filter(e=>e.result==="moved").length;
  const decidedCount = thisMonth.filter(e=>e.result==="decided").length;
  const [coherencia, setCoherencia] = useState(null);
  const [aprendizaje, setAprendizaje] = useState("");
  const [showLabs, setShowLabs] = useState(initialTab==="ritual");

  const [showEntryPoint, setShowEntryPoint] = useState(!initialTab);
  const [showCalmaBreather, setShowCalmaBreather] = useState(false);
  const [showCeremony, setShowCeremony] = useState(null); // {labN, insight, title, color, nextLab}
  const [diaryNotes, setDiaryNotes] = useState({});
  const [diaryEntries, setDiaryEntries] = useState([]);
  const [diaryText, setDiaryText] = useState("");
  const [diarySaved, setDiarySaved] = useState(false);
  const [manif, setManif] = useState(null); // {vision, declaraciones:[]}
  const [manifSaved, setManifSaved] = useState(false);
  const [diaryFilter, setDiaryFilter] = useState("todas");
  const [intencion, setIntencion] = useState("");
  const [intencionDraft, setIntencionDraft] = useState("");
  const [intencionSaved, setIntencionSaved] = useState(false);
  const [fiel, setFiel] = useState(null); // true/false/null

  const saveIntencion = async(text) => {
    const today = localDateStr();
    const entry = {
      date: today,
      labN: "intencion",
      labTitle: "Intención del día",
      q: "Hoy me comprometo a...",
      text: text.trim(),
      time: new Date().toISOString(),
    };
    const updated = [entry, ...(diaryEntries||[]).filter(e=>!(e.date===today&&e.labN==="intencion"))];
    await save("diary_entries", updated);

    setIntencionDraft("");
    setIntencionSaved(true);
    setTimeout(()=>setIntencionSaved(false), 2000);

  const saveFiel = async(val) => {

    const today = localDateStr();
    const entry = {
      date: today,

  if(healingTab?.startsWith("labs_")) {
    const labN = parseInt(healingTab.split("_")[1]);
    const LABS_DETAIL = {
      1:{bio:"El cortisol crónico — producido por déficit calórico, falta de sueño o estrés sostenido — mantiene el sistema nervioso en modo amenaza. En ese estado, el cerebro prefrontal cede el control a la amígdala. No es falta de disciplina. Es química.",ciencia:"El cuerpo memoriza los estados emocionales repetitivos. Años de cortisol crónico no son solo estrés — son identidad biológica almacenada en tejido muscular, en postura, en respuestas automáticas. Cambiar quién eres requiere cambiar la química primero, no la voluntad. (Candace Pert — Moléculas de la emoción)",insight:"La persona más controlada externamente suele ser la que más cortisol tiene. El control es la respuesta adaptativa a sentirse insegura. No es fortaleza — es supervivencia disfrazada.",pregunta:"¿Qué estás controlando externamente para no tener que sentir algo internamente?",accion:"Hoy come algo con grasa y proteína antes de las 10am. Observa si tu nivel de control sobre otras cosas cambia durante el día.",alimentos:"Aguacate, huevo entero, mantequilla de maní, queso, aceite de oliva",alimentosNota:"Grasas + sal en el desayuno bajan el cortisol matutino."},

      3:{bio:"El 95% de la serotonina se produce en el intestino a partir del triptófano — un aminoácido que viene de la proteína. Sin carbohidratos suficientes, el triptófano no puede cruzar la barrera hematoencefálica aunque comas proteína. La combinación proteína + carbs es la ruta completa.",ciencia:"El cuerpo se vuelve adicto a las emociones que repite. La rumiación no es un pensamiento — es una molécula. Cuando interrumpes el ciclo con 90 segundos de consciencia, literalmente cortas el suministro químico de esa adicción emocional. (Jill Bolte Taylor — Mi revelación)",insight:"Las emociones duran 90 segundos si no las alimentas con pensamiento. Lo que dura más de 90 segundos no es la emoción — eres tú manteniéndola viva con la narrativa.",pregunta:"¿Qué patrón de pensamiento repetitivo tienes esta semana? ¿Cuándo comiste menos proteína o carbohidratos?",accion:"Usa el cronómetro de 90 segundos ahora. Después come algo con proteína completa + un carbohidrato simple.",alimentos:"Pollo, pavo, huevo, yogurt natural, proteína de suero + banano, arroz, avena",alimentosNota:"Triptófano + carbohidrato simple = ruta completa a la serotonina cerebral."},
      4:{bio:"El nervio vago conecta el intestino con el cerebro y regula el sistema nervioso parasimpático. La fibra alimenta la microbiota que mantiene ese eje saludable. Sin fibra, la microbiota se empobrece en días — el eje se inflama y la tolerancia al estrés cae antes de que notes el cambio físico.",ciencia:"El sistema nervioso no distingue entre una amenaza real y una anticipada. Cada límite no puesto activa la misma respuesta de estrés que un peligro físico. El cuerpo vive la conversación que no tuviste — en forma de tensión, inflamación o agotamiento. (Stephen Porges — Teoría Polivagal)",insight:"Los límites no son agresión. Son regulación del sistema nervioso. Cuando no los pones, el cuerpo los pone por ti — en forma de tensión, enfermedad o explosión.",pregunta:"¿Dónde estás acumulando algo que no has expresado? ¿Cómo se siente eso en el cuerpo ahora mismo?",accion:"Identifica una tensión física que llevas días sintiendo. Conecta esa tensión con algo no dicho.",alimentos:"Caldo de hueso, yogurt natural, vegetales fermentados, vegetales verdes, magnesio",alimentosNota:"Fibra + fermentados nutren el eje intestino-cerebro que regula tu tolerancia al estrés."},

function TimePicker({value, onSave, onCancel}) {
  const [selH, setSelH] = React.useState(value ? parseInt(value.split(":")[0]) : 7);
  const [selM, setSelM] = React.useState(value ? parseInt(value.split(":")[1]) : 0);
  const hours = Array.from({length:24},(_,i)=>i);
  const mins = [0,5,10,15,20,25,30,35,40,45,50,55];
  const hRef = React.useRef(null);
  const mRef = React.useRef(null);
  const ITEM_H = 56;

  const scrollToIdx = (ref, idx) => {
    if(ref.current) ref.current.scrollTop = idx * ITEM_H;
  };

  React.useEffect(()=>{
    scrollToIdx(hRef, hours.indexOf(selH));
    scrollToIdx(mRef, mins.findIndex(m=>m===selM));
  },[]);

  const onScrollH = () => {
    if(!hRef.current) return;
    const idx = Math.round(hRef.current.scrollTop / ITEM_H);
    setSelH(hours[Math.min(idx, hours.length-1)]);
  };

  const onScrollM = () => {
    if(!mRef.current) return;
    const idx = Math.round(mRef.current.scrollTop / ITEM_H);
    setSelM(mins[Math.min(idx, mins.length-1)]);
  };

  const fmt = (n)=>String(n).padStart(2,"0");

  const colStyle = {
    height: ITEM_H*5, overflowY:"scroll", scrollSnapType:"y mandatory",
    borderRadius:16, background:G.sur, border:`1px solid ${G.bor}`, width:110,
    WebkitOverflowScrolling:"touch"
  };

  const itemStyle = (active) => ({
    height:ITEM_H, display:"flex", alignItems:"center", justifyContent:"center",
    scrollSnapAlign:"center",
    background: active?"rgba(180,140,100,0.15)":"transparent",
    borderLeft: active?`3px solid ${G.acc}`:"3px solid transparent",
    fontSize: active?24:17,
    fontWeight: active?600:400,
    color: active?G.acc:G.sft,
    transition:"font-size .1s, color .1s",
    userSelect:"none", WebkitUserSelect:"none"
  });

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,
      background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:G.bg,borderRadius:"20px 20px 0 0",padding:"20px 24px 36px",
          width:"100%",maxWidth:480}}>
        <div style={{textAlign:"center",fontSize:13,color:G.sft,marginBottom:20,
          letterSpacing:"0.05em",textTransform:"uppercase"}}>Hora del recordatorio</div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <span className="serif" style={{fontSize:52,fontWeight:300,color:G.crm,letterSpacing:2}}>
            {fmt(selH)}:{fmt(selM)}
          </span>
        </div>
        <div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:11,color:G.mut,textAlign:"center",marginBottom:8,letterSpacing:"0.1em"}}>HORA</div>
            <div ref={hRef} style={colStyle} onScroll={onScrollH}>
              <div style={{height:ITEM_H*2}}/>
              {hours.map(h=>(
                <div key={h} style={itemStyle(selH===h)}>{fmt(h)}</div>
              ))}
              <div style={{height:ITEM_H*2}}/>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",paddingTop:32}}>
            <span className="serif" style={{fontSize:32,color:G.mut}}>:</span>
          </div>
          <div>
            <div style={{fontSize:11,color:G.mut,textAlign:"center",marginBottom:8,letterSpacing:"0.1em"}}>MIN</div>
            <div ref={mRef} style={colStyle} onScroll={onScrollM}>
              <div style={{height:ITEM_H*2}}/>
              {mins.map(m=>(
                <div key={m} style={itemStyle(selM===m)}>{fmt(m)}</div>
              ))}
              <div style={{height:ITEM_H*2}}/>
            </div>
          </div>
        </div>
        {/* Actions */}
        <div style={{display:"flex",gap:12}}>
          <button onClick={onCancel}
            style={{flex:1,padding:"14px",borderRadius:14,
              background:"transparent",border:`1px solid ${G.bor}`,
              fontSize:14,color:G.mut,cursor:"pointer"}}>
            Cancelar
          </button>
          <button onClick={()=>onSave(fmt(selH)+":"+fmt(selM))}
            style={{flex:2,padding:"14px",borderRadius:14,
              background:G.acc,border:"none",
              fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer"}}>
            Guardar
          </button>
        </div>
      </div>
    </div>
  );
}

                  </div>
                </div>
              </div>
            ))}
          </div>

      })}

      </div>
      {editingTime&&(
        <TimePicker
          value={suppTimes[editingTime]||""}
          onSave={(t)=>saveTime(editingTime,t)}
          onCancel={()=>setEditingTime(null)}/>
      )}
    </div>
  );
}

const METRICS_KEY = "daily_metrics";

  const [water, setWater] = useState(0);

  const [alcohol, setAlcohol] = useState(0);
  const [cycleDay, setCycleDay] = useState("");
  const [cyclePhase, setCyclePhase] = useState("");

    setLogs(newLogs);
    await save(METRICS_KEY, newLogs);

  // Last 7 days for charts
  const last7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const key=localDateStr(d);
    const lbls=["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
    return {key, label:i===6?"Hoy":lbls[d.getDay()], log:logs[key]||{}};
  });

  const waterGoal = 8; // glasses
  const stepsGoal = profile?.activity==="sedentary"?7000:profile?.activity==="light"?8000:10000;

  if(!loaded) return <div style={{padding:40,textAlign:"center",color:G.mut}}>Cargando...</div>;

  if(healingTab?.startsWith("labs_")) {
    const labN = parseInt(healingTab.split("_")[1]);
    const LABS_DETAIL = {
      1:{bio:"El cortisol crónico — producido por déficit calórico, falta de sueño o estrés sostenido — mantiene el sistema nervioso en modo amenaza. En ese estado, el cerebro prefrontal cede el control a la amígdala. No es falta de disciplina. Es química.",ciencia:"El cuerpo memoriza los estados emocionales repetitivos. Años de cortisol crónico no son solo estrés — son identidad biológica almacenada en tejido muscular, en postura, en respuestas automáticas. Cambiar quién eres requiere cambiar la química primero, no la voluntad. (Candace Pert — Moléculas de la emoción)",insight:"La persona más controlada externamente suele ser la que más cortisol tiene. El control es la respuesta adaptativa a sentirse insegura. No es fortaleza — es supervivencia disfrazada.",pregunta:"¿Qué estás controlando externamente para no tener que sentir algo internamente?",accion:"Hoy come algo con grasa y proteína antes de las 10am. Observa si tu nivel de control sobre otras cosas cambia durante el día.",alimentos:"Aguacate, huevo entero, mantequilla de maní, queso, aceite de oliva",alimentosNota:"Grasas + sal en el desayuno bajan el cortisol matutino."},
      2:{bio:"La mielina — la vaina que recubre tus neuronas — está hecha de grasa. Sin suficiente grasa en la dieta, las señales neuronales viajan con estática. Pensar con claridad sobre quién eres requiere literalmente el sustrato graso para que esas conexiones funcionen.",ciencia:"Cada vez que repites un pensamiento con emoción, refuerzas esa red neuronal. La Premise no es afirmación positiva — es construcción deliberada de arquitectura cerebral. Neuronas que se activan juntas, se conectan juntas. La repetición diaria no es disciplina — es biología. (Donald Hebb — Neuroplasticidad)",insight:"Tu Premise no es solo una frase. Es una red neuronal que estás construyendo con repetición. Cada vez que la escribes de memoria, estás mielinizando esa identidad — haciéndola más rápida, más automática, más tuya.",pregunta:"¿Quién serías si tu cerebro tuviera todo el combustible que necesita para pensar con claridad?",accion:"Agrega una cucharada de aceite de oliva o aguacate a tu comida. Escribe tu Premise de memoria antes de dormir.",alimentos:"Huevo entero, pescado graso, aguacate, nueces, chocolate negro",alimentosNota:"Grasas estructurales — los bloques de construcción de la mielina neuronal."},
      3:{bio:"El 95% de la serotonina se produce en el intestino a partir del triptófano — un aminoácido que viene de la proteína. Sin carbohidratos suficientes, el triptófano no puede cruzar la barrera hematoencefálica aunque comas proteína. La combinación proteína + carbs es la ruta completa.",ciencia:"El cuerpo se vuelve adicto a las emociones que repite. La rumiación no es un pensamiento — es una molécula. Cuando interrumpes el ciclo con 90 segundos de consciencia, literalmente cortas el suministro químico de esa adicción emocional. (Jill Bolte Taylor — Mi revelación)",insight:"Las emociones duran 90 segundos si no las alimentas con pensamiento. Lo que dura más de 90 segundos no es la emoción — eres tú manteniéndola viva con la narrativa.",pregunta:"¿Qué patrón de pensamiento repetitivo tienes esta semana? ¿Cuándo comiste menos proteína o carbohidratos?",accion:"Usa el cronómetro de 90 segundos ahora. Después come algo con proteína completa + un carbohidrato simple.",alimentos:"Pollo, pavo, huevo, yogurt natural, proteína de suero + banano, arroz, avena",alimentosNota:"Triptófano + carbohidrato simple = ruta completa a la serotonina cerebral."},
      4:{bio:"El nervio vago conecta el intestino con el cerebro y regula el sistema nervioso parasimpático. La fibra alimenta la microbiota que mantiene ese eje saludable. Sin fibra, la microbiota se empobrece en días — el eje se inflama y la tolerancia al estrés cae antes de que notes el cambio físico.",ciencia:"El sistema nervioso no distingue entre una amenaza real y una anticipada. Cada límite no puesto activa la misma respuesta de estrés que un peligro físico. El cuerpo vive la conversación que no tuviste — en forma de tensión, inflamación o agotamiento. (Stephen Porges — Teoría Polivagal)",insight:"Los límites no son agresión. Son regulación del sistema nervioso. Cuando no los pones, el cuerpo los pone por ti — en forma de tensión, enfermedad o explosión.",pregunta:"¿Dónde estás acumulando algo que no has expresado? ¿Cómo se siente eso en el cuerpo ahora mismo?",accion:"Identifica una tensión física que llevas días sintiendo. Conecta esa tensión con algo no dicho.",alimentos:"Caldo de hueso, yogurt natural, vegetales fermentados, vegetales verdes, magnesio",alimentosNota:"Fibra + fermentados nutren el eje intestino-cerebro que regula tu tolerancia al estrés."},
      5:{bio:"Los comportamientos compulsivos activan el sistema dopaminérgico. La dopamina baja cuando hay estrés crónico, poco sueño o déficit de tirosina. Los carbohidratos regulan los picos y caídas de dopamina — sin ellos, el sistema de recompensa busca gratificación inmediata con más urgencia.",ciencia:"La personalidad es un conjunto de programas automáticos grabados en la primera infancia y reforzados por la emoción. El autosabotaje no es sabotaje — es el programa antiguo ejecutándose. No puedes desinstalarlo con fuerza de voluntad. Necesitas crear un programa nuevo más fuerte y repetirlo hasta que el cuerpo lo memorice. (Bruce Lipton — La biología de la creencia)",insight:"El autosabotaje no es falta de voluntad. Es el sistema nervioso buscando alivio con las herramientas disponibles. El pacto inconsciente existe para protegerte — de una amenaza que ya no existe.",pregunta:"¿Qué comportamiento usas para anestesiarte? ¿Qué sientes en el cuerpo justo antes de hacerlo?",accion:"La próxima vez que sientas el impulso, pon el cronómetro de 90 segundos antes de actuar. No para resistir — para observar.",alimentos:"Proteína animal magra, huevo, semillas, legumbres + carbohidratos complejos",alimentosNota:"Tirosina para dopamina estable. Carbohidratos complejos para evitar los picos que disparan el impulso."},

// ── PROFILE CODE ──────────────────────────────────────────────────────────
function encodeProfile(p) {
  try {
    const parts = [
      (p.name||'').replace(/[|]/g,''),
      p.gender==='male'?'M':'F',
      p.age||0, p.weight||0, p.height||0, p.restingHR||0,
      {sedentary:'S',light:'L',moderate:'M',active:'A',athlete:'AT'}[p.activity]||'M',
      {recomp:'RC',fat_loss:'FL',muscle:'MU',health:'HE'}[p.goal]||'RC',
      {none:'N',pre:'PR',peri:'PE',post:'PO'}[p.menopause]||'N',
      {beginner:'B',intermediate:'I',advanced:'A',expert:'E'}[p.trainingYears]||'B',
      p.muscleLevel||'average',
      (p.conditions||[]).join(',')
    ];
    return 'FND2:' + btoa(parts.join('|'));
  } catch(e) { return ''; }
}
function decodeProfile(code) {
  try {
    if(!code) return null;
    code = code.trim();
    let raw;
    if(code.toUpperCase().startsWith('FND2:')) {
      raw = atob(code.slice(5));
    } else if(code.toUpperCase().startsWith('FND:')) {
      // legacy
      raw = atob(code.slice(4));
    } else return null;
    const parts = raw.split('|');
    const [name,g,age,weight,height,rhr,act,goal,mn,ty,ml,conds] = parts;
    return {
      name: name||'',
      gender: g==='M'?'male':'female',
      age: +age||0, weight: +weight||0, height: +height||0,
      restingHR: +rhr||null,
      activity:{S:'sedentary',L:'light',M:'moderate',A:'active',AT:'athlete'}[act]||'moderate',
      goal:{RC:'recomp',FL:'fat_loss',MU:'muscle',HE:'health'}[goal]||'recomp',
      menopause:{N:'none',PR:'pre',PE:'peri',PO:'post'}[mn]||'none',
      trainingYears:{B:'beginner',I:'intermediate',A:'advanced',E:'expert'}[ty]||'beginner',
      muscleLevel: ml||'average',
      conditions: conds?conds.split(',').filter(Boolean):[]
    };
  } catch(e) { return null; }
}

function ModoPlato({profile, onAdd, onClose}) {
  const tg = calcTargets(profile);
  const [selections, setSelections] = useState({proteina:"", carbo:"", vegetal:"", grasa:""});
  const [porciones, setPorciones] = useState({proteina:1, carbo:1, vegetal:2, grasa:0.5});

  const PLATO_OPTIONS = {
    proteina: ["Pollo cocido","Res","Salmón","Atún","Huevos","Yogurt griego","Tofu"],
    carbo: ["Arroz blanco cocido","Arroz integral cocido","Papa cocida","Batata cocida","Pasta cocida","Quinoa cocida"],
    vegetal: ["Brócoli cocido","Ensalada mixta","Espinaca","Zanahoria cocida","Zucchini cocido","Pimentón"],
    grasa: ["Aguacate","Aceite de oliva","Nueces","Mantequilla de maní"],
  };

  // Portion sizes in grams
  const PORTION_G = {proteina:120, carbo:150, vegetal:100, grasa:30};

  const getItem = (type, name) => {
    const g = PORTION_G[type] * porciones[type];
    const food = DB.find(f=>f.n===name||f.a?.includes(name.toLowerCase()));
    if(!food) return null;
    const factor = g/100;
    return {n:`${name} (plato)`,g,p:Math.round(food.p*factor*10)/10,c:Math.round(food.c*factor*10)/10,f:Math.round(food.f*factor*10)/10,k:Math.round(food.k*factor),fi:Math.round(food.fi*factor*10)/10};
  };

  const addAll = () => {
    const items = Object.entries(selections)
      .filter(([,v])=>v)
      .map(([type,name])=>getItem(type,name))
      .filter(Boolean);
    if(items.length) onAdd(items);
    onClose();
  };

  const totalCal = Object.entries(selections).reduce((acc,[type,name])=>{
    const item = name ? getItem(type,name) : null;
    return acc + (item?.k||0);
  },0);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:G.card,border:`1px solid ${G.bor}`,borderRadius:"20px 20px 0 0",

        {[
          {key:"proteina",label:"🥩 Proteína (¼ del plato)",color:G.acc},
          {key:"carbo",label:"🍚 Carbohidrato (¼ del plato)",color:"#EAC850"},
          {key:"vegetal",label:"🥦 Vegetales (½ del plato)",color:G.grn},
